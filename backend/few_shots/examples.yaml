examples:
  - domain: cpu
    query: Show average CPU busy time per CPU
    sql: SELECT cpu_num, AVG(cpu_busy_time) AS avg_busy_time FROM macht413.cpu GROUP BY cpu_num ORDER BY cpu_num LIMIT 10000;
  - domain: cpu
    query: Show comprehensive CPU performance metrics including type, memory, PCBs, queue lengths, busy percentages, overhead, swaps, dispatches, cache hits, and disk I/Os per second
    sql: "SELECT \n  cpu_num,\n  cpu_type,\n  mem_mb,\n  pcbs,\n  cpu_qtime * 1000000.0 / NULLIF(delta_time, 0) AS queue_length_total,\n  cpu_busy_time * 100.0 / NULLIF(delta_time, 0) AS process_busy_pct,\n  intr_busy_time * 100.0 / NULLIF(delta_time, 0) AS interrupt_busy_pct,\n  (cpu_busy_time + intr_busy_time) * 100.0 / NULLIF(delta_time, 0) AS total_busy_pct,\n  process_ovhd * 100.0 / NULLIF(delta_time, 0) AS process_overhead_pct,\n  swaps * 1000000.0 / NULLIF(delta_time, 0) AS memory_swaps_per_sec,\n  dispatches * 1000000.0 / NULLIF(delta_time, 0) AS process_dispatches_per_sec,\n  cache_hits * 1000000.0 / NULLIF(delta_time, 0) AS cache_hits_per_sec,\n  disc_ios * 1000000.0 / NULLIF(delta_time, 0) AS disk_ios_per_sec\nFROM macht413.cpu\nORDER BY cpu_num\nLIMIT 10000;\n"
  - domain: disc
    query: Show disk read and write counts per device
    sql: SELECT device_name, SUM(reads) AS total_reads, SUM(writes) AS total_writes FROM macht413.disc GROUP BY device_name ORDER BY total_reads DESC LIMIT 10000;
  - domain: proc
    query: List all process names with their CPU usage
    sql: SELECT process_name, cpu_busy_time FROM macht413.proc ORDER BY cpu_busy_time DESC LIMIT 10000;
  - domain: tmf
    query: Show transaction backout counts
    sql: SELECT SUM(aborting_trans) AS total_aborts FROM macht413.tmf LIMIT 10000;
  - domain: multi
    query: Analyze CPU utilization with memory pressure and identify bottlenecks by correlating CPU busy time, page faults, and queue times across all CPUs
    sql: "SELECT \n  c.cpu_num,\n  c.from_timestamp,\n  c.cpu_busy_time / NULLIF(c.delta_time, 0) * 100 AS cpu_utilization_pct,\n  c.cpu_qtime / NULLIF(c.delta_time, 0) AS avg_queue_length,\n  c.page_requests,\n  c.page_scans,\n  c.ending_free_mem - c.starting_free_mem AS mem_delta,\n  CASE \n    WHEN c.page_scans > c.page_requests * 5 THEN 'MEMORY_PRESSURE'\n    WHEN c.cpu_qtime / NULLIF(c.delta_time, 0) > 2 THEN 'CPU_BOTTLENECK'\n    ELSE 'NORMAL'\n  END AS bottleneck_type\nFROM macht413.cpu c\nWHERE c.cpu_busy_time > 0\nORDER BY cpu_utilization_pct DESC, c.from_timestamp\nLIMIT 10000;\n"
  - domain: multi
    query: Identify disk I/O hotspots by analyzing cache hit ratios, queue times, and correlating with file-level activity to find poorly cached files
    sql: "SELECT \n  d.device_name,\n  d.from_timestamp,\n  d.reads + d.writes AS total_ios,\n  CASE WHEN (d.reads + d.writes) > 0 \n    THEN (d.cache_hits * 100.0 / (d.reads + d.writes)) \n    ELSE 0 \n  END AS cache_hit_ratio_pct,\n  d.request_qtime / NULLIF(d.delta_time, 0) AS avg_request_queue_length,\n  d.read_qtime / NULLIF(d.delta_time, 0) AS avg_read_queue_length,\n  d.write_qtime / NULLIF(d.delta_time, 0) AS avg_write_queue_length,\n  d.ending_free_space / 1024 / 1024 AS free_space_mb,\n  df.file_name_volume || '.' || df.file_name_subvol || '.' || df.file_name_filename AS top_file,\n  df.driver_input_calls + df.driver_output_calls AS file_total_ops\nFROM macht413.disc d\nLEFT JOIN macht413.dfile df \n  ON d.system_name = df.system_name \n  AND d.device_name = df.device_name \n  AND DATE_TRUNC('second', d.from_timestamp) = DATE_TRUNC('second', df.from_timestamp)\nWHERE d.reads + d.writes > 100\nORDER BY cache_hit_ratio_pct ASC, total_ios DESC\nLIMIT 10000;\n"
  - domain: multi
    query: Perform deep process analysis correlating CPU usage, memory consumption, messaging activity, and file I/O to identify resource-intensive processes
    sql: "SELECT \n  p.process_name,\n  p.cpu_num,\n  p.from_timestamp,\n  p.cpu_busy_time / NULLIF(p.delta_time, 0) * 100 AS cpu_usage_pct,\n  p.ready_time / NULLIF(p.delta_time, 0) * 100 AS ready_time_pct,\n  p.pres_pages_end AS memory_pages,\n  p.page_faults,\n  p.messages_sent + p.messages_received AS total_messages,\n  (p.sent_bytes + p.received_bytes) / 1024 AS message_kb,\n  f.reads + f.writes AS file_operations,\n  f.file_busy_time / NULLIF(f.delta_time, 0) * 100 AS file_io_pct,\n  CASE \n    WHEN p.page_faults > 1000 THEN 'HIGH_PAGING'\n    WHEN p.cpu_busy_time / NULLIF(p.delta_time, 0) > 0.8 THEN 'CPU_INTENSIVE'\n    WHEN (p.sent_bytes + p.received_bytes) > 10000000 THEN 'MESSAGE_INTENSIVE'\n    WHEN f.reads + f.writes > 5000 THEN 'IO_INTENSIVE'\n    ELSE 'BALANCED'\n  END AS workload_profile\nFROM macht413.proc p\nLEFT JOIN macht413.file f \n  ON p.system_name = f.system_name \n  AND p.cpu_num = f.cpu_num \n  AND p.pin = f.opener_pin \n  AND DATE_TRUNC('second', p.from_timestamp)\
      \ = DATE_TRUNC('second', f.from_timestamp)\nWHERE p.cpu_busy_time > 0\nORDER BY cpu_usage_pct DESC, memory_pages DESC\nLIMIT 10000;\n"
  - domain: multi
    query: Analyze transaction performance by correlating TMF statistics with process activity and disk I/O to identify transaction bottlenecks and backout patterns
    sql: "SELECT \n  t.from_timestamp,\n  t.cpu_num,\n  t.home_trans AS transactions_started,\n  t.aborting_trans AS transactions_aborted,\n  CASE WHEN t.home_trans > 0 \n    THEN (t.aborting_trans * 100.0 / t.home_trans) \n    ELSE 0 \n  END AS abort_rate_pct,\n  t.trans_backout_qtime / NULLIF(t.delta_time, 0) AS avg_backout_queue_length,\n  t.home_trans_qtime / NULLIF(t.home_trans, 0) AS avg_trans_lifetime_us,\n  p.process_name,\n  p.begin_trans AS process_trans_begun,\n  p.abort_trans AS process_trans_aborted,\n  d.control_points AS disk_control_points,\n  d.control_point_writes AS disk_cp_writes\nFROM macht413.tmf t\nLEFT JOIN macht413.proc p \n  ON t.system_name = p.system_name \n  AND t.cpu_num = p.cpu_num \n  AND DATE_TRUNC('second', t.from_timestamp) = DATE_TRUNC('second', p.from_timestamp)\nLEFT JOIN macht413.disc d \n  ON t.system_name = d.system_name \n  AND t.cpu_num = d.cpu_num \n  AND DATE_TRUNC('second', t.from_timestamp) = DATE_TRUNC('second', d.from_timestamp)\nWHERE t.home_trans\
      \ > 0\nORDER BY abort_rate_pct DESC, transactions_started DESC\nLIMIT 10000;\n"
  - domain: multi
    query: Investigate file locking contention by analyzing lock wait times, blocked requests, and correlating with opener processes to identify lock conflicts
    sql: "SELECT \n  df.file_name_volume || '.' || df.file_name_subvol || '.' || df.file_name_filename AS file_path,\n  df.from_timestamp,\n  df.requests_blocked AS total_blocked_requests,\n  df.lockwait_time / NULLIF(df.requests_blocked, 0) AS avg_lockwait_us,\n  df.max_lockwait_time AS max_lockwait_us,\n  df.lock_timeouts,\n  df.lock_bounces,\n  do.opener_cpu,\n  do.opener_pin,\n  do.requests_blocked AS opener_blocked_requests,\n  do.lockwait_time AS opener_lockwait_time,\n  p.process_name AS opener_process_name,\n  p.program_file_name_volume || '.' || p.program_file_name_subvol || '.' || p.program_file_name_filename AS opener_program\nFROM macht413.dfile df\nLEFT JOIN macht413.dopen do \n  ON df.system_name = do.system_name \n  AND df.file_name_volume = do.file_name_volume \n  AND df.file_name_subvol = do.file_name_subvol \n  AND df.file_name_filename = do.file_name_filename \n  AND DATE_TRUNC('second', df.from_timestamp) = DATE_TRUNC('second', do.from_timestamp)\nLEFT JOIN macht413.proc\
      \ p \n  ON do.system_name = p.system_name \n  AND do.opener_cpu = p.cpu_num \n  AND do.opener_pin = p.pin \n  AND DATE_TRUNC('second', do.from_timestamp) = DATE_TRUNC('second', p.from_timestamp)\nWHERE df.requests_blocked > 0\nORDER BY df.lockwait_time DESC, df.requests_blocked DESC\nLIMIT 10000;\n"
  - domain: multi
    query: Analyze OSS namespace server performance by correlating cache hit ratios, checkpoint activity, and semaphore contention with DP2 messaging patterns
    sql: "SELECT \n  o.process_name AS ns_process,\n  o.cpu_num,\n  o.from_timestamp,\n  o.rr_processed AS resolution_requests,\n  o.ic_lookups AS inode_cache_lookups,\n  CASE WHEN o.ic_lookups > 0 \n    THEN (o.ic_hits * 100.0 / o.ic_lookups) \n    ELSE 0 \n  END AS inode_cache_hit_pct,\n  o.lc_lookups AS link_cache_lookups,\n  CASE WHEN o.lc_lookups > 0 \n    THEN (o.lc_hits * 100.0 / o.lc_lookups) \n    ELSE 0 \n  END AS link_cache_hit_pct,\n  o.checkpoint_reqs,\n  o.checkpoint_blks,\n  o.sem_waits,\n  o.sem_wait_qtime / NULLIF(o.sem_waits, 0) AS avg_sem_wait_us,\n  o.dp2_messages,\n  o.dp2_msg_qtime / NULLIF(o.dp2_messages, 0) AS avg_dp2_response_us,\n  p.cpu_busy_time / NULLIF(p.delta_time, 0) * 100 AS ns_cpu_usage_pct,\n  p.messages_sent + p.messages_received AS ns_total_messages\nFROM macht413.ossns o\nLEFT JOIN macht413.proc p \n  ON o.system_name = p.system_name \n  AND o.cpu_num = p.cpu_num \n  AND o.pin = p.pin \n  AND DATE_TRUNC('second', o.from_timestamp) = DATE_TRUNC('second',\
      \ p.from_timestamp)\nWHERE o.rr_processed > 0\nORDER BY inode_cache_hit_pct ASC, resolution_requests DESC\nLIMIT 10000;\n"
  - domain: multi
    query: Perform comprehensive system health analysis by aggregating CPU, memory, disk, and process metrics to identify overall system bottlenecks and capacity issues
    sql: "WITH cpu_agg AS (\n    SELECT DATE_TRUNC('second', from_timestamp) AS ts, system_name,\n           COUNT(DISTINCT cpu_num) AS total_cpus,\n           AVG(cpu_busy_time * 100.0 / NULLIF(delta_time, 0)) AS avg_cpu_utilization_pct,\n           MAX(cpu_busy_time * 100.0 / NULLIF(delta_time, 0)) AS max_cpu_utilization_pct,\n           AVG(cpu_qtime * 1.0 / NULLIF(delta_time, 0)) AS avg_cpu_queue_length,\n           SUM(ending_free_mem) AS total_free_memory_pages,\n           SUM(page_requests) AS total_page_requests,\n           SUM(page_scans) AS total_page_scans\n    FROM macht413.cpu\n    GROUP BY 1, 2\n),\ndisc_agg AS (\n    SELECT DATE_TRUNC('second', from_timestamp) AS ts, system_name,\n           COUNT(DISTINCT device_name) AS total_disks,\n           SUM(reads + writes) AS total_disk_ios,\n           AVG(request_qtime * 1.0 / NULLIF(delta_time, 0)) AS avg_disk_queue_length,\n           SUM(ending_free_space) AS total_free_space\n    FROM macht413.disc\n    GROUP BY 1, 2\n),\n\
      proc_agg AS (\n    SELECT DATE_TRUNC('second', from_timestamp) AS ts, system_name,\n           COUNT(DISTINCT pin) AS active_processes,\n           SUM(messages_sent + messages_received) AS total_messages\n    FROM macht413.proc\n    GROUP BY 1, 2\n),\ntmf_agg AS (\n    SELECT DATE_TRUNC('second', from_timestamp) AS ts, system_name,\n           SUM(home_trans) AS total_transactions,\n           SUM(aborting_trans) AS total_aborted_transactions\n    FROM macht413.tmf\n    GROUP BY 1, 2\n)\nSELECT\n    c.ts AS measurement_time,\n    c.total_cpus,\n    c.avg_cpu_utilization_pct,\n    c.max_cpu_utilization_pct,\n    c.avg_cpu_queue_length,\n    c.total_free_memory_pages,\n    c.total_page_requests,\n    c.total_page_scans,\n    d.total_disks,\n    d.total_disk_ios,\n    d.avg_disk_queue_length,\n    d.total_free_space / 1024 / 1024 / 1024 AS total_free_disk_gb,\n    p.active_processes,\n    p.total_messages,\n    t.total_transactions,\n    t.total_aborted_transactions,\n    CASE\n    \
      \    WHEN c.avg_cpu_utilization_pct > 85 THEN 'CPU_SATURATED'\n        WHEN c.total_page_scans > c.total_page_requests * 5 THEN 'MEMORY_PRESSURE'\n        WHEN d.avg_disk_queue_length > 5 THEN 'DISK_BOTTLENECK'\n        WHEN d.total_free_space / 1024 / 1024 / 1024 < 100 THEN 'LOW_DISK_SPACE'\n        ELSE 'HEALTHY'\n    END AS system_health_status\nFROM cpu_agg c\nLEFT JOIN disc_agg d ON c.system_name = d.system_name AND c.ts = d.ts\nLEFT JOIN proc_agg p ON c.system_name = p.system_name AND c.ts = p.ts\nLEFT JOIN tmf_agg t  ON c.system_name = t.system_name AND c.ts = t.ts\nORDER BY c.ts\nLIMIT 10000;\n"
  - domain: multi
    query: Analyze disk cache effectiveness across all cache levels by calculating hit ratios, fault rates, and dirty block queue times to optimize cache configuration
    sql: "SELECT \n  d.device_name,\n  d.from_timestamp,\n  d.c0_blks AS cache_512b_blocks,\n  d.c1_blks AS cache_1kb_blocks,\n  d.c2_blks AS cache_2kb_blocks,\n  d.c3_blks AS cache_4kb_blocks,\n  CASE WHEN (d.c0_hits + d.c0_misses) > 0 \n    THEN (d.c0_hits * 100.0 / (d.c0_hits + d.c0_misses)) \n    ELSE 0 \n  END AS cache_512b_hit_pct,\n  CASE WHEN (d.c1_hits + d.c1_misses) > 0 \n    THEN (d.c1_hits * 100.0 / (d.c1_hits + d.c1_misses)) \n    ELSE 0 \n  END AS cache_1kb_hit_pct,\n  CASE WHEN (d.c2_hits + d.c2_misses) > 0 \n    THEN (d.c2_hits * 100.0 / (d.c2_hits + d.c2_misses)) \n    ELSE 0 \n  END AS cache_2kb_hit_pct,\n  CASE WHEN (d.c3_hits + d.c3_misses) > 0 \n    THEN (d.c3_hits * 100.0 / (d.c3_hits + d.c3_misses)) \n    ELSE 0 \n  END AS cache_4kb_hit_pct,\n  d.c0_faults + d.c1_faults + d.c2_faults + d.c3_faults AS total_cache_faults,\n  CASE WHEN (d.reads + d.writes) > 0 \n    THEN ((d.c0_faults + d.c1_faults + d.c2_faults + d.c3_faults) * 100.0 / (d.reads + d.writes)) \n    ELSE\
      \ 0 \n  END AS fault_rate_pct,\n  (d.c0_blks_dirty_qtime + d.c1_blks_dirty_qtime + d.c2_blks_dirty_qtime + d.c3_blks_dirty_qtime) / NULLIF(d.delta_time, 0) AS avg_dirty_blocks_queued,\n  d.reads + d.writes AS total_ios,\n  d.cache_hits AS total_cache_hits\nFROM macht413.disc d\nWHERE d.reads + d.writes > 0\nORDER BY fault_rate_pct DESC, total_ios DESC\nLIMIT 10000;\n"
  - domain: multi
    query: Identify messaging bottlenecks by analyzing inter-process communication patterns, queue times, and correlating with CPU and process activity
    sql: "SELECT \n  p.process_name,\n  p.cpu_num,\n  p.from_timestamp,\n  p.messages_sent AS msgs_sent_as_linker,\n  p.messages_received AS msgs_received_as_listener,\n  (p.sent_bytes + p.returned_bytes) / 1024 AS linker_kb,\n  (p.received_bytes + p.reply_bytes) / 1024 AS listener_kb,\n  p.msgs_sent_qtime / NULLIF(p.messages_sent, 0) AS avg_msg_response_time_us,\n  p.recv_qtime / NULLIF(p.messages_received, 0) AS avg_receive_queue_time_us,\n  p.mqc_allocations AS mqc_allocated,\n  p.mqc_alloc_failures AS mqc_failures,\n  p.mqcs_inuse_qtime / NULLIF(p.delta_time, 0) AS avg_mqcs_in_use,\n  c.cpu_busy_time / NULLIF(c.delta_time, 0) * 100 AS cpu_utilization_pct,\n  c.cpu_qtime / NULLIF(c.delta_time, 0) AS cpu_queue_length,\n  CASE \n    WHEN p.mqc_alloc_failures > 0 THEN 'MQC_EXHAUSTION'\n    WHEN p.msgs_sent_qtime / NULLIF(p.messages_sent, 0) > 100000 THEN 'SLOW_RESPONSE'\n    WHEN p.recv_qtime / NULLIF(p.messages_received, 0) > 50000 THEN 'RECEIVE_QUEUE_BUILDUP'\n    ELSE 'NORMAL'\n  END\
      \ AS messaging_health\nFROM macht413.proc p\nLEFT JOIN macht413.cpu c \n  ON p.system_name = c.system_name \n  AND p.cpu_num = c.cpu_num \n  AND DATE_TRUNC('second', p.from_timestamp) = DATE_TRUNC('second', c.from_timestamp)\nWHERE p.messages_sent + p.messages_received > 0\nORDER BY avg_msg_response_time_us DESC, msgs_sent_as_linker DESC\nLIMIT 10000;\n"
  - domain: multi
    query: Analyze file I/O patterns by correlating logical operations with physical disk I/O, cache behavior, and DBIO usage to identify optimization opportunities
    sql: "SELECT \n  f.file_name_volume || '.' || f.file_name_subvol || '.' || f.file_name_filename AS file_path,\n  f.from_timestamp,\n  f.reads AS logical_reads,\n  f.writes AS logical_writes,\n  f.dbio_reads AS direct_bulk_reads,\n  f.dbio_writes AS direct_bulk_writes,\n  (f.dbio_read_bytes + f.dbio_write_bytes) / 1024 / 1024 AS dbio_mb,\n  df.driver_input_calls AS physical_reads,\n  df.driver_output_calls AS physical_writes,\n  df.cache_read_hits,\n  CASE WHEN df.driver_input_calls > 0 \n    THEN (df.cache_read_hits * 100.0 / df.driver_input_calls) \n    ELSE 0 \n  END AS read_cache_hit_pct,\n  df.requests_blocked AS lock_conflicts,\n  df.lockwait_time / NULLIF(df.requests_blocked, 0) AS avg_lock_wait_us,\n  df.block_splits,\n  d.device_name,\n  d.request_qtime / NULLIF(d.delta_time, 0) AS disk_queue_length,\n  CASE \n    WHEN df.cache_read_hits * 100.0 / NULLIF(df.driver_input_calls, 1) < 50 THEN 'POOR_CACHE_EFFICIENCY'\n    WHEN df.block_splits > 100 THEN 'HIGH_FRAGMENTATION'\n   \
      \ WHEN df.requests_blocked > 50 THEN 'LOCK_CONTENTION'\n    WHEN (f.dbio_read_bytes + f.dbio_write_bytes) / 1024 / 1024 > 100 THEN 'DBIO_INTENSIVE'\n    ELSE 'NORMAL'\n  END AS io_pattern_classification\nFROM macht413.file f\nLEFT JOIN macht413.dfile df \n  ON f.system_name = df.system_name \n  AND f.file_name_volume = df.file_name_volume \n  AND f.file_name_subvol = df.file_name_subvol \n  AND f.file_name_filename = df.file_name_filename \n  AND DATE_TRUNC('second', f.from_timestamp) = DATE_TRUNC('second', df.from_timestamp)\nLEFT JOIN macht413.disc d \n  ON df.system_name = d.system_name \n  AND df.device_name = d.device_name \n  AND DATE_TRUNC('second', df.from_timestamp) = DATE_TRUNC('second', d.from_timestamp)\nWHERE f.reads + f.writes > 0\nORDER BY logical_reads + logical_writes DESC\nLIMIT 10000;\n"
  - domain: ossns
    query: Average out all the server net values and show them to me
    sql: "SELECT \n  AVG(rr_processed) AS avg_rr_processed,\n  AVG(rr_redir_sent) AS avg_rr_redir_sent,\n  AVG(rr_redir_processed) AS avg_rr_redir_processed,\n  AVG(ic_lookups) AS avg_ic_lookups,\n  AVG(ic_hits) AS avg_ic_hits,\n  AVG(ic_dirty_qtime) AS avg_ic_dirty_qtime,\n  AVG(lc_lookups) AS avg_lc_lookups,\n  AVG(lc_hits) AS avg_lc_hits,\n  AVG(lc_inuse_qtime) AS avg_lc_inuse_qtime,\n  AVG(checkpoint_reqs) AS avg_checkpoint_reqs,\n  AVG(checkpoint_blks) AS avg_checkpoint_blks,\n  AVG(sem_waits) AS avg_sem_waits,\n  AVG(sem_wait_qtime) AS avg_sem_wait_qtime,\n  AVG(dp2_dd_reqs) AS avg_dp2_dd_reqs,\n  AVG(dp2_messages) AS avg_dp2_messages,\n  AVG(dp2_msg_qtime) AS avg_dp2_msg_qtime,\n  AVG(ps_messages) AS avg_ps_messages,\n  AVG(ps_msg_qtime) AS avg_ps_msg_qtime,\n  AVG(ls_messages) AS avg_ls_messages,\n  AVG(ls_msg_qtime) AS avg_ls_msg_qtime,\n  AVG(gettime_reqs) AS avg_gettime_reqs,\n  AVG(settime_reqs) AS avg_settime_reqs\nFROM macht413.ossns\nLIMIT 10000;\n"
  - domain: dfile
    query: Top 20 files by total physical I/O calls
    sql: "SELECT\n  file_name_volume || '.' || file_name_subvol || '.' || file_name_filename AS file_path,\n  device_name,\n  CAST(driver_input_calls AS BIGINT) + CAST(driver_output_calls AS BIGINT) AS total_driver_calls,\n  CAST(driver_input_calls AS BIGINT) AS reads,\n  CAST(driver_output_calls AS BIGINT) AS writes\nFROM macht413.dfile\nORDER BY total_driver_calls DESC\nLIMIT 20;\n"
  - domain: dopen
    query: Count active opens per file and total requests across all openers
    sql: "SELECT\n  file_name_volume || '.' || file_name_subvol || '.' || file_name_filename AS file_path,\n  COUNT(*) AS open_count,\n  SUM(requests) AS total_requests,\n  SUM(requests_blocked) AS total_blocked,\n  SUM(lockwait_time) AS total_lockwait_us\nFROM macht413.dopen\nGROUP BY file_name_volume, file_name_subvol, file_name_filename\nORDER BY total_requests DESC\nLIMIT 10000;\n"
  - domain: udef
    query: List all distinct user-defined counter names and how many processes set each
    sql: "SELECT\n  name,\n  COUNT(DISTINCT pin) AS process_count,\n  COUNT(*) AS row_count\nFROM macht413.udef\nWHERE name IS NOT NULL\nGROUP BY name\nORDER BY process_count DESC\nLIMIT 10000;\n"
  - domain: file
    query: Top 20 files by logical reads + writes
    sql: "SELECT\n  file_name_volume || '.' || file_name_subvol || '.' || file_name_filename AS file_path,\n  opener_processname,\n  reads,\n  writes,\n  reads + writes AS total_io,\n  (read_bytes + write_bytes) / 1024 / 1024 AS total_mb\nFROM macht413.file\nORDER BY total_io DESC\nLIMIT 20;\n"
  - domain: multi
    query: "For each CPU show the interrupt busy percentage, backup disc process percentage, primary disc process percentage, other processes percentage, and user processes percentage \u2014 all as a fraction of delta time, ordered by CPU number"
examples:
  - domain: cpu
    query: Show average CPU busy time per CPU
    sql: SELECT cpu_num, AVG(cpu_busy_time) AS avg_busy_time FROM macht413.cpu GROUP BY cpu_num ORDER BY cpu_num LIMIT 10000;
  - domain: cpu
    query: Show comprehensive CPU performance metrics including type, memory, PCBs, queue lengths, busy percentages, overhead, swaps, dispatches, cache hits, and disk I/Os per second
    sql: "SELECT \n  cpu_num,\n  cpu_type,\n  mem_mb,\n  pcbs,\n  cpu_qtime * 1000000.0 / NULLIF(delta_time, 0) AS queue_length_total,\n  cpu_busy_time * 100.0 / NULLIF(delta_time, 0) AS process_busy_pct,\n  intr_busy_time * 100.0 / NULLIF(delta_time, 0) AS interrupt_busy_pct,\n  (cpu_busy_time + intr_busy_time) * 100.0 / NULLIF(delta_time, 0) AS total_busy_pct,\n  process_ovhd * 100.0 / NULLIF(delta_time, 0) AS process_overhead_pct,\n  swaps * 1000000.0 / NULLIF(delta_time, 0) AS memory_swaps_per_sec,\n  dispatches * 1000000.0 / NULLIF(delta_time, 0) AS process_dispatches_per_sec,\n  cache_hits * 1000000.0 / NULLIF(delta_time, 0) AS cache_hits_per_sec,\n  disc_ios * 1000000.0 / NULLIF(delta_time, 0) AS disk_ios_per_sec\nFROM macht413.cpu\nORDER BY cpu_num\nLIMIT 10000;\n"
  - domain: disc
    query: Show disk read and write counts per device
    sql: SELECT device_name, SUM(reads) AS total_reads, SUM(writes) AS total_writes FROM macht413.disc GROUP BY device_name ORDER BY total_reads DESC LIMIT 10000;
  - domain: proc
    query: List all process names with their CPU usage
    sql: SELECT process_name, cpu_busy_time FROM macht413.proc ORDER BY cpu_busy_time DESC LIMIT 10000;
  - domain: tmf
    query: Show transaction backout counts
    sql: SELECT SUM(aborting_trans) AS total_aborts FROM macht413.tmf LIMIT 10000;
  - domain: multi
    query: Analyze CPU utilization with memory pressure and identify bottlenecks by correlating CPU busy time, page faults, and queue times across all CPUs
    sql: "SELECT \n  c.cpu_num,\n  c.from_timestamp,\n  c.cpu_busy_time / NULLIF(c.delta_time, 0) * 100 AS cpu_utilization_pct,\n  c.cpu_qtime / NULLIF(c.delta_time, 0) AS avg_queue_length,\n  c.page_requests,\n  c.page_scans,\n  c.ending_free_mem - c.starting_free_mem AS mem_delta,\n  CASE \n    WHEN c.page_scans > c.page_requests * 5 THEN 'MEMORY_PRESSURE'\n    WHEN c.cpu_qtime / NULLIF(c.delta_time, 0) > 2 THEN 'CPU_BOTTLENECK'\n    ELSE 'NORMAL'\n  END AS bottleneck_type\nFROM macht413.cpu c\nWHERE c.cpu_busy_time > 0\nORDER BY cpu_utilization_pct DESC, c.from_timestamp\nLIMIT 10000;\n"
  - domain: multi
    query: Identify disk I/O hotspots by analyzing cache hit ratios, queue times, and correlating with file-level activity to find poorly cached files
    sql: "SELECT \n  d.device_name,\n  d.from_timestamp,\n  d.reads + d.writes AS total_ios,\n  CASE WHEN (d.reads + d.writes) > 0 \n    THEN (d.cache_hits * 100.0 / (d.reads + d.writes)) \n    ELSE 0 \n  END AS cache_hit_ratio_pct,\n  d.request_qtime / NULLIF(d.delta_time, 0) AS avg_request_queue_length,\n  d.read_qtime / NULLIF(d.delta_time, 0) AS avg_read_queue_length,\n  d.write_qtime / NULLIF(d.delta_time, 0) AS avg_write_queue_length,\n  d.ending_free_space / 1024 / 1024 AS free_space_mb,\n  df.file_name_volume || '.' || df.file_name_subvol || '.' || df.file_name_filename AS top_file,\n  df.driver_input_calls + df.driver_output_calls AS file_total_ops\nFROM macht413.disc d\nLEFT JOIN macht413.dfile df \n  ON d.system_name = df.system_name \n  AND d.device_name = df.device_name \n  AND DATE_TRUNC('second', d.from_timestamp) = DATE_TRUNC('second', df.from_timestamp)\nWHERE d.reads + d.writes > 100\nORDER BY cache_hit_ratio_pct ASC, total_ios DESC\nLIMIT 10000;\n"
  - domain: multi
    query: Perform deep process analysis correlating CPU usage, memory consumption, messaging activity, and file I/O to identify resource-intensive processes
    sql: "SELECT \n  p.process_name,\n  p.cpu_num,\n  p.from_timestamp,\n  p.cpu_busy_time / NULLIF(p.delta_time, 0) * 100 AS cpu_usage_pct,\n  p.ready_time / NULLIF(p.delta_time, 0) * 100 AS ready_time_pct,\n  p.pres_pages_end AS memory_pages,\n  p.page_faults,\n  p.messages_sent + p.messages_received AS total_messages,\n  (p.sent_bytes + p.received_bytes) / 1024 AS message_kb,\n  f.reads + f.writes AS file_operations,\n  f.file_busy_time / NULLIF(f.delta_time, 0) * 100 AS file_io_pct,\n  CASE \n    WHEN p.page_faults > 1000 THEN 'HIGH_PAGING'\n    WHEN p.cpu_busy_time / NULLIF(p.delta_time, 0) > 0.8 THEN 'CPU_INTENSIVE'\n    WHEN (p.sent_bytes + p.received_bytes) > 10000000 THEN 'MESSAGE_INTENSIVE'\n    WHEN f.reads + f.writes > 5000 THEN 'IO_INTENSIVE'\n    ELSE 'BALANCED'\n  END AS workload_profile\nFROM macht413.proc p\nLEFT JOIN macht413.file f \n  ON p.system_name = f.system_name \n  AND p.cpu_num = f.cpu_num \n  AND p.pin = f.opener_pin \n  AND DATE_TRUNC('second', p.from_timestamp)\n      \ = DATE_TRUNC('second', f.from_timestamp)\nWHERE p.cpu_busy_time > 0\nORDER BY cpu_usage_pct DESC, memory_pages DESC\nLIMIT 10000;\n"
  - domain: multi
    query: Analyze transaction performance by correlating TMF statistics with process activity and disk I/O to identify transaction bottlenecks and backout patterns
    sql: "SELECT \n  t.from_timestamp,\n  t.cpu_num,\n  t.home_trans AS transactions_started,\n  t.aborting_trans AS transactions_aborted,\n  CASE WHEN t.home_trans > 0 \n    THEN (t.aborting_trans * 100.0 / t.home_trans) \n    ELSE 0 \n  END AS abort_rate_pct,\n  t.trans_backout_qtime / NULLIF(t.delta_time, 0) AS avg_backout_queue_length,\n  t.home_trans_qtime / NULLIF(t.home_trans, 0) AS avg_trans_lifetime_us,\n  p.process_name,\n  p.begin_trans AS process_trans_begun,\n  p.abort_trans AS process_trans_aborted,\n  d.control_points AS disk_control_points,\n  d.control_point_writes AS disk_cp_writes\nFROM macht413.tmf t\nLEFT JOIN macht413.proc p \n  ON t.system_name = p.system_name \n  AND t.cpu_num = p.cpu_num \n  AND DATE_TRUNC('second', t.from_timestamp) = DATE_TRUNC('second', p.from_timestamp)\nLEFT JOIN macht413.disc d \n  ON t.system_name = d.system_name \n  AND t.cpu_num = d.cpu_num \n  AND DATE_TRUNC('second', t.from_timestamp) = DATE_TRUNC('second', d.from_timestamp)\nWHERE t.home_trans\n      \ > 0\nORDER BY abort_rate_pct DESC, transactions_started DESC\nLIMIT 10000;\n"
  - domain: multi
    query: Investigate file locking contention by analyzing lock wait times, blocked requests, and correlating with opener processes to identify lock conflicts
    sql: "SELECT \n  df.file_name_volume || '.' || df.file_name_subvol || '.' || df.file_name_filename AS file_path,\n  df.from_timestamp,\n  df.requests_blocked AS total_blocked_requests,\n  df.lockwait_time / NULLIF(df.requests_blocked, 0) AS avg_lockwait_us,\n  df.max_lockwait_time AS max_lockwait_us,\n  df.lock_timeouts,\n  df.lock_bounces,\n  do.opener_cpu,\n  do.opener_pin,\n  do.requests_blocked AS opener_blocked_requests,\n  do.lockwait_time AS opener_lockwait_time,\n  p.process_name AS opener_process_name,\n  p.program_file_name_volume || '.' || p.program_file_name_subvol || '.' || p.program_file_name_filename AS opener_program\nFROM macht413.dfile df\nLEFT JOIN macht413.dopen do \n  ON df.system_name = do.system_name \n  AND df.file_name_volume = do.file_name_volume \n  AND df.file_name_subvol = do.file_name_subvol \n  AND df.file_name_filename = do.file_name_filename \n  AND DATE_TRUNC('second', df.from_timestamp) = DATE_TRUNC('second', do.from_timestamp)\nLEFT JOIN macht413.proc\n      \ p \n  ON do.system_name = p.system_name \n  AND do.opener_cpu = p.cpu_num \n  AND do.opener_pin = p.pin \n  AND DATE_TRUNC('second', do.from_timestamp) = DATE_TRUNC('second', p.from_timestamp)\nWHERE df.requests_blocked > 0\nORDER BY df.lockwait_time DESC, df.requests_blocked DESC\nLIMIT 10000;\n"
  - domain: multi
    query: Analyze OSS namespace server performance by correlating cache hit ratios, checkpoint activity, and semaphore contention with DP2 messaging patterns
    sql: "SELECT \n  o.process_name AS ns_process,\n  o.cpu_num,\n  o.from_timestamp,\n  o.rr_processed AS resolution_requests,\n  o.ic_lookups AS inode_cache_lookups,\n  CASE WHEN o.ic_lookups > 0 \n    THEN (o.ic_hits * 100.0 / o.ic_lookups) \n    ELSE 0 \n  END AS inode_cache_hit_pct,\n  o.lc_lookups AS link_cache_lookups,\n  CASE WHEN o.lc_lookups > 0 \n    THEN (o.lc_hits * 100.0 / o.lc_lookups) \n    ELSE 0 \n  END AS link_cache_hit_pct,\n  o.checkpoint_reqs,\n  o.checkpoint_blks,\n  o.sem_waits,\n  o.sem_wait_qtime / NULLIF(o.sem_waits, 0) AS avg_sem_wait_us,\n  o.dp2_messages,\n  o.dp2_msg_qtime / NULLIF(o.dp2_messages, 0) AS avg_dp2_response_us,\n  p.cpu_busy_time / NULLIF(p.delta_time, 0) * 100 AS ns_cpu_usage_pct,\n  p.messages_sent + p.messages_received AS ns_total_messages\nFROM macht413.ossns o\nLEFT JOIN macht413.proc p \n  ON o.system_name = p.system_name \n  AND o.cpu_num = p.cpu_num \n  AND o.pin = p.pin \n  AND DATE_TRUNC('second', o.from_timestamp) = DATE_TRUNC('second',\n      \ p.from_timestamp)\nWHERE o.rr_processed > 0\nORDER BY inode_cache_hit_pct ASC, resolution_requests DESC\nLIMIT 10000;\n"
  - domain: multi
    query: Perform comprehensive system health analysis by aggregating CPU, memory, disk, and process metrics to identify overall system bottlenecks and capacity issues
    sql: "WITH cpu_agg AS (\n    SELECT DATE_TRUNC('second', from_timestamp) AS ts, system_name,\n           COUNT(DISTINCT cpu_num) AS total_cpus,\n           AVG(cpu_busy_time * 100.0 / NULLIF(delta_time, 0)) AS avg_cpu_utilization_pct,\n           MAX(cpu_busy_time * 100.0 / NULLIF(delta_time, 0)) AS max_cpu_utilization_pct,\n           AVG(cpu_qtime * 1.0 / NULLIF(delta_time, 0)) AS avg_cpu_queue_length,\n           SUM(ending_free_mem) AS total_free_memory_pages,\n           SUM(page_requests) AS total_page_requests,\n           SUM(page_scans) AS total_page_scans\n    FROM macht413.cpu\n    GROUP BY 1, 2\n),\ndisc_agg AS (\n    SELECT DATE_TRUNC('second', from_timestamp) AS ts, system_name,\n           COUNT(DISTINCT device_name) AS total_disks,\n           SUM(reads + writes) AS total_disk_ios,\n           AVG(request_qtime * 1.0 / NULLIF(delta_time, 0)) AS avg_disk_queue_length,\n           SUM(ending_free_space) AS total_free_space\n    FROM macht413.disc\n    GROUP BY 1, 2\n),\n\
      proc_agg AS (\n    SELECT DATE_TRUNC('second', from_timestamp) AS ts, system_name,\n           COUNT(DISTINCT pin) AS active_processes,\n           SUM(messages_sent + messages_received) AS total_messages\n    FROM macht413.proc\n    GROUP BY 1, 2\n),\ntmf_agg AS (\n    SELECT DATE_TRUNC('second', from_timestamp) AS ts, system_name,\n           SUM(home_trans) AS total_transactions,\n           SUM(aborting_trans) AS total_aborted_transactions\n    FROM macht413.tmf\n    GROUP BY 1, 2\n)\nSELECT\n    c.ts AS measurement_time,\n    c.total_cpus,\n    c.avg_cpu_utilization_pct,\n    c.max_cpu_utilization_pct,\n    c.avg_cpu_queue_length,\n    c.total_free_memory_pages,\n    c.total_page_requests,\n    c.total_page_scans,\n    d.total_disks,\n    d.total_disk_ios,\n    d.avg_disk_queue_length,\n    d.total_free_space / 1024 / 1024 / 1024 AS total_free_disk_gb,\n    p.active_processes,\n    p.total_messages,\n    t.total_transactions,\n    t.total_aborted_transactions,\n    CASE\n    \
      \    WHEN c.avg_cpu_utilization_pct > 85 THEN 'CPU_SATURATED'\n        WHEN c.total_page_scans > c.total_page_requests * 5 THEN 'MEMORY_PRESSURE'\n        WHEN d.avg_disk_queue_length > 5 THEN 'DISK_BOTTLENECK'\n        WHEN d.total_free_space / 1024 / 1024 / 1024 < 100 THEN 'LOW_DISK_SPACE'\n        ELSE 'HEALTHY'\n    END AS system_health_status\nFROM cpu_agg c\nLEFT JOIN disc_agg d ON c.system_name = d.system_name AND c.ts = d.ts\nLEFT JOIN proc_agg p ON c.system_name = p.system_name AND c.ts = p.ts\nLEFT JOIN tmf_agg t  ON c.system_name = t.system_name AND c.ts = t.ts\nORDER BY c.ts\nLIMIT 10000;\n"
  - domain: multi
    query: Analyze disk cache effectiveness across all cache levels by calculating hit ratios, fault rates, and dirty block queue times to optimize cache configuration
    sql: "SELECT \n  d.device_name,\n  d.from_timestamp,\n  d.c0_blks AS cache_512b_blocks,\n  d.c1_blks AS cache_1kb_blocks,\n  d.c2_blks AS cache_2kb_blocks,\n  d.c3_blks AS cache_4kb_blocks,\n  CASE WHEN (d.c0_hits + d.c0_misses) > 0 \n    THEN (d.c0_hits * 100.0 / (d.c0_hits + d.c0_misses)) \n    ELSE 0 \n  END AS cache_512b_hit_pct,\n  CASE WHEN (d.c1_hits + d.c1_misses) > 0 \n    THEN (d.c1_hits * 100.0 / (d.c1_hits + d.c1_misses)) \n    ELSE 0 \n  END AS cache_1kb_hit_pct,\n  CASE WHEN (d.c2_hits + d.c2_misses) > 0 \n    THEN (d.c2_hits * 100.0 / (d.c2_hits + d.c2_misses)) \n    ELSE 0 \n  END AS cache_2kb_hit_pct,\n  CASE WHEN (d.c3_hits + d.c3_misses) > 0 \n    THEN (d.c3_hits * 100.0 / (d.c3_hits + d.c3_misses)) \n    ELSE 0 \n  END AS cache_4kb_hit_pct,\n  d.c0_faults + d.c1_faults + d.c2_faults + d.c3_faults AS total_cache_faults,\n  CASE WHEN (d.reads + d.writes) > 0 \n    THEN ((d.c0_faults + d.c1_faults + d.c2_faults + d.c3_faults) * 100.0 / (d.reads + d.writes)) \n    ELSE\
      \ 0 \n  END AS fault_rate_pct,\n  (d.c0_blks_dirty_qtime + d.c1_blks_dirty_qtime + d.c2_blks_dirty_qtime + d.c3_blks_dirty_qtime) / NULLIF(d.delta_time, 0) AS avg_dirty_blocks_queued,\n  d.reads + d.writes AS total_ios,\n  d.cache_hits AS total_cache_hits\nFROM macht413.disc d\nWHERE d.reads + d.writes > 0\nORDER BY fault_rate_pct DESC, total_ios DESC\nLIMIT 10000;\n"
  - domain: multi
    query: Identify messaging bottlenecks by analyzing inter-process communication patterns, queue times, and correlating with CPU and process activity
    sql: "SELECT \n  p.process_name,\n  p.cpu_num,\n  p.from_timestamp,\n  p.messages_sent AS msgs_sent_as_linker,\n  p.messages_received AS msgs_received_as_listener,\n  (p.sent_bytes + p.returned_bytes) / 1024 AS linker_kb,\n  (p.received_bytes + p.reply_bytes) / 1024 AS listener_kb,\n  p.msgs_sent_qtime / NULLIF(p.messages_sent, 0) AS avg_msg_response_time_us,\n  p.recv_qtime / NULLIF(p.messages_received, 0) AS avg_receive_queue_time_us,\n  p.mqc_allocations AS mqc_allocated,\n  p.mqc_alloc_failures AS mqc_failures,\n  p.mqcs_inuse_qtime / NULLIF(p.delta_time, 0) AS avg_mqcs_in_use,\n  c.cpu_busy_time / NULLIF(c.delta_time, 0) * 100 AS cpu_utilization_pct,\n  c.cpu_qtime / NULLIF(c.delta_time, 0) AS cpu_queue_length,\n  CASE \n    WHEN p.mqc_alloc_failures > 0 THEN 'MQC_EXHAUSTION'\n    WHEN p.msgs_sent_qtime / NULLIF(p.messages_sent, 0) > 100000 THEN 'SLOW_RESPONSE'\n    WHEN p.recv_qtime / NULLIF(p.messages_received, 0) > 50000 THEN 'RECEIVE_QUEUE_BUILDUP'\n    ELSE 'NORMAL'\n  END\
      \ AS messaging_health\nFROM macht413.proc p\nLEFT JOIN macht413.cpu c \n  ON p.system_name = c.system_name \n  AND p.cpu_num = c.cpu_num \n  AND DATE_TRUNC('second', p.from_timestamp) = DATE_TRUNC('second', c.from_timestamp)\nWHERE p.messages_sent + p.messages_received > 0\nORDER BY avg_msg_response_time_us DESC, msgs_sent_as_linker DESC\nLIMIT 10000;\n"
  - domain: multi
    query: Analyze file I/O patterns by correlating logical operations with physical disk I/O, cache behavior, and DBIO usage to identify optimization opportunities
    sql: "SELECT \n  f.file_name_volume || '.' || f.file_name_subvol || '.' || f.file_name_filename AS file_path,\n  f.from_timestamp,\n  f.reads AS logical_reads,\n  f.writes AS logical_writes,\n  f.dbio_reads AS direct_bulk_reads,\n  f.dbio_writes AS direct_bulk_writes,\n  (f.dbio_read_bytes + f.dbio_write_bytes) / 1024 / 1024 AS dbio_mb,\n  df.driver_input_calls AS physical_reads,\n  df.driver_output_calls AS physical_writes,\n  df.cache_read_hits,\n  CASE WHEN df.driver_input_calls > 0 \n    THEN (df.cache_read_hits * 100.0 / df.driver_input_calls) \n    ELSE 0 \n  END AS read_cache_hit_pct,\n  df.requests_blocked AS lock_conflicts,\n  df.lockwait_time / NULLIF(df.requests_blocked, 0) AS avg_lock_wait_us,\n  df.block_splits,\n  d.device_name,\n  d.request_qtime / NULLIF(d.delta_time, 0) AS disk_queue_length,\n  CASE \n    WHEN df.cache_read_hits * 100.0 / NULLIF(df.driver_input_calls, 1) < 50 THEN 'POOR_CACHE_EFFICIENCY'\n    WHEN df.block_splits > 100 THEN 'HIGH_FRAGMENTATION'\n   \
      \ WHEN df.requests_blocked > 50 THEN 'LOCK_CONTENTION'\n    WHEN (f.dbio_read_bytes + f.dbio_write_bytes) / 1024 / 1024 > 100 THEN 'DBIO_INTENSIVE'\n    ELSE 'NORMAL'\n  END AS io_pattern_classification\nFROM macht413.file f\nLEFT JOIN macht413.dfile df \n  ON f.system_name = df.system_name \n  AND f.file_name_volume = df.file_name_volume \n  AND f.file_name_subvol = df.file_name_subvol \n  AND f.file_name_filename = df.file_name_filename \n  AND DATE_TRUNC('second', f.from_timestamp) = DATE_TRUNC('second', df.from_timestamp)\nLEFT JOIN macht413.disc d \n  ON df.system_name = d.system_name \n  AND df.device_name = d.device_name \n  AND DATE_TRUNC('second', df.from_timestamp) = DATE_TRUNC('second', d.from_timestamp)\nWHERE f.reads + f.writes > 0\nORDER BY logical_reads + logical_writes DESC\nLIMIT 10000;\n"
  - domain: ossns
    query: Average out all the server net values and show them to me
    sql: "SELECT \n  AVG(rr_processed) AS avg_rr_processed,\n  AVG(rr_redir_sent) AS avg_rr_redir_sent,\n  AVG(rr_redir_processed) AS avg_rr_redir_processed,\n  AVG(ic_lookups) AS avg_ic_lookups,\n  AVG(ic_hits) AS avg_ic_hits,\n  AVG(ic_dirty_qtime) AS avg_ic_dirty_qtime,\n  AVG(lc_lookups) AS avg_lc_lookups,\n  AVG(lc_hits) AS avg_lc_hits,\n  AVG(lc_inuse_qtime) AS avg_lc_inuse_qtime,\n  AVG(checkpoint_reqs) AS avg_checkpoint_reqs,\n  AVG(checkpoint_blks) AS avg_checkpoint_blks,\n  AVG(sem_waits) AS avg_sem_waits,\n  AVG(sem_wait_qtime) AS avg_sem_wait_qtime,\n  AVG(dp2_dd_reqs) AS avg_dp2_dd_reqs,\n  AVG(dp2_messages) AS avg_dp2_messages,\n  AVG(dp2_msg_qtime) AS avg_dp2_msg_qtime,\n  AVG(ps_messages) AS avg_ps_messages,\n  AVG(ps_msg_qtime) AS avg_ps_msg_qtime,\n  AVG(ls_messages) AS avg_ls_messages,\n  AVG(ls_msg_qtime) AS avg_ls_msg_qtime,\n  AVG(gettime_reqs) AS avg_gettime_reqs,\n  AVG(settime_reqs) AS avg_settime_reqs\nFROM macht413.ossns\nLIMIT 10000;\n"
  - domain: dfile
    query: Top 20 files by total physical I/O calls
    sql: "SELECT\n  file_name_volume || '.' || file_name_subvol || '.' || file_name_filename AS file_path,\n  device_name,\n  CAST(driver_input_calls AS BIGINT) + CAST(driver_output_calls AS BIGINT) AS total_driver_calls,\n  CAST(driver_input_calls AS BIGINT) AS reads,\n  CAST(driver_output_calls AS BIGINT) AS writes\nFROM macht413.dfile\nORDER BY total_driver_calls DESC\nLIMIT 20;\n"
  - domain: dopen
    query: Count active opens per file and total requests across all openers
    sql: "SELECT\n  file_name_volume || '.' || file_name_subvol || '.' || file_name_filename AS file_path,\n  COUNT(*) AS open_count,\n  SUM(requests) AS total_requests,\n  SUM(requests_blocked) AS total_blocked,\n  SUM(lockwait_time) AS total_lockwait_us\nFROM macht413.dopen\nGROUP BY file_name_volume, file_name_subvol, file_name_filename\nORDER BY total_requests DESC\nLIMIT 10000;\n"
  - domain: udef
    query: List all distinct user-defined counter names and how many processes set each
    sql: "SELECT\n  name,\n  COUNT(DISTINCT pin) AS process_count,\n  COUNT(*) AS row_count\nFROM macht413.udef\nWHERE name IS NOT NULL\nGROUP BY name\nORDER BY process_count DESC\nLIMIT 10000;\n"
  - domain: file
    query: Top 20 files by logical reads + writes
    sql: "SELECT\n  file_name_volume || '.' || file_name_subvol || '.' || file_name_filename AS file_path,\n  opener_processname,\n  reads,\n  writes,\n  reads + writes AS total_io,\n  (read_bytes + write_bytes) / 1024 / 1024 AS total_mb\nFROM macht413.file\nORDER BY total_io DESC\nLIMIT 20;\n"
  - domain: multi
    query: "For each CPU show the interrupt busy percentage, backup disc process percentage, primary disc process percentage, other processes percentage, and user processes percentage \u2014 all as a fraction of delta time, ordered by CPU number"
    sql: "WITH cpu_stats AS (\n    SELECT\n        DATE_TRUNC('second', from_timestamp) AS ts,\n        system_name,\n        cpu_num,\n        intr_busy_time,\n        delta_time\n    FROM macht413.cpu\n),\nproc_stats AS (\n    SELECT\n        DATE_TRUNC('second', from_timestamp) AS ts,\n        system_name,\n        cpu_num,\n        SUM(CASE WHEN process_name LIKE '$DATA%'\n                      OR process_name LIKE '$SSD%'\n                      OR process_name LIKE '$AUDIT%'\n                 THEN cpu_busy_time ELSE 0 END) AS disc_busy_time,\n        SUM(CASE WHEN process_name IN ('$SYSTEM','$MONITOR','$MSENGER',\n                                       '$VIRTUAL','$NULL','$OSS',\n                                       '$SWAP','$SWAP01','$SWAP23','$SWAP34',\n                                       '$NCP','$TMP')\n                 THEN cpu_busy_time ELSE 0 END) AS system_busy_time,\n        SUM(CASE WHEN process_name NOT LIKE '$DATA%'\n                      AND process_name NOT LIKE '$SSD%'\n\
      \                      AND process_name NOT LIKE '$AUDIT%'\n                      AND process_name NOT IN ('$SYSTEM','$MONITOR','$MSENGER',\n                                               '$VIRTUAL','$NULL','$OSS',\n                                               '$SWAP','$SWAP01','$SWAP23','$SWAP34',\n                                               '$NCP','$TMP')\n                 THEN cpu_busy_time ELSE 0 END) AS user_app_busy_time,\n        MAX(delta_time) AS delta_time\n    FROM macht413.proc\n    GROUP BY 1, 2, 3\n)\nSELECT\n    c.cpu_num,\n    AVG(c.intr_busy_time         * 100.0 / NULLIF(c.delta_time, 0)) AS interrupt_busy_pct,\n    AVG(p.disc_busy_time         * 100.0 / NULLIF(p.delta_time, 0)) AS disc_proc_pct,\n    AVG(p.system_busy_time       * 100.0 / NULLIF(p.delta_time, 0)) AS system_proc_pct,\n    AVG(p.user_app_busy_time     * 100.0 / NULLIF(p.delta_time, 0)) AS user_app_proc_pct\nFROM cpu_stats AS c\nJOIN proc_stats AS p\n    ON c.ts = p.ts\n    AND c.system_name = p.system_name\n\
      \    AND c.cpu_num = p.cpu_num\nGROUP BY c.cpu_num\nORDER BY c.cpu_num\nLIMIT 10000;\n"
  - domain: cpu
    query: Show the average CPU ready queue length per CPU, ensuring small values do not round to 0.
    sql: "SELECT\n  cpu_num,\n  CAST(SUM(cpu_qtime) * 1.0 / NULLIF(MAX(delta_time) * COUNT(DISTINCT from_timestamp), 0) AS NUMERIC(10,4)) AS avg_ready_queue_length\nFROM macht413.cpu\nGROUP BY cpu_num\nORDER BY avg_ready_queue_length DESC\nLIMIT 10000;"
  - domain: disc
    query: Analyze the disk cache effectiveness for each device by showing the overall cache hit percentage and the total cache faults as a percentage of total I/Os.
    sql: "SELECT\n  device_name,\n  CAST(SUM(c0_hits + c1_hits + c2_hits + c3_hits + c4_hits + c5_hits + c6_hits + c7_hits) * 100.0 / NULLIF(SUM(c0_hits + c1_hits + c2_hits + c3_hits + c4_hits + c5_hits + c6_hits + c7_hits + c0_misses + c1_misses + c2_misses + c3_misses + c4_misses + c5_misses + c6_misses + c7_misses), 0) AS NUMERIC(10,4)) AS overall_cache_hit_pct,\n  CAST(SUM(c0_faults + c1_faults + c2_faults + c3_faults + c4_faults + c5_faults + c6_faults + c7_faults) * 100.0 / NULLIF(SUM(reads + writes), 0) AS NUMERIC(10,4)) AS fault_rate_pct\nFROM macht413.disc\nGROUP BY device_name\nORDER BY fault_rate_pct DESC\nLIMIT 10000;"
