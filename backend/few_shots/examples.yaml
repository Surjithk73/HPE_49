examples:
- domain: cpu
  query: Show average CPU busy time per CPU
  sql: SELECT cpu_num, AVG(cpu_busy_time) AS avg_busy_time FROM %db%.cpu GROUP BY
    cpu_num ORDER BY cpu_num LIMIT 10000;
- domain: cpu
  query: Show comprehensive CPU performance metrics including type, memory, PCBs,
    queue lengths, busy percentages, overhead, swaps, dispatches, cache hits, and
    disk I/Os per second
  sql: "SELECT \n  cpu_num,\n  cpu_type,\n  mem_mb,\n  pcbs,\n  cpu_qtime * 1000000.0\
    \ / NULLIF(delta_time, 0) AS queue_length_total,\n  cpu_busy_time * 100.0 / NULLIF(delta_time,\
    \ 0) AS process_busy_pct,\n  intr_busy_time * 100.0 / NULLIF(delta_time, 0) AS\
    \ interrupt_busy_pct,\n  (cpu_busy_time + intr_busy_time) * 100.0 / NULLIF(delta_time,\
    \ 0) AS total_busy_pct,\n  process_ovhd * 100.0 / NULLIF(delta_time, 0) AS process_overhead_pct,\n\
    \  swaps * 1000000.0 / NULLIF(delta_time, 0) AS memory_swaps_per_sec,\n  dispatches\
    \ * 1000000.0 / NULLIF(delta_time, 0) AS process_dispatches_per_sec,\n  cache_hits\
    \ * 1000000.0 / NULLIF(delta_time, 0) AS cache_hits_per_sec,\n  disc_ios * 1000000.0\
    \ / NULLIF(delta_time, 0) AS disk_ios_per_sec\nFROM %db%.cpu\nORDER BY cpu_num\n\
    LIMIT 10000;\n"
- domain: disc
  query: Show disk read and write counts per device
  sql: SELECT system_name, device_name, SUM(reads) AS total_reads, SUM(writes) AS
    total_writes FROM %db%.disc GROUP BY system_name, device_name ORDER BY total_reads
    DESC LIMIT 10000;
- domain: proc
  query: List all process names with their CPU usage
  sql: SELECT process_name, cpu_busy_time FROM %db%.proc ORDER BY cpu_busy_time DESC
    LIMIT 10000;
- domain: tmf
  query: Show transaction backout counts
  sql: SELECT SUM(aborting_trans) AS total_aborts FROM %db%.tmf LIMIT 10000;
- domain: multi
  query: Analyze CPU utilization with memory pressure and identify bottlenecks by
    correlating CPU busy time, page faults, and queue times across all CPUs
  sql: "SELECT \n  c.cpu_num,\n  c.from_timestamp,\n  c.cpu_busy_time / NULLIF(c.delta_time,\
    \ 0) * 100 AS cpu_utilization_pct,\n  c.cpu_qtime / NULLIF(c.delta_time, 0) AS\
    \ avg_queue_length,\n  c.page_requests,\n  c.page_scans,\n  c.ending_free_mem\
    \ - c.starting_free_mem AS mem_delta,\n  CASE \n    WHEN c.page_scans > c.page_requests\
    \ * 5 THEN 'MEMORY_PRESSURE'\n    WHEN c.cpu_qtime / NULLIF(c.delta_time, 0) >\
    \ 2 THEN 'CPU_BOTTLENECK'\n    ELSE 'NORMAL'\n  END AS bottleneck_type\nFROM %db%.cpu\
    \ c\nWHERE c.cpu_busy_time > 0\nORDER BY cpu_utilization_pct DESC, c.from_timestamp\n\
    LIMIT 10000;\n"
- domain: multi
  query: Identify disk I/O hotspots by analyzing cache hit ratios, queue times, and
    correlating with file-level activity to find poorly cached files
  sql: "SELECT \n  d.device_name,\n  d.from_timestamp,\n  d.reads + d.writes AS total_ios,\n\
    \  CASE WHEN (d.reads + d.writes) > 0 \n    THEN ((d.c0_hits + d.c1_hits + d.c2_hits\
    \ + d.c3_hits + d.c4_hits + d.c5_hits + d.c6_hits + d.c7_hits) * 100.0 / (d.reads\
    \ + d.writes)) \n    ELSE 0 \n  END AS cache_hit_ratio_pct,\n  d.request_qtime\
    \ / NULLIF(d.delta_time, 0) AS avg_request_queue_length,\n  d.read_qtime / NULLIF(d.delta_time,\
    \ 0) AS avg_read_queue_length,\n  d.write_qtime / NULLIF(d.delta_time, 0) AS avg_write_queue_length,\n\
    \  d.ending_free_space / 1024 / 1024 AS free_space_mb,\n  df.file_name_volume\
    \ || '.' || df.file_name_subvol || '.' || df.file_name_filename AS top_file,\n\
    \  df.driver_input_calls + df.driver_output_calls AS file_total_ops\nFROM %db%.disc\
    \ d\nLEFT JOIN %db%.dfile df \n  ON d.system_name = df.system_name \n  AND d.device_name\
    \ = df.device_name \n  AND DATE_TRUNC('second', d.from_timestamp) = DATE_TRUNC('second',\
    \ df.from_timestamp)\nWHERE d.reads + d.writes > 100\nORDER BY cache_hit_ratio_pct\
    \ ASC, total_ios DESC\nLIMIT 10000;\n"
- domain: multi
  query: Perform deep process analysis correlating CPU usage, memory consumption,
    messaging activity, and file I/O to identify resource-intensive processes
  sql: "SELECT \n  p.process_name,\n  p.cpu_num,\n  p.from_timestamp,\n  p.cpu_busy_time\
    \ / NULLIF(p.delta_time, 0) * 100 AS cpu_usage_pct,\n  p.ready_time / NULLIF(p.delta_time,\
    \ 0) * 100 AS ready_time_pct,\n  p.pres_pages_end AS memory_pages,\n  p.page_faults,\n\
    \  p.messages_sent + p.messages_received AS total_messages,\n  (p.sent_bytes +\
    \ p.received_bytes) / 1024 AS message_kb,\n  f.reads + f.writes AS file_operations,\n\
    \  f.file_busy_time / NULLIF(f.delta_time, 0) * 100 AS file_io_pct,\n  CASE \n\
    \    WHEN p.page_faults > 1000 THEN 'HIGH_PAGING'\n    WHEN p.cpu_busy_time /\
    \ NULLIF(p.delta_time, 0) > 0.8 THEN 'CPU_INTENSIVE'\n    WHEN (p.sent_bytes +\
    \ p.received_bytes) > 10000000 THEN 'MESSAGE_INTENSIVE'\n    WHEN f.reads + f.writes\
    \ > 5000 THEN 'IO_INTENSIVE'\n    ELSE 'BALANCED'\n  END AS workload_profile\n\
    FROM %db%.proc p\nLEFT JOIN %db%.file f \n  ON p.system_name = f.system_name \n\
    \  AND p.cpu_num = f.cpu_num \n  AND p.pin = f.opener_pin \n  AND DATE_TRUNC('second',\
    \ p.from_timestamp) = DATE_TRUNC('second', f.from_timestamp)\nWHERE p.cpu_busy_time\
    \ > 0\nORDER BY cpu_usage_pct DESC, memory_pages DESC\nLIMIT 10000;\n"
- domain: multi
  query: Analyze transaction performance by correlating TMF statistics with process
    activity and disk I/O to identify transaction bottlenecks and backout patterns
  sql: "SELECT \n  t.from_timestamp,\n  t.cpu_num,\n  t.home_trans AS transactions_started,\n\
    \  t.aborting_trans AS transactions_aborted,\n  CASE WHEN t.home_trans > 0 \n\
    \    THEN (t.aborting_trans * 100.0 / t.home_trans) \n    ELSE 0 \n  END AS abort_rate_pct,\n\
    \  t.trans_backout_qtime / NULLIF(t.delta_time, 0) AS avg_backout_queue_length,\n\
    \  t.home_trans_qtime / NULLIF(t.home_trans, 0) AS avg_trans_lifetime_us,\n  p.process_name,\n\
    \  p.begin_trans AS process_trans_begun,\n  p.abort_trans AS process_trans_aborted,\n\
    \  d.control_points AS disk_control_points,\n  d.control_point_writes AS disk_cp_writes\n\
    FROM %db%.tmf t\nLEFT JOIN %db%.proc p \n  ON t.system_name = p.system_name \n\
    \  AND t.cpu_num = p.cpu_num \n  AND DATE_TRUNC('second', t.from_timestamp) =\
    \ DATE_TRUNC('second', p.from_timestamp)\nLEFT JOIN %db%.disc d \n  ON t.system_name\
    \ = d.system_name \n  AND t.cpu_num = d.cpu_num \n  AND DATE_TRUNC('second', t.from_timestamp)\
    \ = DATE_TRUNC('second', d.from_timestamp)\nWHERE t.home_trans > 0\nORDER BY abort_rate_pct\
    \ DESC, transactions_started DESC\nLIMIT 10000;\n"
- domain: multi
  query: Investigate file locking contention by analyzing lock wait times, blocked
    requests, and correlating with opener processes to identify lock conflicts
  sql: "SELECT \n  df.file_name_volume || '.' || df.file_name_subvol || '.' || df.file_name_filename\
    \ AS file_path,\n  df.from_timestamp,\n  df.requests_blocked AS total_blocked_requests,\n\
    \  df.lockwait_time / NULLIF(df.requests_blocked, 0) AS avg_lockwait_us,\n  df.max_lockwait_time\
    \ AS max_lockwait_us,\n  df.lock_timeouts,\n  df.lock_bounces,\n  do.opener_cpu,\n\
    \  do.opener_pin,\n  do.requests_blocked AS opener_blocked_requests,\n  do.lockwait_time\
    \ AS opener_lockwait_time,\n  p.process_name AS opener_process_name,\n  p.program_file_name_volume\
    \ || '.' || p.program_file_name_subvol || '.' || p.program_file_name_filename\
    \ AS opener_program\nFROM %db%.dfile df\nLEFT JOIN %db%.dopen do \n  ON df.system_name\
    \ = do.system_name \n  AND df.file_name_volume = do.file_name_volume \n  AND df.file_name_subvol\
    \ = do.file_name_subvol \n  AND df.file_name_filename = do.file_name_filename\
    \ \n  AND DATE_TRUNC('second', df.from_timestamp) = DATE_TRUNC('second', do.from_timestamp)\n\
    LEFT JOIN %db%.proc p \n  ON do.system_name = p.system_name \n  AND do.opener_cpu\
    \ = p.cpu_num \n  AND do.opener_pin = p.pin \n  AND DATE_TRUNC('second', do.from_timestamp)\
    \ = DATE_TRUNC('second', p.from_timestamp)\nWHERE df.requests_blocked > 0\nORDER\
    \ BY df.lockwait_time DESC, df.requests_blocked DESC\nLIMIT 10000;\n"
- domain: multi
  query: Analyze OSS namespace server performance by correlating cache hit ratios,
    checkpoint activity, and semaphore contention with DP2 messaging patterns
  sql: "SELECT \n  o.process_name AS ns_process,\n  o.cpu_num,\n  o.from_timestamp,\n\
    \  o.rr_processed AS resolution_requests,\n  o.ic_lookups AS inode_cache_lookups,\n\
    \  CASE WHEN o.ic_lookups > 0 \n    THEN (o.ic_hits * 100.0 / o.ic_lookups) \n\
    \    ELSE 0 \n  END AS inode_cache_hit_pct,\n  o.lc_lookups AS link_cache_lookups,\n\
    \  CASE WHEN o.lc_lookups > 0 \n    THEN (o.lc_hits * 100.0 / o.lc_lookups) \n\
    \    ELSE 0 \n  END AS link_cache_hit_pct,\n  o.checkpoint_reqs,\n  o.checkpoint_blks,\n\
    \  o.sem_waits,\n  o.sem_wait_qtime / NULLIF(o.sem_waits, 0) AS avg_sem_wait_us,\n\
    \  o.dp2_messages,\n  o.dp2_msg_qtime / NULLIF(o.dp2_messages, 0) AS avg_dp2_response_us,\n\
    \  p.cpu_busy_time / NULLIF(p.delta_time, 0) * 100 AS ns_cpu_usage_pct,\n  p.messages_sent\
    \ + p.messages_received AS ns_total_messages\nFROM %db%.ossns o\nLEFT JOIN %db%.proc\
    \ p \n  ON o.system_name = p.system_name \n  AND o.cpu_num = p.cpu_num \n  AND\
    \ o.pin = p.pin \n  AND DATE_TRUNC('second', o.from_timestamp) = DATE_TRUNC('second',\
    \ p.from_timestamp)\nWHERE o.rr_processed > 0\nORDER BY inode_cache_hit_pct ASC,\
    \ resolution_requests DESC\nLIMIT 10000;\n"
- domain: multi
  query: Perform comprehensive system health analysis by aggregating CPU, memory,
    disk, and process metrics to identify overall system bottlenecks and capacity
    issues
  sql: "WITH cpu_agg AS (\n    SELECT DATE_TRUNC('second', from_timestamp) AS ts,\
    \ system_name,\n           COUNT(DISTINCT cpu_num) AS total_cpus,\n          \
    \ AVG(cpu_busy_time * 100.0 / NULLIF(delta_time, 0)) AS avg_cpu_utilization_pct,\n\
    \           MAX(cpu_busy_time * 100.0 / NULLIF(delta_time, 0)) AS max_cpu_utilization_pct,\n\
    \           AVG(cpu_qtime * 1.0 / NULLIF(delta_time, 0)) AS avg_cpu_queue_length,\n\
    \           SUM(ending_free_mem) AS total_free_memory_pages,\n           SUM(page_requests)\
    \ AS total_page_requests,\n           SUM(page_scans) AS total_page_scans\n  \
    \  FROM %db%.cpu\n    GROUP BY 1, 2\n),\ndisc_agg AS (\n    SELECT DATE_TRUNC('second',\
    \ from_timestamp) AS ts, system_name,\n           COUNT(DISTINCT device_name)\
    \ AS total_disks,\n           SUM(reads + writes) AS total_disk_ios,\n       \
    \    AVG(request_qtime * 1.0 / NULLIF(delta_time, 0)) AS avg_disk_queue_length,\n\
    \           SUM(ending_free_space) AS total_free_space\n    FROM %db%.disc\n \
    \   GROUP BY 1, 2\n),\nproc_agg AS (\n    SELECT DATE_TRUNC('second', from_timestamp)\
    \ AS ts, system_name,\n           COUNT(DISTINCT pin) AS active_processes,\n \
    \          SUM(messages_sent + messages_received) AS total_messages\n    FROM\
    \ %db%.proc\n    GROUP BY 1, 2\n),\ntmf_agg AS (\n    SELECT DATE_TRUNC('second',\
    \ from_timestamp) AS ts, system_name,\n           SUM(home_trans) AS total_transactions,\n\
    \           SUM(aborting_trans) AS total_aborted_transactions\n    FROM %db%.tmf\n\
    \    GROUP BY 1, 2\n)\nSELECT\n    c.ts AS measurement_time,\n    c.total_cpus,\n\
    \    c.avg_cpu_utilization_pct,\n    c.max_cpu_utilization_pct,\n    c.avg_cpu_queue_length,\n\
    \    c.total_free_memory_pages,\n    c.total_page_requests,\n    c.total_page_scans,\n\
    \    d.total_disks,\n    d.total_disk_ios,\n    d.avg_disk_queue_length,\n   \
    \ d.total_free_space / 1024 / 1024 / 1024 AS total_free_disk_gb,\n    p.active_processes,\n\
    \    p.total_messages,\n    t.total_transactions,\n    t.total_aborted_transactions,\n\
    \    CASE\n        WHEN c.avg_cpu_utilization_pct > 85 THEN 'CPU_SATURATED'\n\
    \        WHEN c.total_page_scans > c.total_page_requests * 5 THEN 'MEMORY_PRESSURE'\n\
    \        WHEN d.avg_disk_queue_length > 5 THEN 'DISK_BOTTLENECK'\n        WHEN\
    \ d.total_free_space / 1024 / 1024 / 1024 < 100 THEN 'LOW_DISK_SPACE'\n      \
    \  ELSE 'HEALTHY'\n    END AS system_health_status\nFROM cpu_agg c\nLEFT JOIN\
    \ disc_agg d ON c.system_name = d.system_name AND c.ts = d.ts\nLEFT JOIN proc_agg\
    \ p ON c.system_name = p.system_name AND c.ts = p.ts\nLEFT JOIN tmf_agg t  ON\
    \ c.system_name = t.system_name AND c.ts = t.ts\nORDER BY c.ts\nLIMIT 10000;\n"
- domain: multi
  query: Analyze disk cache effectiveness across all cache levels by calculating hit
    ratios, fault rates, and dirty block queue times to optimize cache configuration
  sql: "SELECT \n  d.device_name,\n  d.from_timestamp,\n  d.c0_blks AS cache_512b_blocks,\n\
    \  d.c1_blks AS cache_1kb_blocks,\n  d.c2_blks AS cache_2kb_blocks,\n  d.c3_blks\
    \ AS cache_4kb_blocks,\n  CASE WHEN (d.c0_hits + d.c0_misses) > 0 \n    THEN (d.c0_hits\
    \ * 100.0 / (d.c0_hits + d.c0_misses)) \n    ELSE 0 \n  END AS cache_512b_hit_pct,\n\
    \  CASE WHEN (d.c1_hits + d.c1_misses) > 0 \n    THEN (d.c1_hits * 100.0 / (d.c1_hits\
    \ + d.c1_misses)) \n    ELSE 0 \n  END AS cache_1kb_hit_pct,\n  CASE WHEN (d.c2_hits\
    \ + d.c2_misses) > 0 \n    THEN (d.c2_hits * 100.0 / (d.c2_hits + d.c2_misses))\
    \ \n    ELSE 0 \n  END AS cache_2kb_hit_pct,\n  CASE WHEN (d.c3_hits + d.c3_misses)\
    \ > 0 \n    THEN (d.c3_hits * 100.0 / (d.c3_hits + d.c3_misses)) \n    ELSE 0\
    \ \n  END AS cache_4kb_hit_pct,\n  d.c0_faults + d.c1_faults + d.c2_faults + d.c3_faults\
    \ AS total_cache_faults,\n  CASE WHEN (d.reads + d.writes) > 0 \n    THEN ((d.c0_faults\
    \ + d.c1_faults + d.c2_faults + d.c3_faults) * 100.0 / (d.reads + d.writes)) \n\
    \    ELSE 0 \n  END AS fault_rate_pct,\n  (d.c0_blks_dirty_qtime + d.c1_blks_dirty_qtime\
    \ + d.c2_blks_dirty_qtime + d.c3_blks_dirty_qtime) / NULLIF(d.delta_time, 0) AS\
    \ avg_dirty_blocks_queued,\n  d.reads + d.writes AS total_ios,\n  (d.c0_hits +\
    \ d.c1_hits + d.c2_hits + d.c3_hits + d.c4_hits + d.c5_hits + d.c6_hits + d.c7_hits)\
    \ AS total_cache_hits\nFROM %db%.disc d\nWHERE d.reads + d.writes > 0\nORDER BY\
    \ fault_rate_pct DESC, total_ios DESC\nLIMIT 10000;\n"
- domain: multi
  query: Identify messaging bottlenecks by analyzing inter-process communication patterns,
    queue times, and correlating with CPU and process activity
  sql: "SELECT \n  p.process_name,\n  p.cpu_num,\n  p.from_timestamp,\n  p.messages_sent\
    \ AS msgs_sent_as_linker,\n  p.messages_received AS msgs_received_as_listener,\n\
    \  (p.sent_bytes + p.returned_bytes) / 1024 AS linker_kb,\n  (p.received_bytes\
    \ + p.reply_bytes) / 1024 AS listener_kb,\n  p.msgs_sent_qtime / NULLIF(p.messages_sent,\
    \ 0) AS avg_msg_response_time_us,\n  p.recv_qtime / NULLIF(p.messages_received,\
    \ 0) AS avg_receive_queue_time_us,\n  p.mqc_allocations AS mqc_allocated,\n  p.mqc_alloc_failures\
    \ AS mqc_failures,\n  p.mqcs_inuse_qtime / NULLIF(p.delta_time, 0) AS avg_mqcs_in_use,\n\
    \  c.cpu_busy_time / NULLIF(c.delta_time, 0) * 100 AS cpu_utilization_pct,\n \
    \ c.cpu_qtime / NULLIF(c.delta_time, 0) AS cpu_queue_length,\n  CASE \n    WHEN\
    \ p.mqc_alloc_failures > 0 THEN 'MQC_EXHAUSTION'\n    WHEN p.msgs_sent_qtime /\
    \ NULLIF(p.messages_sent, 0) > 100000 THEN 'SLOW_RESPONSE'\n    WHEN p.recv_qtime\
    \ / NULLIF(p.messages_received, 0) > 50000 THEN 'RECEIVE_QUEUE_BUILDUP'\n    ELSE\
    \ 'NORMAL'\n  END AS messaging_health\nFROM %db%.proc p\nLEFT JOIN %db%.cpu c\
    \ \n  ON p.system_name = c.system_name \n  AND p.cpu_num = c.cpu_num \n  AND DATE_TRUNC('second',\
    \ p.from_timestamp) = DATE_TRUNC('second', c.from_timestamp)\nWHERE p.messages_sent\
    \ + p.messages_received > 0\nORDER BY avg_msg_response_time_us DESC, msgs_sent_as_linker\
    \ DESC\nLIMIT 10000;\n"
- domain: multi
  query: Analyze file I/O patterns by correlating logical operations with physical
    disk I/O, cache behavior, and DBIO usage to identify optimization opportunities
  sql: "SELECT \n  f.file_name_volume || '.' || f.file_name_subvol || '.' || f.file_name_filename\
    \ AS file_path,\n  f.from_timestamp,\n  f.reads AS logical_reads,\n  f.writes\
    \ AS logical_writes,\n  f.dbio_reads AS direct_bulk_reads,\n  f.dbio_writes AS\
    \ direct_bulk_writes,\n  (f.dbio_read_bytes + f.dbio_write_bytes) / 1024 / 1024\
    \ AS dbio_mb,\n  df.driver_input_calls AS physical_reads,\n  df.driver_output_calls\
    \ AS physical_writes,\n  df.cache_read_hits,\n  CASE WHEN df.driver_input_calls\
    \ > 0 \n    THEN (df.cache_read_hits * 100.0 / df.driver_input_calls) \n    ELSE\
    \ 0 \n  END AS read_cache_hit_pct,\n  df.requests_blocked AS lock_conflicts,\n\
    \  df.lockwait_time / NULLIF(df.requests_blocked, 0) AS avg_lock_wait_us,\n  df.block_splits,\n\
    \  d.device_name,\n  d.request_qtime / NULLIF(d.delta_time, 0) AS disk_queue_length,\n\
    \  CASE \n    WHEN df.cache_read_hits * 100.0 / NULLIF(df.driver_input_calls,\
    \ 1) < 50 THEN 'POOR_CACHE_EFFICIENCY'\n    WHEN df.block_splits > 100 THEN 'HIGH_FRAGMENTATION'\n\
    \    WHEN df.requests_blocked > 50 THEN 'LOCK_CONTENTION'\n    WHEN (f.dbio_read_bytes\
    \ + f.dbio_write_bytes) / 1024 / 1024 > 100 THEN 'DBIO_INTENSIVE'\n    ELSE 'NORMAL'\n\
    \  END AS io_pattern_classification\nFROM %db%.file f\nLEFT JOIN %db%.dfile df\
    \ \n  ON f.system_name = df.system_name \n  AND f.file_name_volume = df.file_name_volume\
    \ \n  AND f.file_name_subvol = df.file_name_subvol \n  AND f.file_name_filename\
    \ = df.file_name_filename \n  AND DATE_TRUNC('second', f.from_timestamp) = DATE_TRUNC('second',\
    \ df.from_timestamp)\nLEFT JOIN %db%.disc d \n  ON df.system_name = d.system_name\
    \ \n  AND df.device_name = d.device_name \n  AND DATE_TRUNC('second', df.from_timestamp)\
    \ = DATE_TRUNC('second', d.from_timestamp)\nWHERE f.reads + f.writes > 0\nORDER\
    \ BY logical_reads + logical_writes DESC\nLIMIT 10000;\n"
- domain: ossns
  query: Average out all the server net values and show them to me
  sql: "SELECT \n  AVG(rr_processed) AS avg_rr_processed,\n  AVG(rr_redir_sent) AS\
    \ avg_rr_redir_sent,\n  AVG(rr_redir_processed) AS avg_rr_redir_processed,\n \
    \ AVG(ic_lookups) AS avg_ic_lookups,\n  AVG(ic_hits) AS avg_ic_hits,\n  AVG(ic_dirty_qtime)\
    \ AS avg_ic_dirty_qtime,\n  AVG(lc_lookups) AS avg_lc_lookups,\n  AVG(lc_hits)\
    \ AS avg_lc_hits,\n  AVG(lc_inuse_qtime) AS avg_lc_inuse_qtime,\n  AVG(checkpoint_reqs)\
    \ AS avg_checkpoint_reqs,\n  AVG(checkpoint_blks) AS avg_checkpoint_blks,\n  AVG(sem_waits)\
    \ AS avg_sem_waits,\n  AVG(sem_wait_qtime) AS avg_sem_wait_qtime,\n  AVG(dp2_dd_reqs)\
    \ AS avg_dp2_dd_reqs,\n  AVG(dp2_messages) AS avg_dp2_messages,\n  AVG(dp2_msg_qtime)\
    \ AS avg_dp2_msg_qtime,\n  AVG(ps_messages) AS avg_ps_messages,\n  AVG(ps_msg_qtime)\
    \ AS avg_ps_msg_qtime,\n  AVG(ls_messages) AS avg_ls_messages,\n  AVG(ls_msg_qtime)\
    \ AS avg_ls_msg_qtime,\n  AVG(gettime_reqs) AS avg_gettime_reqs,\n  AVG(settime_reqs)\
    \ AS avg_settime_reqs\nFROM %db%.ossns\nLIMIT 10000;\n"
- domain: dfile
  query: Top 20 files by total physical I/O calls
  sql: "SELECT\n  file_name_volume || '.' || file_name_subvol || '.' || file_name_filename\
    \ AS file_path,\n  device_name,\n  CAST(driver_input_calls AS BIGINT) + CAST(driver_output_calls\
    \ AS BIGINT) AS total_driver_calls,\n  CAST(driver_input_calls AS BIGINT) AS reads,\n\
    \  CAST(driver_output_calls AS BIGINT) AS writes\nFROM %db%.dfile\nORDER BY total_driver_calls\
    \ DESC\nLIMIT 20;\n"
- domain: dopen
  query: Count active opens per file and total requests across all openers
  sql: "SELECT\n  file_name_volume || '.' || file_name_subvol || '.' || file_name_filename\
    \ AS file_path,\n  COUNT(*) AS open_count,\n  SUM(requests) AS total_requests,\n\
    \  SUM(requests_blocked) AS total_blocked,\n  SUM(lockwait_time) AS total_lockwait_us\n\
    FROM %db%.dopen\nGROUP BY file_name_volume, file_name_subvol, file_name_filename\n\
    ORDER BY total_requests DESC\nLIMIT 10000;\n"
- domain: udef
  query: List all distinct user-defined counter names and how many processes set each
  sql: "SELECT\n  name,\n  COUNT(DISTINCT pin) AS process_count,\n  COUNT(*) AS row_count\n\
    FROM %db%.udef\nWHERE name IS NOT NULL\nGROUP BY name\nORDER BY process_count\
    \ DESC\nLIMIT 10000;\n"
- domain: file
  query: Top 20 files by logical reads + writes
  sql: "SELECT\n  file_name_volume || '.' || file_name_subvol || '.' || file_name_filename\
    \ AS file_path,\n  opener_processname,\n  reads,\n  writes,\n  reads + writes\
    \ AS total_io,\n  (read_bytes + write_bytes) / 1024 / 1024 AS total_mb\nFROM %db%.file\n\
    ORDER BY total_io DESC\nLIMIT 20;\n"
- domain: multi
  query: "For each CPU show the interrupt busy percentage, backup disc process percentage,\
    \ primary disc process percentage, other processes percentage, and user processes\
    \ percentage \u2014 all as a fraction of delta time, ordered by CPU number"
  sql: "WITH cpu_stats AS (\n    SELECT\n        DATE_TRUNC('second', from_timestamp)\
    \ AS ts,\n        system_name,\n        cpu_num,\n        intr_busy_time,\n  \
    \      delta_time\n    FROM %db%.cpu\n),\nproc_stats AS (\n    SELECT\n      \
    \  DATE_TRUNC('second', from_timestamp) AS ts,\n        system_name,\n       \
    \ cpu_num,\n        SUM(CASE WHEN process_name LIKE '$DATA%'\n               \
    \       OR process_name LIKE '$SSD%'\n                      OR process_name LIKE\
    \ '$AUDIT%'\n                 THEN cpu_busy_time ELSE 0 END) AS disc_busy_time,\n\
    \        SUM(CASE WHEN process_name IN ('$SYSTEM','$MONITOR','$MSENGER',\n   \
    \                                    '$VIRTUAL','$NULL','$OSS',\n            \
    \                           '$SWAP','$SWAP01','$SWAP23','$SWAP34',\n         \
    \                              '$NCP','$TMP')\n                 THEN cpu_busy_time\
    \ ELSE 0 END) AS system_busy_time,\n        SUM(CASE WHEN process_name NOT LIKE\
    \ '$DATA%'\n                      AND process_name NOT LIKE '$SSD%'\n        \
    \              AND process_name NOT LIKE '$AUDIT%'\n                      AND\
    \ process_name NOT IN ('$SYSTEM','$MONITOR','$MSENGER',\n                    \
    \                           '$VIRTUAL','$NULL','$OSS',\n                     \
    \                          '$SWAP','$SWAP01','$SWAP23','$SWAP34',\n          \
    \                                     '$NCP','$TMP')\n                 THEN cpu_busy_time\
    \ ELSE 0 END) AS user_app_busy_time,\n        MAX(delta_time) AS delta_time\n\
    \    FROM %db%.proc\n    GROUP BY 1, 2, 3\n)\nSELECT\n    c.cpu_num,\n    AVG(c.intr_busy_time\
    \         * 100.0 / NULLIF(c.delta_time, 0)) AS interrupt_busy_pct,\n    AVG(p.disc_busy_time\
    \         * 100.0 / NULLIF(p.delta_time, 0)) AS disc_proc_pct,\n    AVG(p.system_busy_time\
    \       * 100.0 / NULLIF(p.delta_time, 0)) AS system_proc_pct,\n    AVG(p.user_app_busy_time\
    \     * 100.0 / NULLIF(p.delta_time, 0)) AS user_app_proc_pct\nFROM cpu_stats\
    \ AS c\nJOIN proc_stats AS p\n    ON c.ts = p.ts\n    AND c.system_name = p.system_name\n\
    \    AND c.cpu_num = p.cpu_num\nGROUP BY c.cpu_num\nORDER BY c.cpu_num\nLIMIT\
    \ 10000;\n"
- domain: cpu
  query: Show the average CPU ready queue length per CPU, ensuring small values do
    not round to 0.
  sql: "SELECT\n  cpu_num,\n  CAST(SUM(cpu_qtime) * 1.0 / NULLIF(MAX(delta_time) *\
    \ COUNT(DISTINCT from_timestamp), 0) AS NUMERIC(10,4)) AS avg_ready_queue_length\n\
    FROM %db%.cpu\nGROUP BY cpu_num\nORDER BY avg_ready_queue_length DESC\nLIMIT 10000;"
- domain: disc
  query: Analyze the disk cache effectiveness for each device by showing the overall
    cache hit percentage and the total cache faults as a percentage of total I/Os.
  sql: "SELECT system_name, device_name,\n  CAST(SUM(c0_hits + c1_hits + c2_hits +\
    \ c3_hits + c4_hits + c5_hits + c6_hits + c7_hits) * 100.0 / NULLIF(SUM(c0_hits\
    \ + c1_hits + c2_hits + c3_hits + c4_hits + c5_hits + c6_hits + c7_hits + c0_misses\
    \ + c1_misses + c2_misses + c3_misses + c4_misses + c5_misses + c6_misses + c7_misses),\
    \ 0) AS NUMERIC(10,4)) AS overall_cache_hit_pct,\n  CAST(SUM(c0_faults + c1_faults\
    \ + c2_faults + c3_faults + c4_faults + c5_faults + c6_faults + c7_faults) * 100.0\
    \ / NULLIF(SUM(reads + writes), 0) AS NUMERIC(10,4)) AS fault_rate_pct\nFROM %db%.disc\n\
    GROUP BY system_name, device_name\nORDER BY fault_rate_pct DESC\nLIMIT 10000;"
- domain: disc
  query: For each disk device, what is the cache hit ratio across all cache levels?
  sql: "SELECT system_name, device_name,\n  CAST(SUM(c0_hits + c1_hits + c2_hits +\
    \ c3_hits + c4_hits + c5_hits + c6_hits + c7_hits) * 100.0 / NULLIF(SUM(c0_hits\
    \ + c1_hits + c2_hits + c3_hits + c4_hits + c5_hits + c6_hits + c7_hits + c0_misses\
    \ + c1_misses + c2_misses + c3_misses + c4_misses + c5_misses + c6_misses + c7_misses),\
    \ 0) AS NUMERIC(10,4)) AS total_cache_hit_ratio_pct\nFROM %db%.disc\nGROUP BY\
    \ system_name, device_name\nORDER BY total_cache_hit_ratio_pct DESC\nLIMIT 10000;"
- domain: proc
  query: Show me the acceleration profile of programs by calculating the tns share
    pct, accelerated share pct, native share pct
  sql: "SELECT\n  program_file_name_volume || '.' || program_file_name_subvol || '.'\
    \ || program_file_name_filename AS program_name,\n  CAST(SUM(tns_busy_time) *\
    \ 100.0 / NULLIF(SUM(tns_busy_time + accel_busy_time + native_busy_time), 0) AS\
    \ NUMERIC(10,4)) AS tns_share_pct,\n  CAST(SUM(accel_busy_time) * 100.0 / NULLIF(SUM(tns_busy_time\
    \ + accel_busy_time + native_busy_time), 0) AS NUMERIC(10,4)) AS accelerated_share_pct,\n\
    \  CAST(SUM(native_busy_time) * 100.0 / NULLIF(SUM(tns_busy_time + accel_busy_time\
    \ + native_busy_time), 0) AS NUMERIC(10,4)) AS native_share_pct,\n  SUM(tns_busy_time\
    \ + accel_busy_time + native_busy_time) AS total_busy_time\nFROM %db%.proc\nWHERE\
    \ program_file_name_volume IS NOT NULL\nGROUP BY program_file_name_volume, program_file_name_subvol,\
    \ program_file_name_filename\nORDER BY total_busy_time DESC\nLIMIT 10000;"
- domain: disc
  query: Show disk busy times including device queue busy percentage, read queue busy
    percentage, and write queue busy percentage ordered by device busy time
  sql: SELECT system_name, device_name || '-' || u_scsi_id_plpt_target_id AS device_name,
    AVG(100.0 * device_qbusy_time / NULLIF(delta_time, 0)) AS device_qbusy_time_pct,
    AVG(100.0 * read_qbusy_time / NULLIF(delta_time, 0)) AS read_qbusy_time_pct, AVG(100.0
    * write_qbusy_time / NULLIF(delta_time, 0)) AS write_qbusy_time_pct FROM %db%.disc
    GROUP BY system_name, device_name, u_scsi_id_plpt_target_id ORDER BY device_qbusy_time_pct
    DESC LIMIT 10;
- domain: disc
  query: Show disk device average service time (AST) per device ordered by AST descending
  sql: SELECT system_name, device_name || '-' || u_scsi_id_plpt_target_id AS device_name,
    AVG(device_qbusy_time * 1.0 / NULLIF(delta_time, 0)) / NULLIF(SUM(reads * 1.0
    / NULLIF(delta_time, 0)) + SUM(writes * 1.0 / NULLIF(delta_time, 0)), 0) / 1000.0
    AS device_ast FROM %db%.disc WHERE reads != 0 OR writes != 0 GROUP BY system_name,
    device_name, u_scsi_id_plpt_target_id ORDER BY device_ast DESC LIMIT 10;
- domain: disc
  query: Show average input bytes per second and output bytes per second per disk
    device
  sql: SELECT system_name, device_name || '-' || u_scsi_id_plpt_target_id AS device_name,
    AVG(1000000.0 * input_bytes / NULLIF(delta_time, 0)) AS input_bytes_per_sec, AVG(1000000.0
    * output_bytes / NULLIF(delta_time, 0)) AS output_bytes_per_sec FROM %db%.disc
    GROUP BY system_name, device_name, u_scsi_id_plpt_target_id ORDER BY input_bytes_per_sec
    DESC LIMIT 10;
- domain: disc
  query: Show average read queue length and average write queue length per disk device
  sql: SELECT system_name, device_name || '-' || u_scsi_id_plpt_target_id AS device_name,
    AVG(read_qtime * 1.0 / NULLIF(delta_time, 0)) AS avg_read_queue_length, AVG(write_qtime
    * 1.0 / NULLIF(delta_time, 0)) AS avg_write_queue_length FROM %db%.disc GROUP
    BY system_name, device_name, u_scsi_id_plpt_target_id ORDER BY avg_read_queue_length
    DESC LIMIT 10;
- domain: disc
  query: Show average requests per second per disk device
  sql: SELECT system_name, device_name || '-' || u_scsi_id_plpt_target_id AS device_name,
    AVG(1000000.0 * requests / NULLIF(delta_time, 0)) AS requests_per_sec FROM %db%.disc
    GROUP BY system_name, device_name, u_scsi_id_plpt_target_id ORDER BY requests_per_sec
    DESC LIMIT 10;
- domain: disc
  query: Show disk request average response time (ART) per device
  sql: SELECT system_name, device_name || '-' || u_scsi_id_plpt_target_id AS device_name,
    AVG(request_qtime * 1.0 / NULLIF(delta_time, 0)) / NULLIF(AVG(1000.0 * requests
    / NULLIF(delta_time, 0)), 0) AS request_art FROM %db%.disc WHERE requests > 0
    GROUP BY system_name, device_name, u_scsi_id_plpt_target_id ORDER BY request_art
    DESC LIMIT 10;
- domain: disc
  query: Show disk request queue time average queue length (AQL) per device
  sql: SELECT system_name, device_name || '-' || u_scsi_id_plpt_target_id AS device_name,
    AVG(request_qtime * 1.0 / NULLIF(delta_time, 0)) AS request_qtime_aql FROM %db%.disc
    GROUP BY system_name, device_name, u_scsi_id_plpt_target_id ORDER BY request_qtime_aql
    DESC LIMIT 10;
- domain: disc
  query: Show disk volume semaphore queue time average queue length (AQL) per device
  sql: SELECT system_name, device_name || '-' || u_scsi_id_plpt_target_id AS device_name,
    AVG(volsem_qtime * 1.0 / NULLIF(delta_time, 0)) AS volsem_qtime_aql FROM %db%.disc
    GROUP BY system_name, device_name, u_scsi_id_plpt_target_id ORDER BY volsem_qtime_aql
    DESC LIMIT 10;
- domain: dfile
  query: Show average cache write hits and cache read hits per disk file ordered by
    cache write hits
  sql: SELECT file_name_volume || '.' || file_name_subvol || '.' || file_name_filename
    AS disk_file, AVG(cache_write_hits * 1.0) AS avg_cache_write_hits, AVG(cache_read_hits
    * 1.0) AS avg_cache_read_hits FROM %db%.dfile GROUP BY file_name_volume, file_name_subvol,
    file_name_filename ORDER BY avg_cache_write_hits DESC LIMIT 10;
- domain: dfile
  query: Show average driver input calls per disk file
  sql: SELECT file_name_volume || '.' || file_name_subvol || '.' || file_name_filename
    AS disk_file, AVG(driver_input_calls * 1.0) AS avg_driver_input_calls FROM %db%.dfile
    GROUP BY file_name_volume, file_name_subvol, file_name_filename ORDER BY avg_driver_input_calls
    DESC LIMIT 10;
- domain: dfile
  query: Show average driver output calls per disk file
  sql: SELECT file_name_volume || '.' || file_name_subvol || '.' || file_name_filename
    AS disk_file, AVG(driver_output_calls * 1.0) AS avg_driver_output_calls FROM %db%.dfile
    GROUP BY file_name_volume, file_name_subvol, file_name_filename ORDER BY avg_driver_output_calls
    DESC LIMIT 10;
- domain: dfile
  query: Show average open queue length per disk file
  sql: SELECT file_name_volume || '.' || file_name_subvol || '.' || file_name_filename
    AS disk_file, AVG(open_qtime * 1.0 / NULLIF(delta_time, 0)) AS avg_open_queue_length
    FROM %db%.dfile GROUP BY file_name_volume, file_name_subvol, file_name_filename
    ORDER BY avg_open_queue_length DESC LIMIT 10;
- domain: dfile
  query: Show average requests per second per disk file
  sql: SELECT file_name_volume || '.' || file_name_subvol || '.' || file_name_filename
    AS disk_file, AVG(1000000.0 * requests / NULLIF(delta_time, 0)) AS requests_per_sec
    FROM %db%.dfile GROUP BY file_name_volume, file_name_subvol, file_name_filename
    ORDER BY requests_per_sec DESC LIMIT 10;
- domain: dfile
  query: Show average transient opens per second per disk file
  sql: SELECT file_name_volume || '.' || file_name_subvol || '.' || file_name_filename
    AS disk_file, AVG(100000.0 * transient_opens / NULLIF(delta_time, 0)) AS transient_opens_per_sec
    FROM %db%.dfile GROUP BY file_name_volume, file_name_subvol, file_name_filename
    ORDER BY transient_opens_per_sec DESC LIMIT 10;
- domain: proc
  query: Show process CPU busy time for a specific time range ordered by busy time
    descending
  sql: SELECT cpu_num || ',' || pin || ',' || process_name AS process_id, cpu_busy_time
    FROM %db%.proc WHERE from_timestamp > '2017-12-03 21:22:44.526813' AND from_timestamp
    < '2017-12-03 21:22:46.526813' ORDER BY cpu_busy_time DESC LIMIT 20;
- domain: proc
  query: Show average dispatches per second per process
  sql: SELECT process_name || ':' || cpu_num || ',' || pin AS process_id, AVG(dispatches
    * 1000000.0 / NULLIF(delta_time, 0)) AS dispatches_per_sec FROM %db%.proc GROUP
    BY process_name, cpu_num, pin ORDER BY dispatches_per_sec DESC LIMIT 10;
- domain: proc
  query: Show average file open calls per second per process
  sql: SELECT process_name || ':' || cpu_num || ',' || pin AS process_id, AVG(file_open_calls
    * 1000000.0 / NULLIF(delta_time, 0)) AS file_open_calls_per_sec FROM %db%.proc
    GROUP BY process_name, cpu_num, pin ORDER BY file_open_calls_per_sec DESC LIMIT
    10;
- domain: proc
  query: Show average info calls per second per process
  sql: SELECT process_name || ':' || cpu_num || ',' || pin AS process_id, AVG(info_calls
    * 1000000.0 / NULLIF(delta_time, 0)) AS info_calls_per_sec FROM %db%.proc GROUP
    BY process_name, cpu_num, pin ORDER BY info_calls_per_sec DESC LIMIT 10;
- domain: proc
  query: Show average memory queue time percentage per process
  sql: SELECT process_name || ':' || cpu_num || ',' || pin AS process_id, AVG(mem_qtime
    * 100.0 / NULLIF(delta_time, 0)) AS mem_qtime_pct FROM %db%.proc GROUP BY process_name,
    cpu_num, pin ORDER BY mem_qtime_pct DESC LIMIT 10;
- domain: proc
  query: Show average messages received per second per process
  sql: SELECT process_name || ':' || cpu_num || ',' || pin AS process_id, AVG(messages_received
    * 1000000.0 / NULLIF(delta_time, 0)) AS messages_received_per_sec FROM %db%.proc
    GROUP BY process_name, cpu_num, pin ORDER BY messages_received_per_sec DESC LIMIT
    10;
- domain: proc
  query: Show average messages sent per second per process
  sql: SELECT process_name || ':' || cpu_num || ',' || pin AS process_id, AVG(messages_sent
    * 1000000.0 / NULLIF(delta_time, 0)) AS messages_sent_per_sec FROM %db%.proc GROUP
    BY process_name, cpu_num, pin ORDER BY messages_sent_per_sec DESC LIMIT 10;
- domain: proc
  query: Show average messages sent queue length per process
  sql: SELECT process_name || ':' || cpu_num || ',' || pin AS process_id, AVG(msgs_sent_qtime
    * 1.0 / NULLIF(delta_time, 0)) AS avg_msgs_sent_queue_length FROM %db%.proc GROUP
    BY process_name, cpu_num, pin ORDER BY avg_msgs_sent_queue_length DESC LIMIT 10;
- domain: proc
  query: Show average page faults per second per process
  sql: SELECT process_name || ':' || cpu_num || ',' || pin AS process_id, AVG(page_faults
    * 1000000.0 / NULLIF(delta_time, 0)) AS page_faults_per_sec FROM %db%.proc GROUP
    BY process_name, cpu_num, pin ORDER BY page_faults_per_sec DESC LIMIT 10;
- domain: proc
  query: Show average present pages queue length per process
  sql: SELECT process_name || ':' || cpu_num || ',' || pin AS process_id, AVG(pres_pages_qtime
    * 1.0 / NULLIF(delta_time, 0)) AS avg_pres_pages_queue_length FROM %db%.proc GROUP
    BY process_name, cpu_num, pin ORDER BY avg_pres_pages_queue_length DESC LIMIT
    10;
- domain: proc
  query: Show average ready time percentage per process
  sql: SELECT process_name || ':' || cpu_num || ',' || pin AS process_id, AVG(ready_time
    * 100.0 / NULLIF(delta_time, 0)) AS ready_time_pct FROM %db%.proc GROUP BY process_name,
    cpu_num, pin ORDER BY ready_time_pct DESC LIMIT 10;
- domain: proc
  query: Show average sent bytes and received bytes per process
  sql: SELECT process_name || ':' || cpu_num || ',' || pin AS process_id, AVG(sent_bytes
    * 1.0) AS avg_sent_bytes, AVG(received_bytes * 1.0) AS avg_received_bytes FROM
    %db%.proc GROUP BY process_name, cpu_num, pin ORDER BY avg_sent_bytes DESC LIMIT
    10;
- domain: tmf
  query: Show aborting transactions per second per CPU
  sql: SELECT cpu_num AS tmf_name, AVG(aborting_trans * 1000000.0 / NULLIF(delta_time,
    0)) AS aborting_trans_per_sec FROM %db%.tmf GROUP BY cpu_num ORDER BY aborting_trans_per_sec
    DESC LIMIT 10;
- domain: tmf
  query: Show home network transactions per second per CPU
  sql: SELECT cpu_num AS tmf_name, AVG(home_net_trans * 1000000.0 / NULLIF(delta_time,
    0)) AS home_net_trans_per_sec FROM %db%.tmf GROUP BY cpu_num ORDER BY home_net_trans_per_sec
    DESC LIMIT 10;
- domain: tmf
  query: Show TMF home network transactions average response time (ART) per CPU
  sql: SELECT cpu_num, AVG(home_net_trans_qtime * 1.0 / NULLIF(home_net_trans, 0)
    / 1000.0) AS home_net_trans_art_ms FROM %db%.tmf WHERE home_net_trans > 0 GROUP
    BY cpu_num ORDER BY home_net_trans_art_ms DESC LIMIT 10000;
- domain: tmf
  query: Show home network transactions queue time average queue length (AQL) per
    CPU
  sql: SELECT cpu_num AS tmf_name, AVG(home_net_trans_qtime * 1.0 / NULLIF(delta_time,
    0)) AS avg_home_net_trans_queue_length FROM %db%.tmf GROUP BY cpu_num ORDER BY
    avg_home_net_trans_queue_length DESC LIMIT 10;
- domain: tmf
  query: Show home transactions per second per CPU
  sql: SELECT cpu_num AS tmf_name, AVG(home_trans * 1000000.0 / NULLIF(delta_time,
    0)) AS home_trans_per_sec FROM %db%.tmf GROUP BY cpu_num ORDER BY home_trans_per_sec
    DESC LIMIT 10;
- domain: tmf
  query: Show TMF home transactions average response time (ART) per CPU
  sql: SELECT cpu_num, AVG(home_trans_qtime * 1.0 / NULLIF(home_trans, 0) / 1000.0)
    AS home_trans_art_ms FROM %db%.tmf WHERE home_trans > 0 GROUP BY cpu_num ORDER
    BY home_trans_art_ms DESC LIMIT 10000;
- domain: tmf
  query: Show home transactions queue time average queue length (AQL) per CPU
  sql: SELECT cpu_num AS tmf_name, AVG(home_trans_qtime * 1.0 / NULLIF(delta_time,
    0)) AS avg_home_trans_queue_length FROM %db%.tmf GROUP BY cpu_num ORDER BY avg_home_trans_queue_length
    DESC LIMIT 10;
- domain: tmf
  query: Show remote transactions per second per CPU
  sql: SELECT cpu_num AS tmf_name, AVG(remote_trans * 1000000.0 / NULLIF(delta_time,
    0)) AS remote_trans_per_sec FROM %db%.tmf GROUP BY cpu_num ORDER BY remote_trans_per_sec
    DESC LIMIT 10;
- domain: tmf
  query: Show remote transactions queue time average queue length (AQL) per CPU
  sql: SELECT cpu_num AS tmf_name, AVG(remote_trans_qtime * 1.0 / NULLIF(delta_time,
    0)) AS avg_remote_trans_queue_length FROM %db%.tmf GROUP BY cpu_num ORDER BY avg_remote_trans_queue_length
    DESC LIMIT 10;
- domain: tmf
  query: Show transaction backout queue time average queue length (AQL) per CPU
  sql: SELECT cpu_num AS tmf_name, AVG(trans_backout_qtime * 1.0 / NULLIF(delta_time,
    0)) AS avg_trans_backout_queue_length FROM %db%.tmf GROUP BY cpu_num ORDER BY
    avg_trans_backout_queue_length DESC LIMIT 10;
- domain: tmf
  query: Show total home transactions per CPU
  sql: SELECT cpu_num AS tmf_name, SUM(home_trans) AS total_home_trans FROM %db%.tmf
    GROUP BY cpu_num ORDER BY total_home_trans DESC LIMIT 10;
- domain: disc
  query: Show total writes and total reads grouped by device type and device subtype
  sql: SELECT device_type, device_subtype, SUM(writes) AS total_writes, SUM(reads)
    AS total_reads FROM %db%.disc GROUP BY device_type, device_subtype LIMIT 10000;
- domain: proc
  query: Show measurement duration and interval for each system and OS version
  sql: SELECT system_name, os_version_letter || '-' || os_version_number AS os_version,
    EXTRACT(EPOCH FROM MAX(to_timestamp)) - EXTRACT(EPOCH FROM MIN(from_timestamp))
    AS duration_seconds, ROUND(MAX(delta_time) / 1000000.0, 0) AS interval_seconds
    FROM %db%.proc GROUP BY system_name, os_version_letter, os_version_number LIMIT
    10000;
- domain: proc
  query: Show comprehensive stats for NSJSP processes including CPU busy time, file
    operations, OSS requests, messaging, and transactions
  sql: SELECT process_name, SUM(cpu_busy_time) AS total_cpu_busy_time, 100.0 * SUM(cpu_busy_time)
    / NULLIF(MAX(delta_time), 0) AS cpu_busy_pct, SUM(file_open_calls) AS total_file_open_calls,
    SUM(info_calls) AS total_info_calls, SUM(ossns_requests) AS total_ossns_requests,
    SUM(ossns_wait_time) AS total_ossns_wait_time, SUM(messages_sent) AS total_messages_sent,
    SUM(mqcs_inuse_qtime) AS total_mqcs_inuse_qtime, SUM(mqc_allocations) AS total_mqc_allocations,
    SUM(msgs_sent_qtime) AS total_msgs_sent_qtime, SUM(begin_trans) AS total_begin_trans,
    SUM(messages_received) AS total_messages_received, SUM(recv_qtime) AS total_recv_qtime
    FROM %db%.proc WHERE process_name LIKE '%NSJSP%' GROUP BY process_name ORDER BY
    process_name LIMIT 10000;
- domain: proc
  query: Show comprehensive stats for PM processes including CPU busy time, file operations,
    OSS requests, and messaging
  sql: SELECT process_name, SUM(cpu_busy_time) AS total_cpu_busy_time, 100.0 * SUM(cpu_busy_time)
    / NULLIF(MAX(delta_time), 0) AS cpu_busy_pct, SUM(file_open_calls) AS total_file_open_calls,
    SUM(info_calls) AS total_info_calls, SUM(ossns_requests) AS total_ossns_requests,
    SUM(ossns_wait_time) AS total_ossns_wait_time, SUM(messages_sent) AS total_messages_sent,
    SUM(mqcs_inuse_qtime) AS total_mqcs_inuse_qtime, SUM(mqc_allocations) AS total_mqc_allocations,
    SUM(msgs_sent_qtime) AS total_msgs_sent_qtime, SUM(begin_trans) AS total_begin_trans,
    SUM(messages_received) AS total_messages_received, SUM(recv_qtime) AS total_recv_qtime
    FROM %db%.proc WHERE process_name LIKE '%PM%' GROUP BY process_name ORDER BY process_name
    LIMIT 10000;
- domain: proc
  query: Show CPU busy time and percentage for NSMEF processes
  sql: SELECT SUM(cpu_busy_time) AS nsmef_cpu_busytime, 100.0 * SUM(cpu_busy_time)
    / NULLIF(MAX(delta_time), 0) AS nsmef_cpu_busy_pct FROM %db%.proc WHERE process_name
    LIKE '%NSMEF%' LIMIT 10000;
- domain: udef
  query: Show sum of user defined values grouped by process name and counter name
  sql: SELECT process_name || name AS countername, SUM(CAST(value AS INTEGER)) AS
    userdefvalue FROM %db%.udef GROUP BY process_name, name ORDER BY countername LIMIT
    10000;
- domain: proc
  query: Show CPU busy time, messages sent, MQC allocations, and MQCS in-use queue
    time for ROUT processes
  sql: SELECT process_name, SUM(cpu_busy_time) AS cpu_busytime_rout, SUM(messages_sent)
    AS messages_sent_rout, SUM(mqc_allocations) AS mqc_allocations_rout, SUM(mqcs_inuse_qtime)
    AS mqcs_inuse_qtime_rout FROM %db%.proc WHERE process_name LIKE '%ROUT%' GROUP
    BY process_name ORDER BY process_name LIMIT 10000;
- domain: file
  query: Show file busy time and messages for NSJSP processes grouped by file name
    volume
  sql: SELECT file_name_volume, SUM(file_busy_time) AS file_busy_time, SUM(messages)
    AS total_messages FROM %db%.file WHERE opener_processname LIKE '%NSJSP%' AND file_name_volume
    LIKE '%ROUT%' GROUP BY file_name_volume ORDER BY file_name_volume LIMIT 10000;
- domain: file
  query: Show detailed file statistics including busy time, reads, writes, messages,
    and updates for NSJSP processes grouped by file name and open type
  sql: SELECT file_name_volume || '.' || file_name_subvol || '.' || file_name_filename
    AS filename, file_open_type, SUM(file_busy_time) AS file_busy_time, SUM(reads)
    AS total_reads, SUM(read_bytes) AS total_read_bytes, SUM(writes) AS total_writes,
    SUM(write_bytes) AS total_write_bytes, SUM(messages) AS total_messages, SUM(deletes_or_writereads)
    AS total_deletes_writereads, SUM(updates_or_replies) AS total_updates_replies
    FROM %db%.file WHERE opener_processname LIKE '%NSJSP%' GROUP BY file_name_volume,
    file_name_subvol, file_name_filename, file_open_type ORDER BY filename DESC LIMIT
    10000;
- domain: file
  query: Show detailed file statistics including reads, writes, and messages grouped
    by opener process name, file name, and open type
  sql: SELECT opener_processname, file_name_volume || '.' || file_name_subvol || '.'
    || file_name_filename AS filename, file_open_type, SUM(file_busy_time) AS file_busy_time,
    SUM(reads) AS total_reads, SUM(read_bytes) AS total_read_bytes, SUM(writes) AS
    total_writes, SUM(write_bytes) AS total_write_bytes, SUM(messages) AS total_messages,
    SUM(deletes_or_writereads) AS total_deletes_writereads, SUM(updates_or_replies)
    AS total_updates_replies FROM %db%.file GROUP BY opener_processname, file_name_volume,
    file_name_subvol, file_name_filename, file_open_type ORDER BY filename DESC LIMIT
    10000;
- domain: tmf
  query: Show total home transactions grouped by CPU number
  sql: SELECT cpu_num, SUM(home_trans) AS total_home_trans FROM %db%.tmf GROUP BY
    cpu_num ORDER BY cpu_num LIMIT 10000;
- domain: file
  query: Show detailed file statistics including reads, writes, and messages for PM
    processes
  sql: SELECT file_name_volume || '.' || file_name_subvol || '.' || file_name_filename
    AS filename, file_open_type, SUM(file_busy_time) AS file_busy_time, SUM(reads)
    AS total_reads, SUM(read_bytes) AS total_read_bytes, SUM(writes) AS total_writes,
    SUM(write_bytes) AS total_write_bytes, SUM(messages) AS total_messages, SUM(deletes_or_writereads)
    AS total_deletes_writereads, SUM(updates_or_replies) AS total_updates_replies
    FROM %db%.file WHERE opener_processname LIKE '%PM%' GROUP BY file_name_volume,
    file_name_subvol, file_name_filename, file_open_type ORDER BY file_busy_time DESC
    LIMIT 10000;
- domain: sqls
  query: Show SQL statement execution statistics including calls, busy time, records
    accessed, and disk reads for SQL statement processes
  sql: SELECT process_name, SUM(calls) AS total_calls, SUM(elapsed_busy_time) AS total_elapsed_busy_time,
    SUM(records_used) AS total_records_used, SUM(records_accessed) AS total_records_accessed,
    SUM(messages) AS total_messages, SUM(disc_reads) AS total_disc_reads, SUM(message_bytes)
    AS total_message_bytes, SUM(elapsed_recompile_time) AS total_elapsed_recompile_time
    FROM %db%.sqls WHERE process_name LIKE '%SQL%' GROUP BY process_name LIMIT 10000;
- domain: disc
  query: Show read and write queue busy times and queue lengths for each disk device
    and config name
  sql: SELECT system_name, device_name, config_name, SUM(read_qbusy_time) AS total_read_qbusy_time,
    SUM(read_qtime) AS total_read_qtime, SUM(write_qbusy_time) AS total_write_qbusy_time,
    SUM(write_qtime) AS total_write_qtime, SUM(device_qbusy_time) AS total_device_qbusy_time
    FROM %db%.disc GROUP BY system_name, device_name, config_name ORDER BY total_device_qbusy_time
    DESC LIMIT 10000;
- domain: cpu
  query: Show me the CPU busy percentage for each CPU in a normalized way with pct
    between 0-100, use ipus for this
  sql: SELECT cpu_num, CAST(SUM(cpu_busy_time) * 100.0 / NULLIF(SUM(delta_time * ipus),
    0) AS DECIMAL(10, 4)) AS normalized_busy_pct FROM %db%.cpu WHERE ipus > 0 GROUP
    BY cpu_num ORDER BY normalized_busy_pct DESC LIMIT 10000;
