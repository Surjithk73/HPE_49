netline:
  counter_classifications:
  - counter: READ-BUSY-TIME
    classification: Busy counter
  - counter: WRITE-BUSY-TIME
    classification: Busy counter
  - counter: READS
    classification: Incrementing counter
  - counter: WRITES
    classification: Incrementing counter
  - counter: REQUESTS
    classification: Incrementing counter
  - counter: U64-BYTES
    classification: Incrementing counter
  - counter: U128-BYTES
    classification: Incrementing counter
  - counter: U256-BYTES
    classification: Incrementing counter
  - counter: U512-BYTES
    classification: Incrementing counter
  - counter: U1024-BYTES
    classification: Incrementing counter
  - counter: U2048-BYTES
    classification: Incrementing counter
  - counter: U4096-BYTES
    classification: Incrementing counter
  - counter: O4095-BYTES
    classification: Incrementing counter
  - counter: L2IN-BYTES
    classification: Accumulating counter
  - counter: L2OUT-BYTES
    classification: Accumulating counter
  - counter: DIN4-BYTES
    classification: Accumulating counter
  - counter: DOUT4-BYTES
    classification: Accumulating counter
  - counter: CIN4-BYTES
    classification: Accumulating counter
  - counter: COUT4-BYTES
    classification: Accumulating counter
  formulas:
  - description: L2IN-BYTES components (for non-CSS type controllers)
    formula: L2IN-BYTES = DIN4-BYTES + CIN4-BYTES
  - description: L2OUT-BYTES components (for non-CSS type controllers)
    formula: L2OUT-BYTES = DOUT4-BYTES + COUT4-BYTES
  - description: Total Level 2 bytes on the network line
    formula: Total Level 2 Bytes = L2IN-BYTES + L2OUT-BYTES
  interpretations:
  - description: L2IN-BYTES and L2OUT-BYTES include both user data and line protocol
      data. For CSS type controllers, L2IN-BYTES also contains CLB protocol and CLIP
      TRACE blocks, and L2OUT-BYTES contains CLB protocol bytes.
  - description: DIN4-BYTES and DOUT4-BYTES include only user data and message system
      protocol bytes, ignoring data associated with line protocol.
  - description: REQUESTS counts both message-level events (LINKS) and packet-level
      events (SENT FORWARD) in the same counter.
  - description: Message size distribution counters (U64-BYTES through O4095-BYTES)
      represent message sizes AFTER compression and include protocol bytes.
  - description: Measure byte counters are close to actual counts but do not advance
      when retransmission occurs due to line problems for CSS-type controllers.
  thresholds:
  - description: READ-BUSY-TIME is expected to have a high value because active, full-duplex
      lines usually have a read continue outstanding.
    condition: Normal operation
  business_rules:
  - rule: READ-BUSY-TIME and WRITE-BUSY-TIME are only measured when Expand over SWAN
      is in use.
  - rule: X.25 protocol does not update CIN4-BYTES or COUT4-BYTES counters.
  - rule: In H-series and later RVUs, all byte-count fields accommodate 64 bits and
      the -F suffix for fields is no longer used in ZMS style records.
  - rule: In G-series RVUs, if a 32-bit byte counter overflows, it returns a value
      of -1 and the ERROR field returns -1. The 64-bit (-F) counterpart returns the
      correct value.
  relationships:
  - source_counter: DIN4-BYTES
    target_counter: L2IN-BYTES
    relationship: DIN4-BYTES is a component of L2IN-BYTES for non-CSS controllers.
  - source_counter: CIN4-BYTES
    target_counter: L2IN-BYTES
    relationship: CIN4-BYTES is a component of L2IN-BYTES for non-CSS controllers.
  - source_counter: DOUT4-BYTES
    target_counter: L2OUT-BYTES
    relationship: DOUT4-BYTES is a component of L2OUT-BYTES for non-CSS controllers.
  - source_counter: COUT4-BYTES
    target_counter: L2OUT-BYTES
    relationship: COUT4-BYTES is a component of L2OUT-BYTES for non-CSS controllers.
  sql_generation_guidance:
  - rule: When querying byte counters for G-series RVUs, prefer 64-bit fields (-F
      suffix) or handle values of -1 in 32-bit fields, which indicate overflow.
  - rule: Do not use CIN4-BYTES or COUT4-BYTES for network lines utilizing X.25, as
      they are not updated.
  reporting_guidance:
  - recommendation: To report detailed information about line problems or retransmissions,
      Measure L2 counters are insufficient (as they do not count retransmissions).
      Recommend using SCF line statistics instead.
  - recommendation: When presenting message size histograms, clarify that the sizes
      reflect post-compression bytes including protocol overhead.
