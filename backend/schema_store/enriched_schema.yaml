dfile:
  source_file: measurefiles/dfilecsv
  ddl_record: ZMSDFILE
  entity_type: "DFILE (Disk File \xE2\u20AC\u201D DISKFILE entity)"
  purpose: 'Per-file performance metrics for all opener processes on a specified disk
    file. DISKFILE creates one counter record per measured file and does not track
    individual opener processes. Creates a new record if a file closes and reopens
    during measurement.

    '
  identity_columns:
    - system_name
    - cpu_num
    - file_name.volume
    - file_name.subvol
    - file_name.filename
  time_columns:
    - from_timestamp
    - to_timestamp
    - delta_time
  join_hints:
    - JOIN disc ON (system_name, cpu_num, device_name, from_timestamp) for disk context
    - JOIN dopen ON (system_name, cpu_num, fcb_number, from_timestamp) for per-opener
      detail
  columns:
    system_name:
      queryable: true
      type: string
      description: Name of the system on which the measurement was taken.
    cpu_num:
      queryable: true
      type: integer
      description: "Number of the CPU on which the measurement was taken. For interprocessor\
        \ communications (IPC records, CPU\u2011NUM is MYCPU.)"
    object_uid:
      queryable: false
      type: string
      description: (ZMS Style only Reserved for future use.)
    from_timestamp:
      queryable: true
      type: datetime
      description: "Starting time of the measurement or transient entity. Specified\
        \ as Julian\u2011based, local civil time (LCT.) When using the CSV[A], JSON,\
        \ or XML report format, the timestamp is emitted as ISO 8601 date and time\
        \ of day representation, extended format, fractional seconds, local time (YYYY-MM-DDThh:mm:ss.s.)"
    to_timestamp:
      queryable: true
      type: datetime
      description: "Ending time of the measurement or transient entity. Specified\
        \ as Julian\u2011based, local civil time (LCT.) When using the CSV[A], JSON,\
        \ or XML report format, the timestamp is emitted as ISO 8601 date and time\
        \ of day representation, extended format, fractional seconds, local time (YYYY-MM-DDThh:mm:ss.s.)"
    delta_time:
      queryable: true
      type: integer
      unit: microseconds
      description: Duration of the measurement, in microseconds.
    template_version:
      queryable: false
      type: integer
      description: (ZMS Style only Record template version from MEASDDLS for the format
        of the external record. When data collected on systems of differing product
        versions are stored in the same structured files, the template version for
        all records is the one used to create the structured file.)
    subsystem_version:
      queryable: false
      type: integer
      description: (ZMS Style only This value is set to 1 for the initial H-series
        and later versions of all subsystems. If the value is greater than 1, consult
        the subsystem documentation for information about changes that affect the
        Measure counters.)
    error:
      queryable: false
      type: integer
      description: Indicates whether an error prevented Measure from collecting data
        or writing an output record for this entity. For values, see Identifying Data
        File Errors.
    fcb_number:
      queryable: true
      type: integer
      description: "File Control Block number \xE2\u20AC\u201D internal to the disk\
        \ process File control block number of the measured file. Internal to the\
        \ disk process."
      derived_formula: N/A
    file_type:
      queryable: true
      type: integer
      description: 'File type: 0=unstructured, 1=relative, 2=entry-sequenced, 3=key-sequenced
        File type, from the access control block: .'
    file_code:
      queryable: true
      type: integer
      description: "Three-digit system file code (e.g. 100=object, 101=edit) Three\u2011\
        digit system file code, such as 100 for object files or 101 for edit files.\
        \ For a complete list of file codes, see the HPE Nonstop File Utility Program\
        \ (FUP Reference Manual.)"
    format:
      queryable: true
      type: integer
      description: 'File format: 1=format 1, 2=format 2 (for files >2GB or large extents)'
    device_name:
      queryable: true
      type: string
      description: Disk device name hosting this file; for SMF files = physical location
        Disk device on which the program file is located. For SMF files, this field
        provides the physical location that corresponds to the logical file name.
        For Nonstop files, this field is the same as the FILE-NAME VOLUME subfield.
      derived_formula: N/A
    storage_pool:
      queryable: true
      type: string
      description: SMF storage pool process name Name of the SMF storage pool to which
        the measured disk is assigned (process name of the storage pool process.)
      derived_formula: N/A
    starting_eof:
      queryable: true
      type: integer
      unit: bytes
      counter_type: Snapshot
      description: "EOF position at interval start; not displayed by MEASCOM but available\
        \ for IF/BY EOF value of the file, in bytes, at measurement start time. This\
        \ item is part of the structured DISKFILE record, but MEASCOM does not display\
        \ it. Instead, MEASCOM uses this counter value as a base to compute the ratio\
        \ of ENDING\u2011EOF to STARTING-EOF."
      derived_formula: Growth ratio = ENDING-EOF / STARTING-EOF
    ending_eof:
      queryable: true
      type: integer
      unit: bytes
      counter_type: Snapshot
      description: "EOF position at interval end; displayed with ratio ending_eof/starting_eof\
        \ EOF value of the file, in bytes, at measurement stop time or measurement\
        \ interval copy time. The REPORT RATE value does not affect the display of\
        \ this value in MEASCOM. This item is displayed in its absolute value in bytes,\
        \ followed by the ratio of ENDING\u2011EOF over STARTING-EOF."
      derived_formula: Growth ratio = ENDING-EOF / STARTING-EOF
    transient_opens:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: 'Number of opens that occurred during the measurement period Number
        of opens that occur during the measurement period. Counter type: Incrementing.'
      derived_formula: N/A
    open_qtime:
      queryable: true
      type: integer
      unit: microseconds
      counter_type: Queue
      description: "Time for all opens of this file including transient opens; RATE\
        \ ON \xE2\u2020\u2019 AQL Time for all the opens of this file (including transient\
        \ opens. Counter type: Queue.)"
      derived_formula: N/A
    driver_input_calls:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: Number of read operations (cache hits + misses); physical reads
        = driver_input_calls - cache_read_hits Number of read operations, both cache
        hits and cache misses. The number of physical read operations is the difference
        between DRIVER- INPUT-CALLS and CACHE-READ-HITS. The number of physical read
        operations is the difference between DRIVER- INPUT-CALLS and CACHE-READ-HITS.
      derived_formula: N/A
    driver_output_calls:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: Number of write operations; physical writes = driver_output_calls
        - cache_write_hits (for small writes) Number of write operations. For writes
        to unstructured files where the write-count is less than or equal to 4096
        bytes and for structured files, the number of physical disk write operations
        is the difference between DRIVER-OUTPUT-CALLS and CACHE-WRITE-HITS. For writes
        to unstructured files where the write-count is less than or equal to 4096
        bytes and for structured files, the number of physical disk write operations
        is the difference between DRIVER-OUTPUT-CALLS and CACHE-WRITE-HITS. For writes
        to unstructured files where the write-count is greater than 4096 (large write,
        the number of physical disk write operations is the difference between DRIVER-OUTPUT-CALLS
        and the sum of CACHE-WRITE-HITS and CACHE-WRITE-CLEANS.)
      derived_formula: Physical write operations (<= 4096 bytes or structured) = DRIVER-OUTPUT-CALLS
        - CACHE-WRITE-HITS; Physical write operations (> 4096 bytes) = DRIVER-OUTPUT-CALLS
        - (CACHE-WRITE-HITS + CACHE-WRITE-CLEANS)
    cache_read_hits:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: "Times a read found the required block in cache; saves a disk I/O\
        \ Number of times a read operation found the required block in cache, which\
        \ saves a disk I/O. The DRIVER\u2011INPUT\u2011CALLS counter counts all read\
        \ operations, both cache hits and misses."
      derived_formula: N/A
    cache_write_hits:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: Times a write found the required block dirty in cache Number of
        times a write operation found the required block in cache and the block was
        dirty. A write to a dirty block saves a write I/O operation.
      derived_formula: N/A
    cache_write_cleans:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: Times a write found the required block clean in cache; saves a
        disk read per write Number of times a write operation found the required block
        in cache and the block was clean. During a write, the diskprocess searches
        for the requested block in its cache.
      derived_formula: N/A
    requests:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: "Total I/O requests for this file Number of requests received by\
        \ the terminal process. To determine how long the requests were queued before\
        \ being read by the terminal process, measure the process and examine the\
        \ PROCESS RECV\u2011QTIME counter."
      derived_formula: N/A
    requests_blocked:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: Times an I/O operation waited because the requested file or record
        was locked Number of times an I/O operation had to wait because the requested
        file or record was locked. LOCKWAITS is another term for this counter.
      derived_formula: N/A
    lockwait_time:
      queryable: true
      type: integer
      unit: microseconds
      counter_type: Lockwait
      description: "Cumulative time waiting for locks; RATE ON \xE2\u2020\u2019 avg\
        \ wait per blocked request Time spent waiting for locks. The REQUESTS\u2011\
        BLOCKED counter counts the number of blocked requests\u2014that is, the number\
        \ of times requests are queued to locks. When the REPORT RATE value is on,\
        \ this counter returns the average wait time (LOCKWAIT\u2011TIME divided by\
        \ REQUESTS\u2011BLOCKED.)"
      derived_formula: Average wait time = LOCKWAIT-TIME / REQUESTS-BLOCKED
    max_lockwait_time:
      queryable: true
      type: integer
      unit: microseconds
      counter_type: Max value
      description: Maximum wait time per lock; use as guide for timeout value; unaffected
        by RATE Maximum wait time for each lock. Use this number as a guide to set
        the timeout value in the application.
      derived_formula: N/A
    lock_timeouts:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: Number of lock timeout events (error 40) Number of timeouts on
        locks (error 40. When a timeout value for a request expires, the file system
        (Enscribe and SQL/MP) sends a cancel request to the disk process.)
      derived_formula: N/A
    lock_bounces:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: "Number of bounced locks (FELOCKED/error 73) returned to the file\
        \ system Number of bounced locks (FELOCKED = error 73 returned to the file\
        \ system. For SQL tables, a bounced lock is a result of the CONTROL TABLE\
        \ command with the RETURN\u2011IF\u2011LOCKED control option.)"
      derived_formula: N/A
    block_splits:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: 'Number of B-tree block splits during writes; keep to minimum Number
        of block splits during writes to the file. Counter type: Incrementing.'
      derived_formula: N/A
    extent_allocations:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: 'Number of times a file extent was allocated Number of times a
        file extent is allocated. Counter type: Incrementing.'
      derived_formula: N/A
    dbio_input_calls:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: Direct bulk I/O read operations; subset of driver_input_calls Number
        of direct bulk I/O read operations to a requesting processor. This counter
        is a subset of DRIVER-INPUT-CALLS. This counter is a subset of DRIVER-INPUT-CALLS.
      derived_formula: DBIO-INPUT-CALLS is a subset of DRIVER-INPUT-CALLS
    dbio_output_calls:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: Direct bulk I/O write operations; subset of driver_output_calls
        Number of direct bulk I/O write operations from a requesting processor. This
        counter is a subset of DRIVER-OUTPUT-CALLS. This counter is a subset of DRIVER-OUTPUT-CALLS.
      derived_formula: DBIO-OUTPUT-CALLS is a subset of DRIVER-OUTPUT-CALLS
    sql_inserts:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: 'Number of SQL INSERT row operations Number of row insert operations
        performed on the SQL table. Counter type: Incrementing.'
      derived_formula: N/A
    sql_updates:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: 'Number of SQL UPDATE row operations Number of row update operations
        performed on the SQL table. Counter type: Incrementing.'
      derived_formula: N/A
    sql_deletes:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: 'Number of SQL DELETE row operations Number of row delete operations
        performed on the SQL table. Counter type: Incrementing.'
      derived_formula: N/A
    starting_rows:
      queryable: true
      type: integer
      counter_type: Snapshot
      description: Row count at interval start; valid only if table had zero rows
        at some point since file open (ZMS Style only Number of rows in the SQL table
        at the start of a measurement interval. This counter is valid only if the
        table had zero rows at some time since the file open.)
      derived_formula: N/A
    ending_rows:
      queryable: true
      type: integer
      counter_type: Snapshot
      description: Row count at interval end; valid only if table had zero rows at
        some point since file open Number of rows in the SQL table at the end of a
        measurement interval. This counter is valid only if the table had zero rows
        at some time since the file open.
      derived_formula: N/A
    oss_block_writes:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: 'Block write operations issued by DP2 for the OSS file system Number
        of block write operations issued by DP2 for the OSS file system. Counter type:
        Incrementing.'
      derived_formula: N/A
    oss_block_write_bytes:
      queryable: true
      type: integer
      unit: bytes
      counter_type: Accumulating
      description: 'Bytes written by DP2 as a result of oss_block_writes Number of
        bytes written by DP2 as a result of OSS-BLOCK-WRITES. Counter type: Accumulating.
        Number of bytes written by DP2 as a result of OSS-BLOCK-WRITES.'
      derived_formula: N/A
    oss_cache_callbacks:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: 'Cache callback requests sent by DP2 to the OSS file manager Number
