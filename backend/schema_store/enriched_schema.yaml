    c0_faults:
      type: integer
      queryable: true
      description: Number of times the cache tables indicate a required block is in
        cache, but not because the memory manager is using it for another purpose.
        Faults occur when a cache is too large or physical memory is too small for
        a given application.
      thresholds: Fault rates greater than 5% of all I/O operations generally indicate
        you need more memory.
