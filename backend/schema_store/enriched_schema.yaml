      unit: bytes
      counter_type: Accumulating
      description: Protocol control bytes sent by message system on behalf of this
        process (linker)
    returned_cbytes:
      queryable: true
      type: integer
      unit: bytes
      counter_type: Accumulating
      description: Protocol control bytes returned to this process as linker
    received_cbytes:
      queryable: true
      type: integer
      unit: bytes
      counter_type: Accumulating
      description: Protocol control bytes received by this process as listener
    reply_cbytes:
      queryable: true
      type: integer
      unit: bytes
      counter_type: Accumulating
      description: Protocol control bytes sent by this process as listener in reply
    mqc_allocations:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: Number of MQCs currently allocated to this process
    mqc_alloc_failures:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: Number of MQC allocation failures
    mqcs_inuse_qtime:
      queryable: true
      type: integer
      unit: microseconds
      counter_type: Queue
      description: Time MQCs have been allocated to this process; RATE ON → AQL
    msgs_sent_qtime:
      queryable: true
      type: integer
      unit: microseconds
      counter_type: Queue
