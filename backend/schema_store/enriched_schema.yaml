    subfield.
  proc.IPUS: The field is not displayed by MEASCOM, but determines whether the IPU-SWITCHES
    field is displayed.
  proc.CPU_BUSY_TIME: "For TNS/R systems, CPU-BUSY-TIME is the sum of ACCEL\u2011\
    BUSY\u2011TIME, TNS\u2011BUSY\u2011TIME, and TNSR\u2011BUSY\u2011TIME. For TNS/E\
    \ systems, CPU-BUSY-TIME is the sum of ACCEL\u2011BUSY\u2011TIME, TNS\u2011BUSY\u2011\
    TIME, and NATIVE\u2011BUSY\u2011TIME. A CPU-BUSY-TIME value is always displayed.\
    \ ``` ``` Related CounterRelated Counter DescriptionDescription CPU CPU-BUSY-TIMESimilar,\
    \ but is the busy time for the entire processor. PROCESS CPU-NUM Identifies the\
    \ CPU executing the process ``` Counter type: Busy."
  proc.READY_TIME: (G-series) Due to changes in memory handling, the results of the
    READY-TIME counter for G05 and later RVUs are not directly comparable to earlier
    measurements. ``` NOTENOTE Measure data can exhibit a combination of high PROCESS.READY-TIME
    and CPU.CPU-QTIME while having low PROCESS.CPU-BUSY-TIME and low overall processor
    utilization. Prior to G05, this was due to the suspension of PROCESS.CPU-BUSY-TIME
    while waiting for completion of a page fault. In either case, the PROCESS.READY-TIME
    and CPU.CPU-QTIME counters continue to accumulate.
  proc.IPU_NUM_PREV: (ZMS Style only) In Measure H05/J03 and later PVUs, if an IPU
    switch took place during the measurement interval, IPU-NUM-PREV displays number
    of the IPU on which the process was executing before the most recent switch.
  proc.MEM_QTIME: '``` Related CounterRelated Counter DescriptionDescription PROCESS
    PAGE- FAULTS ``` ``` Counts the number of page faults generated by the measured
    process ``` ``` CPU MEM-QTIME Measures the time that all processes in a given
    processor spent waiting on page faults CPU CPU-QTIME Measures the time that all
    processes spent on the ready list, including time spent waiting on page faults
    ``` Counter type: Queue.'
  proc.ABS_SEGS_START: Number of items on the queue described by ABS-SEGS-QTIME at
    the start of the measurement interval.
  proc.ABS_SEGS_END: Number of items on the queue described by ABS-SEGS-QTIME at the
    end of the measurement interval.
  proc.LOCKED_PAGES_START: This counter is valid and displayed by MEASCOM in ZMS style
    when the PROCESS subsystem version (ZMSPROC.HDR.SUBSYSTEM- VERSION), supplied
