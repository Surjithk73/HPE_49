        \ path handler 2 Multiline line attached to a controller 3 FOX line handler\
        \ 5 Single\u2011line handler attached to a 6100 subsystem 6 Multiline line\
        \ attached to a 6100 subsystem ``` # DEVICE-TYPEDEVICE-TYPE A value of 63,\
        \ which indicates an Expand line."
