        3 Key-sequenced ``` # STORAGE-POOLSTORAGE-POOL Name of the SMF storage pool
        to which the measured disk is assigned (process name of the storage pool process).'
    disc_process_type:
      queryable: true
      type: integer
      description: 'Disk process type (DP2) (MANUAL DEF: The disk process type, DP2.)'
    request_qtime:
      queryable: true
      type: integer
      unit: microseconds
      counter_type: Queue
      description: "Time I/O requests spent on the disk process internal queue including\
        \ active requests; RATE ON \xE2\u2020\u2019 AQL. NOTE: includes lock wait\
        \ time (MANUAL DEF: Time that requests spent on the optical disk process internal\
        \ queue (includes any currently active requests). When reading a request,\
        \ the optical disk process places it on the internal queue.)"
      derived_formula: N/A
      thresholds: N/A
    requests:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: "Number of I/O requests (READ, WRITE, FILEINFO) received by the\
        \ disk process (MANUAL DEF: Number of requests received by the terminal process.\
        \ To determine how long the requests were queued before being read by the\
        \ terminal process, measure the process and examine the PROCESS RECV\u2011\
        QTIME counter.)"
      derived_formula: "This derived counter is formed by dividing a busy or queue-busy\
        \ counter for a resource by a corresponding incrementing counter for requests\
        \ of the resource. REQUEST-QTIME is divided by REQUESTS. When the REPORT RATE\
        \ value is on, this counter returns the average wait time (LOCKWAIT\u2011\
        TIME divided by REQUESTS\u2011BLOCKED). Average message latency can be calculated\
        \ by subtracting listener record SERVER-QTIME from linker record WRITE-QTIME,\
        \ then dividing by the linker record WRITE-REQUESTS. OSSNS-WAIT-TIME is divided\
        \ by OSSNS-REQUESTS."
    reads:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: 'Number of physical read operations from disk to memory (MANUAL
        DEF: Number of read operations (from the terminal to memory) performed by
        the terminal process. Counter type: Incrementing.)'
      derived_formula: N/A
      thresholds: N/A
    writes:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: 'Number of physical write operations from memory to disk (MANUAL
        DEF: Number of write operations (from memory to the terminal) performed by
        the terminal process. Counter type: Incrementing.)'
      derived_formula: DEVICE-QBUSY-TIME is divided by the sum of READS and WRITES.
        For writes to unstructured files where the write-count is less than or equal
        to 4096 bytes and for structured files, the number of physical disk write
        operations is the difference between DRIVER-OUTPUT-CALLS and CACHE-WRITE-HITS.
        For writes to unstructured files where the write-count is greater than 4096
        (large write), the number of physical disk write operations is the difference
        between DRIVER-OUTPUT-CALLS and the sum of CACHE-WRITE-HITS and CACHE-WRITE-CLEANS.
    input_bytes:
      queryable: true
      type: integer
      unit: bytes
      counter_type: Accumulating
      description: "Bytes read from disk (MANUAL DEF: Number of bytes read from the\
        \ terminal. The total number of bytes transferred to and from the terminal\
        \ is this counter plus OUTPUT\u2011BYTES.) (DERIVED METRIC: In G-series RVUs,\
        \ the INPUT-BYTES-F field is a 64-bit version of INPUT-BYTES.)"
      derived_formula: N/A
      thresholds: N/A
    output_bytes:
      queryable: true
      type: integer
      unit: bytes
      counter_type: Accumulating
      description: "Bytes written to disk (MANUAL DEF: Number of bytes written to\
        \ the terminal. The total number of bytes transferred to and from the terminal\
        \ is INPUT\u2011BYTES plus this counter.)"
      derived_formula: N/A
      thresholds: N/A
    swaps:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: 'Number of swap I/O operations; advanced per I/O (may exceed CPU
        swaps) (MANUAL DEF: Number of swap operations (both into and out of memory)
        performed for the memory manager. Unlike CPU swaps, which are not dependent
        on file block size, the disk process performs I/O based on the block size
        of the file and might need to perform more than one I/O to swap the needed
        data.)'
    control_points:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: 'Number of times disk process wrote a TMF control point record
        to its audit-trail file (MANUAL DEF: Number of times the disk process wrote
        a TMF control point record to its audit-trail file. For a discussion of TMF
        auditing, see the TMF Operations and Recovery Guide.)'
      derived_formula: N/A
      thresholds: N/A
    control_point_writes:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: 'Number of dirty cache blocks written to disk at TMF control points
        (MANUAL DEF: Number of dirty cache blocks that the disk process wrote to disk
        at TMF control points. For a discussion of TMF auditing, see the TMF Operations
        and Recovery Guide.)'
      derived_formula: N/A
      thresholds: N/A
    free_space_ios:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: 'Number of I/O operations to the disk free space table (MANUAL
        DEF: Number of I/O operations to the disk free space table. The disk free
        space table lists each available free block on the disk.)'
      derived_formula: N/A
      thresholds: N/A
    requests_blocked:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: 'Number of times an operation waited because the requested file
        or record was locked (MANUAL DEF: Number of times an I/O operation had to
        wait because the requested file or record was locked. LOCKWAITS is another
        term for this counter.)'
    starting_free_space:
      queryable: true
      type: integer
      unit: bytes
      counter_type: Snapshot
      description: 'Free disk space at interval start; primary path record only (MANUAL
        DEF: Number of bytes free on the volume when the measurement starts. This
        counter is displayed by MEASCOM when the REPORT STYLE is ZMS.)'
    ending_free_space:
      queryable: true
      type: integer
      unit: bytes
      counter_type: Snapshot
      description: 'Free disk space at interval end; primary path record only (MANUAL
        DEF: Number of bytes free on the volume at the time indicated by the TO time.
        This counter is updated only for the primary path record.)'
      derived_formula: N/A
      thresholds: N/A
    starting_free_blocks:
      queryable: true
      type: integer
      counter_type: Snapshot
      description: 'Free entries in the free space table at interval start; primary
        path record only (MANUAL DEF: Number of free entries in the free space table
        for the volume when the measurement starts. The free space table is an internal
        data structure maintained by DP2.)'
    ending_free_blocks:
      queryable: true
      type: integer
      counter_type: Snapshot
      description: 'Free entries in the free space table at interval end; primary
        path record only (MANUAL DEF: Number of free blocks on the volume at the time
        indicated by the TO time. The counter is updated only for the primary path
        record.)'
      derived_formula: N/A
      thresholds: N/A
    volsem_qtime:
      queryable: true
      type: integer
      unit: microseconds
      counter_type: Queue
      description: "Time requests waited for the volume semaphore (exclusive and shared\
        \ modes); RATE ON \xE2\u2020\u2019 AQL (MANUAL DEF: Time that the requests\
        \ spent waiting for the volume semaphore (exclusive and shared modes). With\
        \ REPORT RATE OFF, the value of this counter equals the total queue time for\
        \ volume semaphore.)"
    read_qbusy_time:
      queryable: true
      type: integer
      unit: microseconds
      counter_type: Queue-Busy
      description: "Time the read queue was non-empty; RATE ON \xE2\u2020\u2019 %\
        \ (MANUAL DEF: Time spent in a state in which requests for data transfer from\
        \ this entity to memory were queued. Counter type: Queue Busy.)"
      derived_formula: N/A
      thresholds: N/A
    read_qtime:
      queryable: true
      type: integer
      unit: microseconds
      counter_type: Queue
      description: "Total time spent by read requests queued to this disk; RATE ON\
        \ \xE2\u2020\u2019 AQL (MANUAL DEF: Total time spent by read requests queued\
        \ for this entity. With REPORT RATE ON, the average number of read requests\
        \ queued for this entity.)"
      derived_formula: N/A
      thresholds: N/A
    write_qbusy_time:
      queryable: true
      type: integer
      unit: microseconds
      counter_type: Queue-Busy
      description: "Time the write queue was non-empty; RATE ON \xE2\u2020\u2019 %\
        \ (MANUAL DEF: Time spent in a state in which requests for data transfer from\
        \ memory to this entity were queued. Counter type: Queue Busy.)"
    write_qtime:
      queryable: true
      type: integer
      unit: microseconds
      counter_type: Queue
      description: "Total time spent by write requests queued to this disk; RATE ON\
        \ \xE2\u2020\u2019 AQL (MANUAL DEF: Total time spent by write requests queued\
        \ for this entity. With REPORT RATE ON, the average number of write requests\
        \ queued for this entity.)"
      derived_formula: Average message latency can be calculated by subtracting listener
        record SERVER-QTIME from linker record WRITE-QTIME, then dividing by the linker
        record WRITE-REQUESTS. To calculate the average message latency between processors
        in separate clusters, calculate the average SERVER-QTIME and WRITE-QTIME values
        in a similar interval and then subtract the resulting values.
    device_qbusy_time:
      queryable: true
      type: integer
      unit: microseconds
      counter_type: Queue-Busy
      description: "Time any requests were queued to this disk; RATE ON \xE2\u2020\
        \u2019 %. NOTE: does NOT equal read_qbusy_time + write_qbusy_time due to concurrency\
        \ (MANUAL DEF: (ZMS Style only) Time spent in a state in which requests of\
        \ any number or type were queued to this optical disk in this processor. Counter\
        \ type: Queue Busy.)"
      derived_formula: In D-series RVUs, DISC-BUSY-TIME is calculated by adding the
        values of the DISC WRITE-BUSY-TIME and READ-BUSY-TIME counters. In G-series
        RVUs, DEVICE-QBUSY-TIME does not equal WRITE-QBUSY-TIME plus READ-QBUSY-TIME.
      thresholds: N/A
    dbio_reads:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: 'Read operations enabled for direct bulk I/O; subset of reads (MANUAL
        DEF: Number of direct bulk I/O read operations to the measured file. This
        counter is a subset of READS.)'
      derived_formula: N/A
      thresholds: N/A
    dbio_writes:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: 'Write operations enabled for direct bulk I/O; subset of writes
        (MANUAL DEF: Number of direct bulk I/O write operations to the measured file.
        This counter is a subset of WRITES.)'
      derived_formula: N/A
      thresholds: N/A
    defreqs:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: 'Number of requests subject to deferral (mixed workload algorithm);
        subset of requests (MANUAL DEF: Number of requests received by the disk process
        that are subject to deferral. This counter is a subset of REQUESTS.)'
      derived_formula: N/A
      thresholds: N/A
    defreq_qtime:
      queryable: true
      type: integer
      unit: microseconds
      counter_type: Queue
      description: 'Time deferrable requests spent on the disk process internal queue;
        subset of request_qtime (MANUAL DEF: Time (in microseconds) that requests
        subject to deferral spent on the disk process internal queue (including any
        current active or deferred requests). This counter is a subset of REQUEST-QTIME.)
        (DERIVED METRIC: This counter is a subset of REQUEST-QTIME.)'
      derived_formula: N/A
      thresholds: N/A
    deferred_qtime:
      queryable: true
      type: integer
      unit: microseconds
      counter_type: Queue
      description: 'Time requests subject to deferral actually spent deferred; subset
        of defreq_qtime (MANUAL DEF: Time (in microseconds) that requests subject
        to deferral actually spent deferred. This counter is a subset of DEFREQ-QTIME.)
        (DERIVED METRIC: This counter is a subset of DEFREQ-QTIME.)'
      derived_formula: N/A
      thresholds: N/A
    c{N}.blks:
      queryable: true
      type: integer
      counter_type: Snapshot
      description: Total cache blocks allocated for level N; N = 0..7
    c{N}.block_size:
      queryable: true
      type: integer
      unit: bytes
      counter_type: Snapshot
      description: Cache block size for level N in bytes
    c{N}.blocks_inuse_start:
      queryable: true
      type: integer
      counter_type: Snapshot
      description: Cache blocks in use at interval start for level N
    c{N}.blocks_inuse_end:
      queryable: true
      type: integer
      counter_type: Snapshot
      description: Cache blocks in use at interval end for level N
    c{N}.block_splits:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: Number of block splits per block size for level N
    c{N}.hits:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: Cache hits for level N on read or buffered write; hits/(hits+misses)
        = hit ratio
    c{N}.misses:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: Cache misses for level N on read operations; causes a disk I/O
    c{N}.faults:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: "Cache faults for level N \u2014 block indicated in cache but stolen\
        \ by memory manager; >5% of I/Os indicates need for more memory"
    c{N}.audit_buf_forces:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: Times disk process had to write to audit-trail before freeing a
        dirty cache block; should be near zero
    c{N}.blks_dirty_qtime:
      queryable: true
      type: integer
      unit: microseconds
      counter_type: Queue
      description: "Time cache blocks spent dirty for level N; RATE ON \u2192 AQL"
    c{N}.write_cleans:
      queryable: true
      type: integer
      counter_type: Accumulating
      description: Times a write found the required block clean in cache for level
        N; saves a disk read per write
    c{N}.write_dirtys:
      queryable: true
      type: integer
      counter_type: Accumulating
      description: Times a write found the required block dirty in cache for level
        N
    c{N}.write_misses:
      queryable: true
      type: integer
      counter_type: Accumulating
      description: Times a write did not find the required block in cache for level
        N; requires a disk read before write
    blocks_inuse_end:
      type: integer
      description: Number of cache blocks that were in use at the end of the measurement
        or at measurement interval copy time.
      queryable: true
      derived_formula: N/A
      thresholds: N/A
    block_splits:
      type: integer
      description: Number of block splits (per block size) for the volume.
      queryable: true
      derived_formula: N/A
      thresholds: N/A
    hits:
      type: integer
      description: Number of times a required block is found in cache on a read or
        buffered write operation, which saves a disk I/O. This counter includes cache
        hits on both read and write operations.
      queryable: true
      derived_formula: N/A
      thresholds: N/A
    misses:
      type: integer
      description: Number of times a required block is not found in cache on a read
        operation, which causes a disk I/O. Read operations that do not go through
        cache are not included in this counter.
      queryable: true
      derived_formula: N/A
      thresholds: N/A
    faults:
      type: integer
      description: Number of times the cache tables indicate a required block is in
        cache, but not because the memory manager is using it for another purpose.
        Faults occur when a cache is too large or physical memory is too small for
        a given application.
      queryable: true
      derived_formula: N/A
      thresholds: Fault rates greater than 5% of all I/O operations generally indicate
        you need more memory.
    audit_buf_forces:
      type: integer
      description: Number of times the disk process had to write to the audit-trail
        volume before it could write a dirty cache block and thereby free that block
        for another use.
      queryable: true
      derived_formula: N/A
      thresholds: This value should be close to zero.
    blks_dirty_qtime:
      type: integer
      description: Time that cache blocks spent dirty. A cache block is dirty when
        a buffered write operation writes data to it. After the disk process writes
        the dirty cache block to disk, the block is clean.
      queryable: true
      derived_formula: N/A
      thresholds: N/A
    write_cleans:
      type: integer
      description: Number of times a required block is in cache for a write operation,
        which saves a found clean disk read per write.
      queryable: true
      derived_formula: N/A
      thresholds: N/A
    write_dirtys:
      type: integer
      description: Number of times a required block is found dirty in cache for a
        write operation.
      queryable: true
      derived_formula: N/A
      thresholds: N/A
    write_misses:
      type: integer
      description: Number of times a required block is not found in cache for a write
        operation, which requires a disk read before the write can be performed.
      queryable: true
      derived_formula: N/A
      thresholds: N/A
dfile:
  source_file: measurefiles/dfilecsv
  ddl_record: ZMSDFILE
  entity_type: "DFILE (Disk File \xE2\u20AC\u201D DISKFILE entity)"
  purpose: 'Per-file performance metrics for all opener processes on a specified disk
    file. DISKFILE creates one counter record per measured file and does not track
    individual opener processes. Creates a new record if a file closes and reopens
    during measurement.

    '
  identity_columns:
  - system_name
  - cpu_num
  - file_name.volume
  - file_name.subvol
  - file_name.filename
  time_columns:
  - from_timestamp
  - to_timestamp
  - delta_time
  join_hints:
  - JOIN disc ON (system_name, cpu_num, device_name, from_timestamp) for disk context
  - JOIN dopen ON (system_name, cpu_num, fcb_number, from_timestamp) for per-opener
    detail
  columns:
    u_loadid.loadid:
      queryable: false
      type: string
    u_loadid.load_id.prefix_id:
      queryable: false
      type: string
    u_loadid.load_id.interval_id:
      queryable: false
      type: string
    system_name:
      queryable: true
      type: string
      description: '(MANUAL DEF: Name of the system on which the measurement was taken.)'
    cpu_num:
      queryable: true
      type: integer
      description: "(MANUAL DEF: Number of the CPU on which the measurement was taken.\
        \ For interprocessor communications (IPC) records, CPU\u2011NUM is MYCPU.)"
    os_version.letter:
      queryable: true
      type: string
    os_version.number:
      queryable: true
      type: integer
    object_uid:
      queryable: false
      type: string
      description: '(MANUAL DEF: (ZMS Style only) Reserved for future use.)'
    from_timestamp:
      queryable: true
      type: datetime
      description: "(MANUAL DEF: Starting time of the measurement or transient entity.\
        \ Specified as Julian\u2011based, local civil time (LCT).) (DERIVED METRIC:\
        \ When using the CSV[A], JSON, or XML report format, the timestamp is emitted\
        \ as ISO 8601 date and time of day representation, extended format, fractional\
        \ seconds, local time (YYYY-MM-DDThh:mm:ss.s).)"
    to_timestamp:
      queryable: true
      type: datetime
      description: "(MANUAL DEF: Ending time of the measurement or transient entity.\
        \ Specified as Julian\u2011based, local civil time (LCT).) (DERIVED METRIC:\
        \ When using the CSV[A], JSON, or XML report format, the timestamp is emitted\
        \ as ISO 8601 date and time of day representation, extended format, fractional\
        \ seconds, local time (YYYY-MM-DDThh:mm:ss.s).)"
    delta_time:
      queryable: true
      type: integer
      unit: microseconds
      description: '(MANUAL DEF: Duration of the measurement, in microseconds.)'
    template_version:
      queryable: false
      type: integer
      description: '(MANUAL DEF: (ZMS Style only) Record template version from MEASDDLS
        for the format of the external record. When data collected on systems of differing
        product versions are stored in the same structured files, the template version
        for all records is the one used to create the structured file.)'
    format_version.letter:
      queryable: false
      type: string
    format_version.number:
      queryable: false
      type: integer
    data_version.letter:
      queryable: false
      type: string
    data_version.number:
      queryable: false
      type: integer
    subsystem_version:
      queryable: false
      type: integer
      description: '(MANUAL DEF: (ZMS Style only) This value is set to 1 for the initial
        H-series and later versions of all subsystems. If the value is greater than
        1, consult the subsystem documentation for information about changes that
        affect the Measure counters.)'
    error:
      queryable: false
      type: integer
      description: '(MANUAL DEF: Indicates whether an error prevented Measure from
        collecting data or writing an output record for this entity. For values, see
        Identifying Data File Errors.)'
    fcb_number:
      queryable: true
      type: integer
      description: "File Control Block number \xE2\u20AC\u201D internal to the disk\
        \ process (MANUAL DEF: File control block number of the measured file. Internal\
        \ to the disk process.)"
      derived_formula: N/A
      thresholds: N/A
    file_type:
      queryable: true
      type: integer
      description: 'File type: 0=unstructured, 1=relative, 2=entry-sequenced, 3=key-sequenced
        (MANUAL DEF: File type, from the access control block: ``` 1 Relative file
        2 Entry-sequenced file 3 Key-sequenced file 0 Any other type of file ```.)'
    file_code:
      queryable: true
      type: integer
      description: "Three-digit system file code (e.g. 100=object, 101=edit) (MANUAL\
        \ DEF: Three\u2011digit system file code, such as 100 for object files or\
        \ 101 for edit files. For a complete list of file codes, see the HPE Nonstop\
        \ File Utility Program (FUP) Reference Manual.)"
    format:
      queryable: true
      type: integer
      description: 'File format: 1=format 1, 2=format 2 (for files >2GB or large extents)'
    file_name.volume:
      queryable: true
      type: string
      description: Volume component of the file name (e.g. $DATA01)
    file_name.subvol:
      queryable: true
      type: string
      description: Subvolume component of the file name
    file_name.filename:
      queryable: true
      type: string
      description: Filename component
    device_name:
      queryable: true
      type: string
      description: 'Disk device name hosting this file; for SMF files = physical location
        (MANUAL DEF: Disk device on which the program file is located. For SMF files,
        this field provides the physical location that corresponds to the logical
        file name.) (DERIVED METRIC: For Nonstop files, this field is the same as
        the FILE-NAME VOLUME subfield.)'
      derived_formula: N/A
      thresholds: N/A
    storage_pool:
      queryable: true
      type: string
      description: 'SMF storage pool process name (MANUAL DEF: Name of the SMF storage
        pool to which the measured disk is assigned (process name of the storage pool
        process).)'
      derived_formula: N/A
      thresholds: N/A
    file_name_mid.pathid:
      queryable: false
      type: string
      description: Internal OSS/SQL MID PATHID; zeros for non-OSS/SQL files
    file_name_mid.crvsn:
      queryable: false
      type: string
      description: Creation Version Serial Number for OSS/SQL files; zeros for others
    starting_eof:
      queryable: true
      type: integer
      unit: bytes
      counter_type: Snapshot
      description: "EOF position at interval start; not displayed by MEASCOM but available\
        \ for IF/BY (MANUAL DEF: EOF value of the file, in bytes, at measurement start\
        \ time. This item is part of the structured DISKFILE record, but MEASCOM does\
        \ not display it.) (DERIVED METRIC: Instead, MEASCOM uses this counter value\
        \ as a base to compute the ratio of ENDING\u2011EOF to STARTING-EOF.)"
      derived_formula: Growth ratio = ENDING-EOF / STARTING-EOF
      thresholds: N/A
    ending_eof:
      queryable: true
      type: integer
      unit: bytes
      counter_type: Snapshot
      description: "EOF position at interval end; displayed with ratio ending_eof/starting_eof\
        \ (MANUAL DEF: EOF value of the file, in bytes, at measurement stop time or\
        \ measurement interval copy time. The REPORT RATE value does not affect the\
        \ display of this value in MEASCOM.) (DERIVED METRIC: This item is displayed\
        \ in its absolute value in bytes, followed by the ratio of ENDING\u2011EOF\
        \ over STARTING-EOF.)"
      derived_formula: Growth ratio = ENDING-EOF / STARTING-EOF
      thresholds: N/A
    transient_opens:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: 'Number of opens that occurred during the measurement period (MANUAL
        DEF: Number of opens that occur during the measurement period. Counter type:
        Incrementing.)'
      derived_formula: N/A
      thresholds: N/A
    open_qtime:
      queryable: true
      type: integer
      unit: microseconds
      counter_type: Queue
      description: "Time for all opens of this file including transient opens; RATE\
        \ ON \xE2\u2020\u2019 AQL (MANUAL DEF: Time for all the opens of this file\
        \ (including transient opens). Counter type: Queue.)"
      derived_formula: N/A
      thresholds: N/A
    driver_input_calls:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: 'Number of read operations (cache hits + misses); physical reads
        = driver_input_calls - cache_read_hits (MANUAL DEF: Number of read operations,
        both cache hits and cache misses. The number of physical read operations is
        the difference between DRIVER- INPUT-CALLS and CACHE-READ-HITS.) (DERIVED
        METRIC: The number of physical read operations is the difference between DRIVER-
        INPUT-CALLS and CACHE-READ-HITS.)'
      derived_formula: N/A
      thresholds: N/A
    driver_output_calls:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: 'Number of write operations; physical writes = driver_output_calls
        - cache_write_hits (for small writes) (MANUAL DEF: Number of write operations.
        For writes to unstructured files where the write-count is less than or equal
        to 4096 bytes and for structured files, the number of physical disk write
        operations is the difference between DRIVER-OUTPUT-CALLS and CACHE-WRITE-HITS.)
        (DERIVED METRIC: For writes to unstructured files where the write-count is
        less than or equal to 4096 bytes and for structured files, the number of physical
        disk write operations is the difference between DRIVER-OUTPUT-CALLS and CACHE-WRITE-HITS.
        For writes to unstructured files where the write-count is greater than 4096
        (large write), the number of physical disk write operations is the difference
        between DRIVER-OUTPUT-CALLS and the sum of CACHE-WRITE-HITS and CACHE-WRITE-CLEANS.)'
      derived_formula: Physical write operations (<= 4096 bytes or structured) = DRIVER-OUTPUT-CALLS
        - CACHE-WRITE-HITS; Physical write operations (> 4096 bytes) = DRIVER-OUTPUT-CALLS
        - (CACHE-WRITE-HITS + CACHE-WRITE-CLEANS)
      thresholds: N/A
    cache_read_hits:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: "Times a read found the required block in cache; saves a disk I/O\
        \ (MANUAL DEF: Number of times a read operation found the required block in\
        \ cache, which saves a disk I/O. The DRIVER\u2011INPUT\u2011CALLS counter\
        \ counts all read operations, both cache hits and misses.)"
      derived_formula: N/A
      thresholds: N/A
    cache_write_hits:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: 'Times a write found the required block dirty in cache (MANUAL
        DEF: Number of times a write operation found the required block in cache and
        the block was dirty. A write to a dirty block saves a write I/O operation.)'
      derived_formula: N/A
      thresholds: N/A
    cache_write_cleans:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: 'Times a write found the required block clean in cache; saves a
        disk read per write (MANUAL DEF: Number of times a write operation found the
        required block in cache and the block was clean. During a write, the diskprocess
        searches for the requested block in its cache.)'
      derived_formula: N/A
      thresholds: N/A
    requests:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: "Total I/O requests for this file (MANUAL DEF: Number of requests\
        \ received by the terminal process. To determine how long the requests were\
        \ queued before being read by the terminal process, measure the process and\
        \ examine the PROCESS RECV\u2011QTIME counter.)"
      derived_formula: N/A
      thresholds: N/A
    requests_blocked:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: 'Times an I/O operation waited because the requested file or record
        was locked (MANUAL DEF: Number of times an I/O operation had to wait because
        the requested file or record was locked. LOCKWAITS is another term for this
        counter.)'
      derived_formula: N/A
      thresholds: N/A
    lockwait_time:
      queryable: true
      type: integer
      unit: microseconds
      counter_type: Lockwait
      description: "Cumulative time waiting for locks; RATE ON \xE2\u2020\u2019 avg\
        \ wait per blocked request (MANUAL DEF: Time spent waiting for locks. The\
        \ REQUESTS\u2011BLOCKED counter counts the number of blocked requests\u2014\
        that is, the number of times requests are queued to locks.) (DERIVED METRIC:\
        \ When the REPORT RATE value is on, this counter returns the average wait\
        \ time (LOCKWAIT\u2011TIME divided by REQUESTS\u2011BLOCKED).)"
      derived_formula: Average wait time = LOCKWAIT-TIME / REQUESTS-BLOCKED
      thresholds: N/A
    max_lockwait_time:
      queryable: true
      type: integer
      unit: microseconds
      counter_type: Max value
      description: 'Maximum wait time per lock; use as guide for timeout value; unaffected
        by RATE (MANUAL DEF: Maximum wait time for each lock. Use this number as a
        guide to set the timeout value in the application.)'
      derived_formula: N/A
      thresholds: Use as a guide to set the application timeout value.
    lock_timeouts:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: 'Number of lock timeout events (error 40) (MANUAL DEF: Number of
        timeouts on locks (error 40). When a timeout value for a request expires,
        the file system (Enscribe and SQL/MP) sends a cancel request to the disk process.)'
      derived_formula: N/A
      thresholds: N/A
    lock_bounces:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: "Number of bounced locks (FELOCKED/error 73) returned to the file\
        \ system (MANUAL DEF: Number of bounced locks (FELOCKED = error 73) returned\
        \ to the file system. For SQL tables, a bounced lock is a result of the CONTROL\
        \ TABLE command with the RETURN\u2011IF\u2011LOCKED control option.)"
      derived_formula: N/A
      thresholds: N/A
    block_splits:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: 'Number of B-tree block splits during writes; keep to minimum (MANUAL
        DEF: Number of block splits during writes to the file. Counter type: Incrementing.)'
      derived_formula: N/A
      thresholds: N/A
    extent_allocations:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: 'Number of times a file extent was allocated (MANUAL DEF: Number
        of times a file extent is allocated. Counter type: Incrementing.)'
      derived_formula: N/A
      thresholds: N/A
    dbio_input_calls:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: 'Direct bulk I/O read operations; subset of driver_input_calls
        (MANUAL DEF: Number of direct bulk I/O read operations to a requesting processor.
        This counter is a subset of DRIVER-INPUT-CALLS.) (DERIVED METRIC: This counter
        is a subset of DRIVER-INPUT-CALLS.)'
      derived_formula: DBIO-INPUT-CALLS is a subset of DRIVER-INPUT-CALLS
      thresholds: N/A
    dbio_output_calls:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: 'Direct bulk I/O write operations; subset of driver_output_calls
        (MANUAL DEF: Number of direct bulk I/O write operations from a requesting
        processor. This counter is a subset of DRIVER-OUTPUT-CALLS.) (DERIVED METRIC:
        This counter is a subset of DRIVER-OUTPUT-CALLS.)'
      derived_formula: DBIO-OUTPUT-CALLS is a subset of DRIVER-OUTPUT-CALLS
      thresholds: N/A
    sql_inserts:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: 'Number of SQL INSERT row operations (MANUAL DEF: Number of row
        insert operations performed on the SQL table. Counter type: Incrementing.)'
      derived_formula: N/A
      thresholds: N/A
    sql_updates:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: 'Number of SQL UPDATE row operations (MANUAL DEF: Number of row
        update operations performed on the SQL table. Counter type: Incrementing.)'
      derived_formula: N/A
      thresholds: N/A
    sql_deletes:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: 'Number of SQL DELETE row operations (MANUAL DEF: Number of row
        delete operations performed on the SQL table. Counter type: Incrementing.)'
      derived_formula: N/A
      thresholds: N/A
    starting_rows:
      queryable: true
      type: integer
      counter_type: Snapshot
      description: 'Row count at interval start; valid only if table had zero rows
        at some point since file open (MANUAL DEF: (ZMS Style only) Number of rows
        in the SQL table at the start of a measurement interval. This counter is valid
        only if the table had zero rows at some time since the file open.)'
      derived_formula: N/A
      thresholds: N/A
    ending_rows:
      queryable: true
      type: integer
      counter_type: Snapshot
      description: 'Row count at interval end; valid only if table had zero rows at
        some point since file open (MANUAL DEF: Number of rows in the SQL table at
        the end of a measurement interval. This counter is valid only if the table
        had zero rows at some time since the file open.)'
      derived_formula: N/A
      thresholds: N/A
    oss_block_writes:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: 'Block write operations issued by DP2 for the OSS file system (MANUAL
        DEF: Number of block write operations issued by DP2 for the OSS file system.
        Counter type: Incrementing.)'
      derived_formula: N/A
      thresholds: N/A
    oss_block_write_bytes:
      queryable: true
      type: integer
      unit: bytes
      counter_type: Accumulating
      description: 'Bytes written by DP2 as a result of oss_block_writes (MANUAL DEF:
        Number of bytes written by DP2 as a result of OSS-BLOCK-WRITES. Counter type:
        Accumulating.) (DERIVED METRIC: Number of bytes written by DP2 as a result
        of OSS-BLOCK-WRITES.)'
      derived_formula: N/A
      thresholds: N/A
    oss_cache_callbacks:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: 'Cache callback requests sent by DP2 to the OSS file manager (MANUAL
        DEF: Number of cache callback requests sent by DP2 to the OSS file manager.
        Counter type: Incrementing.)'
      derived_formula: N/A
      thresholds: N/A
    oss_callback_writes:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: 'OSS block writes received by DP2 as a result of oss_cache_callbacks
        (MANUAL DEF: Number of OSS-BLOCK-WRITES received by DP2 as a result of OSS-CACHE-CALLBACKS.
        Counter type: Incrementing.) (DERIVED METRIC: Number of OSS-BLOCK-WRITES received
        by DP2 as a result of OSS-CACHE-CALLBACKS.)'
      derived_formula: N/A
      thresholds: N/A
    open_qlen_max:
      type: integer
      description: (Legacy Style only) Maximum number of opens on this file.
      queryable: true
      derived_formula: N/A
      thresholds: N/A
    adapter_name:
      type: integer
      description: Logical name associated with the adapter in which the SAC resides.
        Logical names are maintained by the system configuration database. The name
        is null-filled and null-terminated.
      queryable: true
      derived_formula: N/A
      thresholds: N/A
    ctrl_type:
      type: integer
      description: "Product number, such as 3128. For IPC and RIPC records, CTRL\u2011\
        TYPE is 0 for the linker, 1 for the listener. For more information on IPC\
        \ records, see Usage notes for ENDPOINT entities."
      queryable: true
      derived_formula: N/A
      thresholds: N/A
    flags:
      type: integer
      description: (ZMS style only, L01, H07/J05 and later PVUs) A16-bit field that
        is used to indicate if the measurement was done on an L-series or later RVU.
        flags.0:13Reserved for future use. flags.14 1 = The measurement was done on
        an L-series or later RVU flags.15 Reserved for future use.
      queryable: true
      derived_formula: N/A
      thresholds: N/A
    node_class:
      type: integer
      description: SAC type as defined in the system configuration database.
      queryable: true
      derived_formula: N/A
      thresholds: N/A
    node_class_s:
      type: integer
      description: "Redefines NODE\u2011CLASS as a four\u2011character alphanumeric\
        \ field. The possible values (blank filled to four characters) are: #####\
        \ \u201CCLIM\u201D ##### \u201CCLMI\u201D ##### \u201CCLMO\u201D ##### \u201C\
        CLMS\u201D ##### \"COLO\" ##### \"ENET\" ##### \"IPC \" ##### \"MONT\" #####\
        \ \"NIOC\" ##### \"RIPC\" ##### \"SCSI\" ##### \"SWAN\" ##### \"* \" Node\
        \ classes supported on L-series RVUs are CLIM, CLMI, CLMO, CLMS, IPC, and\
        \ RIPC. NOTENOTE CLIM is a wildcard for all CLIM node classes."
      queryable: true
      derived_formula: N/A
      thresholds: N/A
    remote_cluster:
      type: integer
      description: Number of a remote cluster with which the entity is communicating.
        Only valid for RIPC.
      queryable: true
      derived_formula: N/A
      thresholds: N/A
    remote_cpu:
      type: integer
      description: Number of the CPU on a remote cluster with which the entity is
        communicating for RIPC. Number of the other CPU on a local cluster with which
        the entity is communicating for IPC.
      queryable: true
      derived_formula: N/A
      thresholds: N/A
    sac_name:
      type: integer
      description: 'Logical name of the SAC used in this path to the physical disk.
        Logical names are maintained by the system configuration database. The name
        is null-filled and null-terminated. For IPC records, Measure generates this
        identifier instead of a SAC name: where xx is the linker CPU number and yy
        is the listener CPU number.'
      queryable: true
      derived_formula: N/A
      thresholds: N/A
    server_qtime:
      type: integer
      description: Time (in microseconds) between the receipt of messages in this
        processor and the issuing of replies. This value does not include READ- QTIME
        for Measure System read operations to pull the data to the CPU. The counter
        helps to isolate Measure System latency time from the time required for the
        receiving process to respond to a request. This applies only to IPC and RIPC
        records.
      queryable: true
      derived_formula: Average message latency = (linker WRITE-QTIME - listener SERVER-QTIME)
        / linker WRITE-REQUESTS
      thresholds: N/A
    x_defrd_busy_time:
      type: integer
      description: Time (in microseconds) during which the Message System was unable
        to switch from using the Y fabric to using the X fabric. A large value for
        this counter can be the result of an outstanding message on the Y fabric or
        a problem with the X fabric. This counter applies only to IPC and RIPC records.
      queryable: true
      derived_formula: N/A
      thresholds: Large value indicates outstanding message on Y fabric or problem
        with X fabric.
    y_defrd_busy_time:
      type: integer
      description: Time (in microseconds) during which the Measure System was unable
        to switch from using the X fabric to using the Y fabric. A large value for
        this counter can be the result of an outstanding message on the X fabric or
        a problem with the Y fabric. This counter applies only to IPC and RIPC records.
      queryable: true
      derived_formula: N/A
      thresholds: Large value indicates outstanding message on Y fabric or problem
        with X fabric.
    write_qlen_max:
      type: integer
      description: (Legacy Style only) Maximum number of requests on the write request
        queue since the counter was allocated.
      queryable: true
      derived_formula: N/A
      thresholds: N/A
    target_cpu:
      type: integer
      description: This is the CPU number of the target CPU if the endpoint type is
        CPU. This field is 0 for all other endpoint types.
      queryable: true
      derived_formula: N/A
      thresholds: N/A
    target_node:
      type: integer
      description: 02 y-sends type binary 64. 02 y-send-bytes type binary 64. 02 y-send-qlen-start
        type binary 64. 02 y-send-qlen-end type binary 64. 02 y-reserved-2 type character
        48. end RECORD zmsfabr. FILE is "zmsfabr" ENTRY-SEQUENCED. 02 hdr type zmsheader.
        02 ctr type zmsfabr-ctrs. 02 id type zmsfabr-id. end For CPU endpoints, this
        is the ServerNet node number on G-, H-, and J-series RVUs, or the Expand node
        number on L-series RVUs. This field is 0 for other endpoint types.
      queryable: true
      derived_formula: N/A
      thresholds: N/A
    target_node_name:
      type: integer
      description: This is a 8 byte field that contains the target node name (e.g.,
        \BLPROD). This field is filled in only for CPU endpoints of remote CPUs. The
        name is space-filled.
      queryable: true
      derived_formula: N/A
      thresholds: N/A
    virtual_chan_name:
      type: integer
      description: This is the 8 byte field that contains the virtual channel name.
        The name is null-filled.
      queryable: true
      derived_formula: N/A
      thresholds: N/A
    x_recvs:
      type: integer
      description: Number of received transfers from the endpoint over the X fabric.
      queryable: true
      derived_formula: N/A
      thresholds: N/A
    x_recv_bytes:
      type: integer
      description: Number of received bytes from the endpoint over the X fabric.
      queryable: true
      derived_formula: N/A
      thresholds: N/A
    x_sends:
      type: integer
      description: Number of sent transfers to the endpoint over the X fabric.
      queryable: true
      derived_formula: N/A
      thresholds: N/A
    x_send_bytes:
      type: integer
      description: Number of sent bytes to the endpoint over the X fabric.
      queryable: true
      derived_formula: N/A
      thresholds: N/A
    x_send_qlen_end:
      type: integer
      description: Number of data transfer operations on the send queue for the X
        fabric at the end of the measurement interval.
      queryable: true
      derived_formula: N/A
      thresholds: N/A
    x_send_qlen_start:
      type: integer
      description: Number of data transfer operations on the send queue for the X
        fabric at the start of the measurement interval.
      queryable: true
      derived_formula: N/A
      thresholds: N/A
    y_recvs:
      type: integer
      description: Number of received transfers from the endpoint over the Y fabric.
      queryable: true
      derived_formula: N/A
      thresholds: N/A
    y_recv_bytes:
      type: integer
      description: Number of received bytes from the endpoint over the Y fabric.
      queryable: true
      derived_formula: N/A
      thresholds: N/A
    y_sends:
      type: integer
      description: Number of sent transfers to the endpoint over the Y fabric.
      queryable: true
      derived_formula: N/A
      thresholds: N/A
    y_send_bytes:
      type: integer
      description: Number of sent bytes to the endpoint over the Y fabric.
      queryable: true
      derived_formula: N/A
      thresholds: N/A
    y_send_qlen_end:
      type: integer
      description: Number of data transfer operations on the send queue for the Y
        fabric at the end of the measurement interval.
      queryable: true
      derived_formula: N/A
      thresholds: N/A
    y_send_qlen_start:
      type: integer
      description: Number of data transfer operations on the send queue for the Y
        fabric at the start of the measurement interval.
      queryable: true
      derived_formula: N/A
      thresholds: N/A
dopen:
  source_file: measurefiles/dopencsv
  ddl_record: ZMSDOPEN
  entity_type: "DOPEN (Disk File Open \xE2\u20AC\u201D DISCOPEN entity)"
  purpose: 'Per-open-instance physical I/O metrics for disk files. Each row represents
    one opener process of a file during an interval. DISCOPEN creates a separate counter
    record for each file open; creates a new record if a file closes and reopens.
    Short-form records (for temp files, edit files, object files) have zero values
    for lockwait_time, max_lockwait_time, lock_timeouts, lock_bounces, cache_write_cleans.

    '
  identity_columns:
  - system_name
  - cpu_num
  - opener_cpu
  - opener_pin
  - ocb_number
  - file_name.volume
  - file_name.subvol
  - file_name.filename
  time_columns:
  - from_timestamp
  - to_timestamp
  - delta_time
  join_hints:
  - JOIN dfile ON (system_name, cpu_num, file_name.*, from_timestamp) for file-level
    totals
  - JOIN proc ON (system_name, opener_cpu, opener_pin, from_timestamp) for opener
    process detail
  columns:
    u_loadid.loadid:
      queryable: false
      type: string
    u_loadid.load_id.prefix_id:
      queryable: false
      type: string
    u_loadid.load_id.interval_id:
      queryable: false
      type: string
    system_name:
      queryable: true
      type: string
      description: '(MANUAL DEF: Name of the system on which the measurement was taken.)'
    cpu_num:
      queryable: true
      type: integer
      description: "CPU number where the file resides (MANUAL DEF: Number of the CPU\
        \ on which the measurement was taken. For interprocessor communications (IPC)\
        \ records, CPU\u2011NUM is MYCPU.)"
    os_version.letter:
      queryable: true
      type: string
    os_version.number:
      queryable: true
      type: integer
    object_uid:
      queryable: false
      type: string
      description: '(MANUAL DEF: (ZMS Style only) Reserved for future use.)'
    from_timestamp:
      queryable: true
      type: datetime
      description: "(MANUAL DEF: Starting time of the measurement or transient entity.\
        \ Specified as Julian\u2011based, local civil time (LCT).) (DERIVED METRIC:\
        \ When using the CSV[A], JSON, or XML report format, the timestamp is emitted\
        \ as ISO 8601 date and time of day representation, extended format, fractional\
        \ seconds, local time (YYYY-MM-DDThh:mm:ss.s).)"
    to_timestamp:
      queryable: true
      type: datetime
      description: "(MANUAL DEF: Ending time of the measurement or transient entity.\
        \ Specified as Julian\u2011based, local civil time (LCT).) (DERIVED METRIC:\
        \ When using the CSV[A], JSON, or XML report format, the timestamp is emitted\
        \ as ISO 8601 date and time of day representation, extended format, fractional\
        \ seconds, local time (YYYY-MM-DDThh:mm:ss.s).)"
    delta_time:
      queryable: true
      type: integer
      unit: microseconds
      description: '(MANUAL DEF: Duration of the measurement, in microseconds.)'
    template_version:
      queryable: false
      type: integer
      description: '(MANUAL DEF: (ZMS Style only) Record template version from MEASDDLS
        for the format of the external record. When data collected on systems of differing
        product versions are stored in the same structured files, the template version
        for all records is the one used to create the structured file.)'
    format_version.letter:
      queryable: false
      type: string
    format_version.number:
      queryable: false
      type: integer
    data_version.letter:
      queryable: false
      type: string
    data_version.number:
      queryable: false
      type: integer
    subsystem_version:
      queryable: false
      type: integer
      description: '(MANUAL DEF: (ZMS Style only) This value is set to 1 for the initial
        H-series and later versions of all subsystems. If the value is greater than
        1, consult the subsystem documentation for information about changes that
        affect the Measure counters.)'
    error:
      queryable: false
      type: integer
      description: '(MANUAL DEF: Indicates whether an error prevented Measure from
        collecting data or writing an output record for this entity. For values, see
        Identifying Data File Errors.)'
    opener_cpu:
      queryable: true
      type: integer
      description: 'CPU number of the process that opened the file (MANUAL DEF: (Legacy
        Style only) Number of the CPU on which the process that opened the file is
        executing.)'
    opener_pin:
      queryable: true
      type: integer
      description: 'PIN of the process that opened the file (MANUAL DEF: Process identification
        number of the process that opened the file.)'
    ocb_number:
      queryable: true
      type: integer
      description: 'Open Control Block number; unique per open instance; -1 if value
        exceeds 65534 (MANUAL DEF: Identification number of the open control block
        (OCB), if less than or equal to 65534. Otherwise value will be -1.)'
    file_type:
      queryable: true
      type: integer
      description: 'File type: 0=unstructured, 1=relative, 2=entry-sequenced, 3=key-sequenced
        (MANUAL DEF: File type, from the access control block: ``` 1 Relative file
        2 Entry-sequenced file 3 Key-sequenced file 0 Any other type of file ```.)'
    opener_system_name:
      queryable: true
      type: string
      description: 'System name of the opener process (MANUAL DEF: Name of the system
        that opened the measured file.)'
    file_name.volume:
      queryable: true
      type: string
      description: Volume component of the opened file name
    file_name.subvol:
      queryable: true
      type: string
      description: Subvolume component of the opened file name
    file_name.filename:
      queryable: true
      type: string
      description: Filename component of the opened file name
    device_name:
      queryable: true
      type: string
      description: 'Disk device name hosting the file (MANUAL DEF: Disk device on
        which the program file is located. For SMF files, this field provides the
        physical location that corresponds to the logical file name.) (DERIVED METRIC:
        For Nonstop files, this field is the same as the FILE-NAME VOLUME subfield.)'
    storage_pool:
      queryable: true
      type: string
      description: 'SMF storage pool process name (MANUAL DEF: Name of the SMF storage
        pool to which the measured disk is assigned (process name of the storage pool
        process).)'
    file_name_mid.pathid:
      queryable: false
      type: string
      description: Internal OSS/SQL MID PATHID
    file_name_mid.crvsn:
      queryable: false
      type: string
      description: Creation Version Serial Number
    record_type:
      queryable: true
      type: integer
      description: '0 = short-form record (temp/edit/object files); non-zero = long-form
        record with locking counters (MANUAL DEF: Type of internal counter record
        used to record the instrumentation for the DISCOPEN entity. If the value is
        0, the file opened was either a temporary file, a program (object file), or
        an edit file.)'
    ocb32_number:
      queryable: true
      type: integer
      description: '32-bit Open Control Block number (L02/J06 and later) (MANUAL DEF:
        (ZMS style only, L02, J06 and later) Identification number of the open control
        block (OCB).)'
    driver_input_calls:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: 'Read operations for this open (cache hits + misses); physical
        reads = driver_input_calls - cache_hits (MANUAL DEF: Number of read operations,
        both cache hits and cache misses. The number of physical read operations is
        the difference between DRIVER- INPUT-CALLS and CACHE-READ-HITS.) (DERIVED
        METRIC: The number of physical read operations is the difference between DRIVER-
        INPUT-CALLS and CACHE-READ-HITS.)'
      derived_formula: physical read operations = DRIVER-INPUT-CALLS - CACHE-HITS
    driver_output_calls:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: 'Write operations for this open (MANUAL DEF: Number of write operations.
        For writes to unstructured files where the write-count is less than or equal
        to 4096 bytes and for structured files, the number of physical disk write
        operations is the difference between DRIVER-OUTPUT-CALLS and CACHE-WRITE-HITS.)
        (DERIVED METRIC: For writes to unstructured files where the write-count is
        less than or equal to 4096 bytes and for structured files, the number of physical
        disk write operations is the difference between DRIVER-OUTPUT-CALLS and CACHE-WRITE-HITS.
        For writes to unstructured files where the write-count is greater than 4096
        (large write), the number of physical disk write operations is the difference
        between DRIVER-OUTPUT-CALLS and the sum of CACHE-WRITE-HITS and CACHE-WRITE-CLEANS.)'
      derived_formula: physical disk write operations (structured or unstructured
        <= 4096 bytes) = DRIVER-OUTPUT-CALLS - CACHE-WRITE-HITS. physical disk write
        operations (unstructured > 4096 bytes) = DRIVER-OUTPUT-CALLS - (CACHE-WRITE-HITS
        + CACHE-WRITE-CLEANS).
    cache_hits:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: 'Times a read found the required block in cache for this open (MANUAL
        DEF: Number of times a read operation found the required block in cache, which
        saves a disk I/O. If you write a partially filled block to disk, the disk
        process must read the block (possibly incrementing this counter), merge the
        new data into the block, and then write the block to disk.)'
    cache_write_hits:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: 'Times a write found the required block dirty in cache for this
        open (MANUAL DEF: Number of times a write operation found the required block
        in cache and the block was dirty. A write to a dirty block saves a write I/O
        operation.)'
    block_splits:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: 'B-tree block splits caused by this opener (MANUAL DEF: Number
        of block splits during writes to the file. Counter type: Incrementing.)'
      thresholds: Keep block splits to a minimum because they require several I/O
        operations.
    requests_blocked:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: 'Requests blocked waiting for a lock for this open (MANUAL DEF:
        Number of times an I/O operation had to wait because the requested file or
        record was locked. LOCKWAITS is another term for this counter.)'
    requests:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: "Total I/O requests for this open (MANUAL DEF: Number of requests\
        \ received by the terminal process. To determine how long the requests were\
        \ queued before being read by the terminal process, measure the process and\
        \ examine the PROCESS RECV\u2011QTIME counter.)"
    lockwait_time:
      queryable: true
      type: integer
      unit: microseconds
      counter_type: Lockwait
      description: "Cumulative lock wait time for this open; zero for short-form records;\
        \ RATE ON \xE2\u2020\u2019 avg per blocked request (MANUAL DEF: Time spent\
        \ waiting for locks. The REQUESTS\u2011BLOCKED counter counts the number of\
        \ blocked requests\u2014that is, the number of times requests are queued to\
        \ locks.) (DERIVED METRIC: When the REPORT RATE value is on, this counter\
        \ returns the average wait time (LOCKWAIT\u2011TIME divided by REQUESTS\u2011\
        BLOCKED).)"
      derived_formula: average wait time = LOCKWAIT-TIME / REQUESTS-BLOCKED
    max_lockwait_time:
      queryable: true
      type: integer
      unit: microseconds
      counter_type: Max value
      description: 'Maximum single lock wait time for this open; zero for short-form
        records; unaffected by RATE (MANUAL DEF: Maximum wait time for each lock.
        Use this number as a guide to set the timeout value in the application.)'
      thresholds: Can be used as a guide to set the timeout value in the application.
    lock_timeouts:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: 'Lock timeout events for this open; zero for short-form records
        (MANUAL DEF: Number of timeouts on locks (error 40). When a timeout value
        for a request expires, the file system (Enscribe and SQL/MP) sends a cancel
        request to the disk process.)'
    lock_bounces:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: "Lock bounce events (FELOCKED/error 73) for this open; zero for\
        \ short-form records (MANUAL DEF: Number of bounced locks (FELOCKED = error\
        \ 73) returned to the file system. For SQL tables, a bounced lock is a result\
        \ of the CONTROL TABLE command with the RETURN\u2011IF\u2011LOCKED control\
        \ option.)"
    cache_write_cleans:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: 'Times a write found the required block clean in cache for this
        open; zero for short-form records (MANUAL DEF: Number of times a write operation
        found the required block in cache and the block was clean. During a write,
        the diskprocess searches for the requested block in its cache.)'
    dbio_input_calls:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: 'Direct bulk I/O read operations for this open; subset of driver_input_calls
        (MANUAL DEF: Number of direct bulk I/O read operations to a requesting processor.
        This counter is a subset of DRIVER-INPUT-CALLS.) (DERIVED METRIC: This counter
        is a subset of DRIVER-INPUT-CALLS.)'
      derived_formula: Subset of DRIVER-INPUT-CALLS
    dbio_output_calls:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: 'Direct bulk I/O write operations for this open; subset of driver_output_calls
        (MANUAL DEF: Number of direct bulk I/O write operations from a requesting
        processor. This counter is a subset of DRIVER-OUTPUT-CALLS.) (DERIVED METRIC:
        This counter is a subset of DRIVER-OUTPUT-CALLS.)'
      derived_formula: Subset of DRIVER-OUTPUT-CALLS
    sql_operation_time:
      queryable: true
      type: integer
      unit: microseconds
      counter_type: Busy
      description: "DP2 process busy-time while working on SQL subset requests for\
        \ this open; RATE ON \xE2\u2020\u2019 % (MANUAL DEF: DP2 process busy-time\
        \ accumulated while DP2 was working on SQL subset requests on behalf of this\
        \ DISCOPEN. Counter type: Busy.)"
file:
  source_file: measurefiles/filecsv
  ddl_record: ZMSFILE
  entity_type: FILE (File Activity per Opener)
  purpose: 'Logical I/O operations performed by a user process on an explicitly opened
    file. Measures all partitions of a partitioned file together as a single entity.
    Counter records are initiated on first significant use of the file, not on open.
    Does not measure files not explicitly opened by the application (e.g. alternate-key
    files).

    '
  identity_columns:
  - system_name
  - cpu_num
  - opener_pin
  - file_number
  - file_name.volume
  - file_name.subvol
  - file_name.filename
  time_columns:
  - from_timestamp
  - to_timestamp
  - delta_time
  join_hints:
  - JOIN proc ON (system_name, cpu_num, opener_pin, from_timestamp) for opener process
    detail
  - JOIN dfile ON (system_name, cpu_num, file_name.*, from_timestamp) for disk file
    totals
  columns:
    u_loadid.loadid:
      queryable: false
      type: string
    u_loadid.load_id.prefix_id:
      queryable: false
      type: string
    u_loadid.load_id.interval_id:
      queryable: false
      type: string
    system_name:
      queryable: true
      type: string
      description: '(MANUAL DEF: Name of the system on which the measurement was taken.)'
      derived_formula: end ``` ``` + help zmstmf counters --- Measurement descriptive
        fields --------------------------------- error+ delta-time+ loadid* from-timestamp+
        system-name* cpu-num+ to-timestamp+ os-version+ --- Counter fields -------------------------------------------------
        home-trans remote-trans-qtime home-net-trans-qtime remote-trans home-net-trans
        trans-backout-qtime home-trans-qtime aborting-trans tmp-work tmp-work-qtime
        pio-sends pio-send-qtime pio-send-bytes pio-recvs pio-recv-bytes --- Derived
        counter fields ----------------------------------------- home-trans-ART home-net-trans-ART
        remote-trans-ART trans-backout-ART tmp-work-AQT ``` ``` RECORD zmstmf.
    cpu_num:
      queryable: true
      type: integer
      description: "(MANUAL DEF: Number of the CPU on which the measurement was taken.\
        \ For interprocessor communications (IPC) records, CPU\u2011NUM is MYCPU.)"
      derived_formula: end ``` ``` + help zmstmf counters --- Measurement descriptive
        fields --------------------------------- error+ delta-time+ loadid* from-timestamp+
        system-name* cpu-num+ to-timestamp+ os-version+ --- Counter fields -------------------------------------------------
        home-trans remote-trans-qtime home-net-trans-qtime remote-trans home-net-trans
        trans-backout-qtime home-trans-qtime aborting-trans tmp-work tmp-work-qtime
        pio-sends pio-send-qtime pio-send-bytes pio-recvs pio-recv-bytes --- Derived
        counter fields ----------------------------------------- home-trans-ART home-net-trans-ART
        remote-trans-ART trans-backout-ART tmp-work-AQT ``` ``` RECORD zmstmf.
    os_version.letter:
      queryable: true
      type: string
    os_version.number:
      queryable: true
      type: integer
    object_uid:
      queryable: false
      type: string
      description: '(MANUAL DEF: (ZMS Style only) Reserved for future use.)'
    from_timestamp:
      queryable: true
      type: datetime
      description: "(MANUAL DEF: Starting time of the measurement or transient entity.\
        \ Specified as Julian\u2011based, local civil time (LCT).) (DERIVED METRIC:\
        \ When using the CSV[A], JSON, or XML report format, the timestamp is emitted\
        \ as ISO 8601 date and time of day representation, extended format, fractional\
        \ seconds, local time (YYYY-MM-DDThh:mm:ss.s).)"
      derived_formula: end ``` ``` + help zmstmf counters --- Measurement descriptive
        fields --------------------------------- error+ delta-time+ loadid* from-timestamp+
        system-name* cpu-num+ to-timestamp+ os-version+ --- Counter fields -------------------------------------------------
        home-trans remote-trans-qtime home-net-trans-qtime remote-trans home-net-trans
        trans-backout-qtime home-trans-qtime aborting-trans tmp-work tmp-work-qtime
        pio-sends pio-send-qtime pio-send-bytes pio-recvs pio-recv-bytes --- Derived
        counter fields ----------------------------------------- home-trans-ART home-net-trans-ART
        remote-trans-ART trans-backout-ART tmp-work-AQT ``` ``` RECORD zmstmf.
    to_timestamp:
      queryable: true
      type: datetime
      description: "(MANUAL DEF: Ending time of the measurement or transient entity.\
        \ Specified as Julian\u2011based, local civil time (LCT).) (DERIVED METRIC:\
        \ When using the CSV[A], JSON, or XML report format, the timestamp is emitted\
        \ as ISO 8601 date and time of day representation, extended format, fractional\
        \ seconds, local time (YYYY-MM-DDThh:mm:ss.s).)"
      derived_formula: end ``` ``` + help zmstmf counters --- Measurement descriptive
        fields --------------------------------- error+ delta-time+ loadid* from-timestamp+
        system-name* cpu-num+ to-timestamp+ os-version+ --- Counter fields -------------------------------------------------
        home-trans remote-trans-qtime home-net-trans-qtime remote-trans home-net-trans
        trans-backout-qtime home-trans-qtime aborting-trans tmp-work tmp-work-qtime
        pio-sends pio-send-qtime pio-send-bytes pio-recvs pio-recv-bytes --- Derived
        counter fields ----------------------------------------- home-trans-ART home-net-trans-ART
        remote-trans-ART trans-backout-ART tmp-work-AQT ``` ``` RECORD zmstmf.
    delta_time:
      queryable: true
