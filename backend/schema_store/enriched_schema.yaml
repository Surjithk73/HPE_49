        \ preprocessor output file.  ``` TopicTopic Entity specification syntax for\
        \ SQLSTMT entities DDL record for SQLSTMT entities DDL field definitions for\
        \ SQLSTMT entities Usage notes for SQLSTMT entities Example of SQLSTMT measurement\
        \ ``` SubtopicsSubtopics Entity Specification Syntax for SQLSTMT EntitiesEntity\
        \ Specification Syntax for SQLSTMT Entities DDL Record for SQLSTMT Entities\
        \ (ZMS Style)DDL Record for SQLSTMT Entities (ZMS Style) DDL Record for SQLSTMT\
        \ Entities (Legacy Style)DDL Record for SQLSTMT Entities (Legacy Style) Common\
        \ and ZMS Style Only ID Field DDL Definitions for SQLSTMT EntitiesCommon and\
        \ ZMS Style Only ID Field DDL Definitions for SQLSTMT Entities Common and\
        \ ZMS Style Only Counter Field DDL Definitions for SQLSTMT EntitiesCommon\
        \ and ZMS Style Only Counter Field DDL Definitions for SQLSTMT Entities Legacy\
        \ Style Only ID Field DDL Definitions for SQLSTMT EntitiesLegacy Style Only\
        \ ID Field DDL Definitions for SQLSTMT Entities Legacy Style Only Counter\
        \ Field DDL Definitions for SQLSTMT EntitiesLegacy Style Only Counter Field\
        \ DDL Definitions for SQLSTMT Entities Usage Notes for All SQLSTMT EntitiesUsage\
        \ Notes for All SQLSTMT Entities Usage Notes for L-series and later SQLSTMT\
        \ EntitiesUsage Notes for L-series and later SQLSTMT Entities Usage Notes\
        \ for H-series and later SQLSTMT EntitiesUsage Notes for H-series and later\
        \ SQLSTMT Entities Usage Notes for G-Series SQLSTMT EntitiesUsage Notes for\
        \ G-Series SQLSTMT Entities ExampleExample"
      queryable: true
      derived_formula: '``` In Measure G09 and later PVUs, SQLSTMT entity operation
        supports SQL/MX and OSS file pathnames.'
    systemsystem:
      type: integer
      description: 'The SYSTEM entity provides information about network traffic through
        Expand line handlers. A network link involves at least two processes: the
        linker that initiated the link and the listener that accepted the link. Because
        the Measure subsystem can measure only the local system, the measurement data
        reflects only one side of each link: the linker or the listener, but not both.
        Which network links are measured depends on the entity specification in the
        measurement configuration: If you specify all systems, the Measure subsystem
        counts the local end of all messages passed between the local system and any
        remote system. If you specify a local CPU, the Measure subsystem counts the
        local end of all messages passed between the local system and any remote system
        through the line-handler processes (primary or backup) in the specified CPU.
        If you specify a remote system, the Measure subsystem counts the local end
        of all messages passed between the local system and the remote system. For
        a multi-CPU path (superpath), the Measure subsystem reports one active path
        only. Entity specification syntax and DDL record Legacy Styles are the same
        for G-series PVU SYSTEM entities as for D-series PVU SYSTEM entities.  ```
        TopicTopic Entity specification syntax for SYSTEM entities DDL record for
        SYSTEM entities DDL field definitions for SYSTEM entities Usage notes for
        SYSTEM entities ``` SubtopicsSubtopics Entity Specification Syntax for SYSTEM
        EntitiesEntity Specification Syntax for SYSTEM Entities DDL Record for All
        SYSTEM Entities (ZMS Style)DDL Record for All SYSTEM Entities (ZMS Style)
        DDL Record for All SYSTEM Entities (Legacy Style)DDL Record for All SYSTEM
        Entities (Legacy Style)  ``` SQL Statement Procedure ''CATALOG_12.SCHEMA_34.MODULE_56
        '' Index # Process Pri OSSPID: Program OSSPath: Userid Creatorid Ancestor
        Format Version: H01 Data Version: H01 Subsystem Version: 1 Local System ----------------------------------------------------------------------------
        Elapsed-Busy-Time 4.17 ms Calls 0.17 /s Elapsed-Sort-Time Sorts Elapsed-Recompile-Time
        Recompiles Messages 0.22 /s Message-Bytes 931.00 /s Lock-Waits Escalations
        Timeouts Disc-Reads Records-Accessed 0.17 /s Records-Used 0.17 /s ```  ```
        Common ID Field DDL Definitions for SYSTEM EntitiesCommon ID Field DDL Definitions
        for SYSTEM Entities Common Counter Field DDL Definitions for SYSTEM EntitiesCommon
        Counter Field DDL Definitions for SYSTEM Entities Usage Notes for All SYSTEM
        EntitiesUsage Notes for All SYSTEM Entities ```'
      queryable: true
      derived_formula: 'Which network links are measured depends on the entity specification
        in the measurement configuration: If you specify all systems, the Measure
        subsystem counts the local end of all messages passed between the local system
        and any remote system.'
    response_timeresponse_time:
      type: integer
      description: 'Time the terminal process spent on terminal response.   A transaction
        is a read from a terminal followed by a write to the terminal. Terminal response
        is the interval between the end of the read and the beginning of the write.
        Block mode operations read a function key and then read data. This counter
        does not include the time between the two reads. For SNAX lines, this counter
        is always zero. Counter type: Response time.'
      queryable: true
      derived_formula: Block mode operations read a function key and then read data.
    tnsr_busy_time:
      type: integer
      description: Time that the CPU was busy executing TNS/R native code. This counter
        applies only to measurements taken on a TNS/R system and is derived from other
        counters.
      queryable: true
      derived_formula: CPU-BUSY-TIME - (INTR-BUSY-TIME + TNS-BUSY-TIME + ACCEL-BUSY-TIME)
        = TNSR-BUSY-TIME
tmf:
  source_file: measurefiles/tmfcsv
  ddl_record: ZMSTMF
  entity_type: TMF (Transaction Management Facility)
  purpose: 'Transaction Management Facility performance metrics per CPU. Captures
    transaction activity including home transactions, remote transactions, aborting
    transactions, and TMP queue activity. TMF counters are advanced only in the CPU
    containing the primary $TMP process.

    '
  identity_columns:
  - system_name
  - cpu_num
  time_columns:
  - from_timestamp
  - to_timestamp
  - delta_time
  join_hints:
  - JOIN cpu ON (system_name, cpu_num, from_timestamp) for CPU context
  - JOIN proc ON (system_name, cpu_num, from_timestamp) for process activity
  columns:
    u_loadid.loadid:
      queryable: false
      type: string
    u_loadid.load_id.prefix_id:
      queryable: false
      type: string
    u_loadid.load_id.interval_id:
      queryable: false
      type: string
    system_name:
      queryable: true
      type: string
      description: '(MANUAL DEF: Name of the system on which the measurement was taken.)'
    cpu_num:
      queryable: true
      type: integer
      description: "(MANUAL DEF: Number of the CPU on which the measurement was taken.\
        \ For interprocessor communications (IPC) records, CPU\u2011NUM is MYCPU.)"
    os_version.letter:
      queryable: true
      type: string
    os_version.number:
      queryable: true
      type: integer
    object_uid:
      queryable: false
      type: string
      description: '(MANUAL DEF: (ZMS Style only) Reserved for future use.)'
    from_timestamp:
      queryable: true
      type: datetime
      description: "(MANUAL DEF: Starting time of the measurement or transient entity.\
        \ Specified as Julian\u2011based, local civil time (LCT).) (DERIVED METRIC:\
        \ When using the CSV[A], JSON, or XML report format, the timestamp is emitted\
        \ as ISO 8601 date and time of day representation, extended format, fractional\
        \ seconds, local time (YYYY-MM-DDThh:mm:ss.s).)"
    to_timestamp:
      queryable: true
      type: datetime
      description: "(MANUAL DEF: Ending time of the measurement or transient entity.\
        \ Specified as Julian\u2011based, local civil time (LCT).) (DERIVED METRIC:\
        \ When using the CSV[A], JSON, or XML report format, the timestamp is emitted\
        \ as ISO 8601 date and time of day representation, extended format, fractional\
        \ seconds, local time (YYYY-MM-DDThh:mm:ss.s).)"
    delta_time:
      queryable: true
      type: integer
      unit: microseconds
      description: '(MANUAL DEF: Duration of the measurement, in microseconds.)'
    template_version:
      queryable: false
      type: integer
      description: '(MANUAL DEF: (ZMS Style only) Record template version from MEASDDLS
        for the format of the external record. When data collected on systems of differing
        product versions are stored in the same structured files, the template version
        for all records is the one used to create the structured file.)'
    format_version.letter:
      queryable: false
      type: string
    format_version.number:
      queryable: false
      type: integer
    data_version.letter:
      queryable: false
      type: string
    data_version.number:
      queryable: false
      type: integer
    subsystem_version:
      queryable: false
      type: integer
      description: 'Provided by the TMF subsystem (MANUAL DEF: (ZMS Style only) This
        value is set to 1 for the initial H-series and later versions of all subsystems.
        If the value is greater than 1, consult the subsystem documentation for information
        about changes that affect the Measure counters.)'
    error:
      queryable: false
      type: integer
      description: '(MANUAL DEF: Indicates whether an error prevented Measure from
        collecting data or writing an output record for this entity. For values, see
        Identifying Data File Errors.)'
    home_trans:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: 'Number of transactions that began in the measured CPU; includes
        transactions regardless of whether they remain on the local system or are
        distributed to a remote system (MANUAL DEF: Number of transactions that began
        in the measured CPU. This counter includes transactions regardless of whether
        they remain on the local system or are distributed to a remote system.)'
    home_trans_qtime:
      queryable: true
      type: integer
      unit: microseconds
      counter_type: Queue
      description: "Sum of lifetimes of transactions originated in the measured CPU;\
        \ includes transactions regardless of whether they remain in the local system\
        \ or are distributed to a remote system; RATE ON \u2192 AQL (MANUAL DEF: Sum\
        \ of lifetimes of transactions originated in the measured CPU. This counter\
        \ includes transactions regardless of whether they remain in the local system\
        \ or are distributed to a remote system.)"
    home_net_trans:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: 'Number of transactions that began in this system and were subsequently
        distributed to another system; advanced only in the CPU containing the primary
        $TMP process (MANUAL DEF: Number of transactions that began in this system
        and were subsequently distributed to another system. This counter is advanced
        only in the TMF record of the CPU containing the primary $TMP process.)'
    home_net_trans_qtime:
      queryable: true
      type: integer
      unit: microseconds
      counter_type: Queue
      description: "Time that transactions that began on the local system and were\
        \ subsequently distributed to a remote system spent on the remote system;\
        \ advanced only in the CPU containing the primary $TMP process; RATE ON \u2192\
        \ AQL (MANUAL DEF: Time that transactions that began on the local system and\
        \ were subsequently distributed to a remote system spent on the remote system.\
        \ This counter is advanced only in the TMF record of the CPU containing the\
        \ primary $TMP process.)"
    remote_trans:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: 'Number of transactions that began in a remote system and were
        distributed to the measured system; advanced only in the CPU containing the
        primary $TMP process (MANUAL DEF: Number of transactions that began in a remote
        system and were distributed to the measured system. This counter is advanced
        only in the TMF record of the CPU containing the primary $TMP process.)'
    remote_trans_qtime:
      queryable: true
      type: integer
      unit: microseconds
      counter_type: Queue
      description: "Time that transactions that began in a remote system and were\
        \ distributed to the local system spent on the local system; advanced only\
        \ in the CPU containing the primary $TMP process; RATE ON \u2192 AQL (MANUAL\
        \ DEF: Time that transactions that began in a remote system and were distributed\
        \ to the local system spent on the local system. This counter is advanced\
        \ only in the TMF record of the CPU containing the primary $TMP process.)"
    aborting_trans:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: 'Number of aborted transactions; counted regardless of whether
        it began in the local system and remained there, began in the local system
        and was distributed to a remote system, or began in a remote system and was
        distributed to the local system; advanced only in the CPU containing the primary
        $TMP process (MANUAL DEF: Number of aborted transactions. An aborted transaction
        is counted regardless of whether it began in the local system and remained
        there, began in the local system and was distributed to a remote system, or
        began in a remote system and was distributed to the local system.)'
    trans_backout_qtime:
      queryable: true
      type: integer
      unit: microseconds
      counter_type: Queue
      description: "Time that transactions spent waiting for and being serviced by\
        \ BACKOUT; after a transaction is designated as aborting and its audit is\
        \ on disk, that transaction is scheduled for backout services; advanced only\
        \ in the CPU containing the primary $TMP process; RATE ON \u2192 AQL (MANUAL\
        \ DEF: Time that transactions spent waiting for and being serviced by BACKOUT.\
        \ After a transaction is designated as aborting and its audit is on disk,\
        \ that transaction is scheduled for backout services, and this counter is\
        \ advanced.)"
    tmp_work:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: 'Number of work items placed on the TMP queue (MANUAL DEF: Number
        of work items placed on the TMP queue. Counter type: Incrementing.)'
    tmp_work_qtime:
      queryable: true
      type: integer
      unit: microseconds
      counter_type: Queue
      description: "Time that work items spent on the TMP queue; RATE ON \u2192 AQL\
        \ (MANUAL DEF: Time that work items spent on the TMP queue. Counter type:\
        \ Queue.)"
    pio_sends:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: 'Number of PIOs sent to other CPUs (MANUAL DEF: Number of PIOs
        sent to other CPUs. Counter type: Incrementing.)'
    pio_send_qtime:
      queryable: true
      type: integer
      unit: microseconds
      counter_type: Queue
      description: "Time PIOs spent in transit; RATE ON \u2192 AQL (MANUAL DEF: Time\
        \ PIOs spent in transit. Counter type: Queue.)"
    pio_send_bytes:
      queryable: true
      type: integer
      unit: bytes
      counter_type: Accumulating
      description: 'Number of PIO bytes sent to other CPUs (MANUAL DEF: Number of
        PIO bytes sent to other CPUs. Counter type: Accumulating.)'
    pio_recvs:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: 'Number of PIOs received by the CPU (MANUAL DEF: Number of PIOs
        received by the CPU. Counter type: Incrementing.)'
    pio_recv_bytes:
      queryable: true
      type: integer
      unit: bytes
      counter_type: Accumulating
      description: 'Number of PIO bytes received by the CPU (MANUAL DEF: Number of
        PIO bytes received by the CPU. Counter type: Accumulating.)'
    tmp_work_aqt:
      type: integer
      description: The average time that each work item spends waiting on the TMP
        queue.
      queryable: true
      derived_formula: TMP-WORK-QTIME / TMP-WORK
    home_net_trans_qmax:
      type: integer
      description: (Legacy Style only) Maximum number of items on the queue described
        by the HOME-NET-TRANS-QTIME counter.
      queryable: true
    home_trans_qmax:
      type: integer
      description: (Legacy Style only) Maximum number of items on the queue described
        by the HOME-TRANS-QTIME counter.
      queryable: true
    remote_trans_qmax:
      type: integer
      description: (Legacy Style only) Maximum number of items on the queue described
        by the REMOTE-TRANS-QTIME counter.
      queryable: true
    trans_backout_qmax:
      type: integer
      description: (Legacy Style only) Maximum number of items on the queue described
        by the TRANS-BACKOUT-QTIME counter.
      queryable: true
    home_trans_art:
      type: integer
      description: (ZMS Style only) The average response time that each home transaction
        spends waiting or being processed by TMF.
      queryable: true
      derived_formula: HOME-TRANS-QTIME / HOME-TRANS
    home_net_trans_art:
      type: integer
      description: (ZMS Style only) The average response time that each request spends
        waiting or being processed by TMF.
      queryable: true
      derived_formula: HOME-NET-TRANS-QTIME / HOME-NET-TRANS
    remote_trans_art:
      type: integer
      description: (ZMS Style only) The average response time that each remote home
        net transaction spends waiting or being processed by TMF.
      queryable: true
      derived_formula: REMOTE-TRANS-QTIME / REMOTE-TRANS
    trans_backout_art:
      type: integer
      description: (ZMS Style only) The average response time that each aborting transaction
        spends waiting or being processed by TMF.
      queryable: true
      derived_formula: TRANS-BACKOUT-QTIME / ABORTING-TRANS
