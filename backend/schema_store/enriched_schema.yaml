dopen:
  source_file: measurefiles/dopencsv
  ddl_record: ZMSDOPEN
  entity_type: "DOPEN (Disk File Open \xE2\u20AC\u201D DISCOPEN entity)"
  purpose: Per-open-instance physical I/O metrics for disk files. Each row represents
    one opener process of a file during an interval. DISCOPEN creates a separate counter
    record for each file open; creates a new record if a file closes and reopens.
    Short-form records (for temp files, edit files, object files) have zero values
    for lockwait_time, max_lockwait_time, lock_timeouts, lock_bounces, cache_write_cleans.
  identity_columns:
  - system_name
  - cpu_num
  - opener_cpu
  - opener_pin
  - ocb_number
  - file_name.volume
  - file_name.subvol
  - file_name.filename
  time_columns:
  - from_timestamp
  - to_timestamp
  - delta_time
  join_hints:
  - JOIN dfile ON (system_name, cpu_num, file_name.*, from_timestamp) for file-level
    totals
  - JOIN proc ON (system_name, opener_cpu, opener_pin, from_timestamp) for opener
    process detail
  columns:
    system_name:
      queryable: true
      type: string
      description: Name of the system on which the measurement was taken.
    cpu_num:
      queryable: true
      type: integer
      description: "CPU number where the file resides Number of the CPU on which the\
        \ measurement was taken. For interprocessor communications (IPC records, CPU\u2011\
        NUM is MYCPU.)"
    object_uid:
      queryable: false
      type: string
      description: (ZMS Style only Reserved for future use.)
    from_timestamp:
      queryable: true
      type: datetime
      description: "Starting time of the measurement or transient entity. Specified\
        \ as Julian\u2011based, local civil time (LCT.) When using the CSV[A], JSON,\
        \ or XML report format, the timestamp is emitted as ISO 8601 date and time\
        \ of day representation, extended format, fractional seconds, local time (YYYY-MM-DDThh:mm:ss.s.)"
    to_timestamp:
      queryable: true
      type: datetime
      description: "Ending time of the measurement or transient entity. Specified\
        \ as Julian\u2011based, local civil time (LCT.) When using the CSV[A], JSON,\
        \ or XML report format, the timestamp is emitted as ISO 8601 date and time\
        \ of day representation, extended format, fractional seconds, local time (YYYY-MM-DDThh:mm:ss.s.)"
    delta_time:
      queryable: true
      type: integer
      unit: microseconds
      description: Duration of the measurement, in microseconds.
    template_version:
      queryable: false
      type: integer
      description: (ZMS Style only Record template version from MEASDDLS for the format
        of the external record. When data collected on systems of differing product
        versions are stored in the same structured files, the template version for
        all records is the one used to create the structured file.)
    subsystem_version:
      queryable: false
      type: integer
      description: (ZMS Style only This value is set to 1 for the initial H-series
        and later versions of all subsystems. If the value is greater than 1, consult
        the subsystem documentation for information about changes that affect the
        Measure counters.)
    error:
      queryable: false
      type: integer
      description: Indicates whether an error prevented Measure from collecting data
        or writing an output record for this entity. For values, see Identifying Data
        File Errors.
    opener_cpu:
      queryable: true
      type: integer
      description: CPU number of the process that opened the file (Legacy Style only
        Number of the CPU on which the process that opened the file is executing.)
    opener_pin:
      queryable: true
      type: integer
      description: PIN of the process that opened the file Process identification
        number of the process that opened the file.
    ocb_number:
      queryable: true
      type: integer
      description: Open Control Block number; unique per open instance; -1 if value
        exceeds 65534 Identification number of the open control block (OCB, if less
        than or equal to 65534. Otherwise value will be -1.)
    file_type:
      queryable: true
      type: integer
      description: 'File type: 0=unstructured, 1=relative, 2=entry-sequenced, 3=key-sequenced.'
    opener_system_name:
      queryable: true
      type: string
      description: System name of the opener process Name of the system that opened
        the measured file.
    device_name:
      queryable: true
      type: string
      description: Disk device name hosting the file Disk device on which the program
        file is located. For SMF files, this field provides the physical location
        that corresponds to the logical file name. For Nonstop files, this field is
        the same as the FILE-NAME VOLUME subfield.
    storage_pool:
      queryable: true
      type: string
      description: SMF storage pool process name Name of the SMF storage pool to which
        the measured disk is assigned (process name of the storage pool process.)
    record_type:
      queryable: true
      type: integer
      description: 0 = short-form record (temp/edit/object files); non-zero = long-form
        record with locking counters Type of internal counter record used to record
        the instrumentation for the DISCOPEN entity. If the value is 0, the file opened
        was either a temporary file, a program (object file, or an edit file.)
    ocb32_number:
      queryable: true
      type: integer
      description: 32-bit Open Control Block number (L02/J06 and later) (ZMS style
        only, L02, J06 and later Identification number of the open control block (OCB).)
    driver_input_calls:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: Read operations for this open (cache hits + misses); physical reads
        = driver_input_calls - cache_hits Number of read operations, both cache hits
        and cache misses.
      derived_formula: physical read operations = DRIVER-INPUT-CALLS - CACHE-HITS
    driver_output_calls:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: Write operations for this open Number of write operations. For
        writes to unstructured files where the write-count is greater than 4096 (large
        write, the number of physical disk write operations is the difference between
        DRIVER-OUTPUT-CALLS and the sum of CACHE-WRITE-HITS and CACHE-WRITE-CLEANS.)
      derived_formula: physical disk write operations (structured or unstructured
        <= 4096 bytes) = DRIVER-OUTPUT-CALLS - CACHE-WRITE-HITS. physical disk write
        operations (unstructured > 4096 bytes) = DRIVER-OUTPUT-CALLS - (CACHE-WRITE-HITS
        + CACHE-WRITE-CLEANS).
    cache_hits:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: Times a read found the required block in cache for this open Number
        of times a read operation found the required block in cache, which saves a
        disk I/O. If you write a partially filled block to disk, the disk process
        must read the block (possibly incrementing this counter, merge the new data
        into the block, and then write the block to disk.)
    cache_write_hits:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: Times a write found the required block dirty in cache for this
        open Number of times a write operation found the required block in cache and
        the block was dirty. A write to a dirty block saves a write I/O operation.
    block_splits:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: 'B-tree block splits caused by this opener Number of block splits
        during writes to the file. Counter type: Incrementing.'
      thresholds: Keep block splits to a minimum because they require several I/O
        operations.
    requests_blocked:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: Requests blocked waiting for a lock for this open Number of times
        an I/O operation had to wait because the requested file or record was locked.
        LOCKWAITS is another term for this counter.
    requests:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: "Total I/O requests for this open Number of requests received by\
        \ the terminal process. To determine how long the requests were queued before\
        \ being read by the terminal process, measure the process and examine the\
        \ PROCESS RECV\u2011QTIME counter."
    lockwait_time:
      queryable: true
      type: integer
      unit: microseconds
      counter_type: Lockwait
      description: "Cumulative lock wait time for this open; zero for short-form records;\
        \ RATE ON \xE2\u2020\u2019 avg per blocked request Time spent waiting for\
        \ locks. The REQUESTS\u2011BLOCKED counter counts the number of blocked requests\u2014\
        that is, the number of times requests are queued to locks. When the REPORT\
        \ RATE value is on, this counter returns the average wait time (LOCKWAIT\u2011\
        TIME divided by REQUESTS\u2011BLOCKED.)"
      derived_formula: average wait time = LOCKWAIT-TIME / REQUESTS-BLOCKED
    max_lockwait_time:
      queryable: true
      type: integer
      unit: microseconds
      counter_type: Max value
      description: Maximum single lock wait time for this open; zero for short-form
        records; unaffected by RATE Maximum wait time for each lock. Use this number
        as a guide to set the timeout value in the application.
    lock_timeouts:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: Lock timeout events for this open; zero for short-form records
        Number of timeouts on locks (error 40. When a timeout value for a request
        expires, the file system (Enscribe and SQL/MP) sends a cancel request to the
        disk process.)
    lock_bounces:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: "Lock bounce events (FELOCKED/error 73) for this open; zero for\
        \ short-form records Number of bounced locks (FELOCKED = error 73 returned\
        \ to the file system. For SQL tables, a bounced lock is a result of the CONTROL\
        \ TABLE command with the RETURN\u2011IF\u2011LOCKED control option.)"
    cache_write_cleans:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: Times a write found the required block clean in cache for this
        open; zero for short-form records Number of times a write operation found
        the required block in cache and the block was clean. During a write, the diskprocess
        searches for the requested block in its cache.
    dbio_input_calls:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: Direct bulk I/O read operations for this open; subset of driver_input_calls
        Number of direct bulk I/O read operations to a requesting processor. This
        counter is a subset of DRIVER-INPUT-CALLS.
    dbio_output_calls:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: Direct bulk I/O write operations for this open; subset of driver_output_calls
        Number of direct bulk I/O write operations from a requesting processor. This
        counter is a subset of DRIVER-OUTPUT-CALLS.
    sql_operation_time:
      queryable: true
      type: integer
      unit: microseconds
      counter_type: Busy
      description: "DP2 process busy-time while working on SQL subset requests for\
        \ this open; RATE ON \xE2\u2020\u2019 % DP2 process busy-time accumulated\
        \ while DP2 was working on SQL subset requests on behalf of this DISCOPEN.\
        \ Counter type: Busy."
    os_version_number:
      type: integer
      queryable: true
      description: os_version_number metric
    format_version_number:
      type: integer
      queryable: true
      description: format_version_number metric
    data_version_number:
      type: integer
      queryable: true
      description: data_version_number metric
    u_loadid_loadid:
      type: string
      queryable: true
      description: u_loadid_loadid metric
    u_loadid_load_id_prefix_id:
      type: string
      queryable: true
      description: u_loadid_load_id_prefix_id metric
    u_loadid_load_id_interval_id:
      type: string
      queryable: true
      description: u_loadid_load_id_interval_id metric
    os_version_letter:
      type: string
      queryable: true
      description: os_version_letter metric
    format_version_letter:
      type: string
      queryable: true
      description: format_version_letter metric
    data_version_letter:
      type: string
      queryable: true
      description: data_version_letter metric
    file_name_volume:
      type: string
      queryable: true
      description: file_name_volume metric
    file_name_subvol:
      type: string
      queryable: true
      description: file_name_subvol metric
    file_name_filename:
      type: string
