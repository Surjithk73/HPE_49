        \ 72.11 ms Transient-Opens Starting-EOF Ending-EOF Extent-Allocations File-Growth-Ratio\
        \ ``` # ENDPOINTENDPOINT The SERVERNET entity has been replaced by ENDPOINT."
      thresholds: MEAS_PATH_SEL Indicates that selection is only by path and device
        name, and not other attributes like lun, partition, or scsi-id.
    opener_device_name:
      queryable: true
      type: string
      description: 'Device name of the opener''s program file; for SMF = physical
