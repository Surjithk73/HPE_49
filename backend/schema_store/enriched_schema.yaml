business_rules:
- 'PROCESS NAME CONVENTIONS: ALL processes in this dataset start with ''$''. There
  are NO processes without a ''$'' prefix.  Disk processes match LIKE ''$DATA%'' OR
  ''$SSD%'' OR ''$AUDIT%''. Core system processes are: $SYSTEM, $MONITOR, $MSENGER,
  $VIRTUAL, $NULL, $OSS, $SWAP, $SWAP01, $SWAP23, $SWAP34, $NCP, $TMP. User/application
  processes are everything else (e.g. $BEER, $CHAMP, $GANESH). When categorising processes,
  always use explicit IN() or LIKE patterns. When using variables denoted by [n] (like
  ipu[n] or c[n]), you MUST expand them dynamically using the index bounds provided
  in the database mapping configuration. For example, if bounds are 0 to 15, ipu[n]
  should be ipu0, ipu1... ipu15.

  '
cpu:
  ddl_record: ZMSCPU
  entity_type: CPU (Central Processing Unit)
  purpose: 'Per-CPU performance metrics for each NonStop processor. Captures utilization,
    memory, I/O, transaction, and ServerNet fabric activity over measurement intervals.
    Counter records are initialized at CPU load time, not at measurement start.

    '
  identity_columns:
  - system_name
  - cpu_num
  time_columns:
  - from_timestamp
  - to_timestamp
  - delta_time
  join_hints:
  - JOIN proc ON (system_name, cpu_num, from_timestamp) for process activity
  - JOIN disc ON (system_name, cpu_num, from_timestamp) for disk activity
  columns:
    u_loadid.loadid:
      queryable: false
      description: Internal Measure load ID
      type: integer
    u_loadid.load_id.prefix_id:
      queryable: false
      description: Internal Measure load ID prefix
      type: integer
    u_loadid.load_id.interval_id:
      queryable: false
      description: Internal Measure load ID interval
      type: integer
    system_name:
      queryable: true
      type: string
      description: NonStop node name (e.g. \KRONOS)
    cpu_num:
      queryable: true
      type: integer
      description: CPU number (0-indexed, 0-15)
    os_version.letter:
      queryable: true
      type: string
      description: OS version letter (e.g. J, L)
    os_version.number:
      queryable: true
      type: string
      description: OS version number (e.g. 06)
    object_uid:
      queryable: false
      description: Reserved for future use
      type: integer
    from_timestamp:
      queryable: true
      type: datetime
      description: Measurement interval start (Julian LCT)
    to_timestamp:
      queryable: true
      type: datetime
      description: Measurement interval end (Julian LCT)
    delta_time:
      queryable: true
      type: integer
      unit: microseconds
      description: Interval duration; divide accumulating counters by delta_time for
        per-second rates
    template_version:
      queryable: false
      description: ZMS record template version from MEASDDLS
      type: integer
    format_version.letter:
      queryable: false
      description: MEASFH format version letter
      type: string
    format_version.number:
      queryable: false
      description: MEASFH format version number
      type: integer
    data_version.letter:
      queryable: false
      description: Data file version letter
      type: string
    data_version.number:
      queryable: false
      description: Data file version number
      type: integer
    subsystem_version:
      queryable: false
      description: Set to 1 for initial H-series; 0 for G-series
      type: integer
    error:
      queryable: false
      description: 0=no error; >0=error (no data); <0=warning (data present with caveats)
      type: integer
    cpu_type:
      queryable: true
      type: integer
      counter_type: Snapshot
      description: Processor type identifier; use PROCESSOR_GETNAME_ to decode
    cpu_subtype:
      queryable: true
      type: integer
      counter_type: Snapshot
      description: Processor subtype identifier
    mem_mb:
      queryable: true
      type: integer
      unit: megabytes
      counter_type: Snapshot
      description: Total physical memory in MB; if 0xFFFF compute from mem_frames
        * page_size_bytes
    pcbs:
      queryable: true
      type: integer
      counter_type: Snapshot
      description: Number of Process Control Blocks configured by SYSGEN
    page_size_bytes:
      queryable: true
      type: integer
      unit: bytes
      counter_type: Snapshot
      description: Memory page frame size in bytes
    mem_frames:
      queryable: true
      type: integer
      counter_type: Snapshot
      description: Total physical memory frames available (PHYSCL in PEEK)
    mem_initial_lock:
      queryable: true
      type: integer
      counter_type: Snapshot
      description: Memory frames locked at system load by SYSGEN (SWAPBL in PEEK)
    ipus:
      queryable: true
      type: integer
      counter_type: Snapshot
      description: Number of IPUs comprising this logical CPU (J-series and later)
    flags:
      queryable: true
      type: bitmask
      counter_type: Snapshot
      description: 'Bit 14=1: L-series or later RVU; Bit 15=1: NSMA system (H06.24/J06.13+)'
    cpu_busy_time:
      queryable: true
      type: integer
      unit: microseconds
      counter_type: Busy
      description: Time CPU was busy; for TNS/E = sum of accel_busy_time + tns_busy_time
        + native_busy_time; RATE ON → % of interval
    cpu_qtime:
      queryable: true
      type: integer
      unit: microseconds
      counter_type: Queue
      description: Time processes spent on the CPU ready list; RATE ON → AQL
    dispatches:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: Number of times a process was selected from the ready list and
        executed
    swaps:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: Number of memory swap operations (in and out); advanced once per
        swap regardless of pages swapped
    intr_busy_time:
      queryable: true
      type: integer
      unit: microseconds
      counter_type: Busy
      description: Time spent executing interrupt handlers; on TNS/E includes system
        IPs and APs
    process_ovhd:
      queryable: true
      type: integer
      unit: microseconds
      counter_type: Busy
      description: Time spent by OS initializing and terminating processes; not included
        in per-process cpu_busy_time
    disc_ios:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: Total disk I/O transfers performed by disk processes in this CPU,
        including direct bulk I/O
    cache_hits:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: Number of times required block was found in disk cache during an
        I/O operation
    transactions:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: Number of terminal transactions (read followed by write) in active
        measurements on this CPU
    response_time:
      queryable: true
      type: integer
      unit: microseconds
      counter_type: Response-time
      description: Cumulative terminal response time; RATE ON → avg response time
        per transaction
    comp_traps:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: Number of compatibility mode traps (data misalignment, unexpected
        TNS/native transitions)
    native_busy_time:
      queryable: true
      type: integer
      unit: microseconds
      counter_type: Busy
      description: Time CPU was busy executing native (TNS/E) code; only valid when
        PROCESSH measurement is active
    accel_busy_time:
      queryable: true
      type: integer
      unit: microseconds
      counter_type: Busy
      description: Time CPU was busy executing accelerated code; only valid when PROCESSH
        measurement is active
    tns_busy_time:
      queryable: true
      type: integer
      unit: microseconds
      counter_type: Busy
      description: Time CPU was busy executing TNS code; only valid when PROCESSH
        measurement is active
    interrupts:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: Number of hardware interrupts processed by this process
    page_requests:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: Number of times memory manager was invoked to obtain a page frame
        (CLOCK:CALLS in PEEK)
    page_scans:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: Number of page frames examined by memory manager to find a replaceable
        page
    mm_page_scans:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: Memory manager background page scans not caused by demand; does
        not indicate a performance problem
    starting_free_mem:
      queryable: true
      type: integer
      counter_type: Snapshot
      description: Free memory frames at interval start
    ending_free_mem:
      queryable: true
      type: integer
      counter_type: Snapshot
      description: Free memory frames at interval end
    starting_ucme:
      queryable: true
      type: integer
      counter_type: Snapshot
      description: Uncorrectable Memory Error (UCME) frames at interval start; not
        valid for H-series and later
    ending_ucme:
      queryable: true
      type: integer
      counter_type: Snapshot
      description: Uncorrectable Memory Error (UCME) frames at interval end; not valid
        for H-series and later
    starting_ucl:
      queryable: true
      type: integer
      counter_type: Snapshot
      description: User process code and library segment frames in physical memory
        at interval start
    ending_ucl:
      queryable: true
      type: integer
      counter_type: Snapshot
      description: User process code and library segment frames in physical memory
        at interval end
    starting_scl:
      queryable: true
      type: integer
      counter_type: Snapshot
      description: System process code and library segment frames in physical memory
        at interval start
    ending_scl:
      queryable: true
      type: integer
      counter_type: Snapshot
      description: System process code and library segment frames in physical memory
        at interval end
    starting_free_cids:
      queryable: true
      type: integer
      counter_type: Snapshot
      description: Counter ID control blocks available for new counter records at
        interval start
    ending_free_cids:
      queryable: true
      type: integer
      counter_type: Snapshot
      description: Counter ID control blocks available for new counter records at
        interval end
    unsp_pages_qtime:
      queryable: true
      type: integer
      unit: microseconds
      counter_type: Queue
      description: Time unsponsored shared pages spent in main memory (G05+); RATE
        ON → AQL
    unsp_pages_start:
      queryable: true
      type: integer
      counter_type: Snapshot
      description: Number of unsponsored pages at interval start
    unsp_pages_end:
      queryable: true
      type: integer
      counter_type: Snapshot
      description: Number of unsponsored pages at interval end
    link_prepush_msgs:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: 'H/J: messages transferred to another CPU using prepush protocol;
        L: requests via Send operation'
    link_readlink_msgs:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: 'H/J: messages within readlinkcache size not using prepush; L:
        replies received from another CPU'
    link_large_msgs:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: 'H/J: messages exceeding readlinkcache size; L: requests where
        data pulled via IB RDMA Read'
    readlinkcache_all:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: 'H/J: received messages with both control and data cached; L: received
        requests fully cached'
    readlinkcache_ctrl:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: 'H/J: received messages with only control bytes cached; L: received
        requests with only control cached'
    readlinkcache_none:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: 'H/J: received messages with no bytes cached; L: replies transferred
        via RDMA Write'
    replyctrlcache_msgs:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: 'H/J: message replies with control in interrupt packet; L: replies
        via Send operation'
    processh_samples:
      queryable: true
      type: integer
      counter_type: Sampling
      description: Raw count of PROCESSH sampling interrupts in this CPU; 0 if no
        PROCESSH measurement active; for NSMA = aggregate across all IPUs
    starting_timer_cells:
      queryable: true
      type: integer
      counter_type: Snapshot
      description: Instrumentation timer cells in use at interval start
    ending_timer_cells:
      queryable: true
      type: integer
      counter_type: Snapshot
      description: Instrumentation timer cells in use at interval end
    locked_pages_qtime:
      queryable: true
      type: integer
      unit: microseconds
      counter_type: Queue
      description: Reserved for future use (H06/J04+)
    locked_pages_start:
      queryable: true
      type: integer
      counter_type: Snapshot
      description: Page frames locked in main memory at interval start â€” aggregate
        for all processes in CPU (H06/J04+; valid when subsystem_version >= 3)
    locked_pages_end:
      queryable: true
      type: integer
      counter_type: Snapshot
      description: Page frames locked in main memory at interval end â€” aggregate
        for all processes in CPU (H06/J04+; valid when subsystem_version >= 3)
    ipu[n].ipu_busy_time:
      queryable: true
      type: integer
      unit: microseconds
      counter_type: Busy
      description: Time IPU N was busy; N = 0..15; RATE ON → % of interval
    ipu[n].ipu_qtime:
      queryable: true
      type: integer
      unit: microseconds
      counter_type: Queue
      description: Time processes waited on IPU N ready queue; RATE ON → AQL
    ipu[n].ipu_dispatches:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: Number of process dispatches on IPU N
    svnet[n].read_requests:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: Transfers initiated by this CPU that brought data INTO CPU N; N
        = 0..15
    svnet[n].write_requests:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: Transfers initiated by this CPU that sent data OUT FROM CPU N (writes
        + message sends)
    svnet[n].read_bytes:
      queryable: true
      type: integer
      unit: bytes
      counter_type: Accumulating
      description: Bytes transferred by read requests for CPU N
    svnet[n].write_bytes:
      queryable: true
      type: integer
      unit: bytes
      counter_type: Accumulating
      description: Bytes transferred by write requests for CPU N
  formulas:
  - formula: CPU-BUSY-TIME = ACCEL-BUSY-TIME + TNS-BUSY-TIME + TNSR-BUSY-TIME + INTR-BUSY-TIME
    description: CPU-BUSY-TIME on TNS/R systems is the sum of ACCEL-BUSY-TIME, TNS-BUSY-TIME,
      TNSR-BUSY-TIME, and INTR-BUSY-TIME.
  - formula: CPU-BUSY-TIME = SUM(all IPU-BUSY-TIMEs)
    description: On NSMA systems with REPORT RATE OFF, CPU-BUSY-TIME is the sum of
      all the IPU-BUSY-TIMEs.
  - CPU-BUSY-TIME on TNS/R systems is the sum of ACCEL-BUSY-TIME, TNS-BUSY-TIME, TNSR-BUSY-TIME,
    and INTR-BUSY-TIME.
  - On NSMA systems with REPORT RATE OFF, CPU-BUSY-TIME is the sum of all the IPU-BUSY-TIMEs.
  business_rules:
  - rule: Active reads use allocation timestamps (time of CPU reload) rather than
      measurement start timestamps to calculate delta times and RATE ON values.
  - rule: Dynamically changing the number of enabled IPUs/CPU during an active measurement
      causes Measure to automatically stop and restart the measurement.
  - rule: The sum of page frames reported as locked in all PROCESS entities for a
      CPU does not need to equal the page frames reported as locked in the corresponding
      CPU entity.
  - rule: A page frame is locked when it is made present in memory and marked to keep
      it present.
  - rule: A locked page frame becomes unlocked when all marks are removed or when
      it is de-allocated.
  - Active reads use allocation timestamps (time of CPU reload) rather than measurement
    start timestamps to calculate delta times and RATE ON values.
  - Dynamically changing the number of enabled IPUs/CPU during an active measurement
    causes Measure to automatically stop and restart the measurement.
  - The sum of page frames reported as locked in all PROCESS entities for a CPU does
    not need to equal the page frames reported as locked in the corresponding CPU
    entity.
  - A page frame is locked when it is made present in memory and marked to keep it
    present.
  - A locked page frame becomes unlocked when all marks are removed or when it is
    de-allocated.
  interpretations:
  - condition: MEM-QTIME > 0
    meaning: MEM-QTIME is always zero in Measure G05 and later PVUs because a process
      no longer remains active in the ready list timer.
  - condition: High CPU-QLEN-MAX
    meaning: CPU-QLEN-MAX is initialized only at system load, generally reflecting
      a one-time, very long CPU queue.
  - condition: 32-bit field = -1 (overflow)
    meaning: For 32-bit byte-count fields, a value of -1 indicates an overflow condition,
      and the corresponding 64-bit field returns the correct value.
  - MEM-QTIME is always zero in Measure G05 and later PVUs because a process no longer
    remains active in the ready list timer.
  - CPU-QLEN-MAX is initialized only at system load, generally reflecting a one-time,
    very long CPU queue.
  - For 32-bit byte-count fields, a value of -1 indicates an overflow condition, and
    the corresponding 64-bit field returns the correct value.
  relationships:
  - source: PROCESS CPU-BUSY-TIME
    target: CPU CPU-BUSY-TIME
    relationship: PROCESS CPU-BUSY-TIME measures the time spent executing specific
      processes within a CPU.
  - source: PROCESS CPU-NUM
    target: CPU CPU-NUM
    relationship: PROCESS CPU-NUM identifies the CPU executing the process.
  - PROCESS CPU-BUSY-TIME measures the time spent executing specific processes within
    a CPU.
  - PROCESS CPU-NUM identifies the CPU executing the process.
  sql_generation_guidance:
  - guidance: When retrieving data for 32-bit byte-count fields (like DISC-IOS), queries
      should check for -1 to handle overflow and use the 64-bit field instead.
  - When retrieving data for 32-bit byte-count fields (like DISC-IOS), queries should
    check for -1 to handle overflow and use the 64-bit field instead.
  reporting_guidance:
  - guidance: With REPORT RATE ON and STYLE ZMS on NSMA systems, the maximum value
      of CPU-BUSY-TIME is 100% where it approaches the AVERAGE of all IPU-BUSY-TIMEs.
  - guidance: With REPORT RATE ON and STYLE LEGACY on NSMA systems, the maximum value
      of CPU-BUSY-TIME is the Number of IPUs multiplied by 100%.
  - guidance: If TOTALS records with RATE ON are requested after a change in enabled
      IPUs/CPU takes place, the values will not be reliable.
  - guidance: If the PROCESSH sample count is unchanged from the start to the end
      of a measurement interval, NATIVE-BUSY-TIME, ACCEL-BUSY-TIME, and TNS-BUSY-TIME
      fields will not be displayed.
  - With REPORT RATE ON and STYLE ZMS on NSMA systems, the maximum value of CPU-BUSY-TIME
    is 100% where it approaches the AVERAGE of all IPU-BUSY-TIMEs.
  - With REPORT RATE ON and STYLE LEGACY on NSMA systems, the maximum value of CPU-BUSY-TIME
    is the Number of IPUs multiplied by 100%.
  - If TOTALS records with RATE ON are requested after a change in enabled IPUs/CPU
    takes place, the values will not be reliable.
  - If the PROCESSH sample count is unchanged from the start to the end of a measurement
    interval, NATIVE-BUSY-TIME, ACCEL-BUSY-TIME, and TNS-BUSY-TIME fields will not
    be displayed.
  counter_classifications:
  - counter: CPU-QLEN-MAX
    type: Max queue
  - CPU-QLEN-MAX is a Max queue counter.
  thresholds: []
disc:
  ddl_record: ZMSDISC
  entity_type: DISC (Disk Device)
  purpose: 'Per-disk performance metrics for all disk devices. Captures I/O activity,
    queue times, free space, and per-cache-level statistics for each disk volume.
    DISC capacity information is only available from the primary DP2 process records.

    '
  identity_columns:
  - system_name
  - cpu_num
  - device_name
  time_columns:
  - from_timestamp
  - to_timestamp
  - delta_time
  join_hints:
  - JOIN cpu ON (system_name, cpu_num, from_timestamp) for CPU context
  - JOIN dfile ON (system_name, device_name, from_timestamp) for file-level activity
  columns:
    u_loadid.loadid:
      queryable: false
      description: Used only for structured files. If the LOADID clause of the MEASCOM
        LIST command is used when this record is written to the structured file, this
        field contains a unique identification string for the record.
      type: integer
    u_loadid.load_id.prefix_id:
      queryable: false
      description: Prefix portion of the user-provided LOADID string.
      type: integer
    u_loadid.load_id.interval_id:
      queryable: false
      description: Interval sequence number appended to the LOADID string.
      type: integer
    system_name:
      queryable: true
      type: string
      description: NonStop node name
    cpu_num:
      queryable: true
      type: integer
      description: CPU number managing this disk
    os_version.letter:
      queryable: true
      type: string
      description: Operating system release letter when the measurement was taken.
    os_version.number:
      queryable: true
      type: string
      description: Operating system release number when the measurement was taken.
    object_uid:
      queryable: false
      description: Unique object identifier for the record (ZMS Style only; reserved
        for future use).
      type: integer
    from_timestamp:
      queryable: true
      type: datetime
      description: Starting time of the measurement interval, represented as an ISO
        8601 extended format local timestamp.
    to_timestamp:
      queryable: true
      type: datetime
      description: Ending time of the measurement interval, represented as an ISO
        8601 extended format local timestamp.
    delta_time:
      queryable: true
      type: integer
      unit: microseconds
      description: Duration of the measurement interval, in microseconds.
    template_version:
      queryable: false
      description: Record template version from MEASDDLS for the format of the external
        record.
      type: integer
    format_version.letter:
      queryable: false
      description: Format version letter of the formatting program or formatted record.
      type: string
    format_version.number:
      queryable: false
      description: Format version number of the formatting program or formatted record.
      type: integer
    data_version.letter:
      queryable: false
      description: Data version letter of the collected data file.
      type: string
    data_version.number:
      queryable: false
      description: Data version number of the collected data file.
      type: integer
    subsystem_version:
      queryable: false
      description: Provided by DP2
      type: integer
    error:
      queryable: false
      description: Error code indicating whether an error prevented data collection
        or record writing for this entity.
      type: integer
    pin:
      queryable: true
      type: integer
      description: Process Identification Number of the disk process
    device_type:
      queryable: true
      type: integer
      description: Disk device type; value 3 = disk volume
    device_subtype:
      queryable: true
      type: integer
      description: Additional identifier for device_type; see System Generation Manual
    u_fabric.fabric:
      queryable: false
      description: ServerNet fabric (0=X, 1=Y); internal use
      type: integer
    u_fabric.servernet:
      queryable: false
      description: Redefines fabric field
      type: integer
    device_name:
      queryable: true
      type: string
      description: Disk device name (e.g. $DATA01, $SYSTEM)
    logical_device:
      queryable: true
      type: integer
      description: Logical device number
    gms.group:
      queryable: true
      type: integer
      description: GMS group number (physical enclosure); use in IF/BY clauses
    gms.module:
      queryable: true
      type: integer
      description: GMS module number; use in IF/BY clauses
    gms.slot:
      queryable: true
      type: integer
      description: GMS slot number; use in IF/BY clauses
    u_scsi_id.plpt.plpt_flags:
      queryable: false
      description: 'PLPT flags: MEAS_CLIM_REL, MEAS_PATH_SEL, MEAS_CLIM_DEVICE, MEAS_MULTIPLE_CLIMS'
      type: integer
    u_scsi_id.plpt.path:
      queryable: true
      type: integer
      description: Connection path (0=Primary, 1=Backup, 2=Mirror, 3=Mirror-Backup)
    u_scsi_id.plpt.lun:
      queryable: true
      type: integer
      description: Logical Unit Number within a CLIM (0-65534); 0 for non-CLIM
    u_scsi_id.plpt.partition:
      queryable: true
      type: integer
      description: Partition number within a partitioned disk (H06.23/J06.12+)
    u_scsi_id.plpt.target_id:
      queryable: true
      type: integer
      description: SCSI device ID (0-999); 0 for CLIM devices
    config_name:
      queryable: true
      type: string
      description: Logical name of the physical disk from system configuration database;
        null-terminated
    adapter_name:
      queryable: true
      type: string
      description: Logical name of the adapter containing the SAC; null-terminated
    sac_name:
      queryable: true
      type: string
      description: Logical name of the SAC or CLIM name; null-terminated
    capacity:
      queryable: true
      type: integer
      unit: bytes
      description: Disk volume capacity in bytes; use in IF/BY clauses
    storage_pool:
      queryable: true
      type: string
      description: SMF storage pool process name
    disc_process_type:
      queryable: true
      type: integer
      description: Disk process type (DP2)
    request_qtime:
      queryable: true
      type: integer
      unit: microseconds
      counter_type: Queue
      derived_formula: "request_qtime / NULLIF(requests, 0) / 1000.0 (returns ART in ms)"
      description: 'Time I/O requests spent on the disk process internal queue including
        active requests; RATE ON → AQL. NOTE: includes lock wait time'
    requests:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: Number of I/O requests (READ, WRITE, FILEINFO) received by the
        disk process
    reads:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: Number of physical read operations from disk to memory
    writes:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: Number of physical write operations from memory to disk
    input_bytes:
      queryable: true
      type: integer
      unit: bytes
      counter_type: Accumulating
      description: Bytes read from disk
    output_bytes:
      queryable: true
      type: integer
      unit: bytes
      counter_type: Accumulating
      description: Bytes written to disk
    swaps:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: Number of swap I/O operations; advanced per I/O (may exceed CPU
        swaps)
    control_points:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: Number of times disk process wrote a TMF control point record to
        its audit-trail file
    control_point_writes:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: Number of dirty cache blocks written to disk at TMF control points
    free_space_ios:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: Number of I/O operations to the disk free space table
    requests_blocked:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: Number of times an operation waited because the requested file
        or record was locked
    starting_free_space:
      queryable: true
      type: integer
      unit: bytes
      counter_type: Snapshot
      description: Free disk space at interval start; primary path record only
    ending_free_space:
      queryable: true
      type: integer
      unit: bytes
      counter_type: Snapshot
      description: Free disk space at interval end; primary path record only
    starting_free_blocks:
      queryable: true
      type: integer
      counter_type: Snapshot
      description: Free entries in the free space table at interval start; primary
        path record only
    ending_free_blocks:
      queryable: true
      type: integer
      counter_type: Snapshot
      description: Free entries in the free space table at interval end; primary path
        record only
    volsem_qtime:
      queryable: true
      type: integer
      unit: microseconds
      counter_type: Queue
      description: Time requests waited for the volume semaphore (exclusive and shared
        modes); RATE ON → AQL
    read_qbusy_time:
      queryable: true
      type: integer
      unit: microseconds
      counter_type: Queue-Busy
      description: Time the read queue was non-empty; RATE ON → %
    read_qtime:
      queryable: true
      type: integer
      unit: microseconds
      counter_type: Queue
      description: Total time spent by read requests queued to this disk; RATE ON
        → AQL
    write_qbusy_time:
      queryable: true
      type: integer
      unit: microseconds
      counter_type: Queue-Busy
      description: Time the write queue was non-empty; RATE ON → %
    write_qtime:
      queryable: true
      type: integer
      unit: microseconds
      counter_type: Queue
      description: Total time spent by write requests queued to this disk; RATE ON
        → AQL
    device_qbusy_time:
      queryable: true
      type: integer
      unit: microseconds
      counter_type: Queue-Busy
      derived_formula: "device_qbusy_time / NULLIF(reads + writes, 0) / 1000.0 (returns AST in ms)"
      description: 'Time any requests were queued to this disk; RATE ON → %. NOTE:
        does NOT equal read_qbusy_time + write_qbusy_time due to concurrency'
    dbio_reads:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: Read operations enabled for direct bulk I/O; subset of reads
    dbio_writes:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: Write operations enabled for direct bulk I/O; subset of writes
    defreqs:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: Number of requests subject to deferral (mixed workload algorithm);
        subset of requests
    defreq_qtime:
      queryable: true
      type: integer
      unit: microseconds
      counter_type: Queue
      description: Time deferrable requests spent on the disk process internal queue;
        subset of request_qtime
    deferred_qtime:
      queryable: true
      type: integer
      unit: microseconds
      counter_type: Queue
      description: Time requests subject to deferral actually spent deferred; subset
        of defreq_qtime
    c[n].blks:
      queryable: true
      type: integer
      counter_type: Snapshot
      description: Total cache blocks allocated for level N; N = 0..7
    c[n].block_size:
      queryable: true
      type: integer
      unit: bytes
      counter_type: Snapshot
      description: Cache block size for level N in bytes
    c[n].blocks_inuse_start:
      queryable: true
      type: integer
      counter_type: Snapshot
      description: Cache blocks in use at interval start for level N
    c[n].blocks_inuse_end:
      queryable: true
      type: integer
      counter_type: Snapshot
      description: Cache blocks in use at interval end for level N
    c[n].block_splits:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: Number of block splits per block size for level N
    c[n].hits:
      queryable: true
      type: integer
      counter_type: Incrementing
      derived_formula: "c[n]_hits * 100.0 / NULLIF(c[n]_hits + c[n]_misses, 0) (returns Hit Ratio %)"
      description: Cache hits for level N on read or buffered write; hits/(hits+misses)
        = hit ratio
    c[n].misses:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: Cache misses for level N on read operations; causes a disk I/O
    c[n].faults:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: Cache faults for level N â€” block indicated in cache but stolen
        by memory manager; >5% of I/Os indicates need for more memory
    c[n].audit_buf_forces:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: Times disk process had to write to audit-trail before freeing a
        dirty cache block; should be near zero
    c[n].blks_dirty_qtime:
      queryable: true
      type: integer
      unit: microseconds
      counter_type: Queue
      description: Time cache blocks spent dirty for level N; RATE ON → AQL
    c[n].write_cleans:
      queryable: true
      type: integer
      counter_type: Accumulating
      description: Times a write found the required block clean in cache for level
        N; saves a disk read per write
    c[n].write_dirtys:
      queryable: true
      type: integer
      counter_type: Accumulating
      description: Times a write found the required block dirty in cache for level
        N
    c[n].write_misses:
      queryable: true
      type: integer
      counter_type: Accumulating
      description: Times a write did not find the required block in cache for level
        N; requires a disk read before write
  counter_classifications:
  - counter: REQUEST-ART
    type: Average response time
  - counter: DISC-BUSY-TIME
    type: Busy counter
  - counter: DISC-RATE
    type: Incrementing counter
  formulas:
  - formula: REQUEST-ART = REQUEST-QTIME / REQUESTS
    description: Calculates the average response time each request spends waiting
      or being processed by DP2.
  - formula: DISC-BUSY-TIME = WRITE-BUSY-TIME + READ-BUSY-TIME
    description: Calculates disk busy time in legacy D-series RVUs. Do not use for
      G-series and later.
  - formula: DISC-RATE = READ operations + WRITE operations
    description: Combined rate of READ and WRITE operations to the physical drive.
  interpretations:
  - condition: High ratio between deferrable q-time (DEFREQ-QTIME) and deferred q-time
      (DEFERRED-QTIME)
    meaning: The SQL query requires too much time to complete.
  - condition: Low ratio between deferrable q-time (DEFREQ-QTIME) and deferred q-time
      (DEFERRED-QTIME) during low-priority SQL query activity
    meaning: Response time for high-priority workloads increases significantly.
  - condition: 32-bit byte-count field returns -1
    meaning: The field overflowed. The corresponding 64-bit field (-F) should be used
      instead to get the correct value.
  thresholds:
  - metric: DEFREQ-QTIME / DEFERRED-QTIME
    threshold: Variable
    interpretation: Priority adjustments for the SQL query should correspond to changes
      in this ratio to control the impact of low-priority SQL queries on high-priority
      workloads.
  business_rules:
  - rule: Whenever there is a cache resize, the corresponding DISC measurement is
      restarted and a new set of primary and backup disk records are generated.
  - rule: Whenever there is a path switch, a new set of primary disk records are created
      for those processes. The old primary disk records will not be updated.
  - rule: DISC Capacity information is only available from the primary DP2 process
      DISC records. It is usually not available in the backup DP2 process records
      unless it acts as primary during measurement.
  - rule: Logical device numbers are determined dynamically at system startup for
      G-series and later RVUs and are likely to change.
  - rule: Measure does not measure SMF virtual disk processes (VDPs) as DISC entities.
  relationships:
  - source: Direct bulk I/O requests (DBIO-READS, DBIO-WRITES)
    target: Standard I/O counters (READS, WRITES, READ-QTIME, INPUT-BYTES, READ-QBUSY-TIME)
    relationship: Direct bulk I/O requests update and are included in the standard
      I/O counters.
  sql_generation_guidance:
  - guidance: To measure device-busy time on G-series and later, use DEVICE-QBUSY-TIME.
      Do not calculate it by adding READ-QBUSY-TIME and WRITE-QBUSY-TIME due to concurrency.
  - guidance: If a 32-bit field (e.g. INPUT-BYTES) returns -1, it indicates an overflow.
      Queries should use the 64-bit counterpart (e.g. INPUT-BYTES-F in legacy) for
      accurate values.
  - guidance: Do not group or join using logical device numbers on G-series and later
      systems as they change dynamically.
  reporting_guidance:
  - guidance: Use DISC counters to compare and balance the workload of two or more
      disks.
  - guidance: The DISC counters track all disk activity, including file activity and
      internal activities such as writing to the free space table, writing to the
      undo area, and writing file and volume labels.
  - guidance: In output displays and reports, use the names of the 32-bit fields,
      even if 64-bit fields are used for internal collection.
dfile:
  ddl_record: ZMSDFILE
  entity_type: DFILE (Disk File â€” DISKFILE entity)
  purpose: 'Per-file performance metrics for all opener processes on a specified disk
    file. DISKFILE creates one counter record per measured file and does not track
    individual opener processes. Creates a new record if a file closes and reopens
    during measurement.

    '
  identity_columns:
  - system_name
  - cpu_num
  - file_name.volume
  - file_name.subvol
  - file_name.filename
  time_columns:
  - from_timestamp
  - to_timestamp
  - delta_time
  join_hints:
  - JOIN disc ON (system_name, cpu_num, device_name, from_timestamp) for disk context
  - JOIN dopen ON (system_name, cpu_num, fcb_number, from_timestamp) for per-opener
    detail
  columns:
    u_loadid.loadid:
      queryable: false
      description: Used only for structured files. If the LOADID clause of the MEASCOM
        LIST command is used when this record is written to the structured file, this
        field contains a unique identification string for the record.
      type: integer
    u_loadid.load_id.prefix_id:
      queryable: false
      description: Prefix portion of the user-provided LOADID string.
      type: integer
    u_loadid.load_id.interval_id:
      queryable: false
      description: Interval sequence number appended to the LOADID string.
      type: integer
    system_name:
      queryable: true
      type: string
      description: Name of the system on which the measurement was taken.
    cpu_num:
      queryable: true
      type: integer
      description: Number of the CPU on which the measurement was taken.
    os_version.letter:
      queryable: true
      type: string
      description: Operating system release letter when the measurement was taken.
    os_version.number:
      queryable: true
      type: string
      description: Operating system release number when the measurement was taken.
    object_uid:
      queryable: false
      description: Unique object identifier for the record (ZMS Style only; reserved
        for future use).
      type: integer
    from_timestamp:
      queryable: true
      type: datetime
      description: Starting time of the measurement interval, represented as an ISO
        8601 extended format local timestamp.
    to_timestamp:
      queryable: true
      type: datetime
      description: Ending time of the measurement interval, represented as an ISO
        8601 extended format local timestamp.
    delta_time:
      queryable: true
      type: integer
      unit: microseconds
      description: Duration of the measurement interval, in microseconds.
    template_version:
      queryable: false
      description: Record template version from MEASDDLS for the format of the external
        record.
      type: integer
    format_version.letter:
      queryable: false
      description: Format version letter of the formatting program or formatted record.
      type: string
    format_version.number:
      queryable: false
      description: Format version number of the formatting program or formatted record.
      type: integer
    data_version.letter:
      queryable: false
      description: Data version letter of the collected data file.
      type: string
    data_version.number:
      queryable: false
      description: Data version number of the collected data file.
      type: integer
    subsystem_version:
      queryable: false
      description: Subsystem version number. 1 for initial H-series/J-series and later.
        0 in G-series.
      type: integer
    error:
      queryable: false
      description: Error code indicating whether an error prevented data collection
        or record writing for this entity.
      type: integer
    fcb_number:
      queryable: true
      type: integer
      description: File Control Block number â€” internal to the disk process
    file_type:
      queryable: true
      type: integer
      description: 'File type: 0=unstructured, 1=relative, 2=entry-sequenced, 3=key-sequenced'
    file_code:
      queryable: true
      type: integer
      description: Three-digit system file code (e.g. 100=object, 101=edit)
    format:
      queryable: true
      type: integer
      description: 'File format: 1=format 1, 2=format 2 (for files >2GB or large extents)'
    file_name.volume:
      queryable: true
      type: string
      description: Volume component of the file name (e.g. $DATA01)
    file_name.subvol:
      queryable: true
      type: string
      description: Subvolume component of the file name
    file_name.filename:
      queryable: true
      type: string
      description: Filename component
    device_name:
      queryable: true
      type: string
      description: Disk device name hosting this file; for SMF files = physical location
    storage_pool:
      queryable: true
      type: string
      description: SMF storage pool process name
    file_name_mid.pathid:
      queryable: false
      description: Internal OSS/SQL MID PATHID; zeros for non-OSS/SQL files
      type: string
    file_name_mid.crvsn:
      queryable: false
      description: Creation Version Serial Number for OSS/SQL files; zeros for others
      type: integer
    starting_eof:
      queryable: true
      type: integer
      unit: bytes
      counter_type: Snapshot
      description: EOF position at interval start; not displayed by MEASCOM but available
        for IF/BY
    ending_eof:
      queryable: true
      type: integer
      unit: bytes
      counter_type: Snapshot
      description: EOF position at interval end; displayed with ratio ending_eof/starting_eof
    transient_opens:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: Number of opens that occurred during the measurement period
    open_qtime:
      queryable: true
      type: integer
      unit: microseconds
      counter_type: Queue
      description: Time for all opens of this file including transient opens; RATE
        ON → AQL
    driver_input_calls:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: Number of read operations (cache hits + misses); physical reads
        = driver_input_calls - cache_read_hits
    driver_output_calls:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: Number of write operations; physical writes = driver_output_calls
        - cache_write_hits (for small writes)
    cache_read_hits:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: Times a read found the required block in cache; saves a disk I/O
    cache_write_hits:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: Times a write found the required block dirty in cache
    cache_write_cleans:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: Times a write found the required block clean in cache; saves a
        disk read per write
    requests:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: Total I/O requests for this file
    requests_blocked:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: Times an I/O operation waited because the requested file or record
        was locked
    lockwait_time:
      queryable: true
      type: integer
      unit: microseconds
      counter_type: Lockwait
      description: Cumulative time waiting for locks; RATE ON → avg wait per blocked
        request
    max_lockwait_time:
      queryable: true
      type: integer
      unit: microseconds
      counter_type: Max value
      description: Maximum wait time per lock; use as guide for timeout value; unaffected
        by RATE
    lock_timeouts:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: Number of lock timeout events (error 40)
    lock_bounces:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: Number of bounced locks (FELOCKED/error 73) returned to the file
        system
    block_splits:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: Number of B-tree block splits during writes; keep to minimum
    extent_allocations:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: Number of times a file extent was allocated
    dbio_input_calls:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: Direct bulk I/O read operations; subset of driver_input_calls
    dbio_output_calls:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: Direct bulk I/O write operations; subset of driver_output_calls
    sql_inserts:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: Number of SQL INSERT row operations
    sql_updates:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: Number of SQL UPDATE row operations
    sql_deletes:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: Number of SQL DELETE row operations
    starting_rows:
      queryable: true
      type: integer
      counter_type: Snapshot
      description: Row count at interval start; valid only if table had zero rows
        at some point since file open
    ending_rows:
      queryable: true
      type: integer
      counter_type: Snapshot
      description: Row count at interval end; valid only if table had zero rows at
        some point since file open
    oss_block_writes:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: Block write operations issued by DP2 for the OSS file system
    oss_block_write_bytes:
      queryable: true
      type: integer
      unit: bytes
      counter_type: Accumulating
      description: Bytes written by DP2 as a result of oss_block_writes
    oss_cache_callbacks:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: Cache callback requests sent by DP2 to the OSS file manager
    oss_callback_writes:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: OSS block writes received by DP2 as a result of oss_cache_callbacks
  thresholds: []
  counter_classifications:
  - counter: BLOCK-SPLITS
    type: Incrementing
  - counter: CACHE-READ-HITS
    type: Incrementing
  - counter: CACHE-WRITE-CLEANS
    type: Incrementing
  - counter: CACHE-WRITE-HITS
    type: Incrementing
  - counter: DBIO-INPUT-CALLS
    type: Incrementing
  - counter: DBIO-OUTPUT-CALLS
    type: Incrementing
  - counter: DRIVER-INPUT-CALLS
    type: Incrementing
  - counter: DRIVER-OUTPUT-CALLS
    type: Incrementing
  - counter: ENDING-EOF
    type: Snapshot
  - counter: ENDING-ROWS
    type: Snapshot
  - counter: EXTENT-ALLOCATIONS
    type: Incrementing
  - counter: LOCK-BOUNCES
    type: Incrementing
  - counter: LOCK-TIMEOUTS
    type: Incrementing
  - counter: LOCKWAIT-TIME
    type: Lockwait
  - counter: MAX-LOCKWAIT-TIME
    type: Max value
  - counter: OPEN-QTIME
    type: Queue
  - counter: OSS-BLOCK-WRITE-BYTES
    type: Accumulating
  - counter: OSS-BLOCK-WRITES
    type: Incrementing
  - counter: OSS-CACHE-CALLBACKS
    type: Incrementing
  - counter: OSS-CALLBACK-WRITES
    type: Incrementing
  - counter: REQUESTS
    type: Incrementing
  - counter: REQUESTS-BLOCKED
    type: Incrementing
  - counter: SQL-DELETES
    type: Incrementing
  - counter: SQL-INSERTS
    type: Incrementing
  - counter: SQL-UPDATES
    type: Incrementing
  - counter: STARTING-EOF
    type: Snapshot
  - counter: STARTING-ROWS
    type: Snapshot
  - counter: TRANSIENT-OPENS
    type: Incrementing
  - counter: OPEN-QLEN-MAX
    type: Max queue
    notes: Legacy Style only
  formulas:
  - description: Physical Reads (Standard)
    formula: DRIVER-INPUT-CALLS - CACHE-READ-HITS
  - description: Physical Reads (Prefetch operation for a given volume)
    formula: ((CACHE-READ-HITS + DISC-READS) - DRIVER-INPUT-CALLS)
    notes: DRIVER-INPUT-CALLS and CACHE-READ-HITS are from DISKFILE entity and DISC-READS
      is from FILE entity
  - description: Physical Writes (writes <= 4096 bytes and structured files)
    formula: DRIVER-OUTPUT-CALLS - CACHE-WRITE-HITS
  - description: Physical Writes (large writes > 4096 bytes to unstructured files)
    formula: DRIVER-OUTPUT-CALLS - (CACHE-WRITE-HITS + CACHE-WRITE-CLEANS)
  - description: Average Wait Time per blocked request (when REPORT RATE is ON)
    formula: LOCKWAIT-TIME / REQUESTS-BLOCKED
  - description: Ratio of EOF
    formula: ENDING-EOF / STARTING-EOF
  interpretations:
  - counter: CACHE-READ-HITS
    description: A cache read hit saves a disk I/O.
  - counter: CACHE-WRITE-HITS
    description: A write to a dirty block saves a write I/O operation.
  - counter: DBIO-INPUT-CALLS
    description: Direct bulk I/O read operations; a subset of DRIVER-INPUT-CALLS.
  - counter: DBIO-OUTPUT-CALLS
    description: Direct bulk I/O write operations; a subset of DRIVER-OUTPUT-CALLS.
  - counter: LOCK-BOUNCES
    description: For SQL tables, a bounced lock is a result of the CONTROL TABLE command
      with the RETURN-IF-LOCKED control option. For Enscribe files, a bounced lock
      is a result of the SETMODE 4 function with Param.<15> = 1 (alternate lock mode).
  - counter: LOCK-TIMEOUTS
    description: Advanced when a timeout value for a request expires, the file system
      sends a cancel request to the disk process, and the disk process finds the request
      still waiting for a lock.
  - counter: MAX-LOCKWAIT-TIME
    description: Use this number as a guide to set the timeout value in the application.
      REPORT RATE ON has no effect on this counter value.
  business_rules:
  - rule: DISKFILE measures disk file access collectively for a file as a whole and
      does not track individual opener processes (creates one record per measured
      file).
  - rule: Both DISCOPEN and DISKFILE create a new record if a file closes and reopens
      during a measurement.
  - rule: DISKFILE does not create a separate record for indirect opens (e.g., alternate-key
      file), unlike DISCOPEN.
  - rule: In writes to mirrored disks, the request counts are incremented once even
      though two physical writes occurred.
  - rule: 'Format 2 files are used when: unpartitioned file or partition exceeds 2
      GB - 1 MB; non-key-sequenced partitioned file >= 4 GB; extent size > 65535 pages.'
  - rule: STARTING-ROWS and ENDING-ROWS are valid only if the SQL table had zero rows
      at some time since the file open.
  relationships:
  - from_entity: DISKFILE
    to_entity: FILE
    relationship: Derivation of prefetch physical reads requires DISC-READS from the
      FILE entity.
  - from_entity: DISKFILE
    to_entity: DISCOPEN
    relationship: DISKFILE reduces data volume for high-level analysis; DISCOPEN provides
      detailed view tracking individual openers and indirect opens.
  sql_generation_guidance:
  - guidance: When tracking SQL queue table rows using STARTING-ROWS or ENDING-ROWS
      (SQL-ENDING-ROWS), external records report -1 until the number of rows has been
      zero at some time. Queries should handle the -1 default value appropriately.
  - guidance: REPORT RATE ON has no effect on MAX-LOCKWAIT-TIME.
  reporting_guidance:
  - guidance: For ENDING-EOF, display the absolute value in bytes, followed by the
      ratio of ENDING-EOF over STARTING-EOF.
dopen:
  ddl_record: ZMSDOPEN
  entity_type: DOPEN (Disk File Open â€” DISCOPEN entity)
  purpose: 'Per-open-instance physical I/O metrics for disk files. Each row represents
    one opener process of a file during an interval. DISCOPEN creates a separate counter
    record for each file open; creates a new record if a file closes and reopens.
    Short-form records (for temp files, edit files, object files) have zero values
    for lockwait_time, max_lockwait_time, lock_timeouts, lock_bounces, cache_write_cleans.

    '
  identity_columns:
  - system_name
  - cpu_num
  - opener_cpu
  - opener_pin
  - ocb_number
  - file_name.volume
  - file_name.subvol
  - file_name.filename
  time_columns:
  - from_timestamp
  - to_timestamp
  - delta_time
  join_hints:
  - JOIN dfile ON (system_name, cpu_num, file_name.*, from_timestamp) for file-level
    totals
  - JOIN proc ON (system_name, opener_cpu, opener_pin, from_timestamp) for opener
    process detail
  columns:
    u_loadid.loadid:
