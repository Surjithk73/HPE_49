    file_number:
      queryable: true
      type: integer
      description: File ACB number within the opener's context
    file_type:
      queryable: true
      type: integer
      description: 'File type from ACB: 0=other, 1=relative, 2=entry-sequenced, 3=key-sequenced
        (MANUAL DEF: File type, from the access control block: ``` 1 Relative file
        2 Entry-sequenced file 3 Key-sequenced file 0 Any other type of file ```.)'
      derived_formula: "##### - ##### - ##### - ``` Diskfile $DATA.ZSD12345.Z1234567\
        \ File Format x ANSI SQL Name \u2018TABLE Catalog_12.Schema_45.Table_56 PARTITION\
        \ Partition_78\u2019 Device Name $DATA Pool Local CPU 0 File Type Key Sequenced\
        \ File Code 550 Format Version: H01 Data Version: H01 Subsystem Version: 1\
        \ Local System \\HURTS From 12 Jan 2003, 19:35:28 For 46.9 Seconds ------------\
        \ File ---------------------------------------------------------- Open-Qtime\
        \ 72.11 ms Transient-Opens Starting-EOF Ending-EOF Extent-Allocations File-Growth-Ratio\
        \ ``` # ENDPOINTENDPOINT The SERVERNET entity has been replaced by ENDPOINT."
      thresholds: '``` # FILE-TYPEFILE-TYPE One of these values, which indicates the
        file type: ``` 0 Unstructured 1 Relative 2 Entry-sequenced 3 Key-sequenced
        ``` # OCB-NUMBEROCB-NUMBER Identification number of the open control block
        (OCB), if less than or equal to 65534. ``` # FILE-TYPEFILE-TYPE One of these
        values, which indicates the type of file to be measured: ``` 0 Unstructured
        1 Relative 2 Entry-sequenced 3 Key-sequenced ``` # STORAGE-POOLSTORAGE-POOL
        Name of the SMF storage pool to which the measured disk is assigned (process
        name of the storage pool process).'
    device_type:
      queryable: true
