    output_bytes_f:
      queryable: true
      type: integer
      description: '(G-series, Legacy Style only) Same as OUTPUT -BYTES but accommodates
        larger values (64 bits rather than 32 bits). Counter type: Accumulating.'
osscpu:
  counter_classifications:
