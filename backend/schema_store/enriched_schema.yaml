      description: Name of the system on which the measurement was taken.
    cpu_num:
      queryable: true
      type: integer
      description: CPU number where the file resides
    os_version.letter:
      queryable: true
      type: string
      description: Operating system release letter when the measurement was taken.
    os_version.number:
      queryable: true
      type: string
      description: Operating system release number when the measurement was taken.
    object_uid:
      queryable: false
      description: Unique object identifier for the record (ZMS Style only; reserved
        for future use).
      type: integer
    from_timestamp:
      queryable: true
      type: datetime
      description: Starting time of the measurement interval, represented as an ISO
        8601 extended format local timestamp.
    to_timestamp:
      queryable: true
      type: datetime
      description: Ending time of the measurement interval, represented as an ISO
        8601 extended format local timestamp.
    delta_time:
      queryable: true
      type: integer
      unit: microseconds
      description: Duration of the measurement interval, in microseconds.
    template_version:
      queryable: false
      description: Record template version from MEASDDLS for the format of the external
        record.
      type: integer
    format_version.letter:
      queryable: false
      description: Format version letter of the formatting program or formatted record.
      type: string
    format_version.number:
      queryable: false
      description: Format version number of the formatting program or formatted record.
      type: integer
    data_version.letter:
      queryable: false
      description: Data version letter of the collected data file.
      type: string
    data_version.number:
      queryable: false
      description: Data version number of the collected data file.
      type: integer
    subsystem_version:
      queryable: false
      description: Subsystem version number. 1 for initial H-series/J-series and later.
        0 in G-series.
      type: integer
    error:
      queryable: false
      description: Error code indicating whether an error prevented data collection
        or record writing for this entity.
      type: integer
    opener_cpu:
      queryable: true
      type: integer
      description: CPU number of the process that opened the file
    opener_pin:
      queryable: true
      type: integer
      description: PIN of the process that opened the file
    ocb_number:
      queryable: true
      type: integer
      description: Open Control Block number; unique per open instance; -1 if value
        exceeds 65534
    file_type:
      queryable: true
      type: integer
      description: 'File type: 0=unstructured, 1=relative, 2=entry-sequenced, 3=key-sequenced'
    opener_system_name:
      queryable: true
      type: string
      description: System name of the opener process
    file_name.volume:
      queryable: true
      type: string
      description: Volume component of the opened file name
    file_name.subvol:
      queryable: true
      type: string
      description: Subvolume component of the opened file name
    file_name.filename:
      queryable: true
      type: string
      description: Filename component of the opened file name
    device_name:
      queryable: true
      type: string
      description: Disk device name hosting the file
    storage_pool:
      queryable: true
      type: string
      description: SMF storage pool process name
    file_name_mid.pathid:
      queryable: false
      description: Internal OSS/SQL MID PATHID
