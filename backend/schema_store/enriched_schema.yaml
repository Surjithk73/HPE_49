# ================================================================
# HPE NonStop Measure â€” Schema Definition
# Source:    Column headers from measurefiles/ CSV exports
# Reference: HPE NonStop Measure Reference Manual (10-180500-Q, Sep 2025)
#            DDL record definitions verified against ZMS-style MEASDDLS
#
# Tables:
#   cpu    â€” CPU-level performance metrics          (ZMSCPU)
#   disc   â€” Disk device I/O + cache metrics        (ZMSDISC)
#   dfile  â€” Disk file (DISKFILE) metrics           (ZMSDFILE)
#   dopen  â€” Disk file open (DISCOPEN) metrics      (ZMSDOPEN)
#   file   â€” File-level I/O per opener              (ZMSFILE)
#   ossns  â€” OSS Name Service metrics               (ZMSOSSNS)
#   proc   â€” Process-level performance metrics      (ZMSPROC)
#   tmf    â€” Transaction Management Facility        (ZMSTMF)
#   udef   â€” User-defined (USERDEF) metrics         (ZMSUDEF)
#
# Notation:
#   {N}  â€” Indexed repeating group (e.g. ipu{N}, svnet{N}, c{N}).
#           Only one representative definition is provided; N varies.
#   Counter types (from manual):
#     Incrementing  â€” event count; RATE ON â†’ /s
#     Accumulating  â€” byte count; RATE ON â†’ /s
#     Busy          â€” time busy; RATE ON â†’ % of interval
#     Queue         â€” total queue time; RATE ON â†’ AQL (avg queue length)
#     Queue-Busy    â€” time queue non-empty; RATE ON â†’ %
#     Snapshot      â€” point-in-time value; unaffected by RATE
#     Response-time â€” cumulative response time; RATE ON â†’ avg per transaction
#     Lockwait      â€” cumulative lock wait; RATE ON â†’ avg per lock
# ================================================================

# ----------------------------------------------------------------
# SHARED HEADER COLUMNS (present in every table)
# ----------------------------------------------------------------
# u_loadid.loadid              â€” Internal Measure composite load ID (non-queryable)
# u_loadid.load_id.prefix_id   â€” Internal Measure load ID prefix (non-queryable)
# u_loadid.load_id.interval_id â€” Internal Measure load ID interval (non-queryable)
# system_name                  â€” NonStop node name (e.g. \KRONOS)
# cpu_num                      â€” CPU number (0-indexed)
# os_version.letter            â€” OS version letter (e.g. J, L)
# os_version.number            â€” OS version number (e.g. 06)
# object_uid                   â€” Reserved for future use (non-queryable)
# from_timestamp               â€” Interval start (Julian LCT)
# to_timestamp                 â€” Interval end (Julian LCT)
# delta_time                   â€” Interval duration in microseconds
# template_version             â€” ZMS record template version from MEASDDLS (non-queryable)
# format_version.letter        â€” MEASFH format version letter (non-queryable)
# format_version.number        â€” MEASFH format version number (non-queryable)
# data_version.letter          â€” Data file version letter (non-queryable)
# data_version.number          â€” Data file version number (non-queryable)
# subsystem_version            â€” Subsystem version supplied by the measured subsystem
# error                        â€” 0=no error; >0=error (no data); <0=warning (data present with caveats)
# ----------------------------------------------------------------

cpu:
  source_file: measurefiles/cpucsv
  ddl_record: ZMSCPU
  entity_type: CPU (Central Processing Unit)
  purpose: >
    Per-CPU performance metrics for each NonStop processor. Captures utilization,
    memory, I/O, transaction, and ServerNet fabric activity over measurement intervals.
    Counter records are initialized at CPU load time, not at measurement start.
  identity_columns: [system_name, cpu_num]
  time_columns: [from_timestamp, to_timestamp, delta_time]
  join_hints:
    - "JOIN proc ON (system_name, cpu_num, from_timestamp) for process activity"
    - "JOIN disc ON (system_name, cpu_num, from_timestamp) for disk activity"
  columns:
    # --- Shared header ---
    u_loadid.loadid:              { queryable: false, description: "Internal Measure load ID" }
    u_loadid.load_id.prefix_id:   { queryable: false, description: "Internal Measure load ID prefix" }
    u_loadid.load_id.interval_id: { queryable: false, description: "Internal Measure load ID interval" }
    system_name:       { queryable: true,  type: string,   description: "NonStop node name (e.g. \\KRONOS)" }
    cpu_num:           { queryable: true,  type: integer,  description: "CPU number (0-indexed, 0-15)" }
    os_version.letter: { queryable: true,  type: string,   description: "OS version letter (e.g. J, L)" }
    os_version.number: { queryable: true,  type: string,   description: "OS version number (e.g. 06)" }
    object_uid:        { queryable: false, description: "Reserved for future use" }
    from_timestamp:    { queryable: true,  type: datetime, description: "Measurement interval start (Julian LCT)" }
    to_timestamp:      { queryable: true,  type: datetime, description: "Measurement interval end (Julian LCT)" }
    delta_time:        { queryable: true,  type: integer,  unit: microseconds, description: "Interval duration; divide accumulating counters by delta_time for per-second rates" }
    template_version:      { queryable: false, description: "ZMS record template version from MEASDDLS" }
    format_version.letter: { queryable: false, description: "MEASFH format version letter" }
    format_version.number: { queryable: false, description: "MEASFH format version number" }
    data_version.letter:   { queryable: false, description: "Data file version letter" }
    data_version.number:   { queryable: false, description: "Data file version number" }
    subsystem_version:     { queryable: false, description: "Set to 1 for initial H-series; 0 for G-series" }
    error:                 { queryable: false, description: "0=no error; >0=error (no data); <0=warning (data present with caveats)" }

    # --- CPU Configuration (ID fields) ---
    cpu_type:         { queryable: true, type: integer, counter_type: Snapshot, description: "Processor type identifier; use PROCESSOR_GETNAME_ to decode" }
    cpu_subtype:      { queryable: true, type: integer, counter_type: Snapshot, description: "Processor subtype identifier" }
    mem_mb:           { queryable: true, type: integer, unit: megabytes, counter_type: Snapshot, description: "Total physical memory in MB; if 0xFFFF compute from mem_frames * page_size_bytes" }
    pcbs:             { queryable: true, type: integer, counter_type: Snapshot, description: "Number of Process Control Blocks configured by SYSGEN" }
    page_size_bytes:  { queryable: true, type: integer, unit: bytes, counter_type: Snapshot, description: "Memory page frame size in bytes" }
    mem_frames:       { queryable: true, type: integer, counter_type: Snapshot, description: "Total physical memory frames available (PHYSCL in PEEK)" }
    mem_initial_lock: { queryable: true, type: integer, counter_type: Snapshot, description: "Memory frames locked at system load by SYSGEN (SWAPBL in PEEK)" }
    ipus:             { queryable: true, type: integer, counter_type: Snapshot, description: "Number of IPUs comprising this logical CPU (J-series and later)" }
    flags:            { queryable: true, type: bitmask, counter_type: Snapshot, description: "Bit 14=1: L-series or later RVU; Bit 15=1: NSMA system (H06.24/J06.13+)" }

    # --- CPU Utilization ---
    cpu_busy_time:    { queryable: true, type: integer, unit: microseconds, counter_type: Busy, description: "Time CPU was busy; for TNS/E = sum of accel_busy_time + tns_busy_time + native_busy_time; RATE ON â†’ % of interval" }
    cpu_qtime:        { queryable: true, type: integer, unit: microseconds, counter_type: Queue, description: "Time processes spent on the CPU ready list; RATE ON â†’ AQL" }
    dispatches:       { queryable: true, type: integer, counter_type: Incrementing, description: "Number of times a process was selected from the ready list and executed" }
    swaps:            { queryable: true, type: integer, counter_type: Incrementing, description: "Number of memory swap operations (in and out); advanced once per swap regardless of pages swapped" }
    intr_busy_time:   { queryable: true, type: integer, unit: microseconds, counter_type: Busy, description: "Time spent executing interrupt handlers; on TNS/E includes system IPs and APs" }
    process_ovhd:     { queryable: true, type: integer, unit: microseconds, counter_type: Busy, description: "Time spent by OS initializing and terminating processes; not included in per-process cpu_busy_time" }
    disc_ios:         { queryable: true, type: integer, counter_type: Incrementing, description: "Total disk I/O transfers performed by disk processes in this CPU, including direct bulk I/O" }
    cache_hits:       { queryable: true, type: integer, counter_type: Incrementing, description: "Number of times required block was found in disk cache during an I/O operation" }
    transactions:     { queryable: true, type: integer, counter_type: Incrementing, description: "Number of terminal transactions (read followed by write) in active measurements on this CPU" }
    response_time:    { queryable: true, type: integer, unit: microseconds, counter_type: Response-time, description: "Cumulative terminal response time; RATE ON â†’ avg response time per transaction" }
    comp_traps:       { queryable: true, type: integer, counter_type: Incrementing, description: "Number of compatibility mode traps (data misalignment, unexpected TNS/native transitions)" }
    native_busy_time: { queryable: true, type: integer, unit: microseconds, counter_type: Busy, description: "Time CPU was busy executing native (TNS/E) code; only valid when PROCESSH measurement is active" }
    accel_busy_time:  { queryable: true, type: integer, unit: microseconds, counter_type: Busy, description: "Time CPU was busy executing accelerated code; only valid when PROCESSH measurement is active" }
    tns_busy_time:    { queryable: true, type: integer, unit: microseconds, counter_type: Busy, description: "Time CPU was busy executing TNS code; only valid when PROCESSH measurement is active" }

    # --- Memory ---
    page_requests:      { queryable: true, type: integer, counter_type: Incrementing, description: "Number of times memory manager was invoked to obtain a page frame (CLOCK:CALLS in PEEK)" }
    page_scans:         { queryable: true, type: integer, counter_type: Incrementing, description: "Number of page frames examined by memory manager to find a replaceable page" }
    mm_page_scans:      { queryable: true, type: integer, counter_type: Incrementing, description: "Memory manager background page scans not caused by demand; does not indicate a performance problem" }
    starting_free_mem:  { queryable: true, type: integer, counter_type: Snapshot, description: "Free memory frames at interval start" }
    ending_free_mem:    { queryable: true, type: integer, counter_type: Snapshot, description: "Free memory frames at interval end" }
    starting_ucme:      { queryable: true, type: integer, counter_type: Snapshot, description: "Uncorrectable Memory Error (UCME) frames at interval start; not valid for H-series and later" }
    ending_ucme:        { queryable: true, type: integer, counter_type: Snapshot, description: "Uncorrectable Memory Error (UCME) frames at interval end; not valid for H-series and later" }
    starting_ucl:       { queryable: true, type: integer, counter_type: Snapshot, description: "User process code and library segment frames in physical memory at interval start" }
    ending_ucl:         { queryable: true, type: integer, counter_type: Snapshot, description: "User process code and library segment frames in physical memory at interval end" }
    starting_scl:       { queryable: true, type: integer, counter_type: Snapshot, description: "System process code and library segment frames in physical memory at interval start" }
    ending_scl:         { queryable: true, type: integer, counter_type: Snapshot, description: "System process code and library segment frames in physical memory at interval end" }
    starting_free_cids: { queryable: true, type: integer, counter_type: Snapshot, description: "Counter ID control blocks available for new counter records at interval start" }
    ending_free_cids:   { queryable: true, type: integer, counter_type: Snapshot, description: "Counter ID control blocks available for new counter records at interval end" }
    unsp_pages_qtime:   { queryable: true, type: integer, unit: microseconds, counter_type: Queue, description: "Time unsponsored shared pages spent in main memory (G05+); RATE ON â†’ AQL" }
    unsp_pages_start:   { queryable: true, type: integer, counter_type: Snapshot, description: "Number of unsponsored pages at interval start" }
    unsp_pages_end:     { queryable: true, type: integer, counter_type: Snapshot, description: "Number of unsponsored pages at interval end" }
    link_prepush_msgs:  { queryable: true, type: integer, counter_type: Incrementing, description: "H/J: messages transferred to another CPU using prepush protocol; L: requests via Send operation" }
    link_readlink_msgs: { queryable: true, type: integer, counter_type: Incrementing, description: "H/J: messages within readlinkcache size not using prepush; L: replies received from another CPU" }
    link_large_msgs:    { queryable: true, type: integer, counter_type: Incrementing, description: "H/J: messages exceeding readlinkcache size; L: requests where data pulled via IB RDMA Read" }
    readlinkcache_all:  { queryable: true, type: integer, counter_type: Incrementing, description: "H/J: received messages with both control and data cached; L: received requests fully cached" }
    readlinkcache_ctrl: { queryable: true, type: integer, counter_type: Incrementing, description: "H/J: received messages with only control bytes cached; L: received requests with only control cached" }
    readlinkcache_none: { queryable: true, type: integer, counter_type: Incrementing, description: "H/J: received messages with no bytes cached; L: replies transferred via RDMA Write" }
    replyctrlcache_msgs: { queryable: true, type: integer, counter_type: Incrementing, description: "H/J: message replies with control in interrupt packet; L: replies via Send operation" }
    processh_samples:   { queryable: true, type: integer, counter_type: Sampling, description: "Raw count of PROCESSH sampling interrupts in this CPU; 0 if no PROCESSH measurement active; for NSMA = aggregate across all IPUs" }
    starting_timer_cells: { queryable: true, type: integer, counter_type: Snapshot, description: "Instrumentation timer cells in use at interval start" }
    ending_timer_cells:   { queryable: true, type: integer, counter_type: Snapshot, description: "Instrumentation timer cells in use at interval end" }
    locked_pages_qtime:   { queryable: true, type: integer, unit: microseconds, counter_type: Queue, description: "Reserved for future use (H06/J04+)" }
    locked_pages_start:   { queryable: true, type: integer, counter_type: Snapshot, description: "Page frames locked in main memory at interval start â€” aggregate for all processes in CPU (H06/J04+; valid when subsystem_version >= 3)" }
    locked_pages_end:     { queryable: true, type: integer, counter_type: Snapshot, description: "Page frames locked in main memory at interval end â€” aggregate for all processes in CPU (H06/J04+; valid when subsystem_version >= 3)" }

    # --- IPU sub-counters (repeating group, N = 0..15) ---
    # Present only on NSMA systems (J-series+). Zero on non-NSMA systems.
    ipu{N}.ipu_busy_time:  { queryable: true, type: integer, unit: microseconds, counter_type: Busy, description: "Time IPU N was busy; N = 0..15; RATE ON â†’ % of interval" }
    ipu{N}.ipu_qtime:      { queryable: true, type: integer, unit: microseconds, counter_type: Queue, description: "Time processes waited on IPU N ready queue; RATE ON â†’ AQL" }
    ipu{N}.ipu_dispatches: { queryable: true, type: integer, counter_type: Incrementing, description: "Number of process dispatches on IPU N" }

    # --- ServerNet interface sub-counters (repeating group, N = 0..15) ---
    # SUM across all N for node-wide totals.
    svnet{N}.read_requests:  { queryable: true, type: integer, counter_type: Incrementing, description: "Transfers initiated by this CPU that brought data INTO CPU N; N = 0..15" }
    svnet{N}.write_requests: { queryable: true, type: integer, counter_type: Incrementing, description: "Transfers initiated by this CPU that sent data OUT FROM CPU N (writes + message sends)" }
    svnet{N}.read_bytes:     { queryable: true, type: integer, unit: bytes, counter_type: Accumulating, description: "Bytes transferred by read requests for CPU N" }
    svnet{N}.write_bytes:    { queryable: true, type: integer, unit: bytes, counter_type: Accumulating, description: "Bytes transferred by write requests for CPU N" }


disc:
  source_file: measurefiles/disccsv
  ddl_record: ZMSDISC
  entity_type: DISC (Disk Device)
  purpose: >
    Per-disk performance metrics for all disk devices. Captures I/O activity,
    queue times, free space, and per-cache-level statistics for each disk volume.
    DISC capacity information is only available from the primary DP2 process records.
  identity_columns: [system_name, cpu_num, device_name]
  time_columns: [from_timestamp, to_timestamp, delta_time]
  join_hints:
    - "JOIN cpu ON (system_name, cpu_num, from_timestamp) for CPU context"
    - "JOIN dfile ON (system_name, device_name, from_timestamp) for file-level activity"
  columns:
    # --- Shared header ---
    u_loadid.loadid:              { queryable: false }
    u_loadid.load_id.prefix_id:   { queryable: false }
    u_loadid.load_id.interval_id: { queryable: false }
    system_name:       { queryable: true,  type: string,  description: "NonStop node name" }
    cpu_num:           { queryable: true,  type: integer, description: "CPU number managing this disk" }
    os_version.letter: { queryable: true,  type: string }
    os_version.number: { queryable: true,  type: string }
    object_uid:        { queryable: false }
    from_timestamp:    { queryable: true,  type: datetime }
    to_timestamp:      { queryable: true,  type: datetime }
    delta_time:        { queryable: true,  type: integer, unit: microseconds }
    template_version:      { queryable: false }
    format_version.letter: { queryable: false }
    format_version.number: { queryable: false }
    data_version.letter:   { queryable: false }
    data_version.number:   { queryable: false }
    subsystem_version:     { queryable: false, description: "Provided by DP2" }
    error:                 { queryable: false }

    # --- Disk Identity (ID fields) ---
    pin:               { queryable: true, type: integer, description: "Process Identification Number of the disk process" }
    device_type:       { queryable: true, type: integer, description: "Disk device type; value 3 = disk volume" }
    device_subtype:    { queryable: true, type: integer, description: "Additional identifier for device_type; see System Generation Manual" }
    u_fabric.fabric:   { queryable: false, description: "ServerNet fabric (0=X, 1=Y); internal use" }
    u_fabric.servernet: { queryable: false, description: "Redefines fabric field" }
    device_name:       { queryable: true, type: string,  description: "Disk device name (e.g. $DATA01, $SYSTEM)" }
    logical_device:    { queryable: true, type: integer, description: "Logical device number" }
    gms.group:         { queryable: true, type: integer, description: "GMS group number (physical enclosure); use in IF/BY clauses" }
    gms.module:        { queryable: true, type: integer, description: "GMS module number; use in IF/BY clauses" }
    gms.slot:          { queryable: true, type: integer, description: "GMS slot number; use in IF/BY clauses" }
    u_scsi_id.plpt.plpt_flags: { queryable: false, description: "PLPT flags: MEAS_CLIM_REL, MEAS_PATH_SEL, MEAS_CLIM_DEVICE, MEAS_MULTIPLE_CLIMS" }
    u_scsi_id.plpt.path:       { queryable: true,  type: integer, description: "Connection path (0=Primary, 1=Backup, 2=Mirror, 3=Mirror-Backup)" }
    u_scsi_id.plpt.lun:        { queryable: true,  type: integer, description: "Logical Unit Number within a CLIM (0-65534); 0 for non-CLIM" }
    u_scsi_id.plpt.partition:  { queryable: true,  type: integer, description: "Partition number within a partitioned disk (H06.23/J06.12+)" }
    u_scsi_id.plpt.target_id:  { queryable: true,  type: integer, description: "SCSI device ID (0-999); 0 for CLIM devices" }
    config_name:       { queryable: true, type: string,  description: "Logical name of the physical disk from system configuration database; null-terminated" }
    adapter_name:      { queryable: true, type: string,  description: "Logical name of the adapter containing the SAC; null-terminated" }
    sac_name:          { queryable: true, type: string,  description: "Logical name of the SAC or CLIM name; null-terminated" }
    capacity:          { queryable: true, type: integer, unit: bytes, description: "Disk volume capacity in bytes; use in IF/BY clauses" }
    storage_pool:      { queryable: true, type: string,  description: "SMF storage pool process name" }
    disc_process_type: { queryable: true, type: integer, description: "Disk process type (DP2)" }

    # --- I/O Activity ---
    request_qtime:        { queryable: true, type: integer, unit: microseconds, counter_type: Queue, description: "Time I/O requests spent on the disk process internal queue including active requests; RATE ON â†’ AQL. NOTE: includes lock wait time" }
    requests:             { queryable: true, type: integer, counter_type: Incrementing, description: "Number of I/O requests (READ, WRITE, FILEINFO) received by the disk process" }
    reads:                { queryable: true, type: integer, counter_type: Incrementing, description: "Number of physical read operations from disk to memory" }
    writes:               { queryable: true, type: integer, counter_type: Incrementing, description: "Number of physical write operations from memory to disk" }
    input_bytes:          { queryable: true, type: integer, unit: bytes, counter_type: Accumulating, description: "Bytes read from disk" }
    output_bytes:         { queryable: true, type: integer, unit: bytes, counter_type: Accumulating, description: "Bytes written to disk" }
    swaps:                { queryable: true, type: integer, counter_type: Incrementing, description: "Number of swap I/O operations; advanced per I/O (may exceed CPU swaps)" }
    control_points:       { queryable: true, type: integer, counter_type: Incrementing, description: "Number of times disk process wrote a TMF control point record to its audit-trail file" }
    control_point_writes: { queryable: true, type: integer, counter_type: Incrementing, description: "Number of dirty cache blocks written to disk at TMF control points" }
    free_space_ios:       { queryable: true, type: integer, counter_type: Incrementing, description: "Number of I/O operations to the disk free space table" }
    requests_blocked:     { queryable: true, type: integer, counter_type: Incrementing, description: "Number of times an operation waited because the requested file or record was locked" }
    starting_free_space:  { queryable: true, type: integer, unit: bytes, counter_type: Snapshot, description: "Free disk space at interval start; primary path record only" }
    ending_free_space:    { queryable: true, type: integer, unit: bytes, counter_type: Snapshot, description: "Free disk space at interval end; primary path record only" }
    starting_free_blocks: { queryable: true, type: integer, counter_type: Snapshot, description: "Free entries in the free space table at interval start; primary path record only" }
    ending_free_blocks:   { queryable: true, type: integer, counter_type: Snapshot, description: "Free entries in the free space table at interval end; primary path record only" }
    volsem_qtime:         { queryable: true, type: integer, unit: microseconds, counter_type: Queue, description: "Time requests waited for the volume semaphore (exclusive and shared modes); RATE ON â†’ AQL" }
    read_qbusy_time:      { queryable: true, type: integer, unit: microseconds, counter_type: Queue-Busy, description: "Time the read queue was non-empty; RATE ON â†’ %" }
    read_qtime:           { queryable: true, type: integer, unit: microseconds, counter_type: Queue, description: "Total time spent by read requests queued to this disk; RATE ON â†’ AQL" }
    write_qbusy_time:     { queryable: true, type: integer, unit: microseconds, counter_type: Queue-Busy, description: "Time the write queue was non-empty; RATE ON â†’ %" }
    write_qtime:          { queryable: true, type: integer, unit: microseconds, counter_type: Queue, description: "Total time spent by write requests queued to this disk; RATE ON â†’ AQL" }
    device_qbusy_time:    { queryable: true, type: integer, unit: microseconds, counter_type: Queue-Busy, description: "Time any requests were queued to this disk; RATE ON â†’ %. NOTE: does NOT equal read_qbusy_time + write_qbusy_time due to concurrency" }
    dbio_reads:           { queryable: true, type: integer, counter_type: Incrementing, description: "Read operations enabled for direct bulk I/O; subset of reads" }
    dbio_writes:          { queryable: true, type: integer, counter_type: Incrementing, description: "Write operations enabled for direct bulk I/O; subset of writes" }
    defreqs:              { queryable: true, type: integer, counter_type: Incrementing, description: "Number of requests subject to deferral (mixed workload algorithm); subset of requests" }
    defreq_qtime:         { queryable: true, type: integer, unit: microseconds, counter_type: Queue, description: "Time deferrable requests spent on the disk process internal queue; subset of request_qtime" }
    deferred_qtime:       { queryable: true, type: integer, unit: microseconds, counter_type: Queue, description: "Time requests subject to deferral actually spent deferred; subset of defreq_qtime" }

    # --- Disk Cache (repeating group, N = 0..7) ---
    # Eight cache levels corresponding to block sizes:
    # C0=512B, C1=1024B, C2=2048B, C3=4096B, C4=8192B, C5=16384B, C6=32768B, C7=65536B
    c{N}.blks:               { queryable: true, type: integer, counter_type: Snapshot, description: "Total cache blocks allocated for level N; N = 0..7" }
    c{N}.block_size:         { queryable: true, type: integer, unit: bytes, counter_type: Snapshot, description: "Cache block size for level N in bytes" }
    c{N}.blocks_inuse_start: { queryable: true, type: integer, counter_type: Snapshot, description: "Cache blocks in use at interval start for level N" }
    c{N}.blocks_inuse_end:   { queryable: true, type: integer, counter_type: Snapshot, description: "Cache blocks in use at interval end for level N" }
    c{N}.block_splits:       { queryable: true, type: integer, counter_type: Incrementing, description: "Number of block splits per block size for level N" }
    c{N}.hits:               { queryable: true, type: integer, counter_type: Incrementing, description: "Cache hits for level N on read or buffered write; hits/(hits+misses) = hit ratio" }
    c{N}.misses:             { queryable: true, type: integer, counter_type: Incrementing, description: "Cache misses for level N on read operations; causes a disk I/O" }
    c{N}.faults:             { queryable: true, type: integer, counter_type: Incrementing, description: "Cache faults for level N â€” block indicated in cache but stolen by memory manager; >5% of I/Os indicates need for more memory" }
    c{N}.audit_buf_forces:   { queryable: true, type: integer, counter_type: Incrementing, description: "Times disk process had to write to audit-trail before freeing a dirty cache block; should be near zero" }
    c{N}.blks_dirty_qtime:   { queryable: true, type: integer, unit: microseconds, counter_type: Queue, description: "Time cache blocks spent dirty for level N; RATE ON â†’ AQL" }
    c{N}.write_cleans:       { queryable: true, type: integer, counter_type: Accumulating, description: "Times a write found the required block clean in cache for level N; saves a disk read per write" }
    c{N}.write_dirtys:       { queryable: true, type: integer, counter_type: Accumulating, description: "Times a write found the required block dirty in cache for level N" }
    c{N}.write_misses:       { queryable: true, type: integer, counter_type: Accumulating, description: "Times a write did not find the required block in cache for level N; requires a disk read before write" }


dfile:
  source_file: measurefiles/dfilecsv
  ddl_record: ZMSDFILE
  entity_type: DFILE (Disk File â€” DISKFILE entity)
  purpose: >
    Per-file performance metrics for all opener processes on a specified disk file.
    DISKFILE creates one counter record per measured file and does not track individual
    opener processes. Creates a new record if a file closes and reopens during measurement.
  identity_columns: [system_name, cpu_num, file_name.volume, file_name.subvol, file_name.filename]
  time_columns: [from_timestamp, to_timestamp, delta_time]
  join_hints:
    - "JOIN disc ON (system_name, cpu_num, device_name, from_timestamp) for disk context"
    - "JOIN dopen ON (system_name, cpu_num, fcb_number, from_timestamp) for per-opener detail"
  columns:
    # --- Shared header ---
    u_loadid.loadid:              { queryable: false }
    u_loadid.load_id.prefix_id:   { queryable: false }
    u_loadid.load_id.interval_id: { queryable: false }
    system_name:       { queryable: true,  type: string }
    cpu_num:           { queryable: true,  type: integer }
    os_version.letter: { queryable: true,  type: string }
    os_version.number: { queryable: true,  type: string }
    object_uid:        { queryable: false }
    from_timestamp:    { queryable: true,  type: datetime }
    to_timestamp:      { queryable: true,  type: datetime }
    delta_time:        { queryable: true,  type: integer, unit: microseconds }
    template_version:      { queryable: false }
    format_version.letter: { queryable: false }
    format_version.number: { queryable: false }
    data_version.letter:   { queryable: false }
    data_version.number:   { queryable: false }
    subsystem_version:     { queryable: false }
    error:                 { queryable: false }

    # --- File Identity (ID fields) ---
    fcb_number:         { queryable: true, type: integer, description: "File Control Block number â€” internal to the disk process" }
    file_type:          { queryable: true, type: integer, description: "File type: 0=unstructured, 1=relative, 2=entry-sequenced, 3=key-sequenced" }
    file_code:          { queryable: true, type: integer, description: "Three-digit system file code (e.g. 100=object, 101=edit)" }
    format:             { queryable: true, type: integer, description: "File format: 1=format 1, 2=format 2 (for files >2GB or large extents)" }
    file_name.volume:   { queryable: true, type: string,  description: "Volume component of the file name (e.g. $DATA01)" }
    file_name.subvol:   { queryable: true, type: string,  description: "Subvolume component of the file name" }
    file_name.filename: { queryable: true, type: string,  description: "Filename component" }
    device_name:        { queryable: true, type: string,  description: "Disk device name hosting this file; for SMF files = physical location" }
    storage_pool:       { queryable: true, type: string,  description: "SMF storage pool process name" }
    file_name_mid.pathid: { queryable: false, description: "Internal OSS/SQL MID PATHID; zeros for non-OSS/SQL files" }
    file_name_mid.crvsn:  { queryable: false, description: "Creation Version Serial Number for OSS/SQL files; zeros for others" }

    # --- File Activity ---
    starting_eof:        { queryable: true, type: integer, unit: bytes, counter_type: Snapshot, description: "EOF position at interval start; not displayed by MEASCOM but available for IF/BY" }
    ending_eof:          { queryable: true, type: integer, unit: bytes, counter_type: Snapshot, description: "EOF position at interval end; displayed with ratio ending_eof/starting_eof" }
    transient_opens:     { queryable: true, type: integer, counter_type: Incrementing, description: "Number of opens that occurred during the measurement period" }
    open_qtime:          { queryable: true, type: integer, unit: microseconds, counter_type: Queue, description: "Time for all opens of this file including transient opens; RATE ON â†’ AQL" }
    driver_input_calls:  { queryable: true, type: integer, counter_type: Incrementing, description: "Number of read operations (cache hits + misses); physical reads = driver_input_calls - cache_read_hits" }
    driver_output_calls: { queryable: true, type: integer, counter_type: Incrementing, description: "Number of write operations; physical writes = driver_output_calls - cache_write_hits (for small writes)" }
    cache_read_hits:     { queryable: true, type: integer, counter_type: Incrementing, description: "Times a read found the required block in cache; saves a disk I/O" }
    cache_write_hits:    { queryable: true, type: integer, counter_type: Incrementing, description: "Times a write found the required block dirty in cache" }
    cache_write_cleans:  { queryable: true, type: integer, counter_type: Incrementing, description: "Times a write found the required block clean in cache; saves a disk read per write" }
    requests:            { queryable: true, type: integer, counter_type: Incrementing, description: "Total I/O requests for this file" }
    requests_blocked:    { queryable: true, type: integer, counter_type: Incrementing, description: "Times an I/O operation waited because the requested file or record was locked" }
    lockwait_time:       { queryable: true, type: integer, unit: microseconds, counter_type: Lockwait, description: "Cumulative time waiting for locks; RATE ON â†’ avg wait per blocked request" }
    max_lockwait_time:   { queryable: true, type: integer, unit: microseconds, counter_type: "Max value", description: "Maximum wait time per lock; use as guide for timeout value; unaffected by RATE" }
    lock_timeouts:       { queryable: true, type: integer, counter_type: Incrementing, description: "Number of lock timeout events (error 40)" }
    lock_bounces:        { queryable: true, type: integer, counter_type: Incrementing, description: "Number of bounced locks (FELOCKED/error 73) returned to the file system" }
    block_splits:        { queryable: true, type: integer, counter_type: Incrementing, description: "Number of B-tree block splits during writes; keep to minimum" }
    extent_allocations:  { queryable: true, type: integer, counter_type: Incrementing, description: "Number of times a file extent was allocated" }
    dbio_input_calls:    { queryable: true, type: integer, counter_type: Incrementing, description: "Direct bulk I/O read operations; subset of driver_input_calls" }
    dbio_output_calls:   { queryable: true, type: integer, counter_type: Incrementing, description: "Direct bulk I/O write operations; subset of driver_output_calls" }
    sql_inserts:         { queryable: true, type: integer, counter_type: Incrementing, description: "Number of SQL INSERT row operations" }
    sql_updates:         { queryable: true, type: integer, counter_type: Incrementing, description: "Number of SQL UPDATE row operations" }
    sql_deletes:         { queryable: true, type: integer, counter_type: Incrementing, description: "Number of SQL DELETE row operations" }
    starting_rows:       { queryable: true, type: integer, counter_type: Snapshot, description: "Row count at interval start; valid only if table had zero rows at some point since file open" }
    ending_rows:         { queryable: true, type: integer, counter_type: Snapshot, description: "Row count at interval end; valid only if table had zero rows at some point since file open" }
    oss_block_writes:    { queryable: true, type: integer, counter_type: Incrementing, description: "Block write operations issued by DP2 for the OSS file system" }
    oss_block_write_bytes: { queryable: true, type: integer, unit: bytes, counter_type: Accumulating, description: "Bytes written by DP2 as a result of oss_block_writes" }
    oss_cache_callbacks: { queryable: true, type: integer, counter_type: Incrementing, description: "Cache callback requests sent by DP2 to the OSS file manager" }
    oss_callback_writes: { queryable: true, type: integer, counter_type: Incrementing, description: "OSS block writes received by DP2 as a result of oss_cache_callbacks" }


dopen:
  source_file: measurefiles/dopencsv
  ddl_record: ZMSDOPEN
  entity_type: DOPEN (Disk File Open â€” DISCOPEN entity)
  purpose: >
    Per-open-instance physical I/O metrics for disk files. Each row represents one
    opener process of a file during an interval. DISCOPEN creates a separate counter
    record for each file open; creates a new record if a file closes and reopens.
    Short-form records (for temp files, edit files, object files) have zero values
    for lockwait_time, max_lockwait_time, lock_timeouts, lock_bounces, cache_write_cleans.
  identity_columns: [system_name, cpu_num, opener_cpu, opener_pin, ocb_number, file_name.volume, file_name.subvol, file_name.filename]
  time_columns: [from_timestamp, to_timestamp, delta_time]
  join_hints:
    - "JOIN dfile ON (system_name, cpu_num, file_name.*, from_timestamp) for file-level totals"
    - "JOIN proc ON (system_name, opener_cpu, opener_pin, from_timestamp) for opener process detail"
  columns:
    # --- Shared header ---
    u_loadid.loadid:              { queryable: false }
    u_loadid.load_id.prefix_id:   { queryable: false }
    u_loadid.load_id.interval_id: { queryable: false }
    system_name:       { queryable: true,  type: string }
    cpu_num:           { queryable: true,  type: integer, description: "CPU number where the file resides" }
    os_version.letter: { queryable: true,  type: string }
    os_version.number: { queryable: true,  type: string }
    object_uid:        { queryable: false }
    from_timestamp:    { queryable: true,  type: datetime }
    to_timestamp:      { queryable: true,  type: datetime }
    delta_time:        { queryable: true,  type: integer, unit: microseconds }
    template_version:      { queryable: false }
    format_version.letter: { queryable: false }
    format_version.number: { queryable: false }
    data_version.letter:   { queryable: false }
    data_version.number:   { queryable: false }
    subsystem_version:     { queryable: false }
    error:                 { queryable: false }

    # --- Open Identity (ID fields) ---
    opener_cpu:         { queryable: true, type: integer, description: "CPU number of the process that opened the file" }
    opener_pin:         { queryable: true, type: integer, description: "PIN of the process that opened the file" }
    ocb_number:         { queryable: true, type: integer, description: "Open Control Block number; unique per open instance; -1 if value exceeds 65534" }
    file_type:          { queryable: true, type: integer, description: "File type: 0=unstructured, 1=relative, 2=entry-sequenced, 3=key-sequenced" }
    opener_system_name: { queryable: true, type: string,  description: "System name of the opener process" }
    file_name.volume:   { queryable: true, type: string,  description: "Volume component of the opened file name" }
    file_name.subvol:   { queryable: true, type: string,  description: "Subvolume component of the opened file name" }
    file_name.filename: { queryable: true, type: string,  description: "Filename component of the opened file name" }
    device_name:        { queryable: true, type: string,  description: "Disk device name hosting the file" }
    storage_pool:       { queryable: true, type: string,  description: "SMF storage pool process name" }
    file_name_mid.pathid: { queryable: false, description: "Internal OSS/SQL MID PATHID" }
    file_name_mid.crvsn:  { queryable: false, description: "Creation Version Serial Number" }
    record_type:        { queryable: true, type: integer, description: "0 = short-form record (temp/edit/object files); non-zero = long-form record with locking counters" }
    ocb32_number:       { queryable: true, type: integer, description: "32-bit Open Control Block number (L02/J06 and later)" }

    # --- Open Activity ---
    driver_input_calls:  { queryable: true, type: integer, counter_type: Incrementing, description: "Read operations for this open (cache hits + misses); physical reads = driver_input_calls - cache_hits" }
    driver_output_calls: { queryable: true, type: integer, counter_type: Incrementing, description: "Write operations for this open" }
    cache_hits:          { queryable: true, type: integer, counter_type: Incrementing, description: "Times a read found the required block in cache for this open" }
    cache_write_hits:    { queryable: true, type: integer, counter_type: Incrementing, description: "Times a write found the required block dirty in cache for this open" }
    block_splits:        { queryable: true, type: integer, counter_type: Incrementing, description: "B-tree block splits caused by this opener" }
    requests_blocked:    { queryable: true, type: integer, counter_type: Incrementing, description: "Requests blocked waiting for a lock for this open" }
    requests:            { queryable: true, type: integer, counter_type: Incrementing, description: "Total I/O requests for this open" }
    lockwait_time:       { queryable: true, type: integer, unit: microseconds, counter_type: Lockwait, description: "Cumulative lock wait time for this open; zero for short-form records; RATE ON â†’ avg per blocked request" }
    max_lockwait_time:   { queryable: true, type: integer, unit: microseconds, counter_type: "Max value", description: "Maximum single lock wait time for this open; zero for short-form records; unaffected by RATE" }
    lock_timeouts:       { queryable: true, type: integer, counter_type: Incrementing, description: "Lock timeout events for this open; zero for short-form records" }
    lock_bounces:        { queryable: true, type: integer, counter_type: Incrementing, description: "Lock bounce events (FELOCKED/error 73) for this open; zero for short-form records" }
    cache_write_cleans:  { queryable: true, type: integer, counter_type: Incrementing, description: "Times a write found the required block clean in cache for this open; zero for short-form records" }
    dbio_input_calls:    { queryable: true, type: integer, counter_type: Incrementing, description: "Direct bulk I/O read operations for this open; subset of driver_input_calls" }
    dbio_output_calls:   { queryable: true, type: integer, counter_type: Incrementing, description: "Direct bulk I/O write operations for this open; subset of driver_output_calls" }
    sql_operation_time:  { queryable: true, type: integer, unit: microseconds, counter_type: Busy, description: "DP2 process busy-time while working on SQL subset requests for this open; RATE ON â†’ %" }


file:
  source_file: measurefiles/filecsv
  ddl_record: ZMSFILE
  entity_type: FILE (File Activity per Opener)
  purpose: >
    Logical I/O operations performed by a user process on an explicitly opened file.
    Measures all partitions of a partitioned file together as a single entity.
    Counter records are initiated on first significant use of the file, not on open.
    Does not measure files not explicitly opened by the application (e.g. alternate-key files).
  identity_columns: [system_name, cpu_num, opener_pin, file_number, file_name.volume, file_name.subvol, file_name.filename]
  time_columns: [from_timestamp, to_timestamp, delta_time]
  join_hints:
    - "JOIN proc ON (system_name, cpu_num, opener_pin, from_timestamp) for opener process detail"
    - "JOIN dfile ON (system_name, cpu_num, file_name.*, from_timestamp) for disk file totals"
  columns:
    # --- Shared header ---
    u_loadid.loadid:              { queryable: false }
    u_loadid.load_id.prefix_id:   { queryable: false }
    u_loadid.load_id.interval_id: { queryable: false }
    system_name:       { queryable: true,  type: string }
    cpu_num:           { queryable: true,  type: integer }
    os_version.letter: { queryable: true,  type: string }
    os_version.number: { queryable: true,  type: string }
    object_uid:        { queryable: false }
    from_timestamp:    { queryable: true,  type: datetime }
    to_timestamp:      { queryable: true,  type: datetime }
    delta_time:        { queryable: true,  type: integer, unit: microseconds }
    template_version:      { queryable: false }
    format_version.letter: { queryable: false }
    format_version.number: { queryable: false }
    data_version.letter:   { queryable: false }
    data_version.number:   { queryable: false }
    subsystem_version:     { queryable: false, description: "Provided by Guardian or OSS file system depending on open type" }
    error:                 { queryable: false }

    # --- File/Opener Identity (ID fields) ---
    opener_pin:         { queryable: true, type: integer, description: "PIN of the process that opened the file" }
    file_number:        { queryable: true, type: integer, description: "File ACB number within the opener's context" }
    file_type:          { queryable: true, type: integer, description: "File type from ACB: 0=other, 1=relative, 2=entry-sequenced, 3=key-sequenced" }
    device_type:        { queryable: true, type: integer, description: "Device type: 0=process, 1=operator, 2=$RECEIVE, 3=disk, 4=tape, 5=printer, 6=terminal, 7=comm line, 8=SCSI" }
    file_name.volume:   { queryable: true, type: string,  description: "Volume component of the file name" }
    file_name.subvol:   { queryable: true, type: string,  description: "Subvolume component of the file name" }
    file_name.filename: { queryable: true, type: string,  description: "Filename component" }
    file_system_name:   { queryable: true, type: string,  description: "System name from the complete file specification" }
    opener_processname: { queryable: true, type: string,  description: "Named process name of the opener (if named)" }
    opener_program_filename.volume:   { queryable: true, type: string, description: "Volume of the opener's program file" }
    opener_program_filename.subvol:   { queryable: true, type: string, description: "Subvolume of the opener's program file" }
    opener_program_filename.filename: { queryable: true, type: string, description: "Filename of the opener's program file" }
    device_name:        { queryable: true, type: string,  description: "Device name of the file; for SMF = physical location" }
    opener_device_name: { queryable: true, type: string,  description: "Device name of the opener's program file; for SMF = physical location" }
    file_name_mid.pathid:  { queryable: false, description: "Internal OSS/SQL MID PATHID; zeros for non-OSS/SQL files" }
    file_name_mid.crvsn:   { queryable: false, description: "Creation Version Serial Number; zeros for non-OSS/SQL files" }
    opener_osspid:      { queryable: true, type: integer, description: "OSS process ID of the opener; zeros for non-OSS processes" }
    opener_program_fname_mid.pathid: { queryable: false, description: "Internal OSS MID PATHID for opener program file" }
    opener_program_fname_mid.crvsn:  { queryable: false, description: "Creation Version Serial Number for opener program file" }
    file_open_type:     { queryable: true, type: integer, description: "File open type bitmask: GUARDIAN, ENSCRIBE, SQLFILE, PROCFILE, OSS, OSSDISK, OSSFIFO, OSSPIPE, OSSSOCKET, etc." }
    ip.family:          { queryable: true, type: integer, description: "IP address family: 2=IPv4, 26=IPv6 (for AF_INET/AF_INET6 sockets)" }
    ip.port:            { queryable: true, type: integer, description: "IP port number (for AF_INET/AF_INET6 sockets)" }
    ip.ip_addr:         { queryable: true, type: string,  description: "IP address in hex (4 bytes for IPv4, 16 bytes for IPv6); use in IF clause as '1.2.3.4 port'" }

    # --- File Activity ---
    file_busy_time:        { queryable: true, type: integer, unit: microseconds, counter_type: Busy, description: "Elapsed time executing waited I/O requests; for nowait I/O includes AWAITIO wait time; RATE ON â†’ %" }
    reads:                 { queryable: true, type: integer, counter_type: Incrementing, description: "Calls to read family of APIs including OSS read() and recv(); includes DBIO and OSS cache reads" }
    writes:                { queryable: true, type: integer, counter_type: Incrementing, description: "Calls to WRITE family of APIs (excluding WRITEREAD); includes DBIO and OSS cache writes" }
    updates_or_replies:    { queryable: true, type: integer, counter_type: Incrementing, description: "WRITEUPDATE calls with non-zero buffer (updates on disk/tape) or successful REPLY calls (on terminals/processes)" }
    deletes_or_writereads: { queryable: true, type: integer, counter_type: Incrementing, description: "WRITEUPDATE calls with zero buffer (deletes on disk/tape) or WRITEREAD calls (on terminals/processes)" }
    info_calls:            { queryable: true, type: integer, counter_type: Incrementing, description: "Calls to FILEINFO, FILE_GETINFO_, DEVICEINFO, etc. that dispatched a message; for OSS includes fstat(), getsockname(), etc." }
    records_used:          { queryable: true, type: integer, counter_type: Incrementing, description: "Records returned to SQL executor on reads/inserts/writes/updates/deletes; zero for Enscribe files" }
    records_accessed:      { queryable: true, type: integer, counter_type: Incrementing, description: "Records read by disk process to perform operations; >= records_used; zero for Enscribe files" }
    disc_reads:            { queryable: true, type: integer, counter_type: Incrementing, description: "Number of physical disk reads performed" }
    messages:              { queryable: true, type: integer, counter_type: Incrementing, description: "Messages sent for this open including OPEN messages; for OSS sockets = name server activity only" }
    message_bytes:         { queryable: true, type: integer, unit: bytes, counter_type: Accumulating, description: "Message bytes sent and received for this open; does not include DBIO bytes" }
    lock_waits:            { queryable: true, type: integer, counter_type: Incrementing, description: "Number of times a call waited for a lock request" }
    timeouts_or_cancels:   { queryable: true, type: integer, counter_type: Incrementing, description: "Number of timeouts or cancels issued against this open" }
    escalations:           { queryable: true, type: integer, counter_type: Incrementing, description: "Number of times a record lock escalated to a file-level lock" }
    dbio_reads:            { queryable: true, type: integer, counter_type: Incrementing, description: "Direct bulk I/O read operations; subset of reads" }
    dbio_writes:           { queryable: true, type: integer, counter_type: Incrementing, description: "Direct bulk I/O write operations; subset of writes" }
    dbio_read_bytes:       { queryable: true, type: integer, unit: bytes, counter_type: Accumulating, description: "Bytes transferred by DBIO read operations" }
    dbio_write_bytes:      { queryable: true, type: integer, unit: bytes, counter_type: Accumulating, description: "Bytes transferred by DBIO write operations" }
    read_bytes:            { queryable: true, type: integer, unit: bytes, counter_type: Accumulating, description: "Bytes returned to user application data buffer; available for all file open types" }
    write_bytes:           { queryable: true, type: integer, unit: bytes, counter_type: Accumulating, description: "Bytes written from user application buffer; available for all file open types" }
    oss_cache_reads:       { queryable: true, type: integer, counter_type: Incrementing, description: "Application reads from OSS file-system cache (OSS regular files only)" }
    oss_cache_writes:      { queryable: true, type: integer, counter_type: Incrementing, description: "Application writes processed using OSS file-system cache (OSS regular files only)" }
    oss_cache_read_bytes:  { queryable: true, type: integer, unit: bytes, counter_type: Accumulating, description: "Bytes read by oss_cache_reads (OSS regular files only)" }
    oss_cache_write_bytes: { queryable: true, type: integer, unit: bytes, counter_type: Accumulating, description: "Bytes written by oss_cache_writes (OSS regular files only)" }
    oss_block_reads:       { queryable: true, type: integer, counter_type: Incrementing, description: "Block read requests to DP2 to fill OSS cache (OSS regular files only)" }
    oss_block_read_bytes:  { queryable: true, type: integer, unit: bytes, counter_type: Accumulating, description: "Bytes read to cache as a result of oss_block_reads (OSS regular files only)" }
    oss_flow_controls:     { queryable: true, type: integer, counter_type: Incrementing, description: "Times a WRITE operation was blocked (OSS sockets and pipes)" }
    misc_calls:            { queryable: true, type: integer, counter_type: Incrementing, description: "OSS operations that increase file_busy_time but are not reads/writes/info_calls: ioctl(), fsync(), ftruncate(), lseek(), fcntl(), connect(), setsockopt(), accept(), shutdown()" }


ossns:
