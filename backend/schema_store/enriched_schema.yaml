        in L03; zero)
    process_launches:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: Number of process launches (L03+; valid when subsystem_version
        >= 9)
    process_launch_qtime:
      queryable: true
      type: integer
      unit: microseconds
      counter_type: Queue
      description: Time to launch processes (L03+; valid when subsystem_version >=
        9); RATE ON → AQL
    thread_launches:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: Number of KLT thread launches (L03+; valid when subsystem_version
        >= 9)
    thread_launch_qtime:
      queryable: true
      type: integer
      unit: microseconds
      counter_type: Queue
      description: Time to launch KLT threads (L03+; valid when subsystem_version
        >= 9); RATE ON → AQL
    oss_tty_reads:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: Number of READ operations to all /dev/tty opens
    oss_tty_writes:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: Number of WRITE operations to all /dev/tty opens
    oss_tty_read_bytes:
      queryable: true
      type: integer
      unit: bytes
      counter_type: Accumulating
      description: Bytes read from all /dev/tty opens
    oss_tty_write_bytes:
      queryable: true
      type: integer
      unit: bytes
      counter_type: Accumulating
      description: Bytes written to all /dev/tty opens
    oss_tty_wait_time:
      queryable: true
      type: integer
      unit: microseconds
      counter_type: Busy
      description: Time process waited on /dev/tty requests; RATE ON → %
    oss_dev_null_ops:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: Number of reads and writes to all /dev/null opens
    ossns_dd_calls:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: Number of data definition requests sent to OSS name servers (creat,
        open, link, mkdir, etc.)
    ossns_requests:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: Number of requests sent to OSS name servers (fileinfo, DD, directory,
        resolution)
    ossns_message_bytes:
      queryable: true
      type: integer
      unit: bytes
      counter_type: Accumulating
      description: Message data bytes sent and received for OSS name server requests
    ossns_wait_time:
      queryable: true
      type: integer
      unit: microseconds
      counter_type: Busy
      description: Time process waited on OSS name server requests; RATE ON → %
    ossns_redirects:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: Number of redirected requests sent to OSS name servers
  thresholds: []
  counter_classifications:
  - counter: PROCESS-LAUNCH-ART
    description: Average time for each process launch.
    classification: Average Response Time
  - counter: PROCESS-BUSY-SAMPLES
    description: Number of times the sampling operation found the process executing.
    classification: Sampling
  formulas:
  - counter: PROCESS-LAUNCH-ART
    formula: PROCESS-LAUNCH-QTIME / PROCESS-LAUNCHES
    type: explicit
  interpretations:
  - counter: CPU-BUSY-TIME
    interpretation: For KLT processes, values may exceed 100% to represent process-level
      resource consumption across multiple IPUs and multiple threads.
  - counter: READY-TIME
    interpretation: For KLT processes, values may exceed 100% due to multithreading.
  - counter: OSSNS-WAIT-TIME
    interpretation: For KLT processes, values may exceed 100% due to multithreading.
  - counter: OPEN-CLOSE-WAIT-TIME
    interpretation: For KLT processes, values may exceed 100% due to multithreading.
  - counter: OSS-TTY-WAIT-TIME
    interpretation: For KLT processes, values may exceed 100% due to multithreading.
  - counter: CHECKPOINT-BUSY-TIME
    interpretation: Can display values more than 100% for interval measurements if
      the checkpoint is no-waited and wait time is larger than the measurement interval.
  - counter: CPU-BUSY-TIME
    interpretation: If IPU switches occur (IPU-SWITCHES > 0), the total PROCESS CPU-BUSY-TIME
      in a CPU for a particular IPU is not likely to match the corresponding IPU-BUSY-TIME
      in the CPU entity.
  business_rules:
  - rule: The main thread of a KLT process is considered active until the last minor
      thread terminates.
  - rule: Process-launch counters (PROCESS-LAUNCH-ART, PROCESS-LAUNCHES, PROCESS-LAUNCH-QTIME)
      are valid only when subsystem_version >= 9. Otherwise, they contain zero.
  relationships:
  - source: FILE-READS
    target: FILE entity READS
    relationship: Corresponds to the READS counter in the FILE entity.
  - source: FILE-WRITES
    target: FILE entity WRITES
    relationship: Corresponds to the WRITES counter (including UPDATES and DELETES)
      in the FILE entity.
  - source: PROCESS CPU-BUSY-TIME
    target: CPU PROCESS-OVHD
    relationship: PROCESS-OVHD is not included in the PROCESS entity's CPU-BUSY-TIME.
  sql_generation_guidance:
  - rule: When querying process-launch metrics, filter with subsystem_version >= 9
      to ensure valid data.
  - rule: Do not attempt to exactly reconcile PROCESS CPU-BUSY-TIME by IPU with CPU
      IPU-BUSY-TIME if the process had IPU switches (IPU-SWITCHES > 0).
  reporting_guidance:
  - guideline: When reporting on KLT processes, note that busy and wait time metrics
      (CPU-BUSY-TIME, READY-TIME, OSSNS-WAIT-TIME, OPEN-CLOSE-WAIT-TIME, OSS-TTY-WAIT-TIME)
      can legitimately exceed 100%.
  - guideline: For CHECKPOINT-BUSY-TIME, values greater than 100% are valid if the
      checkpoint is no-waited and wait time exceeds the measurement interval.
tmf:
  ddl_record: ZMSTMF
  entity_type: TMF (Transaction Management Facility)
  purpose: 'Transaction Management Facility performance metrics per CPU. Captures
    transaction activity including home transactions, remote transactions, aborting
    transactions, and TMP queue activity. TMF counters are advanced only in the CPU
    containing the primary $TMP process.

    '
  identity_columns:
  - system_name
  - cpu_num
  time_columns:
  - from_timestamp
  - to_timestamp
  - delta_time
  join_hints:
  - JOIN cpu ON (system_name, cpu_num, from_timestamp) for CPU context
  - JOIN proc ON (system_name, cpu_num, from_timestamp) for process activity
  columns:
    u_loadid.loadid:
      queryable: false
      description: Used only for structured files. If the LOADID clause of the MEASCOM
        LIST command is used when this record is written to the structured file, this
        field contains a unique identification string for the record.
      type: integer
    u_loadid.load_id.prefix_id:
      queryable: false
      description: Prefix portion of the user-provided LOADID string.
      type: integer
    u_loadid.load_id.interval_id:
      queryable: false
      description: Interval sequence number appended to the LOADID string.
      type: integer
    system_name:
      queryable: true
      type: string
      description: Name of the system on which the measurement was taken.
    cpu_num:
      queryable: true
      type: integer
      description: Number of the CPU on which the measurement was taken.
    os_version.letter:
      queryable: true
      type: string
      description: Operating system release letter when the measurement was taken.
    os_version.number:
      queryable: true
      type: string
      description: Operating system release number when the measurement was taken.
    object_uid:
      queryable: false
      description: Unique object identifier for the record (ZMS Style only; reserved
        for future use).
      type: integer
    from_timestamp:
      queryable: true
      type: datetime
      description: Starting time of the measurement interval, represented as an ISO
        8601 extended format local timestamp.
    to_timestamp:
      queryable: true
      type: datetime
      description: Ending time of the measurement interval, represented as an ISO
        8601 extended format local timestamp.
    delta_time:
      queryable: true
      type: integer
      unit: microseconds
      description: Duration of the measurement interval, in microseconds.
    template_version:
      queryable: false
      description: Record template version from MEASDDLS for the format of the external
        record.
      type: integer
    format_version.letter:
      queryable: false
      description: Format version letter of the formatting program or formatted record.
      type: string
    format_version.number:
      queryable: false
      description: Format version number of the formatting program or formatted record.
      type: integer
    data_version.letter:
      queryable: false
      description: Data version letter of the collected data file.
      type: string
    data_version.number:
      queryable: false
      description: Data version number of the collected data file.
      type: integer
    subsystem_version:
      queryable: false
      description: Provided by the TMF subsystem
      type: integer
    error:
      queryable: false
      description: Error code indicating whether an error prevented data collection
        or record writing for this entity.
      type: integer
    home_trans:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: Number of transactions that began in the measured CPU; includes
        transactions regardless of whether they remain on the local system or are
        distributed to a remote system
    home_trans_qtime:
      queryable: true
      type: integer
      unit: microseconds
      counter_type: Queue
      description: Sum of lifetimes of transactions originated in the measured CPU;
        includes transactions regardless of whether they remain in the local system
        or are distributed to a remote system; RATE ON → AQL
    home_net_trans:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: Number of transactions that began in this system and were subsequently
        distributed to another system; advanced only in the CPU containing the primary
        $TMP process
    home_net_trans_qtime:
      queryable: true
      type: integer
      unit: microseconds
      counter_type: Queue
      derived_formula: home_net_trans_qtime / NULLIF(home_net_trans, 0) / 1000.0 (returns ART in ms)
      description: Time that transactions that began on the local system and were
        subsequently distributed to a remote system spent on the remote system; advanced
        only in the CPU containing the primary $TMP process; RATE ON → AQL
    remote_trans:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: Number of transactions that began in a remote system and were distributed
        to the measured system; advanced only in the CPU containing the primary $TMP
        process
    remote_trans_qtime:
      queryable: true
      type: integer
      unit: microseconds
      counter_type: Queue
      derived_formula: remote_trans_qtime / NULLIF(remote_trans, 0) / 1000.0 (returns ART in ms)
      description: Time that transactions that began in a remote system and were distributed
        to the local system spent on the local system; advanced only in the CPU containing
        the primary $TMP process; RATE ON → AQL
    aborting_trans:
      queryable: true
      type: integer
      counter_type: Incrementing
      derived_formula: aborting_trans * 100.0 / NULLIF(home_trans, 0) (returns abort rate %)
      description: Number of aborted transactions; counted regardless of whether it
        began in the local system and remained there, began in the local system and
        was distributed to a remote system, or began in a remote system and was distributed
        to the local system; advanced only in the CPU containing the primary $TMP
        process
    trans_backout_qtime:
      queryable: true
      type: integer
      unit: microseconds
      counter_type: Queue
      description: Time that transactions spent waiting for and being serviced by
        BACKOUT; after a transaction is designated as aborting and its audit is on
        disk, that transaction is scheduled for backout services; advanced only in
        the CPU containing the primary $TMP process; RATE ON → AQL
    tmp_work:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: Number of work items placed on the TMP queue
    tmp_work_qtime:
      queryable: true
      type: integer
      unit: microseconds
      counter_type: Queue
      description: Time that work items spent on the TMP queue; RATE ON → AQL
    pio_sends:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: Number of PIOs sent to other CPUs
    pio_send_qtime:
      queryable: true
      type: integer
      unit: microseconds
      counter_type: Queue
      description: Time PIOs spent in transit; RATE ON → AQL
    pio_send_bytes:
      queryable: true
      type: integer
      unit: bytes
      counter_type: Accumulating
      description: Number of PIO bytes sent to other CPUs
    pio_recvs:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: Number of PIOs received by the CPU
    pio_recv_bytes:
      queryable: true
      type: integer
      unit: bytes
      counter_type: Accumulating
      description: Number of PIO bytes received by the CPU
  interpretations: []
  thresholds: []
  relationships: []
  counter_classifications:
  - counter: ABORTING-TRANS
    type: Incrementing counter
  - counter: HOME-NET-TRANS
    type: Incrementing counter
  - counter: HOME-TRANS
    type: Incrementing counter
  - counter: PIO-RECVS
    type: Incrementing counter
  - counter: PIO-RECV-BYTES
    type: Accumulating counter
  - counter: PIO-SENDS
    type: Incrementing counter
  - counter: PIO-SEND-BYTES
    type: Accumulating counter
  - counter: REMOTE-TRANS
    type: Incrementing counter
  - counter: TMP-WORK
    type: Incrementing counter
  - counter: HOME-NET-TRANS-QTIME
    type: Queue counter
  - counter: HOME-TRANS-QTIME
    type: Queue counter
  - counter: PIO-SEND-QTIME
    type: Queue counter
  - counter: REMOTE-TRANS-QTIME
    type: Queue counter
  - counter: TMP-WORK-QTIME
    type: Queue counter
  - counter: TRANS-BACKOUT-QTIME
    type: Queue counter
  - counter: HOME-NET-TRANS-QMAX
    type: Max queue counter
  - counter: HOME-TRANS-QMAX
    type: Max queue counter
  - counter: REMOTE-TRANS-QMAX
    type: Max queue counter
  - counter: TRANS-BACKOUT-QMAX
    type: Max queue counter
  - counter: TMP-WORK-AQT
    type: Average Queue Time counter
  - counter: HOME-TRANS-ART
    type: Average response time counter
  - counter: HOME-NET-TRANS-ART
    type: Average response time counter
  - counter: REMOTE-TRANS-ART
    type: Average response time counter
  - counter: TRANS-BACKOUT-ART
    type: Average response time counter
  formulas:
  - name: Local-only Transactions
    formula: HOME-TRANS - HOME-NET-TRANS
    description: Number of transactions that began on the local system and were never
      distributed to another system.
  - name: Total Network Transactions
    formula: SUM(HOME-NET-TRANS) + SUM(REMOTE-TRANS)
    description: The total number of network transactions the local system has participated
      in, summed across all CPUs.
  - name: Total System Transactions
    formula: SUM(HOME-TRANS) + SUM(REMOTE-TRANS)
    description: The total number of transactions this system has participated in,
      summed across all CPUs in the system.
  - name: TMP-WORK-AQT
    formula: TMP-WORK-QTIME / TMP-WORK
    description: The average time that each work item spends waiting on the TMP queue.
  - name: HOME-TRANS-ART
    formula: HOME-TRANS-QTIME / HOME-TRANS
    description: The average response time that each home transaction spends waiting
      or being processed by TMF.
  - name: HOME-NET-TRANS-ART
    formula: HOME-NET-TRANS-QTIME / HOME-NET-TRANS
    description: The average response time that each request spends waiting or being
      processed by TMF.
  - name: REMOTE-TRANS-ART
    formula: REMOTE-TRANS-QTIME / REMOTE-TRANS
    description: The average response time that each remote home net transaction spends
      waiting or being processed by TMF.
  - name: TRANS-BACKOUT-ART
    formula: TRANS-BACKOUT-QTIME / ABORTING-TRANS
    description: The average response time that each aborting transaction spends waiting
      or being processed by TMF.
  business_rules:
  - rule: ABORTING-TRANS double counting
    description: A PRIMARY switch of $TMP causes a small number of aborting transactions
      to be counted twice, once in the old primary and once in the new primary. Multiple
      PRIMARYs can cause an aborting transaction to be counted more than twice.
  - rule: Primary $TMP switch behavior for incrementing counters
    description: Counters such as ABORTING-TRANS, HOME-NET-TRANS, and REMOTE-TRANS
      are advanced only in the TMF record of the CPU containing the primary $TMP process.
      If the primary $TMP switches CPUs, the new primary increments these counters,
      while the old primary's counters remain intact.
  - rule: Primary $TMP switch behavior for queue time counters
    description: Queue time counters such as HOME-NET-TRANS-QTIME, REMOTE-TRANS-QTIME,
      and TRANS-BACKOUT-QTIME are advanced only in the CPU with the primary $TMP.
      On a switch, the new $TMP increments its counter until accurate, while the old
      primary's counter becomes zero.
  - rule: ZMS versus Legacy Style differences
    description: Average Response Time (ART) counters are available in ZMS Style only.
      Max queue (QMAX) counters are available in Legacy Style only.
  sql_generation_guidance:
  - rule: Aggregation of transaction counters across CPUs
    guidance: To find system-wide totals for transactions, sum the respective counters
      (HOME-TRANS, REMOTE-TRANS, HOME-NET-TRANS) across all CPUs.
  - rule: Derived counter calculation
    guidance: Average queue times and response times must be calculated by dividing
      the summed QTIME counter by the summed transaction or work counter across the
      appropriate scope, rather than averaging the pre-calculated ART or AQT values.
  reporting_guidance:
  - guidance: When reporting on total network or system transactions, ensure the totals
      are aggregated across all CPUs as the primary $TMP process can switch CPUs and
      counters might be localized or reset based on $TMP ownership.
