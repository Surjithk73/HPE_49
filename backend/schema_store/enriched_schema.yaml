        \ reports. In Measure H01 and later PVUs, MEASCOM LIST commands accept ANSI\
        \ SQL/MX release 2 module object names (run unit names) in SQLSTMT entity\
        \ specifications. SQL/MX module names (previously called run unit names),\
        \ can be:  ``` Measure PVUsMeasure PVUs Length (In Characters)Length (In Characters)\
        \ G10 and earlierUp to 128 G11 and later Up to 784 ``` If specific module\
        \ names are not specified in SQL/MX, a system-generated name based on the\
