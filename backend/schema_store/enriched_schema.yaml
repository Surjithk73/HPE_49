  file.DEVICE_NAME: For Nonstop files, this field is the same as the FILE-NAME VOLUME
    subfield.
  file.OPENER_DEVICE_NAME: For Nonstop files, this field is the same as the OPENER-PROGRAM-FILENAME
    VOLUME subfield.
  file.FILE_BUSY_TIME: 'For waited I/O, the FILE-BUSY-TIME counter is the elapsed
    time spent executing waited I/O requests. The file system starts FILE-BUSY-TIME
    counter when the message for the I/O request (for example, READ or WRITE) is sent
    to the server. Requests sent during the file open and close and requests sent
    to the OSS Name Server are not counted in the FILE-BUSY-TIME counter, but are
    counted in the PROCESS entity. For nowait I/O, in J06.20/L16.05 and later RVUs,
    the FILE-BUSY-TIME counter includes the elapsed time to initiate nowait I/O requests
    to the server and the elapsed time the process is suspended in AWAITIO[X] waiting
    for nowait I/Os for each file open. ``` NOTENOTE The FILE-BUSY-TIME counter does
    not include: The process wait time in select() and FILE_COMPLETE_() for OSS non-regular
    files to become ready. ``` For nowait I/O, in RVUs prior to in J06.20/L16.05,
    the FILE-BUSY-TIME counter is the execution time to initiate nowait I/O requests
    to the server and any elapsed time the process actually spends waiting for nowait
    requests to complete in AWAITIO[X]. For the OSSPIPE FILE open type, general application
    usage of the OSSPIPE will allow read() or write() to complete on a memory-to-memory
    move and will generate a low FILE-BUSY-TIME. However, if applications ignore the
    OSSFM error EWOULDBLOCK (4101), then FILE-BUSY- TIME will increment.'
  file.RECORDS_USED: In G-series RVUs, the RECORDS-USED-F field is a 64-bit version
    of RECORDS-USED.
  file.RECORDS_ACCESSED: In G-series RVUs, the RECORDS-ACCESSED-F field is a 64-bit
    version of RECORDS-ACCESSED.
  file.DISC_READS: In G-series RVUs, the DISC-READS-F field is a 64-bit version of
    DISC-READS.
  file.OSS_CACHE_READ_BYTES: For OSS regular files only, the number of bytes read
    by OSS-CACHE-READS.
  file.OSS_CACHE_WRITE_BYTES: For OSS regular files only, the number of bytes written
    by OSS-CACHE-WRITES.
  file.OSS_BLOCK_READ_BYTES: For OSS regular files only, the number of bytes read
    to cache as a result of OSS-BLOCK-READS.
  file.MISC_CALLS: For OSS, this counter totals operations that increase FILE-BUSY-TIME
    but are not READS, WRITES, or INFO-CALLS.
  ossns.FROM_TIMESTAMP: When using the CSV[A], JSON, or XML report format, the timestamp
