      description: "Value of the user-defined counter; interpretation depends on counter\
        \ type (MANUAL DEF: (ZMS Style only) Value of a user\u2011defined counter.)"
      derived_formula: None specified
      thresholds: None specified
    counts:
      type: integer
      description: (Legacy Style only) Value of a user-defined accumulating counter.
      queryable: true
      derived_formula: None specified
      thresholds: None specified
    max_value:
      type: integer
      description: (Legacy Style only) Maximum number of items on the queue described
        by the TIME-VALUE counter.
      queryable: true
      derived_formula: None specified
      thresholds: None specified
    time_value:
      type: integer
      description: (Legacy Style only) Redefined. See COUNTS.
      queryable: true
      derived_formula: None specified
      thresholds: None specified
    creatorid:
      type: integer
      description: Creator access ID (CAID). Identifies the creator of the process
        (divided into GROUP and USER).
      queryable: true
      derived_formula: None specified
      thresholds: None specified
    gmom:
      type: integer
      description: GMOM structure containing node, cpu, pin, and jobid of the NetBatch
        job that initiated the process.
      queryable: true
      derived_formula: None specified
      thresholds: None specified
    gmom_full_id:
      type: integer
      description: 64-bit redefinition of the individual GMOM fields as a single value.
      queryable: true
      derived_formula: None specified
      thresholds: None specified
    program_file_name:
      type: integer
      description: Name of the object file the process is executing (VOLUME, SUBVOLUME,
        FILENAME).
      queryable: true
      derived_formula: None specified
      thresholds: None specified
    program_file_name_mid:
      type: integer
      description: Internal format representation of an OSS file pathname (PATHID
        and CRVSN).
      queryable: true
      derived_formula: None specified
      thresholds: None specified
    userid:
      type: integer
      description: Process accessor ID (PAID), helps identify the owner of the process.
      queryable: true
      derived_formula: None specified
      thresholds: None specified
derived_metrics:
  cpu.FROM_TIMESTAMP: When using the CSV[A], JSON, or XML report format, the timestamp
