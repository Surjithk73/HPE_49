        the file open type added for measurement or selected for list display reporting.
        Possible values are: ``` %H000 UNSTRUCT %H001 RELFILE %H002 ENTRYFILE %H003
        KEYFILE %H008 PROCFILE %H081 SQLFILE %H101 OSSFIFO %H102 OSSPIPE %H201 OSSDISK
        %H411 OSSUNIXSTREAM %H412 OSSUNIXDGRAM %H421 OSSINETSTREAM %H422 OSSINETDGRAM
