endpoint:
  counter_classifications:
  - counter: IO-QBUSY-TIME
    classifications:
    - Busy counter
    - Service time counter
  - counter: READ-QBUSY-TIME
    classifications:
    - Busy counter
    - Service time counter
  - counter: WRITE-QBUSY-TIME
    classifications:
    - Busy counter
    - Service time counter
  - counter: SERVER-QTIME
    classifications:
    - Queue counter
    - Response-time counter
  - counter: WRITE-QTIME
    classifications:
    - Queue counter
    - Response-time counter
  formulas:
  - formula_name: Average Message Latency (IPC)
    formula: (WRITE-QTIME(linker) - SERVER-QTIME(listener)) / WRITE-REQUESTS(linker)
    description: Calculates the average message latency for message transfers between
      linker and listener processors.
  - formula_name: Average Message Latency (Separate Clusters)
    formula: Average(WRITE-QTIME) - Average(SERVER-QTIME)
    description: Calculates the average message latency between processors in separate
      clusters using similar intervals, since measurement intervals are not coordinated
      between systems.
  interpretations:
  - counter: RETRIES
    guidance: High values are expected for connections to NonStop S70000 servers (NSRG
      processors) due to software recovery of MITE defects. NonStop S72000 servers
      (NSR-T) might also report high retries when communicating with NSR-G processors.
  - counter: READ-BYTES
    guidance: If listener READ-BYTES exceeds corresponding linker WRITE-BYTES, it
      indicates frequent message system MQC allocation failures, causing retransfer
      of message data.
  - counter: IO-QBUSY-TIME
    guidance: For storage SACs such as MFIOB devices, this is the most accurate indicator
      of busy time and service time for each request.
  - counters:
    - READ-QBUSY-TIME
    - WRITE-QBUSY-TIME
    guidance: Provide similar data to IO-QBUSY-TIME for storage SACs, but are somewhat
      less accurate in the ENDPOINT environment due to request queuing.
  - counters:
    - READ-REQUESTS
    - READ-QBUSY-TIME
    guidance: Comparison of these two counters provides an accurate Message System
      latency for pull operations.
  business_rules:
  - rule: SERVERNET Replacement
    description: The SERVERNET entity has been replaced by ENDPOINT. SERVERNET is
      deprecated.
  - rule: Scope of ENDPOINT operations
    description: Measures combined activity for all devices sharing a CLIM. There
      is overlap with device entity types (DEVICE, DISK) when a single device connects
      to a single controller.
  - rule: IPC and RIPC Measurement
    description: 'Interprocessor communications (IPC) activity requires two ENDPOINT
      records: one for the initiating processor (linker) and one for the receiving/replying
      processor (listener).'
  - rule: Cluster Connection Accounting
    description: Linker and listener records count the same number of message exchanges
      and byte counts to allow the linker record to fully account for message traffic.
  - rule: Pre-push Messages
    description: For pre-push (non-cluster) messages, listener READ-REQUESTS is not
      incremented. It reflects pull operations and is a subset of WRITE-REQUESTS.
  - rule: Remote Node Messages Large Payload
    description: For remote node messages larger than readlinkcache size (e.g., >
      2048 bytes), the listener performs two pulls (control and data), causing READ-REQUESTS
      to potentially be double the number of WRITE-REQUESTS.
  - rule: Storage CLIM Activity Reporting
    description: 'Storage CLIM activity is reported in two separate ENDPOINT records:
      one from the Storage subsystem (reports IO activity, no Control IO) and one
      from the CIP subsystem (reports Control IO activity, no IO activity).'
  relationships:
  - relationship: Listener to Linker
    description: An IPC ENDPOINT linker record (initiating processor) corresponds
      to a listener ENDPOINT record (receiving processor) to track full IPC activity.
  - relationship: ENDPOINT to DEVICE/DISK
    description: Overlap exists between ENDPOINT and DEVICE/DISK entity types when
      a single device is connected to a single controller.
  - relationship: CLIM to Subsystems
    description: 'A single Storage CLIM relates to two ENDPOINT records: one for the
      Storage subsystem and one for the CIP subsystem.'
  sql_generation_guidance:
  - guidance: When calculating latency across clusters, aggregate average SERVER-QTIME
      and average WRITE-QTIME independently over a similar interval before subtracting,
      as measurement intervals are not coordinated.
  reporting_guidance:
  - guidance: When reporting on Storage CLIMs, ensure to aggregate or present both
      the Storage subsystem record (for IO-BYTES, REQUESTS, Q-counters) and the CIP
      subsystem record (for CBYTES, CREQUESTS) to provide a complete view.
  - guidance: Clarify to users that high RETRIES on connections to NSR-G processors
      are normal and not necessarily an indicator of a network problem.
  thresholds: []
  ddl_record: ZMSENDPT
  entity_type: ENDPOINT (ServerNet and communications endpoint)
  purpose: IPC communications and CLIM-attached device interface performance. Tracks
    messages, bytes, queue times, and retries.
  identity_columns:
  - system_name
  - cpu_num
  - adapter_name
  - sac_name
  time_columns:
  - from_timestamp
  - to_timestamp
  - delta_time
  join_hints:
  - JOIN fabric ON (system_name, cpu_num, from_timestamp) for detailed virtual channel
    correlation
  columns:
