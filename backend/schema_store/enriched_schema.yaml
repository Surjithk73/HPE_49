    requests:
      queryable: true
      type: integer
      description: Number of requests received by the terminal process. To determine
        how long the requests were queued before being read by the terminal process,
        measure the process and examine the PROCESS RECV -QTIME counter.
    reads:
      queryable: true
      type: integer
      description: 'Number of read operations (from the terminal to memory) performed
        by the terminal process. Counter type: Incrementing.'
    writes:
      queryable: true
      type: integer
      description: 'Number of write operations (from memory to the terminal) performed
        by the terminal process. Counter type: Incrementing.'
    input_bytes:
      queryable: true
      type: integer
      description: Number of bytes read from the terminal. The total number of bytes
        transferred to and from the terminal is this counter plus OUTPUT -BYTES. For
        SNAX lines, this counter includes the 6 -byte transmission header (TH) and
        the 3 -byte request/response (RH) SNA headers. In D-series and G-series RVUs,
        this is a 32-bit counter. In H-series and later RVUs, it is a 64-bit counter.
    output_bytes:
      queryable: true
      type: integer
      description: Number of bytes written to the terminal. The total number of bytes
        transferred to and from the terminal is INPUT -BYTES plus this counter.
    read_qbusy_time:
      queryable: true
      type: integer
      description: 'Time spent in a state in which requests for data transfer from
        this entity to memory were queued. Counter type: Queue Busy.'
    read_qtime:
      queryable: true
      type: integer
      description: 'Total time spent by read requests queued for this entity. With
        REPORT RATE ON, the average number of read requests queued for this entity.
        Counter type: Queue.'
    write_qbusy_time:
      queryable: true
      type: integer
      description: 'Time spent in a state in which requests for data transfer from
        memory to this entity were queued. Counter type: Queue Busy.'
    write_qtime:
      queryable: true
      type: integer
      description: 'Total time spent by write requests queued for this entity. With
        REPORT RATE ON, the average number of write requests queued for this entity.
        For IPC and RIPC node class entities, this counter has changed (as of Measure
        G08 and later PVUs) to include the entire time the linker waits for a request
        to complete. Counter type: Queue.'
    device_qbusy_time:
      queryable: true
      type: integer
      description: '(ZMS Style only) Time spent in a state in which requests of any
        number or type were queued to this optical disk in this processor. Counter
        type: Queue Busy.'
    dbio_reads:
      queryable: true
      type: integer
      description: 'Number of direct bulk I/O read operations to the measured file.
        This counter is a subset of READS. Counter type: Incrementing.'
    dbio_writes:
      queryable: true
      type: integer
      description: 'Number of direct bulk I/O write operations to the measured file.
        This counter is a subset of WRITES. Counter type: Incrementing.'
    ctrl:
      queryable: true
      type: integer
      description: (Legacy Style only) Not used; returns zero. L
    unit:
      queryable: true
      type: integer
      description: (Legacy Style only) Unit number of the device. L
    read_busy_time:
      queryable: true
      type: integer
      description: '(Legacy Style only) Time spent reading from the disk. This counter
        measures the time from the instruction that starts the read operation to the
