      queryable: true
      type: integer
      description: Total number of bytes transferred to and from the SAC by all IOPs
        connected to this controller path.
    io_qtime:
      queryable: true
      type: integer
      description: Total time spent by I/Os queued for this entity. With REPORT RATE
        ON , the average number of I/Os queued for this entity.
    io_qbusy_time:
      queryable: true
      type: integer
      description: 'Time spent in a state in which requests of any number or type
        were queued for this entity. Counter type: Queue Busy.'
    read_requests:
      queryable: true
      type: integer
      description: Number of requests that transferred data from this entity into
        the CPU.
    write_requests:
      queryable: true
      type: integer
      description: Number of requests that transferred data from the CPU to this entity.
    read_bytes:
      queryable: true
      type: integer
      description: Total number of bytes transferred as a result of read requests
        or pull operations and the bytes received in pre-push operations from the
        linker CPU.
    read_cbytes:
      queryable: true
      type: integer
      description: For IPC and RIPC node classes, total number of message system protocol
        control bytes transferred to this processor as a result of requests. For a
        CLIM node class, the total number of bytes in the incoming control requests
        from the CLIM into the CPU. In all cases, these control bytes are not included
        in the counter READ-BYTES.
    read_qtime:
      queryable: true
      type: integer
      description: Total time spent by read requests queued for this entity. With
        REPORT RATE ON, the average number of read requests queued for this entity.
    read_qbusy_time:
      queryable: true
      type: integer
      description: Time spent in a state in which requests for data transfer from
        this entity to memory were queued.
    write_bytes:
      queryable: true
      type: integer
      description: Total number of bytes transferred as a result of write requests.
    write_cbytes:
      queryable: true
      type: integer
      description: For IPC and RIPC node classes, total number of message system protocol
        control bytes transferred to this processor as a result of requests. For a
        CLIM node class, the total number of bytes in the outgoing control requests
        from the CPU into the CLIM. In all cases, these control bytes are not included
        in the counter WRITE-BYTES.
    write_qtime:
      queryable: true
      type: integer
      description: Total time spent by write requests queued for this entity. With
        REPORT RATE ON, the average number of write requests queued for this entity.
        For IPC and RIPC node class entities, this counter has changed (as of Measure
        G08 and later PVUs) to include the entire time the linker waits for a request
        to complete.
    write_qbusy_time:
      queryable: true
      type: integer
      description: Time spent in a state in which requests for data transfer from
        memory to this entity were queued.
    server_qtime:
      queryable: true
      type: integer
      description: Time (in microseconds) between the receipt of messages in this
        processor and the issuing of replies. This value does not include READ-QTIME
        for Message System read operations to pull the data to the CPU. The counter
        helps to isolate Message System latency time from the time required for the
        receiving process to respond to a request. This applies only to IPC and RIPC
        records.
    retries:
      queryable: true
      type: integer
      description: Number of times the message system tries to send a message before
        succeeding. This counter applies only to IPC and RIPC records.
    acks:
      queryable: true
      type: integer
      description: Number of explicit acknowledgment messages sent. This counter applies
        only to IPC and RIPC records.
    x_defrd_busy_time:
      queryable: true
      type: integer
      description: Time (in microseconds) during which the Message System was unable
        to switch from using the Y fabric to using the X fabric. A large value for
        this counter can be the result of an outstanding message on the Y fabric or
        a problem with the X fabric. This counter applies only to IPC and RIPC records.
    y_defrd_busy_time:
      queryable: true
      type: integer
      description: Time (in microseconds) during which the Message System was unable
        to switch from using the X fabric to using the Y fabric. A large value for
        this counter can be the result of an outstanding message on the X fabric or
        a problem with the Y fabric. This counter applies only to IPC and RIPC records.
    read_crequests:
      queryable: true
      type: integer
      description: (ZMS Style only) For a CLIM, number of incoming control requests
        from this entity into the CPU. This counter appears in the NORMAL but not
        the BRIEF display.
    write_crequests:
      queryable: true
      type: integer
      description: (ZMS Style only) For a CLIM, number of outgoing control requests
        from the CPU into this entity. This counter appears in the NORMAL but not
        the BRIEF display.
    error:
      queryable: true
      type: integer
      description: Error code indicating whether an error prevented data collection
        or record writing for this entity.
    channel:
      queryable: true
      type: integer
      description: (Legacy Style only) Not used; returns zero.
    ctrl:
      queryable: true
      type: integer
      description: (Legacy Style only) Not used; returns zero. L e g a c y S t l O
        n C o u r F i d D fi s f .
    io_qlen_max:
      queryable: true
      type: integer
      description: (Legacy Style only) Maximum number of outstanding I/Os on the queue
        described by the IO -QTIME counter.
    read_qlen_max:
      queryable: true
      type: integer
      description: (Legacy Style only) Maximum number of requests on the read request
        queue since the counter record was allocated.
    write_qlen_max:
      queryable: true
      type: integer
      description: (Legacy Style only) Maximum number of requests on the write request
        queue since the counter was allocated.
    server_qlen_max:
      queryable: true
      type: integer
      description: (Legacy Style only) Maximum number of items on the queue described
        by the SERVER-QTIME counter. This counter applies only to IPC and RIPC records.
        In H-series and later RVUs, this counter has a value of 1.
fabric:
  counter_classifications:
  - name: x-recvs
    type: Incrementing
    description: Number of receive operations on the X fabric.
  - name: x-recv-bytes
    type: Incrementing
    description: Bytes received on the X fabric.
  - name: x-sends
    type: Incrementing
    description: Number of send operations on the X fabric.
  - name: x-send-bytes
    type: Incrementing
    description: Bytes sent on the X fabric.
  - name: x-send-qlen-start
    type: Snapshot
    description: Send queue length on the X fabric at interval start.
  - name: x-send-qlen-end
    type: Snapshot
    description: Send queue length on the X fabric at interval end.
  - name: y-recvs
    type: Incrementing
    description: Number of receive operations on the Y fabric.
  - name: y-recv-bytes
    type: Incrementing
    description: Bytes received on the Y fabric.
  - name: y-sends
    type: Incrementing
    description: Number of send operations on the Y fabric.
  - name: y-send-bytes
    type: Incrementing
    description: Bytes sent on the Y fabric.
  - name: y-send-qlen-start
    type: Snapshot
    description: Send queue length on the Y fabric at interval start.
  - name: y-send-qlen-end
    type: Snapshot
    description: Send queue length on the Y fabric at interval end.
  formulas:
  - name: Total Sends
    formula: x-sends + y-sends
    description: Total sends across both fabrics.
  - name: Total Receives
    formula: x-recvs + y-recvs
    description: Total receives across both fabrics.
  - name: Total Bytes Sent
    formula: x-send-bytes + y-send-bytes
    description: Total bytes sent across both fabrics.
  - name: Total Bytes Received
    formula: x-recv-bytes + y-recv-bytes
    description: Total bytes received across both fabrics.
  interpretations:
  - condition: High x-send-qlen-start or x-send-qlen-end
    meaning: Indicates queueing and possible bottleneck or contention on the X fabric
      send path.
  - condition: High y-send-qlen-start or y-send-qlen-end
    meaning: Indicates queueing and possible bottleneck or contention on the Y fabric
      send path.
  - condition: Imbalance between X and Y traffic (e.g., x-sends >> y-sends)
    meaning: Traffic is not balanced across the X and Y interconnect fabrics.
  business_rules:
  - rule: FABRIC entity instruments system interconnect I/O activity at a lower level
      than the ENDPOINT entity and with more granularity. There can be many FABRIC
      entity records (representing virtual channels) for one ENDPOINT relationship.
  - rule: IPC_GLUP, IPC_PIO, and IPC_WHOL virtual channels are used for same-system
      messages only.
  - rule: IPC_HREP, IPC_HREQ, IPC_RPAK, IPC_RQAK, and IPC_ABAN virtual channels are
      used for both same-system and cross-system messages.
  - rule: IPC_MIAK is used for same-system and cross-system ABANDON ACK packets, but
      other MIAK types are same-system only.
  - rule: Devices connected by an FCSA or CLIM are dual fabric adapters and use both
      X (0) and Y (1) fabrics.
  relationships:
  - relation: FABRIC represents virtual channel activity between a CPU and other endpoints
      (CPU, STORAGE CLIM, IP CLIM, OPEN CLIM).
  - relation: Provides lower-level detail than the ENDPOINT entity (which instruments
      aggregate activity between CPU and target CPU/node).
  sql_generation_guidance:
  - guidance: To calculate per-second rates for incrementing counters like x-sends
      or y-send-bytes, divide by the measurement interval duration.
  - guidance: When comparing FABRIC traffic to ENDPOINT traffic, aggregate FABRIC
      metrics across all virtual channels for the target CPU/node.
  - guidance: To check for fabric balance, compare SUM(x-sends) vs SUM(y-sends) or
      SUM(x-send-bytes) vs SUM(y-send-bytes).
  reporting_guidance:
  - guidance: Present X and Y fabric metrics side-by-side to allow users to verify
      fabric load balancing.
  - guidance: Group FABRIC activity by virtual-chan-name to isolate specific types
      of traffic (e.g., IPC_PIO for TMF I/O vs IPC_HREQ for messages).
  thresholds: []
  ddl_record: ZMSFABR
