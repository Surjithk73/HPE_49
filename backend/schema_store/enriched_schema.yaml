        IPU-NUM-PREV and any previous IPUs (if IPU-SWITCHES is greater than 1). What
        this means is that if you total all the PROCESS CPU-BUSY-TIME in a CPU for
        a particular IPU (for example, LIST PROCESS 0,*, IF IPU- NUM = 1, TOTALS ONLY,
        RATE OFF) and there were IPU switches, this total is not likely to match the
        corresponding IPU-BUSY-TIME in the PROCESS entity, the priority for a particular
        process or set of processes at the start and end of a measurement interval
        and can be helpful in tuning an application. In H06.25/J06.14 and later RVUs,
        two sets of PROCESS entity counters are implemented to track process priority
        changes during a measurement: INITIAL-PRIORITY-START and INITIAL-PRIORITY-END,
        and CURRENT-PRIORITY- START and CURRENT-PRIORITY-END. The INITIAL-PRIORITY-START
        and INITIAL-PRIORITY-END snapshot counters reflect the target (requested)
        priority of a process at the start and end of a measurement interval. The
        initial priority can be changed during process execution by using the ALTPRI
        TACL command, or the ALTERPRIORITY, PRIORITY or PROCESS_SETINFO_ Guardian
        procedures. For example: a process that was launched with a priority of 100
        is said to have an initial priority of 100. If the priority for that process
        were changed to 150 using one of the procedures listed above, its initial
        priority would thereafter be 150. ```  ##### NOTENOTE  ``` The original initial
        priority value of a process (also known as the creation priority) is displayed
        in the first line of the PROCESS header and stored in the PRIORITY field in
        the ID section of the ZMSPROC record. This PRIORITY value is static during
        a measurement. ``` ``` The CURRENT-PRIORITY-START and CURRENT-PRIORITY-END
        snapshot counters reflect the current execution priority at the start and
        end of a measurement interval. The current priority can differ from the initial
        priority because a process may have its priority decremented by process control.
        For example: the current priority for a CPU bound process that started out
        with an initial priority of 150 may go down to 149, 148, and so on, as it
        executes and then return to a current priority (that matches the initial priority)
        of 150 when it becomes I/O bound. ``` ``` NOTENOTE If the process stops during
        a measurement, CURRENT-PRIORITY-END and INITIAL-PRIORITY-END may have unexpected
        values as operating system can modify these counter fields during the shutdown
