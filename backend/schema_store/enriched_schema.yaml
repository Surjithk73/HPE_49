    reply_qtime:
      queryable: true
      type: integer
      unit: microseconds
      counter_type: Queue
      description: Time replies spent in queue
    timeouts:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: Number of times a request timed out
    escalations:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: Number of times a record lock was escalated to a file lock
  formulas:
  - formula: AVG-ELAPSED-TIME = elapsed_busy_time / calls
    description: Calculates the average execution response time for the measured SQL
      statement.
  - formula: AVG-DISC-READS = disc_reads / calls
    description: Calculates the average physical disk reads per statement execution.
  business_rules:
  - rule: Adding a SQLSTMT entity automatically adds the corresponding SQLPROC entity
      for the process, but not the PROCESS entity.
  - rule: SQLSTMT counters are maintained at the process level rather than at the
      thread level.
  interpretations:
  - condition: High ratio of disc_reads to calls
    meaning: Indicates statement is executing full-table scans or suffering from cache
      misses; check query execution plan.
  - condition: High lock_waits or escalations
    meaning: Indicates high concurrency contention on locked rows/files; statement
      execution is blocked waiting for locks.
  thresholds: []
  relationships:
  - source: SQLSTMT run_unit
    target: SQLPROC process_name
    relationship: The run unit executes inside the SQLPROC-measured query executor
      process.
  sql_generation_guidance:
  - guidance: To ensure query execution detail is captured, start monitoring SQLSTMT
      before the SQL application starts and stop it after the process exits.
  reporting_guidance:
  - guidance: Use STATEMENT-INDEX to map the performance counters to the corresponding
      EXEC SQL statement line in compiler listings.
  counter_classifications:
  - counter: CALLS
    classification: Incrementing
  - counter: ELAPSED-BUSY-TIME
    classification: Elapsed
  - counter: DISC-READS
    classification: Incrementing
  - counter: LOCK-WAITS
    classification: Incrementing
device:
  counter_classifications:
  - counter: DEVICE-QBUSY-TIME
    type: Queue-Busy
  - counter: READ-QBUSY-TIME
    type: Queue-Busy
  - counter: WRITE-QBUSY-TIME
    type: Queue-Busy
  - counter: READ-QTIME
    type: Queue
  - counter: WRITE-QTIME
    type: Queue
  - counter: DEVICE-AST
    type: Average service time
  - counter: READS
    type: Incrementing
  - counter: WRITES
    type: Incrementing
  - counter: REQUESTS
    type: Incrementing
  - counter: INPUT-BYTES
    type: Accumulating
  - counter: OUTPUT-BYTES
    type: Accumulating
  - counter: DBIO-READS
    type: Incrementing
  - counter: DBIO-WRITES
    type: Incrementing
  formulas:
  - counter: DEVICE-AST
    formula: DEVICE-QBUSY-TIME / (READS + WRITES)
    description: The average service time that each request spends waiting or being
      processed by DP2.
  interpretations:
  - counter: DEVICE-QBUSY-TIME
    description: Time spent in a state in which requests of any number or type were
      queued to this device in this processor.
  - counter: READ-QTIME
    description: Total time spent by read requests queued. With REPORT RATE ON, provides
      the average number of read requests queued (Average Queue Length).
  - counter: WRITE-QTIME
    description: Total time spent by write requests queued. With REPORT RATE ON, provides
      the average number of write requests queued (Average Queue Length).
  - counter: DEVICE-AST
    description: Not affected by RATE ON or OFF. Measures the average time to satisfy
      each request of a resource.
  - counter: READ-QBUSY-TIME
    description: Time spent in a state in which requests for data transfer from this
      entity to memory were queued.
  - counter: WRITE-QBUSY-TIME
    description: Time spent in a state in which requests for data transfer from memory
      to this entity were queued.
  - concept: DEVICE activity
    description: Tracks all device activity including I/O from user and system processes,
      and internal activities like writing to free space table and volume labels.
  business_rules:
  - rule: Because of concurrent activity in the write and read queues, WRITE-QBUSY-TIME
      plus READ-QBUSY-TIME does not equal DEVICE-QBUSY-TIME.
  - rule: In G-series and later RVUs, the DEVICE entity applies only to tape drives
      (DEVICE-TYPE 4) and open SCSI (DEVICE-TYPE 8).
  - rule: For 32-bit accumulating counters like INPUT-BYTES and OUTPUT-BYTES in G-series,
      if an overflow occurs, the 32-bit field returns -1 and the 64-bit (-F) field
      must be used. In H-series and later, all byte-count fields are 64-bit.
  relationships:
  - source: DBIO-READS
    target: READS
    type: subset
    description: DBIO-READS is a subset of READS.
  - source: DBIO-WRITES
    target: WRITES
    type: subset
    description: DBIO-WRITES is a subset of WRITES.
  sql_generation_guidance:
  - guidance: For queue counters like READ-QTIME and WRITE-QTIME, applying RATE ON
      logic yields the Average Queue Length, which differs from standard RATE ON behavior
      (percentages or per-second rates).
  - guidance: When computing DEVICE-AST, use the explicit formula DEVICE-QBUSY-TIME
      / (READS + WRITES) instead of generic averages.
  reporting_guidance:
  - guidance: To compare and balance the workload of two or more devices, use the
      DEVICE counters instead of individual application process counters.
  thresholds: []
  ddl_record: ZMSDEV
  entity_type: DEVICE (Tape drives and open SCSI)
  purpose: Performance metrics for tape drives and open SCSI devices. Tracks queue
    busy times, service times, and I/O request rates.
