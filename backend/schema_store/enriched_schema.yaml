        The SERVERNET entity measures both intrasystem traffic and intersystem traffic
        (for example, all interprocessor traffic for remote nodes conncted through
        either Expand-over-ServerNet clustering in G-, H-, and J-series RVUs or Expand-over-IB
        clustering in L-series RVUs). Measure refers to the latter as Remote Interprocessor
        Communication or RIPC.  ``` Object File : \ node .$ system .sys nn .ztcpsrl
