      description: Expand node number of GMOM process (NetBatch); 0 if not NetBatch
    u_gmom.gmom.gmom_cpu:
      queryable: true
      type: integer
      description: CPU of GMOM process (NetBatch); 0 if not NetBatch
    u_gmom.gmom.gmom_pin:
      queryable: true
      type: integer
      description: PIN of GMOM process (NetBatch); 0 if not NetBatch
    u_gmom.gmom.gmom_jobid:
      queryable: true
      type: integer
      description: NetBatch job ID assigned by GMOM; 0 if not NetBatch
    gmom_sysname:
      queryable: true
      type: string
      description: Expand system name of GMOM node if remote; spaces otherwise
    gmom_process_name:
      queryable: true
      type: string
      description: Named process name of GMOM; spaces if not NetBatch
    type:
      queryable: true
      type: integer
      description: 'Type of the user-defined counter: 1=ACCUM (32-bit), 2=BUSY, 3=QUEUE,
        4=FACCUM (64-bit), 5=QBUSY, 6=TCELLBUSY, 7=TCELLQUEUE, 8=TCELLQBUSY, 9=SNAPSHOT
        (32-bit), 10=FSNAPSHOT (64-bit)'
    index:
      queryable: true
      type: integer
      description: Index value of the counter; single counter value has index 0; array
        index values range from 0-127 (0-511 for H07/J05/L-series and later)
    name:
      queryable: true
      type: string
      description: Name of the user-defined counter (up to 16 characters)
    value:
      queryable: true
      type: integer
      description: Value of the user-defined counter; interpretation depends on counter
        type
  formulas: []
  business_rules:
  - rule: User-defined counters are registered in application source code using MEASCOUNTERBUMPINIT
      and updated via MEASCOUNTERBUMP.
  - rule: On L-series RVUs, Timer Cell counters (TCELLBUSY, TCELLQUEUE, TCELLQBUSY)
      internally use regular TOD interfaces and execute as BUSY, QUEUE, or QBUSY.
  interpretations:
  - condition: Custom value spikes
    meaning: Application-specific operational metrics or business transaction milestones
      exceeded.
  thresholds: []
  relationships: []
  sql_generation_guidance:
  - guidance: To capture user-defined metrics, both the process and the counter name
      must be explicitly registered.
  reporting_guidance:
  - guidance: Counter types include Accumulating (1, 4), Busy (2, 6), Queue (3, 7),
      Queue Busy (5, 8), and Snapshot (9, 10).
  counter_classifications:
  - counter: VALUE
    classification: Dynamic
