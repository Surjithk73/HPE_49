        \ code and system library activity for all processes in the CPU. ``` #####\
        \ NOTENOTE  ``` A TNS/R system has more than one system code (SC) file. ```\
        \ ``` This example measures SCR and SLR code spaces. To support the TNS/R\
        \ operating environment, the SYSGEN program creates a new object file (file\
        \ code 700), named TSYSCLR, which is placed in $SYSTEM.SYSnn subvolume. This\
        \ object file can be used to sample TNS/R system code (SCR) and the TNS/R\
        \ system library (SLR). Because TNS/R code spaces contain no code maps, the\
        \ samples are displayed only for SCR and SLR. The TSYSCLR file is superseded\
        \ in H-series and later RVUs, as described later in this list of examples.\
        \ To sample TNS/R code spaces for SCR and SLR: ``` ``` This example describes\
        \ how to check for shared run-time libraries (SRLs) in a program and how to\
        \ include them in your program\u2019s PROCESSH measurement: 1. Identify all\
        \ the SRLs associated with a particular program using the Native Object File\
        \ Tool (NOFT) utility. 2. Add the SRLs as user library files (URLs) in MEASCOM.\
        \ The accounting and mapping of the PROCESSH total samples count for the program\
        \ and the sum of the individual code-space sample counts now match as closely\
        \ as currently possible. If a program uses SRLs: 1. Use the NOFT LISTSRLINFO\
        \ command to identify the SRLs: ``` ``` + ``` ``` + ``` ``` ADD PROCESSH ALLTIME\
        \ 7 (SC $SYSTEM.SYSnn.TSC) ``` ``` ADD PROCESSH ALLTIME 7 (SL $SYSTEM.SYSnn.TSL)\
        \ ``` ``` + ``` ``` + ``` ``` ADD PROCESSH proc spec (SCR $SYSTEM.SYSnn.TSYSCLR)\
        \ ``` ``` ADD PROCESSH proc spec (SLR $SYSTEM.SYSnn.TSYSCLR) ``` ``` noft>\
        \ FILE $VOL.SUBVOL.FILENAME ```  ``` 2. In MEASCOM, add these SRLs as ULRs\
        \ to the PROCESSH configuration of the program: ``` ``` No TSYSCLR file exists\
        \ in H-series and later RVUs. That file is replaced by the two system DLLs\
        \ INITDLL and MCPDLL. This example reflects the H-series and later library\
        \ structure. The code-space identifier SL designates nonnative system library\
        \ code: ```"
