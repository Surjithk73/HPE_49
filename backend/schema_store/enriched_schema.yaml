ossns:
  source_file: measurefiles/ossnscsv
  ddl_record: ZMSOSSNS
  entity_type: OSSNS (OSS Name Service)
  purpose: 'OSS Name Service (NS) performance metrics per process. One record per primary and backup process for each OSS name server defined on the system. Any OSS operation involving an OSS file pathname uses the OSS name server.

    '
  identity_columns:
  - system_name
  - cpu_num
  - pin
  - process_name
  time_columns:
  - from_timestamp
  - to_timestamp
  - delta_time
  join_hints:
  - JOIN proc ON (system_name, cpu_num, pin, from_timestamp) for process context
  columns:
    system_name:
      queryable: true
      type: string
      description: System Name
    cpu_num:
      queryable: true
      type: integer
      description: Cpu Num
    object_uid:
      queryable: false
      type: string
      description: Object Uid
    from_timestamp:
      queryable: true
      type: datetime
      description: From Timestamp
    to_timestamp:
      queryable: true
      type: datetime
      description: To Timestamp
    delta_time:
      queryable: true
      type: integer
      unit: microseconds
      description: Delta Time
    template_version:
      queryable: false
      type: integer
      description: Template Version
    subsystem_version:
      queryable: false
      type: integer
      description: Subsystem Version
    error:
      queryable: false
      type: integer
      description: Error
    pin:
      queryable: true
      type: integer
      description: PIN of the NS process
    process_name:
      queryable: true
      type: string
      description: Named process name (e.g. $ZPNS)
    ic_entries:
      queryable: true
      type: integer
      counter_type: Snapshot
      description: Configured number of Inode Cache (IC) records available on this name server
    lc_entries:
      queryable: true
      type: integer
      counter_type: Snapshot
      description: Configured number of Link Cache (LC) records available on this name server
    rr_processed:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: Number of name resolution requests processed by this name server
    rr_redir_sent:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: Number of name resolution requests redirected to another name server
    rr_redir_processed:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: Number of redirected name resolution requests processed
    ic_lookups:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: Inode Cache lookup operations
    ic_hits:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: Inode Cache hits; ic_hits/ic_lookups = hit ratio
      derived_formula: inode cache misses = IC-LOOKUPS - IC-HITS
    ic_dirty_qtime:
      queryable: true
      type: integer
      unit: microseconds
      counter_type: Queue
      description: Time dirty IC entries waited in queue
    lc_lookups:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: Link Cache lookup operations; LC also remembers unsuccessful lookups
    lc_hits:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: Link Cache hits; lc_hits/lc_lookups = hit ratio
      derived_formula: link cache misses = LC-LOOKUPS - LC-HITS
    lc_inuse_qtime:
      queryable: true
      type: integer
      unit: microseconds
      counter_type: Queue
      description: Time LC entries were in use; LC can expand beyond configured size
    checkpoint_reqs:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: Logical checkpoint requests sent by this name server to its backup
    checkpoint_blks:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: Checkpoint blocks sent to backup (multiple requests assembled per block)
    sem_waits:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: Semaphore wait events in processing threads
    sem_wait_qtime:
      queryable: true
      type: integer
      unit: microseconds
      counter_type: Queue
      description: Cumulative semaphore wait time in processing threads
    dp2_dd_reqs:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: Data definition requests sent to DP2 (creat, open, link, mkdir, chmod, chown, utime, rename, unlink, rmdir, mknod, mkfifo, bind)
    dp2_messages:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: Total messages sent to DP2 (includes DD calls and other calls)
    dp2_msg_qtime:
      queryable: true
      type: integer
      unit: microseconds
      counter_type: Queue
      description: Accumulated service time waiting while DP2 messages were outstanding
    ps_messages:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: Messages sent to pipe server processes ($ZPPnn)
    ps_msg_qtime:
      queryable: true
      type: integer
      unit: microseconds
      counter_type: Queue
      description: Time pipe server messages were outstanding
    ls_messages:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: Messages sent to local OSS server process ($ZPLS or $ZLSnn)
    ls_msg_qtime:
      queryable: true
      type: integer
      unit: microseconds
      counter_type: Queue
      description: Time local server messages were outstanding
    gettime_reqs:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: Number of gettime requests sent to a pipe server or local server
    settime_reqs:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: Number of settime requests sent to a pipe server or local server
    os_version_number:
      type: integer
      queryable: true
      description: Os Version Number
    format_version_number:
      type: integer
      queryable: true
      description: Format Version Number
    data_version_number:
      type: integer
      queryable: true
      description: Data Version Number
    u_loadid_loadid:
      type: string
      queryable: true
      description: U Loadid Loadid
    u_loadid_load_id_prefix_id:
      type: string
      queryable: true
      description: U Loadid Load Id Prefix Id
    u_loadid_load_id_interval_id:
      type: string
      queryable: true
      description: U Loadid Load Id Interval Id
    os_version_letter:
      type: string
      queryable: true
      description: Os Version Letter
    format_version_letter:
      type: string
      queryable: true
      description: Format Version Letter
    data_version_letter:
      type: string
      queryable: true
      description: Data Version Letter
    program_file_name_volume:
      type: string
      queryable: true
      description: Program File Name Volume
    program_file_name_subvol:
      type: string
      queryable: true
      description: Program File Name Subvol
    program_file_name_filename:
      type: string
      queryable: true
      description: Program File Name Filename
proc:
  source_file: measurefiles/proccsv
  ddl_record: ZMSPROC
  entity_type: PROC (Process)
  purpose: 'Per-process performance metrics for each measured process. Captures CPU
    utilization, memory, messaging, file I/O, and OSS activity. Counter records are
    initialized when the process starts, not at measurement start.

    '
  identity_columns:
  - system_name
  - cpu_num
  - pin
  - process_name
  - program_file_name.volume
  - program_file_name.subvol
  - program_file_name.filename
  time_columns:
  - from_timestamp
  - to_timestamp
  - delta_time
  join_hints:
  - JOIN cpu ON (system_name, cpu_num, from_timestamp) for CPU context
  - JOIN file ON (system_name, cpu_num, opener_pin, from_timestamp) for file activity
  - JOIN dopen ON (system_name, opener_cpu, opener_pin, from_timestamp) for disk open
    activity
  columns:
    system_name:
      queryable: true
      type: string
      description: NonStop node name Name of the system on which the measurement was
        taken.
    cpu_num:
      queryable: true
      type: integer
      description: CPU number where the process runs Number of the CPU on which the
        measurement was taken. For interprocessor communications (IPC records, CPU‑NUM
        is MYCPU.
    object_uid:
      queryable: false
      type: string
      description: Reserved for future use.
    from_timestamp:
      queryable: true
      type: datetime
      description: Starting time of the measurement or transient entity. Specified
        as Julian‑based, local civil time (LCT. When using the CSV[A], JSON, or XML
        report format, the timestamp is emitted as ISO 8601 date and time of day representation,
        extended format, fractional seconds, local time (YYYY-MM-DDThh:mm:ss.s.
    to_timestamp:
      queryable: true
      type: datetime
      description: Ending time of the measurement or transient entity. Specified as
        Julian‑based, local civil time (LCT. When using the CSV[A], JSON, or XML report
        format, the timestamp is emitted as ISO 8601 date and time of day representation,
        extended format, fractional seconds, local time (YYYY-MM-DDThh:mm:ss.s.
    delta_time:
      queryable: true
      type: integer
      unit: microseconds
      description: Duration of the measurement, in microseconds. The counters ACCEL-BUSY-TIME,
        NATIVE-BUSY-TIME, and TNS-BUSY-TIME are calculated, returned, and displayed
        only if a PROCESSH measurement has been active in the CPU during the delta
        time period.
    template_version:
      queryable: false
      type: integer
      description: Record template version from MEASDDLS for the format of the external
        record. When data collected on systems of differing product versions are stored
        in the same structured files, the template version for all records is the
        one used to create the structured file. The length of in^record is derived
        from the information encoded in the template version of the header record
        pointed to by in^record.
    subsystem_version:
      queryable: false
      type: integer
      description: Provided by Nonstop OS; >= 9 enables process-launch counters This
        value is set to 1 for the initial H-series and later versions of all subsystems.
        If the value is greater than 1, consult the subsystem documentation for information
        about changes that affect the Measure counters.
    error:
      queryable: false
      type: integer
      description: Indicates whether an error prevented Measure from collecting data
        or writing an output record for this entity. For values, see Identifying Data
        File Errors.
    pin:
      queryable: true
      type: integer
      description: Process Identification Number Process identification number of
        the measured process.
    priority:
      queryable: true
      type: integer
      description: Creation priority of the process Priority of the measured process.
        If response time increases significantly during low-priority SQL query activity,
        you see a low ratio between deferrable q-time and deferred q-time. Priority
        adjustments for the SQL query should correspond to changes in the ratio.
    process_name:
      queryable: true
      type: string
      description: 'Named process name (e.g. $ZEXP Name of the measured process. 0
        Unstructured 1 Relative 2 Entry-sequenced 3 Key-sequenced # STORAGE-POOLSTORAGE-POOL
        Name of the SMF storage pool to which the measured disk is assigned (process
        name of the storage pool process.'
    osspid:
      queryable: true
      type: integer
      description: OSS process ID; zeros for non-OSS processes If the process runs
        in the OSS environment, this field contains the OSS Process ID. If it is another
        process, this field contains zeros.
    ancestor_cpu:
      queryable: true
      type: integer
      description: CPU number of the ancestor process Number of the CPU on which the
        ancestor process resides.
    ancestor_pin:
      queryable: true
      type: integer
      description: PIN of the ancestor process Process identification number of the
        ancestor process.
    ancestor_sysname:
      queryable: true
      type: string
      description: System name of the ancestor process Name of the system on which
        the ancestor process resides.
    ancestor_process_name:
      queryable: true
      type: string
      description: Named process name of the ancestor Name of the ancestor process.
    device_name:
      queryable: true
      type: string
      description: Disk device of the program file; for SMF = physical location Disk
        device on which the program file is located. For SMF files, this field provides
        the physical location that corresponds to the logical file name. For Nonstop
        files, this field is the same as the FILE-NAME VOLUME subfield. MEAS_PATH_SEL
        Indicates that selection is only by path and device name, and not other attributes
        like lun, partition, or scsi-id.
    flags:
      queryable: true
      type: bitmask
      thresholds: 'settings output INT:ref:1 is an array of flags that indicates the
        current setting of Measure subsystem parameters controlled through defines:   error
        := MEASMONSTATUS ( meascb!'
      description: Bit 10=KLT process; Bit 11=AP; Bit 12=handles X+Y interrupts; Bit
        13=IP; Bit 15=NSMA system (ZMS style only, L-series and later RVUs A16-bit
        field that is used to indicate if the measurement was done on an L-series
        and later RVU. flags.0:13Reserved for future use.
    gmom_sysname:
      queryable: true
      type: string
      description: Expand system name of GMOM node if remote; spaces otherwise Expand
        system name of the GMOM node if the GMOM process is remote; otherwise spaces.
    gmom_process_name:
      queryable: true
      type: string
      description: Named process name of GMOM; spaces if not NetBatch Name of the
        GMOM process that initiated the NETBATCH job that in turn initiated this process;
        otherwise spaces.
    program_accelerated:
      queryable: true
      type: integer
      description: Non-zero if UC or UL portions of program are accelerated A flag
        that is set to nonzero if the user code (UC or user library (UL portions of
        the program have been accelerated.
    native_process:
      queryable: true
      type: integer
      description: Non-zero if process executes only in native mode A flag set for
        processes executing only in native mode.
    system_process:
      queryable: true
      type: integer
      description: System process type code; 0=not a system process (see SYSPROC_TYPE_*
        literals (ZMS style only, L01,H07/J05 and later This field identifies whether
        the process is a system process, and if so, the system process type. SYSPROC_TYPE_REGULAR
        0 Not a system process SYSPROC_TYPE_MONITOR 1 Monitor SYSPROC_TYPE_MEMMGR
        2 Memory manager SYSPROC_TYPE_MESSENGER 3 Messenger SYSPROC_TYPE_MEASURE_IP
        4 Measure IP SYSPROC_TYPE_IBRKPT_IP 5 Instruction Breakpoint Interrupt Process
        SYSPROC_TYPE_TIMER_IP 6 Timer IP SYSPROC_TYPE_MAB_IP 7 Memory Access Breakpoint
        Interrupt Process SYSPROC_TYPE_GFH 8 General Fault Handler SYSPROC_TYPE_SIGTRAP_MONITOR
        9 Signal Trap Monitor SYSPROC_TYPE_IDLE_AP 10 Idle Auxiliary Process SYSPROC_TYPE_ALIVE_AP
        11 Alive Auxiliary Process SYSPROC_TYPE_WATCHDOG_AP 12 Watchdog Timer Auxiliary
        Process SYSPROC_TYPE_SUSP_ACT_MON_AP 13 Suspend/Activate Monitor Auxiliary
        Process SYSPROC_TYPE_IB_MISC_IP 14 L-series Miscellaneous Interrupt Process
        SYSPROC_TYPE_IB_DRIVER_IP 15 L-series Driver Interrupt Process SYSPROC_TYPE_IB_COMM_IP
        16 L-series Comm Interrupt Process SYSPROC_TYPE_IB_STORAGE_IP 17 L-series
        Storage Interrupt Process SYSPROC_TYPE_IB_IPC_IP 18 L-series Message System
        Interrupt Process SYSPROC_TYPE_IB_ST_WQ_AP 19 L-series Single-Threaded Work
        Queue Auxiliary Process SYSPROC_TYPE_IB_MT_WQ_AP 20 L-series Multi-Threaded
        Work Queue Auxiliary Process SYSPROC_TYPE_IB_HELPER_AP 21 L-series Helper
        Auxiliary Process SYSPROC_TYPE_IB_LNX_HELPER_AP 22 L-series Linux Timer Helper
        Auxiliary Process SYSPROC_TYPE_IMIP_AP 23 L-series Maintenance Interface Protocol
        Auxiliary Process SYSPROC_TYPE_TNET_COMM_IP 24 Servernet Comm Interrupt Process
        SYSPROC_TYPE_TNET_STORAGE_IP 25 Servernet Storage Interrupt Process SYSPROC_TYPE_TNET_IPC_IP
        26 Servernet Message System Interrupt Process SYSPROC_TYPE_TNET_ERROR_IP 27
        Servernet Error Interrupt Process SYSPROC_TYPE_TNET_TIMER_AP 28 Servernet
        Timer Auxiliary Process SYSPROC_TYPE_SMIP_IP 29 Servernet Maintenance Interface
        Protocol Interrupt Process SYSPROC_TYPE_SMIP_AP 30 Servernet Maintenance Interface
        Protocol Auxiliary Process SYSPROC_TYPE_IB_NSADI_IP 31 L-series Application
        Direct Interface Interrupt Process.
    ipus:
      queryable: true
      type: integer
      description: 'Number of IPUs in the CPU (J-series+; 1 for non-NSMA The field
        is not displayed by MEASCOM, but determines whether the IPU-SWITCHES field
        is displayed. In Measure J01 and later PVUs, indicates the number of IPUs
        in the CPU. The field is not displayed by MEASCOM, but determines whether
        the IPU-SWITCHES field is displayed. # IPUSIPUS In Measure J01 and later PVUs,
        indicates the number of IPUs in the CPU. # IPU-SWITCHESIPU-SWITCHES Accumulating
        counter that indicates the total number of times that a process switched IPUs
        while executing.'
    hometerm_sysname:
      queryable: true
      type: string
      description: Home terminal system name Home terminal system name associated
        with the process. This identifier appears only in the data record, not in
        the PROCESS report.
    serverclass_name:
      queryable: true
      type: string
      description: Serverclass name (populated by Nonstop TS/MP Pathway; L02/J06+
        (ZMS style only, L02, J06 and later Serverclass name of the process. This
        field will be displayed if populated by Nonstop TS/MP pathway.
    cpu_busy_time:
      queryable: true
      type: integer
      unit: microseconds
      counter_type: Busy
      description: 'Time CPU spent executing this process; RATE ON → % Time that the
        CPU spent executing the measured process: In D-series RVUs, this counter is
        not advanced for the sending process when LDONE queuing is in use. For measurements
        on systems running G05 and later RVUs, this counter includes any page-defaulting
        activity performed on behalf of this process. For TNS/R systems, CPU-BUSY-TIME
        is the sum of ACCEL‑BUSY‑TIME, TNS‑BUSY‑TIME, and TNSR‑BUSY‑TIME. For TNS/E
        systems, CPU-BUSY-TIME is the sum of ACCEL‑BUSY‑TIME, TNS‑BUSY‑TIME, and NATIVE‑BUSY‑TIME.
        A CPU-BUSY-TIME value is always displayed. Related CounterRelated Counter
        DescriptionDescription CPU CPU-BUSY-TIMESimilar, but is the busy time for
        the entire processor. PROCESS CPU-NUM Identifies the CPU executing the process
        Counter type: Busy.'
    ready_time:
      queryable: true
      type: integer
      unit: microseconds
      counter_type: Busy
      description: Time process spent on ready list or executing; RATE ON → % The
        time that the measured process spent on the ready list or executing. To keep
        the measurement overhead to a minimum, this counter is not turned off during
        certain system activities. (G-series Due to changes in memory handling, the
        results of the READY-TIME counter for G05 and later RVUs are not directly
        comparable to earlier measurements. NOTENOTE Measure data can exhibit a combination
        of high PROCESS.READY-TIME and CPU.CPU-QTIME while having low PROCESS.CPU-BUSY-TIME
        and low overall processor utilization. Prior to G05, this was due to the suspension
        of PROCESS.CPU-BUSY-TIME while waiting for completion of a page fault. In
        either case, the PROCESS.READY-TIME and CPU.CPU-QTIME counters continue to
        accumulate.
    dispatches:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: Number of times process was dispatched (selected and run Number
        of times the process was selected from the ready list and executed by the
        CPU identified by the CPU‑NUM field. You can expect one dispatch for each
        I/O operation, plus additional dispatches caused by the process being preempted
        by higher priority processes.
    comp_traps:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: Number of compatibility mode traps during process execution Number
        of times a compatibility trap occurred during execution of this process. A
        compatibility trap is a data misalignment event, an unexpected transition
        to or from accelerated or unaccelerated code, or a relative segment 2 or 3
        problem.
    native_busy_time:
      queryable: true
      type: integer
      unit: microseconds
      counter_type: Busy
      description: Time CPU busy executing native code for this process; valid only
        when PROCESSH active Time that the CPU was busy executing native code in this
        process. See Usage Notes for H-series and later PROCESS Entities. The counters
        ACCEL-BUSY-TIME, NATIVE-BUSY-TIME, and TNS-BUSY-TIME are calculated, returned,
        and displayed only if a PROCESSH measurement has been active in the CPU during
        the delta time period. The counters ACCEL-BUSY-TIME, NATIVE-BUSY-TIME, and
        TNS-BUSY-TIME are calculated, returned, and displayed only if a PROCESSH measurement
        is active in the CPU where the process is running.
    accel_busy_time:
      queryable: true
      type: integer
      unit: microseconds
      counter_type: Busy
      description: Time CPU busy executing accelerated code for this process; valid
        only when PROCESSH active Time that the CPU was busy executing accelerated
        code in this process. This counter applies only to measurements taken on a
        TNS/R or TNS/E system. The counters ACCEL-BUSY-TIME, NATIVE-BUSY-TIME, and
        TNS-BUSY-TIME are calculated, returned, and displayed only if a PROCESSH measurement
        has been active in the CPU during the delta time period. The counters ACCEL-BUSY-TIME,
        NATIVE-BUSY-TIME, and TNS-BUSY-TIME are calculated, returned, and displayed
        only if a PROCESSH measurement is active in the CPU where the process is running.
    tns_busy_time:
      queryable: true
      type: integer
      unit: microseconds
      counter_type: Busy
      description: Time CPU busy executing TNS code for this process; valid only when
        PROCESSH active Time that the CPU was busy executing TNS code in this process.
        This counter applies only to measurements taken on a TNS/R or TNS/E system.
        The counters ACCEL-BUSY-TIME, NATIVE-BUSY-TIME, and TNS-BUSY-TIME are calculated,
        returned, and displayed only if a PROCESSH measurement has been active in
        the CPU during the delta time period. The counters ACCEL-BUSY-TIME, NATIVE-BUSY-TIME,
        and TNS-BUSY-TIME are calculated, returned, and displayed only if a PROCESSH
        measurement is active in the CPU where the process is running.
    vsems:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: 'Number of times process waited for a semaphore-protected resource
        Number of times the process waited for a resource in use by another process,
        where the resource is protected by the semaphore facility. Counter type: Incrementing.'
    ipu_switches:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: 'Number of times process switched IPUs while executing (NSMA systems
        Accumulating counter that indicates the total number of times that a process
        switched IPUs while executing. On a non- NSMA system, this field is always
        0 (zero. # IPU-SWITCHESIPU-SWITCHES Accumulating counter that indicates the
        total number of times that a process switched IPUs while executing.'
    ipu_num:
      queryable: true
      type: integer
      counter_type: Snapshot
      description: IPU number where process was executing when sample was taken (H05/J03+
        In Measure H05/J03 and later PVUs, the number of the IPU on which the process
        was executing when the sample was taken. On a non-NSMA system, this field
        is always 0 (zero.
    ipu_num_prev:
      queryable: true
      type: integer
      counter_type: Snapshot
      description: Previous IPU number if an IPU switch occurred during interval (H05/J03+
        In Measure H05/J03 and later PVUs, if an IPU switch took place during the
        measurement interval, IPU-NUM-PREV displays number of the IPU on which the
        process was executing before the most recent switch. If no IPU switch occurred
        during the measurement interval, this field is not displayed. In Measure H05/J03
        and later PVUs, if an IPU switch took place during the measurement interval,
        IPU-NUM-PREV displays number of the IPU on which the process was executing
        before the most recent switch.
    initial_priority_start:
      queryable: true
      type: integer
      counter_type: Snapshot
      description: Target (requested process priority at interval start (H06.25/J06.14+
        In H06.25/J06.14 and later RVUs, the target (requested process priority in
        effect at the start of the measurement interval. The initial priority specified
        for a process at the start of a measurement can be changed during execution
        by using the ALTPRI TACL command, or the ALTERPRIORITY, PRIORITY or PROCESS_SETINFO_
        Guardian procedures.
    initial_priority_end:
      queryable: true
      type: integer
      counter_type: Snapshot
      description: Target (requested process priority at interval end (H06.25/J06.14+
        In H06.25/J06.14 and later RVUs, the target (requested process priority in
        effect at the end of the measurement interval. The initial priority specified
        for a process at the start of a measurement can be changed during execution
        by using the ALTPRI TACL command, or the ALTERPRIORITY, PRIORITY or PROCESS_SETINFO_
        Guardian procedures.
    current_priority_start:
      queryable: true
      type: integer
      counter_type: Snapshot
      description: Current execution priority at interval start (H06.25/J06.14+ In
        H06.25/J06.14 and later RVUs, the current execution priority at the start
        of the measurement interval. See also Usage Notes for H-series and later PROCESS
        Entities.
    current_priority_end:
      queryable: true
      type: integer
      counter_type: Snapshot
      description: Current execution priority at interval end (H06.25/J06.14+ In H06.25/J06.14
        and later RVUs, the current execution process priority at the end of the measurement
        interval. See also Usage Notes for H-series and later PROCESS Entities.
    x_interrupts:
      queryable: true
      type: integer
      counter_type: Incrementing
      derived_formula: This is a derived counter, which is the sum of the X-INTERRUPTS
        and Y-INTERRUPTS counters.
      description: 'Number of X-fabric interrupts (or non-fabric interrupts handled
        (H07/J05+ (ZMS style only, L01,H07/J05 and later Number of X-fabric interrupts
        or non-fabric interrupts this process handled. Counter type: Incrementing.'
    y_interrupts:
      queryable: true
      type: integer
      counter_type: Incrementing
      derived_formula: This is a derived counter, which is the sum of the X-INTERRUPTS
        and Y-INTERRUPTS counters.
      description: 'Number of Y-fabric interrupts handled (H07/J05+ (ZMS style only,
        L01,H07/J05 and later Number of Y-fabric interrupts this process handled.
        Counter type: Incrementing.'
    tles_start:
      queryable: true
      type: integer
      counter_type: Snapshot
      description: 'Instrumentation timer cells (TLEs allocated at interval start
        (L02/J06+ (ZMS style only, L02, J06 and later Number of TLEs allocated at
        the start of the measurement interval. Counter type: Snapshot.'
    tles_end:
      queryable: true
      type: integer
      counter_type: Snapshot
      description: 'Instrumentation timer cells (TLEs allocated at interval end (L02/J06+
        (ZMS style only, L02, J06 and later Number of TLEs allocated at the end of
        the measurement interval. Counter type: Snapshot.'
    ipu_affinity_class_start:
      queryable: true
      type: integer
      counter_type: Snapshot
      description: 'IPU affinity class at interval start (L02/J06+ (ZMS style only,
        L02, J06 and later IPU affinity class of the process at the start of the measurement
        interval. Counter type: Snapshot.'
    ipu_affinity_class_end:
      queryable: true
      type: integer
      counter_type: Snapshot
      description: 'IPU affinity class at interval end (L02/J06+ (ZMS style only,
        L02, J06 and later IPU affinity class of the process at the end of the measurement
        interval. Counter type: Snapshot.'
    mem_qtime:
      queryable: true
      type: integer
      unit: microseconds
      counter_type: Queue
      description: 'Time process spent waiting on page faults; RATE ON → AQL Time
        that the measured process spent waiting on page faults. A page fault does
        not cause the system to remove the process from the ready list. Counter type:
        Queue.'
    page_faults:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: 'Number of page faults generated by this process Number of page
        faults generated by the process. Counter type: Incrementing.'
    pres_pages_qtime:
      queryable: true
      type: integer
      unit: microseconds
      counter_type: Queue
      description: Time pages sponsored by this process spent in main memory; RATE
        ON → AQL In D-series RVUs, time that pages owned by the process spent in main
        memory. In G-series RVUs, the time that pages sponsored by the measured process
        spent in main memory.
    pres_pages_start:
      queryable: true
      type: integer
      counter_type: Snapshot
      description: 'Pages in main memory sponsored by this process at interval start
        Number of pages in main memory sponsored by the measured process at the start
        of the measurement interval. Counter type: Snapshot.'
    pres_pages_end:
      queryable: true
      type: integer
      counter_type: Snapshot
      description: 'Pages in main memory sponsored by this process at interval end
        Number of pages in main memory sponsored by the measured process at the end
        of the measurement interval. Counter type: Snapshot.'
    abs_segs_qtime:
      queryable: true
      type: integer
