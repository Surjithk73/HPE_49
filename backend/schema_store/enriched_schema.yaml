        and positioning the disk heads to read the data. Counter type: Busy.'
    write_busy_time:
      queryable: true
      type: integer
      description: '(Legacy Style only) Time spent writing to the disk. This counter
        measures the time from the instruction that starts the write operation to
        the interrupt that ends the operation. This counter includes the time spent
        writing data and positioning the disk heads to write the data. Counter type:
        Busy.'
    channel:
      queryable: true
      type: integer
      description: (Legacy Style only) Not used; returns zero.
    read_qlen_max:
      queryable: true
      type: integer
      description: '(Legacy Style only) Maximum number of requests on the read request
        queue since the counter record was allocated. Counter type: Max queue.'
    write_qlen_max:
      queryable: true
      type: integer
      description: '(Legacy Style only) Maximum number of requests on the write request
        queue since the counter was allocated. Counter type: Max queue.'
    input_bytes_f:
      queryable: true
      type: integer
      description: '(G-series, Legacy Style only) Same as INPUT -BYTES but accommodates
