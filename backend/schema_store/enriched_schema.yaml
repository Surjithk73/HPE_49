        \ % (MANUAL DEF: The time that the measured process spent on the ready list\
        \ or executing. To keep the measurement overhead to a minimum, this counter\
        \ is not turned off during certain system activities.) (DERIVED METRIC: (G-series)\
        \ Due to changes in memory handling, the results of the READY-TIME counter\
        \ for G05 and later RVUs are not directly comparable to earlier measurements.\
        \ ``` NOTENOTE Measure data can exhibit a combination of high PROCESS.READY-TIME\
        \ and CPU.CPU-QTIME while having low PROCESS.CPU-BUSY-TIME and low overall\
        \ processor utilization. Prior to G05, this was due to the suspension of PROCESS.CPU-BUSY-TIME\
        \ while waiting for completion of a page fault. In either case, the PROCESS.READY-TIME\
        \ and CPU.CPU-QTIME counters continue to accumulate.)"
    dispatches:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: "Number of times process was dispatched (selected and run) (MANUAL\
        \ DEF: Number of times the process was selected from the ready list and executed\
        \ by the CPU identified by the CPU\u2011NUM field. You can expect one dispatch\
        \ for each I/O operation, plus additional dispatches caused by the process\
        \ being preempted by higher priority processes.)"
    comp_traps:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: 'Number of compatibility mode traps during process execution (MANUAL
        DEF: Number of times a compatibility trap occurred during execution of this
        process. A compatibility trap is a data misalignment event, an unexpected
        transition to or from accelerated or unaccelerated code, or a relative segment
        2 or 3 problem.)'
    native_busy_time:
      queryable: true
      type: integer
      unit: microseconds
      counter_type: Busy
      description: 'Time CPU busy executing native code for this process; valid only
        when PROCESSH active (MANUAL DEF: (ZMS Style only) Time that the CPU was busy
        executing native code in this process. See Usage Notes for H-series and later
        PROCESS Entities.)'
      derived_formula: The counters ACCEL-BUSY-TIME, NATIVE-BUSY-TIME, and TNS-BUSY-TIME
        are calculated, returned, and displayed only if a PROCESSH measurement has
        been active in the CPU during the delta time period. The counters ACCEL-BUSY-TIME,
        NATIVE-BUSY-TIME, and TNS-BUSY-TIME are calculated, returned, and displayed
        only if a PROCESSH measurement is active in the CPU where the process is running.
    accel_busy_time:
      queryable: true
      type: integer
      unit: microseconds
      counter_type: Busy
      description: 'Time CPU busy executing accelerated code for this process; valid
        only when PROCESSH active (MANUAL DEF: Time that the CPU was busy executing
        accelerated code in this process. This counter applies only to measurements
        taken on a TNS/R or TNS/E system.)'
      derived_formula: The counters ACCEL-BUSY-TIME, NATIVE-BUSY-TIME, and TNS-BUSY-TIME
        are calculated, returned, and displayed only if a PROCESSH measurement has
        been active in the CPU during the delta time period. The counters ACCEL-BUSY-TIME,
        NATIVE-BUSY-TIME, and TNS-BUSY-TIME are calculated, returned, and displayed
        only if a PROCESSH measurement is active in the CPU where the process is running.
    tns_busy_time:
      queryable: true
      type: integer
      unit: microseconds
      counter_type: Busy
      description: 'Time CPU busy executing TNS code for this process; valid only
        when PROCESSH active (MANUAL DEF: Time that the CPU was busy executing TNS
        code in this process. This counter applies only to measurements taken on a
        TNS/R or TNS/E system.)'
      derived_formula: The counters ACCEL-BUSY-TIME, NATIVE-BUSY-TIME, and TNS-BUSY-TIME
        are calculated, returned, and displayed only if a PROCESSH measurement has
        been active in the CPU during the delta time period. The counters ACCEL-BUSY-TIME,
        NATIVE-BUSY-TIME, and TNS-BUSY-TIME are calculated, returned, and displayed
        only if a PROCESSH measurement is active in the CPU where the process is running.
    vsems:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: 'Number of times process waited for a semaphore-protected resource
        (MANUAL DEF: Number of times the process waited for a resource in use by another
        process, where the resource is protected by the semaphore facility. Counter
        type: Incrementing.)'
    ipu_switches:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: 'Number of times process switched IPUs while executing (NSMA systems)
        (MANUAL DEF: (ZMS Style only) Accumulating counter that indicates the total
        number of times that a process switched IPUs while executing. On a non- NSMA
        system, this field is always 0 (zero).)'
      thresholds: '# IPU-SWITCHESIPU-SWITCHES (ZMS Style only) Accumulating counter
        that indicates the total number of times that a process switched IPUs while
        executing.'
    ipu_num:
      queryable: true
      type: integer
      counter_type: Snapshot
      description: 'IPU number where process was executing when sample was taken (H05/J03+)
        (MANUAL DEF: (ZMS Style only) In Measure H05/J03 and later PVUs, the number
        of the IPU on which the process was executing when the sample was taken. On
        a non-NSMA system, this field is always 0 (zero).)'
    ipu_num_prev:
      queryable: true
      type: integer
      counter_type: Snapshot
      description: 'Previous IPU number if an IPU switch occurred during interval
        (H05/J03+) (MANUAL DEF: (ZMS Style only) In Measure H05/J03 and later PVUs,
        if an IPU switch took place during the measurement interval, IPU-NUM-PREV
        displays number of the IPU on which the process was executing before the most
        recent switch. If no IPU switch occurred during the measurement interval,
        this field is not displayed.) (DERIVED METRIC: (ZMS Style only) In Measure
        H05/J03 and later PVUs, if an IPU switch took place during the measurement
        interval, IPU-NUM-PREV displays number of the IPU on which the process was
        executing before the most recent switch.)'
    initial_priority_start:
      queryable: true
      type: integer
      counter_type: Snapshot
      description: 'Target (requested) process priority at interval start (H06.25/J06.14+)
        (MANUAL DEF: (ZMS Style only) In H06.25/J06.14 and later RVUs, the target
        (requested) process priority in effect at the start of the measurement interval.
        The initial priority specified for a process at the start of a measurement
        can be changed during execution by using the ALTPRI TACL command, or the ALTERPRIORITY,
        PRIORITY or PROCESS_SETINFO_ Guardian procedures.)'
    initial_priority_end:
      queryable: true
      type: integer
      counter_type: Snapshot
      description: 'Target (requested) process priority at interval end (H06.25/J06.14+)
        (MANUAL DEF: (ZMS Style only) In H06.25/J06.14 and later RVUs, the target
        (requested) process priority in effect at the end of the measurement interval.
        The initial priority specified for a process at the start of a measurement
        can be changed during execution by using the ALTPRI TACL command, or the ALTERPRIORITY,
        PRIORITY or PROCESS_SETINFO_ Guardian procedures.)'
    current_priority_start:
      queryable: true
      type: integer
      counter_type: Snapshot
      description: 'Current execution priority at interval start (H06.25/J06.14+)
        (MANUAL DEF: (ZMS Style only) In H06.25/J06.14 and later RVUs, the current
        execution priority at the start of the measurement interval. See also Usage
        Notes for H-series and later PROCESS Entities.)'
    current_priority_end:
      queryable: true
      type: integer
      counter_type: Snapshot
      description: 'Current execution priority at interval end (H06.25/J06.14+) (MANUAL
        DEF: (ZMS Style only) In H06.25/J06.14 and later RVUs, the current execution
        process priority at the end of the measurement interval. See also Usage Notes
        for H-series and later PROCESS Entities.)'
    x_interrupts:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: 'Number of X-fabric interrupts (or non-fabric interrupts) handled
        (H07/J05+) (MANUAL DEF: (ZMS style only, L01,H07/J05 and later) Number of
        X-fabric interrupts or non-fabric interrupts this process handled. Counter
        type: Incrementing.)'
      derived_formula: This is a derived counter, which is the sum of the X-INTERRUPTS
        and Y-INTERRUPTS counters.
    y_interrupts:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: 'Number of Y-fabric interrupts handled (H07/J05+) (MANUAL DEF:
        (ZMS style only, L01,H07/J05 and later) Number of Y-fabric interrupts this
        process handled. Counter type: Incrementing.)'
      derived_formula: This is a derived counter, which is the sum of the X-INTERRUPTS
        and Y-INTERRUPTS counters.
    tles_start:
      queryable: true
      type: integer
      counter_type: Snapshot
      description: 'Instrumentation timer cells (TLEs) allocated at interval start
        (L02/J06+) (MANUAL DEF: (ZMS style only, L02, J06 and later) Number of TLEs
        allocated at the start of the measurement interval. Counter type: Snapshot.)'
    tles_end:
      queryable: true
      type: integer
      counter_type: Snapshot
      description: 'Instrumentation timer cells (TLEs) allocated at interval end (L02/J06+)
        (MANUAL DEF: (ZMS style only, L02, J06 and later) Number of TLEs allocated
        at the end of the measurement interval. Counter type: Snapshot.)'
    ipu_affinity_class_start:
      queryable: true
      type: integer
      counter_type: Snapshot
      description: 'IPU affinity class at interval start (L02/J06+) (MANUAL DEF: (ZMS
        style only, L02, J06 and later) IPU affinity class of the process at the start
        of the measurement interval. Counter type: Snapshot.)'
    ipu_affinity_class_end:
      queryable: true
      type: integer
      counter_type: Snapshot
      description: 'IPU affinity class at interval end (L02/J06+) (MANUAL DEF: (ZMS
        style only, L02, J06 and later) IPU affinity class of the process at the end
        of the measurement interval. Counter type: Snapshot.)'
    mem_qtime:
      queryable: true
      type: integer
      unit: microseconds
      counter_type: Queue
      description: "Time process spent waiting on page faults; RATE ON \u2192 AQL\
        \ (MANUAL DEF: Time that the measured process spent waiting on page faults.\
        \ A page fault does not cause the system to remove the process from the ready\
        \ list.) (DERIVED METRIC: ``` Related CounterRelated Counter DescriptionDescription\
        \ PROCESS PAGE- FAULTS ``` ``` Counts the number of page faults generated\
        \ by the measured process ``` ``` CPU MEM-QTIME Measures the time that all\
        \ processes in a given processor spent waiting on page faults CPU CPU-QTIME\
        \ Measures the time that all processes spent on the ready list, including\
        \ time spent waiting on page faults ``` Counter type: Queue.)"
    page_faults:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: 'Number of page faults generated by this process (MANUAL DEF: Number
        of page faults generated by the process. Counter type: Incrementing.)'
    pres_pages_qtime:
      queryable: true
      type: integer
      unit: microseconds
      counter_type: Queue
      description: "Time pages sponsored by this process spent in main memory; RATE\
        \ ON \u2192 AQL (MANUAL DEF: In D-series RVUs, time that pages owned by the\
        \ process spent in main memory. In G-series RVUs, the time that pages sponsored\
        \ by the measured process spent in main memory.)"
    pres_pages_start:
      queryable: true
      type: integer
      counter_type: Snapshot
      description: 'Pages in main memory sponsored by this process at interval start
        (MANUAL DEF: Number of pages in main memory sponsored by the measured process
        at the start of the measurement interval. Counter type: Snapshot.)'
    pres_pages_end:
      queryable: true
      type: integer
      counter_type: Snapshot
      description: 'Pages in main memory sponsored by this process at interval end
        (MANUAL DEF: Number of pages in main memory sponsored by the measured process
        at the end of the measurement interval. Counter type: Snapshot.)'
    abs_segs_qtime:
      queryable: true
      type: integer
      unit: microseconds
      counter_type: Queue
      description: "Time segment table entries were in use for absolute addressable\
        \ segments; RATE ON \u2192 AQL (MANUAL DEF: Time that segment table entries\
        \ were in use for absolute addressable segments on behalf of the measured\
        \ process. Counter type: Queue.)"
    abs_segs_start:
      queryable: true
      type: integer
      counter_type: Snapshot
      description: 'Absolute addressable segment table entries in use at interval
        start (MANUAL DEF: Number of items on the queue described by ABS-SEGS-QTIME
        at the start of the measurement interval. Counter type: Snapshot.) (DERIVED
        METRIC: Number of items on the queue described by ABS-SEGS-QTIME at the start
        of the measurement interval.)'
    abs_segs_end:
      queryable: true
      type: integer
      counter_type: Snapshot
      description: 'Absolute addressable segment table entries in use at interval
        end (MANUAL DEF: Number of items on the queue described by ABS-SEGS-QTIME
        at the end of the measurement interval. Counter type: Snapshot.) (DERIVED
        METRIC: Number of items on the queue described by ABS-SEGS-QTIME at the end
        of the measurement interval.)'
    ext_segs_qtime:
      queryable: true
      type: integer
      unit: microseconds
      counter_type: Queue
      description: "Time extended segments were allocated via SEGMENT_ALLOCATE_ family;\
        \ RATE ON \u2192 AQL (MANUAL DEF: Time that extended segments were allocated\
        \ to the process through the SEGMENT_ALLOCATE_ family of APIs. This counter\
        \ includes both user and system calls to this procedure.)"
    alloc_seg_calls:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: 'Number of successful calls to SEGMENT_ALLOCATE_ family of APIs
        (MANUAL DEF: Number of successful calls made to the SEGMENT_ALLOCATE_ family
        of APIs. Counter type: Incrementing.)'
    locked_pages_start:
      queryable: true
      type: integer
      counter_type: Snapshot
      description: 'Page frames locked in main memory associated with this process
        at interval start (H06/J04+) (MANUAL DEF: (ZMS Style only) In Measure H06/J04
        and later PVUs, the number of page frames associated with the process that
        were locked in main memory at the start of the measurement interval. This
        counter is valid and displayed by MEASCOM in ZMS style when the PROCESS subsystem
        version (ZMSPROC.HDR.SUBSYSTEM- VERSION), supplied by Nonstop OS, is four
        or greater; otherwise the counter contains a zero value and is not displayed
        by MEASCOM.) (DERIVED METRIC: This counter is valid and displayed by MEASCOM
        in ZMS style when the PROCESS subsystem version (ZMSPROC.HDR.SUBSYSTEM- VERSION),
        supplied by Nonstop OS, is four or greater; otherwise the counter contains
        a zero value and is not displayed by MEASCOM.)'
    locked_pages_end:
      queryable: true
      type: integer
      counter_type: Snapshot
      description: 'Page frames locked in main memory associated with this process
        at interval end (H06/J04+) (MANUAL DEF: (ZMS Style only) In Measure H06/J04
        and later PVUs, the number of page frames associated with the process that
        were locked in main memory at the end of the measurement interval. This counter
        is valid and displayed by MEASCOM in ZMS style when the PROCESS subsystem
        version (ZMSPROC.HDR.SUBSYSTEM- VERSION), supplied by Nonstop OS, is four
        or greater; otherwise the counter contains a zero value and is not displayed
        by MEASCOM.) (DERIVED METRIC: This counter is valid and displayed by MEASCOM
        in ZMS style when the PROCESS subsystem version (ZMSPROC.HDR.SUBSYSTEM- VERSION),
        supplied by Nonstop OS, is four or greater; otherwise the counter contains
        a zero value and is not displayed by MEASCOM.)'
    globals_size:
      queryable: true
      type: integer
      unit: bytes
      counter_type: Snapshot
      description: 'Size of the Globals segment (L02/J06+) (MANUAL DEF: (ZMS style
        only, L02, J06 and later) Size of the Globals. Counter type: Snapshot.)'
    swapspace:
      queryable: true
      type: integer
      unit: bytes
      counter_type: Snapshot
      description: 'Guaranteed KMSF swap space size (L02/J06+) (MANUAL DEF: (ZMS style
        only, L02, J06 and later) Size of the Guaranteed KMSF swap space. Counter
        type: Snapshot.)'
    heap32_size_start:
      queryable: true
      type: integer
      unit: bytes
      counter_type: Snapshot
      description: 'Heap (32-bit) size at interval start (L02/J06+) (MANUAL DEF: (ZMS
        style only, L02, J06 and later) Size of the Heap at the start of the measurement
        interval. This counter is not displayed by MEASCOM but is available for IF/BY
        clauses and for plotting.)'
    heap32_size_end:
      queryable: true
      type: integer
      unit: bytes
      counter_type: Snapshot
      description: 'Heap (32-bit) size at interval end (L02/J06+) (MANUAL DEF: (ZMS
        style only, L02, J06 and later) Size of the Heap at the end of the measurement
        interval. Counter type: Snapshot.)'
    heap32_limit:
      queryable: true
      type: integer
      unit: bytes
      counter_type: Snapshot
      description: 'Maximum allowed Heap (32-bit) size (L02/J06+) (MANUAL DEF: (ZMS
        style only, L02, J06 and later) Maximum size allowed for the Heap. Counter
        type: Snapshot.)'
    heap64_size_start:
      queryable: true
      type: integer
      unit: bytes
      counter_type: Snapshot
      description: 'Heap (64-bit) size at interval start (L02/J06+) (MANUAL DEF: (ZMS
        style only, L02, J06 and later) Size of the Heap for a 64 bit process at the
        start of the measurement interval. This counter is not displayed by MEASCOM
        but is available for IF/BY clauses and for plotting.)'
    heap64_size_end:
      queryable: true
      type: integer
      unit: bytes
      counter_type: Snapshot
      description: 'Heap (64-bit) size at interval end (L02/J06+) (MANUAL DEF: (ZMS
        style only, L02, J06 and later) Size of the Heap for a 64 bit process at the
        end of the measurement interval. Counter type: Snapshot.)'
    heap64_limit:
      queryable: true
      type: integer
      unit: bytes
      counter_type: Snapshot
      description: 'Maximum allowed Heap (64-bit) size (L02/J06+) (MANUAL DEF: (ZMS
        style only, L02, J06 and later) Maximum size allowed for the Heap for a 64
        bit process. Counter type: Snapshot.)'
    mainstack_size_start:
      queryable: true
      type: integer
      unit: bytes
      counter_type: Snapshot
      description: 'Main stack size at interval start (H07/J05+) (MANUAL DEF: (ZMS
        style only, L02, J06 and later) Size of the Main stack at the start of the
        measurement interval. Counter type: Snapshot.)'
    mainstack_size_end:
      queryable: true
      type: integer
      unit: bytes
      counter_type: Snapshot
      description: 'Main stack size at interval end (H07/J05+) (MANUAL DEF: (ZMS style
        only, L02, J06 and later) Size of the Main stack at the end of the measurement
        interval. Counter type: Snapshot.)'
    mainstack_limit_start:
      queryable: true
      type: integer
      unit: bytes
      counter_type: Snapshot
      description: 'Maximum allowed main stack size at interval start (H07/J05+) (MANUAL
        DEF: (ZMS style only, L02, J06 and later) Maximum size allowed for the Main
        stack at the start of the measurement interval. Counter type: Snapshot.)'
    mainstack_limit_end:
      queryable: true
      type: integer
      unit: bytes
      counter_type: Snapshot
      description: 'Maximum allowed main stack size at interval end (H07/J05+) (MANUAL
        DEF: (ZMS style only, L02, J06 and later) Maximum size allowed for the Main
        stack at the end of the measurement interval. Counter type: Snapshot.)'
    privstack_size_start:
      queryable: true
      type: integer
      unit: bytes
      counter_type: Snapshot
      description: 'Priv stack size at interval start (H07/J05+) (MANUAL DEF: (ZMS
        style only, L02, J06 and later) Size of the Priv stack at the start of the
        measurement interval. This counter is not displayed by MEASCOM but is available
        for IF/BY clauses and for plotting.)'
    privstack_size_end:
      queryable: true
      type: integer
      unit: bytes
      counter_type: Snapshot
      description: 'Priv stack size at interval end (H07/J05+) (MANUAL DEF: (ZMS style
        only, L02, J06 and later) Size of the Priv stack at the end of the measurement
        interval. Counter type: Snapshot.)'
    privstack_limit:
      queryable: true
      type: integer
      unit: bytes
      counter_type: Snapshot
      description: 'Maximum allowed Priv stack size (H07/J05+) (MANUAL DEF: (ZMS style
        only, L02, J06 and later) Maximum size allowed for the Priv stack. Counter
        type: Snapshot.)'
    messages_sent:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: 'Number of messages sent by this process (linker) (MANUAL DEF:
        Number of messages sent by the linker process. User I/O operations (except
        on $RECEIVE) and calls to some system procedures increment this counter.)'
    sent_bytes:
      queryable: true
      type: integer
      unit: bytes
      counter_type: Accumulating
      description: "Message bytes sent by this process (linker) (MANUAL DEF: Number\
        \ of message bytes sent by the linker process. The message bytes are also\
        \ included in the RECEIVED\u2011BYTES counter of the listener process that\
        \ received the message.) (DERIVED METRIC: For DBIO byte counts, see the measurements\
        \ attributed to the linker process in the DBIO-WRITE-BYTES counter of the\
        \ FILE entity type.)"
    returned_bytes:
      queryable: true
      type: integer
      unit: bytes
      counter_type: Accumulating
      description: "Message bytes received by this process as linker (reply bytes\
        \ from listener) (MANUAL DEF: Number of message bytes received by the linker\
        \ process. The message bytes are also included in the REPLY\u2011BYTES counter\
        \ of the listener process that sent the message.) (DERIVED METRIC: For DBIO\
        \ byte counts, see the measurements attributed to the linker process in the\
        \ DBIO-READ-BYTES counter of the FILE entity type.)"
    messages_received:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: 'Number of messages read from $RECEIVE by this process (listener)
        (MANUAL DEF: Number of messages the process has read from its message input
        queue. For user processes, the message input queue is $RECEIVE.)'
    received_bytes:
      queryable: true
      type: integer
      unit: bytes
      counter_type: Accumulating
      description: "Message bytes received by this process as listener (MANUAL DEF:\
        \ Number of message bytes received by the listener process. The message bytes\
        \ are also included in the SENT\u2011BYTES counter of the linker process that\
        \ sent the message.)"
    reply_bytes:
      queryable: true
      type: integer
      unit: bytes
      counter_type: Accumulating
      description: "Message bytes sent by this process as listener in reply (MANUAL\
        \ DEF: Number of message bytes sent by a listener process in reply to a message\
        \ from a linker process. The message bytes are also included in the RETURNED\u2011\
        BYTES counter of the linker process that received the message.)"
    sent_cbytes:
      queryable: true
      type: integer
      unit: bytes
      counter_type: Accumulating
      description: 'Protocol control bytes sent by message system on behalf of this
        process (linker) (MANUAL DEF: Number of protocol control bytes sent by the
        message system on behalf of this process. This counter is updated when the
        process is acting as a linker process.) (DERIVED METRIC: The protocol control
        bytes are not included in the counter SENT-BYTES.)'
    returned_cbytes:
      queryable: true
      type: integer
      unit: bytes
      counter_type: Accumulating
      description: 'Protocol control bytes returned to this process as linker (MANUAL
        DEF: Number of protocol control bytes returned by the message system on behalf
        of this process. This counter is updated when the process is acting as a linker
        process.) (DERIVED METRIC: The protocol control bytes are not included in
        the counter RETURNED-BYTES.)'
    received_cbytes:
      queryable: true
      type: integer
      unit: bytes
      counter_type: Accumulating
      description: 'Protocol control bytes received by this process as listener (MANUAL
        DEF: Number of protocol control bytes received by the message system on behalf
        of this process. This counter is updated when the process is acting as a listener
        process.) (DERIVED METRIC: The protocol control bytes are not included in
        the counter RECEIVED-BYTES.)'
    reply_cbytes:
      queryable: true
      type: integer
      unit: bytes
      counter_type: Accumulating
      description: 'Protocol control bytes sent by this process as listener in reply
        (MANUAL DEF: Number of protocol control bytes sent by the message system on
        behalf of this process in reply to a message from a linker process. This counter
        is updated when the process is acting as a listener process.) (DERIVED METRIC:
        The protocol control bytes are not included in the counter REPLY- BYTES.)'
    mqc_allocations:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: 'Number of MQCs currently allocated to this process (MANUAL DEF:
        Number of MQCs currently allocated to the process. Counter type: Incrementing.)'
    mqc_alloc_failures:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: 'Number of MQC allocation failures (MANUAL DEF: Number of MQC requests
        that failed. Counter type: Incrementing.)'
    mqcs_inuse_qtime:
      queryable: true
      type: integer
      unit: microseconds
      counter_type: Queue
      description: "Time MQCs have been allocated to this process; RATE ON \u2192\
        \ AQL (MANUAL DEF: Time for which MQCs have been allocated to the process.\
        \ Counter type: Queue.)"
    msgs_sent_qtime:
      queryable: true
      type: integer
      unit: microseconds
      counter_type: Queue
      description: "Time messages sent by this process were outstanding; RATE ON \u2192\
        \ AQL (MANUAL DEF: Time (in microseconds) that messages sent by the process\
        \ were outstanding. Counter type: Queue.)"
    recv_qtime:
      queryable: true
      type: integer
      unit: microseconds
      counter_type: Queue
      description: "Time messages spent waiting on $RECEIVE queue; RATE ON \u2192\
        \ AQL (MANUAL DEF: Time that messages spent waiting on the process message\
        \ input queue. For user processes, the message input queue is $RECEIVE.)"
    file_open_calls:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: 'Number of calls to FILE_OPEN_ or OPEN procedures (includes OSS
        opens) (MANUAL DEF: Number of calls to the FILE_OPEN_ or OPEN procedures.
        Counts all open calls including opens of regular files, pipes, FIFOs, AF_INET
        sockets, AF_UNIX sockets, directories, /dev/null, and TTYs.)'
    info_calls:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: 'Number of FILEINFO/DEVICEINFO/fstat/etc. calls that dispatched
        a message (MANUAL DEF: Number of calls to these procedures that resulted in
        a message being sent to a process (IOP or other) to obtain the information
        requested: ``` FILEINFO DEVICEINFO2 getsockopt() FILERECINFO access() pathconf()
        FILE_GETINFO_ fpathconf() select() FILE_GETINFOBYNAME_ fstat() sockatmark()
        FILE_GETINFOLISTBYNAME_ fstatvfs() stat() FILEGETINFO_LIST getpeername() statvfs()
        DEVICEINFO getsockname() ``` Counter type: Incrementing.)'
    open_close_wait_time:
      queryable: true
      type: integer
      unit: microseconds
      counter_type: Busy
      description: "Time process waited on open and close requests; RATE ON \u2192\
        \ % (MANUAL DEF: Amount of time the process waits on the open and close requests.\
        \ For OSS processes, wait time accumulates for file open and close operations,\
        \ excluding name server operations.) (DERIVED METRIC: Name server operations\
        \ are counted in OSSNS-WAIT-TIME.)"
    open_closes:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: 'Number of OSS and Guardian open and close operations (L03+) (MANUAL
        DEF: (ZMS Style only) Number of OSS and Guardian open and close operations.
        This counter is supported in Measure L03 and later PVUs.)'
    file_reads:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: 'Number of read operations (L03+) (MANUAL DEF: (ZMS Style only)
        Number of read operations. This counter is supported in Measure L03 and later
        PVUs.)'
    file_writes:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: 'Number of write, update, and delete operations (L03+) (MANUAL
        DEF: (ZMS Style only) Number of write, update and delete operations. This
        counter is supported in Measure L03 and later PVUs.)'
    file_nowait_initiated:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: 'Number of nowait I/Os initiated (L03+) (MANUAL DEF: (ZMS Style
        only) Number of nowait I/Os initiated. This counter is supported in Measure
        L03 and later PVUs.)'
    file_nowait_completed:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: 'Number of nowait I/O completions processed (L03+) (MANUAL DEF:
        (ZMS Style only) Number of nowait I/O completions processed. This counter
        is supported in Measure L03 and later PVUs.)'
    file_awaitio_calls:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: 'Number of calls to AWAITIO and FILE_COMPLETE_ family of APIs (L03+)
        (MANUAL DEF: (ZMS Style only) Number of calls to the AWAITIO and FILE_COMPLETE_
        family of APIs. This counter is supported in Measure L03 and later PVUs.)'
      derived_formula: FILE-AWAITIO-QTIME is divided by FILE-AWAITIO-CALLS.
    file_awaitio_qtime:
      queryable: true
      type: integer
      unit: microseconds
      counter_type: Queue
      description: "Time spent in AWAITIO and FILE_COMPLETE_ family of APIs (L03+);\
        \ RATE ON \u2192 AQL (MANUAL DEF: (ZMS Style only) Time spent in the AWAITIO\
        \ and FILE_COMPLETE_ family of APIs. This counter is supported in Measure\
        \ L03 and later PVUs.)"
      derived_formula: FILE-AWAITIO-QTIME is divided by FILE-AWAITIO-CALLS.
    begin_trans:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: 'Number of times process began a TMF transaction (MANUAL DEF: Number
        of times the process began a TMF transaction. Counter type: Incrementing.)'
    abort_trans:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: 'Number of times process invoked ABORTTRANSACTION (MANUAL DEF:
        Number of times the process invokes the TMF ABORTTRANSACTION procedure to
        abort the current transaction. The number of calls does not necessarily correspond
        to the number of backouts driven by the TMP as recorded in the TMF entity.)'
    checkpoints:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: 'Number of calls to CHECKPOINT family of APIs (MANUAL DEF: Number
        of calls to the CHECKPOINT family of APIs. This counter includes both user
        and system calls to this procedure.)'
    checkpoint_busy_time:
      queryable: true
      type: integer
      unit: microseconds
      counter_type: Busy
      description: "Time spent in checkpointing (waited + AWAITIO wait for nowaited);\
        \ RATE ON \u2192 % (L02+; valid when subsystem_version >= 8) (MANUAL DEF:\
        \ (ZMS Style only) Time spent in checkpointing by this process. For waited\
        \ checkpoints, the CHECKPOINT-BUSY-TIME counter is the elapsed time spent\
        \ executing waited checkpoints.) (DERIVED METRIC: For waited checkpoints,\
        \ the CHECKPOINT-BUSY-TIME counter is the elapsed time spent executing waited\
        \ checkpoints. For nowaited checkpoints, the CHECKPOINT-BUSY-TIME counter\
        \ includes the elapsed time to initiate nowaited checkpoint requests and the\
        \ elapsed time for which the process is suspended in AWAITIO[X] waiting for\
        \ the nowaited checkpoints to be completed. This counter is valid and displayed\
        \ by MEASCOM in ZMS style when the PROCESS subsystem version (ZMSPROC.HDR.SUBSYSTEM-\
        \ VERSION), supplied by Nonstop OS is eight or greater.)"
    launches:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: 'Number of calls to process creation procedures (deprecated in
        L03; use process_launches) (DERIVED METRIC: In L03 and later PVUs, replaced
        by PROCESS-LAUNCHES and not displayed by MEASCOM.) (MANUAL DEF: Number of
        calls made by the process to process creation procedures. For Guardian process
        creation, the counter includes unsuccessful creation attempts.)'
      derived_formula: PROCESS-LAUNCH-QTIME is divided by PROCESS-LAUNCHES. THREAD-LAUNCH-QTIME
        is divided by THREAD-LAUNCHES.
    launch_wait_time:
      queryable: true
      type: integer
      unit: microseconds
      counter_type: Busy
      description: 'Time process waited on PROCESS_CREATE_ or fork()/exec*() (deprecated
        in L03; zero) (MANUAL DEF: In earlier PVUs, the amount of time the process
        waits on requests to PROCESS_CREATE_ or the fork() or exec*() process creation
        APIs. In Measure L03 and later PVUs, LAUNCH-WAIT-TIME is zero and not displayed
        by MEASCOM.) (DERIVED METRIC: In Measure L03 and later PVUs, LAUNCH-WAIT-TIME
        is zero and not displayed by MEASCOM.)'
    process_launches:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: 'Number of process launches (L03+; valid when subsystem_version
        >= 9) (MANUAL DEF: (ZMS Style only) Number of process launches. This counter
        is supported in Measure L03 and later PVUs.)'
      derived_formula: PROCESS-LAUNCH-QTIME is divided by PROCESS-LAUNCHES.
    process_launch_qtime:
      queryable: true
      type: integer
      unit: microseconds
      counter_type: Queue
      description: "Time to launch processes (L03+; valid when subsystem_version >=\
        \ 9); RATE ON \u2192 AQL (MANUAL DEF: (ZMS Style only) Time to launch processes.\
        \ This counter is supported in Measure L03 and later PVUs.)"
      derived_formula: PROCESS-LAUNCH-QTIME is divided by PROCESS-LAUNCHES.
    thread_launches:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: 'Number of KLT thread launches (L03+; valid when subsystem_version
        >= 9) (MANUAL DEF: (ZMS Style only) Number of KLT thread launches. This counter
        is supported in Measure L03 and later PVUs.)'
      derived_formula: THREAD-LAUNCH-QTIME is divided by THREAD-LAUNCHES.
    thread_launch_qtime:
      queryable: true
      type: integer
      unit: microseconds
      counter_type: Queue
      description: "Time to launch KLT threads (L03+; valid when subsystem_version\
        \ >= 9); RATE ON \u2192 AQL (MANUAL DEF: (ZMS Style only) Time to launch KLT\
        \ threads. This counter is supported in Measure L03 and later PVUs.)"
      derived_formula: THREAD-LAUNCH-QTIME is divided by THREAD-LAUNCHES.
    oss_tty_reads:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: 'Number of READ operations to all /dev/tty opens (MANUAL DEF: Number
        of READ operations performed by the process to all OSS file opens of /dev/tty.
        Counter type: Incrementing.)'
    oss_tty_writes:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: 'Number of WRITE operations to all /dev/tty opens (MANUAL DEF:
        Number of WRITE operations performed by the process to all OSS file opens
        of /dev/tty. Counter type: Incrementing.)'
    oss_tty_read_bytes:
      queryable: true
      type: integer
      unit: bytes
      counter_type: Accumulating
      description: 'Bytes read from all /dev/tty opens (MANUAL DEF: Number of bytes
        read by the process from all files opened as /dev/tty. Counter type: Accumulating.)'
    oss_tty_write_bytes:
      queryable: true
      type: integer
      unit: bytes
      counter_type: Accumulating
      description: 'Bytes written to all /dev/tty opens (MANUAL DEF: Number of bytes
        written by the process to all files opened as /dev/tty. Counter type: Accumulating.)'
    oss_tty_wait_time:
      queryable: true
      type: integer
      unit: microseconds
      counter_type: Busy
      description: "Time process waited on /dev/tty requests; RATE ON \u2192 % (MANUAL\
        \ DEF: Amount of time the process waits on requests to all files opened as\
        \ /dev/tty. Counter type: Busy.)"
    oss_dev_null_ops:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: 'Number of reads and writes to all /dev/null opens (MANUAL DEF:
        Number of reads and writes to all files opened as /dev/null. Counter type:
        Incrementing.)'
    ossns_dd_calls:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: 'Number of data definition requests sent to OSS name servers (creat,
        open, link, mkdir, etc.) (MANUAL DEF: Number of data definition requests sent
        to OSS name servers. These APIs increment this counter: ``` bind() open(,
        O_CREAT) mkfifo() utime() chmod()link() rename() chown() mkdir() rmdir() creat()
        mknod() unlink() ``` Counter type: Incrementing.)'
    ossns_requests:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: 'Number of requests sent to OSS name servers (fileinfo, DD, directory,
        resolution) (MANUAL DEF: Number of requests sent to OSS name servers. Requests
        can be fileinfo calls, data definition requests, directory operations, or
        resolution requests.)'
      derived_formula: OSSNS-WAIT-TIME is divided by OSSNS-REQUESTS.
    ossns_message_bytes:
      queryable: true
      type: integer
      unit: bytes
      counter_type: Accumulating
      description: 'Message data bytes sent and received for OSS name server requests
        (MANUAL DEF: Number of message data bytes sent and received for requests to
        OSS name servers. Counter type: Accumulating.)'
    ossns_wait_time:
      queryable: true
      type: integer
      unit: microseconds
      counter_type: Busy
      description: "Time process waited on OSS name server requests; RATE ON \u2192\
        \ % (MANUAL DEF: Amount of time the process waits on requests to all OSS name\
        \ servers. Counter type: Busy.)"
      derived_formula: OSSNS-WAIT-TIME is divided by OSSNS-REQUESTS.
    ossns_redirects:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: 'Number of redirected requests sent to OSS name servers (MANUAL
        DEF: Number of redirected requests sent to OSS name servers. Counter type:
        Incrementing.)'
    "intrintr \u2011 busybusy \u2011 timetime":
      type: integer
      description: 'Time that the CPU spent executing interrupt handlers. Most interrupts
        are caused by the processing of messages and I/O operations. The appropriate
        system description manual describes each type of interrupt. For TNS/E systems,
        this is the total time spend executing system Interrupt Processes (IPs) and
        system Auxiliary Processes (APs). Counter type: Busy.'
      queryable: true
      derived_formula: Most interrupts are caused by the processing of messages and
        I/O operations.
    link_large_msgslink_large_msgs:
      type: integer
      description: 'H/J-series: Number of messages transferred to a CPU that exceeded
        the readlinkcache message size. L-series: Number of requests transferred to
        another CPU that exceeded the Send operation size. The request data bytes
        will be pulled by the server CPU with an IB RDMA Read operation. Counter type:
        Incrementing.'
      queryable: true
      derived_formula: 'L-series: Number of requests transferred to another CPU that
        exceeded the Send operation size. The request data bytes will be pulled by
        the server CPU with an IB RDMA Read operation.'
    link_prepush_msgslink_prepush_msgs:
      type: integer
      description: 'H/J-series: Number of messages transferred to another CPU using
        the prepush protocol. L-series: Number of requests transferred to another
        CPU via a Send operation. Counter type: Incrementing.'
      queryable: true
      derived_formula: 'L-series: Number of requests transferred to another CPU via
        a Send operation.'
    "tnsrtnsr \u2011 busybusy \u2011 timetime":
      type: integer
      description: "(Legacy Style only) Time that the CPU was busy executing TNS/R\
        \ native code. This counter applies only to measurements taken on a TNS/R\
        \ system and is derived from other counters: CPU\u2011BUSY\u2011TIME \u2011\
        \ (INTR\u2011BUSY\u2011TIME + TNS\u2011BUSY\u2011TIME + ACCEL\u2011BUSY\u2011\
        TIME) = TNSR\u2011BUSY\u2011TIME Counter type: Busy."
      queryable: true
      derived_formula: "This counter applies only to measurements taken on a TNS/R\
        \ system and is derived from other counters: CPU\u2011BUSY\u2011TIME \u2011\
        \ (INTR\u2011BUSY\u2011TIME + TNS\u2011BUSY\u2011TIME + ACCEL\u2011BUSY\u2011\
        TIME) = TNSR\u2011BUSY\u2011TIME Counter type: Busy.."
    requests_blockedrequests_blocked:
      type: integer
      description: 'Number of times an operation had to wait because the requested
        file or record was already locked. Typically, a record is locked by a LOCKFILE
        request, a LOCKREC request, or a TMF auditing operation.   Counter type: Incrementing.'
      queryable: true
      derived_formula: Number of times an operation had to wait because the requested
        file or record was already locked. Typically, a record is locked by a LOCKFILE
        request, a LOCKREC request, or a TMF auditing operation.
    swapsswaps:
      type: integer
      description: 'Number of swap operations (both into and out of memory) performed
        for the memory manager. Unlike CPU swaps, which are not dependent on file
        block size, the disk process performs I/O based on the block size of the file
        and might need to perform more than one I/O to swap the needed data. The DISC
        SWAPS counter is advanced for each I/O. Therefore, total disk swaps might
        be greater than total CPU swaps. Only updated pages are swapped. Because code
        pages are never updated, they are never swapped out of memory. Counter type:
        Incrementing.'
      queryable: true
      derived_formula: Number of swap operations (both into and out of memory) performed
        for the memory manager.
    volsem_qtimevolsem_qtime:
      type: integer
      description: 'Time that the requests spent waiting for the volume semaphore
        (exclusive and shared modes). With REPORT RATE OFF, the value of this counter
        equals the total queue time for volume semaphore. With REPORT RATE ON, the
        value of this counter equals the average number of requests in the queue.
        Under normal conditions, the value of this counter should be close to zero.
        Otherwise, it indicates some operations are holding the volume semaphore in
        exclusive mode, causing all other request operations that require the volume
        semaphore in share mode to wait. Counter type: Queue.'
      queryable: true
      derived_formula: Otherwise, it indicates some operations are holding the volume
        semaphore in exclusive mode, causing all other request operations that require
        the volume semaphore in share mode to wait.
      thresholds: Under normal conditions, the value of this counter should be close
        to zero.
    writeswrites:
      type: integer
      description: 'Number of physical write operations (from memory to disk) performed
        by the disk process. In addition to programmatic write operations, many commands
        (for example, FORMAT and LOADMICROCODE) also write to the disk. Counter type:
        Incrementing.'
      queryable: true
      derived_formula: Number of write operations (from memory to the terminal) performed
        by the terminal process.
    cc:
      type: integer
      description: "(Legacy Style only) Disk cache metrics. While the C field is included\
        \ in both the Legacy Style DDL and the ZMS Style DDL records, the subfield\
        \ contents and the sequence of the subfields varies based on the style of\
        \ the record. For the subfield contents and sequence of the C field for ZMS\
        \ Style DDL records, see Common and ZMS Style Only Counter Field DDL Definitions\
        \ for DISC Entities. In the Legacy Style DDL record, this field is divided\
        \ into these subfields:   ``` SubfieldSubfield DescriptionDescription Counter\
        \ TypeCounter Type HITS Number of times a required block is found in cache\
        \ on a read or buffered write operation, which saves a disk I/O. This counter\
        \ includes cache hits on both read and write operations. ``` ``` Incrementing\
        \ ``` ``` MISSES Number of times a required block is not found in cache on\
        \ a read operation, which causes a disk I/O. Read operations that do not go\
        \ through cache are not included in this counter. ``` ``` Incrementing ```\
        \ ``` FAULTS Number of times the cache tables indicate a required block is\
        \ in cache, but not because the memory manager is using it for another purpose.\
        \ Faults occur when a cache is too large or physical memory is too small for\
        \ a given application. Fault rates greater than 5% of all I/O operations generally\
        \ indicate you need more memory. ``` ``` Incrementing ``` ``` AUDIT\u2011\
        BUF\u2011FORCES Number of times the disk process had to write to the audit-trail\
        \ volume before it could write a dirty cache block and thereby free that block\
        \ for another use. This value should be close to zero. ``` ``` Incrementing\
        \ ``` ``` BLKS Number of cache blocks allocated. When TOTALS ONLY or TOTALS\
        \ INCLUDE is used, this value is the maximum number of cache blocks allocated.\
        \ BLKS is not a counter but a value obtained from an internal disk process\
        \ data structure. ``` ##### N.A.  ``` BLKS\u2011DIRTY\u2011QTIME Time that\
        \ cache blocks spent dirty. A cache block is dirty when a buffered write operation\
        \ writes data to it. After the disk process writes the dirty cache block to\
        \ disk, the block is clean. ``` ``` Queue ``` ``` BLKS\u2011DIRTY\u2011MAX\
        \ Maximum number of items on the queue described by the BLKS\u2011DIRTY\u2011\
        QTIME counter. ``` ``` Max queue ``` In Measure output, each subfield provides\
        \ four values, one for each size of DP2 cache block:  ``` Field labelField\
        \ labelCache block sizeCache block size C0 512 bytes C1 1024 bytes C2 2048\
        \ bytes C3 4096 bytes ```"
      queryable: true
      derived_formula: 'In the Legacy Style DDL record, this field is divided into
        these subfields:   ``` SubfieldSubfield DescriptionDescription Counter TypeCounter
        Type HITS Number of times a required block is found in cache on a read or
        buffered write operation, which saves a disk I/O. This counter includes cache
        hits on both read and write operations. ``` ``` Incrementing ``` ``` MISSES
        Number of times a required block is not found in cache on a read operation,
        which causes a disk I/O. Read operations that do not go through cache are
        not included in this counter. Fault rates greater than 5% of all I/O operations
        generally indicate you need more memory. A cache block is dirty when a buffered
        write operation writes data to it.'
      thresholds: Fault rates greater than 5% of all I/O operations generally indicate
        you need more memory. AUDIT-BUF-FORCES should be close to zero.
    cwcw:
      type: integer
      description: "(Legacy Style only) Cache write metrics. This field is divided\
        \ into these subfields:  ``` SubfieldSubfield DescriptionDescription Counter\
        \ TypeCounter Type WRITE\u2011DIRTYS Number of times a required block is found\
        \ dirty in cache for a write operation. Accumulating WRITE\u2011CLEANS Number\
        \ of times a required block is found clean in cache for a write operation,\
        \ which saves a disk read per write. ``` ``` Accumulating ``` ``` WRITE\u2011\
        MISSES Number of times a required block is not found in cache for a write\
        \ operation, which requires a disk read before the write can be performed.\
        \ ``` ``` Accumulating ``` ``` BLOCK\u2011SPLITS Number of block splits (per\
        \ block size) for the volume. Incrementing ``` In Measure output, each subfield\
        \ provides four values, one for each size of DP2 cache block:  ``` Field NameField\
        \ NameCache Block SizeCache Block Size C0 512 bytes C1 1024 bytes C2 2048\
        \ bytes C3 4096 bytes ```"
      queryable: true
      derived_formula: "This field is divided into these subfields:  ``` SubfieldSubfield\
        \ DescriptionDescription Counter TypeCounter Type WRITE\u2011DIRTYS Number\
        \ of times a required block is found dirty in cache for a write operation.\
        \ Accumulating WRITE\u2011CLEANS Number of times a required block is found\
        \ clean in cache for a write operation, which saves a disk read per write.\
        \ ``` ``` Accumulating ``` ``` WRITE\u2011MISSES Number of times a required\
        \ block is not found in cache for a write operation, which requires a disk\
        \ read before the write can be performed."
    seek_busy_timeseek_busy_time:
      type: integer
      description: (Legacy Style only) No longer used; returns zeros. All seek operations
        are implicit in read and write operations.
      queryable: true
      derived_formula: All seek operations are implicit in read and write operations..
    seeksseeks:
      type: integer
      description: (Legacy Style only) No longer used; returns zeros. All seek operations
        are implicit in read and write operations.
      queryable: true
      derived_formula: All seek operations are implicit in read and write operations..
    misc_callsmisc_calls:
      type: integer
      description: 'For OSS, this counter totals operations that increase FILE-BUSY-TIME
        but are not READS, WRITES, or INFO-CALLS. APIs that fall in this category
        are ioctl(), fsync(), ftruncate(), lseek(), and fcntl(), and the socket APIs
        connect(), setsockopt(), accept(), and shutdown(). Counter type: Incrementing.'
      queryable: true
      derived_formula: For OSS, this counter totals operations that increase FILE-BUSY-TIME
        but are not READS, WRITES, or INFO-CALLS.
    oss_flow_controlsoss_flow_controls:
      type: integer
      description: 'For OSS sockets and pipes, this counter reports the number of
        times a WRITE operation was blocked. Counter type: Incrementing.'
      queryable: true
      derived_formula: For OSS sockets and pipes, this counter reports the number
        of times a WRITE operation was blocked.
    readsreads:
      type: integer
      description: 'Number of calls to the file system read family of APIs and OSS
        file system read APIs such as read() or recv(). For OSS, the total includes
        OSS- CACHE-READS. For the Enscribe file system, the total includes non-DBIO
        and DBIO operations. This counter includes both user and system calls to these
        procedures. In G05 and later RVUs, this counter includes direct bulk I/O read
        operations. Counter type: Incrementing.'
      queryable: true
      derived_formula: Number of read operations (from the terminal to memory) performed
        by the terminal process.
    records_accessedrecords_accessed:
      type: integer
      description: "Number of records read by the disk process or file system to perform\
        \ the operations. Number of records accessed is greater than or equal to the\
        \ number of records used. The ratio of RECORDS\u2011USED to RECORDS\u2011\
        ACCESSED indicates the selectivity of the statement. The value of this counter\
        \ is zero for Enscribe files. Counter type: Incrementing."
      queryable: true
      derived_formula: "Number of records read by the disk process or file system\
        \ to perform the operations. The ratio of RECORDS\u2011USED to RECORDS\u2011\
        ACCESSED indicates the selectivity of the statement."
      thresholds: Fault rates greater than 5% of all I/O operations generally indicate
        you need more memory. AUDIT-BUF-FORCES should be close to zero.
    reply_aqtreply_aqt:
      type: integer
      description: '(ZMS style only) Average time spent on replying to messages on
        the internal queue. This counter is supported in Measure L03 and later PVUs.
        REPLY-QTIME is divided by REPLIES. Counter type: Derived - Average Queue Time'
      queryable: true
      derived_formula: REPLY-QTIME is divided by REPLIES.
    request_artrequest_art:
      type: integer
      description: '(ZMS style only) The average response time for requests. This
        counter is supported in Measure L03 and later PVUs. REQUEST-QTIME is divided
        by REQUESTS. Counter type: Average Response Time'
      queryable: true
      derived_formula: REQUEST-QTIME is divided by REQUESTS.
    updates_or_repliesupdates_or_replies:
      type: integer
      description: 'Number of calls to the WRITEUPDATE family of APIs with a non-zero
        buffer length for update operations and number of successful calls to the
        REPLY family of APIs. This counter includes both user and system calls to
        these procedures. Interpretation of this counter depends on the type of file
        being measured. Delete operations are performed on disk and tape files. Reply
        operations are performed on terminals or processes. Counter type: Incrementing.'
      queryable: true
      derived_formula: Number of calls to the WRITEUPDATE family of APIs with a non-zero
        buffer length for update operations and number of successful calls to the
        REPLY family of APIs. Delete operations are performed on disk and tape files.
        Reply operations are performed on terminals or processes.
    retriesretries:
      type: integer
      description: 'Number of times the I/O process retried an I/O operation because
        of an error on the communications line. Counter type: Incrementing.'
      queryable: true
      derived_formula: Number of times the I/O process retried an I/O operation because
        of an error on the communications line.
    write_busy_timewrite_busy_time:
      type: integer
      description: 'The time spent writing to the communications line. This counter
        measures the time from the instruction that starts the write to the interrupt
        that signals the end of the I/O operation. Any process can run during this
        time. Counter type: Busy.'
      queryable: true
      derived_formula: This counter measures the time from the instruction that starts
        the write operation to the interrupt that ends the operation.
    read_busy_timeread_busy_time:
      type: integer
      description: "Time spent reading data from the network communications line.\
        \ This counter includes the time spent waiting for input to the line. The\
        \ counter measures the time from the instruction that starts the read to the\
