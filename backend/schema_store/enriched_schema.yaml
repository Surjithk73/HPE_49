      queryable: true
      type: string
      description: GMOM node system name
    gmom_process_name:
      queryable: true
      type: string
      description: GMOM process name
    sql_obj_recompiles:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: Number of objects recompiled for this process
    sql_obj_recompile_time:
      queryable: true
      type: integer
      counter_type: Busy
      description: Time this process spent recompiling objects
    sql_stmt_recompiles:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: Number of statements recompiled
    sql_stmt_recompile_time:
      queryable: true
      type: integer
      counter_type: Busy
      description: Time spent recompiling statements
    sql_newprocesses:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: Number of NEWPROCESS calls generated by the SQL executor
    sql_newprocess_time:
      queryable: true
      type: integer
      counter_type: Busy
      description: Time spent executing SQL-NEWPROCESS
    opens:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: Number of OPEN calls performed by the SQL executor
    open_time:
      queryable: true
      type: integer
      counter_type: Busy
      description: Time spent executing OPENs
    sql_stmt_compiles:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: Number of SQL dynamic statements compiled
    sql_stmt_compile_time:
      queryable: true
      type: integer
      counter_type: Busy
      description: Time spent on SQL dynamic statement compilations
  formulas:
  - formula: AVG-OBJ-RECOMPILE-TIME = sql_obj_recompile_time / sql_obj_recompiles
    description: Calculates the average elapsed time spent recompiling database objects.
  - formula: AVG-STMT-COMPILE-TIME = sql_stmt_compile_time / sql_stmt_compiles
    description: Calculates the average elapsed time spent compiling dynamic SQL statements.
  business_rules:
  - rule: SQLPROC counters are maintained at the process level and not at the thread
      level.
  - rule: Specifying a minor thread does not return any counter values since there
      is no SQLPROC entity associated with a minor thread.
  interpretations:
  - condition: High sql_obj_recompiles or high sql_stmt_recompiles
    meaning: Indicates high execution plan instability or schema changes forcing plan
      generation during execution.
  thresholds: []
  relationships:
  - source: SQLPROC process_name
    target: PROCESS process_name
    relationship: Maps to the underlying OS process executing the database queries.
  sql_generation_guidance:
  - guidance: When querying compile or recompile times, check if subsystem_version
      >= 2 before displaying SQL-STMT-COMPILE-TIME.
  reporting_guidance:
  - guidance: Use compile metrics to identify processes suffering from excessive dynamic
      statement compilation overhead.
  counter_classifications:
  - counter: SQL-OBJ-RECOMPILATION-RATE
    classification: Incrementing
  - counter: SQL-STMT-COMPILATION-RATE
    classification: Incrementing
