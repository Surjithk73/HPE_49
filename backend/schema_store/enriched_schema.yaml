disc:
  source_file: measurefiles/disccsv
  ddl_record: ZMSDISC
  entity_type: DISC (Disk Device)
  purpose: 'Per-disk performance: I/O, queue times, free space, per-cache stats. Cache
    spans 8 levels c0..c7; totals must sum ALL eight, not just c0. Capacity comes
    from primary DP2 records only.

    '
  identity_columns:
  - system_name
  - cpu_num
  - device_name
  time_columns:
  - from_timestamp
  - to_timestamp
  - delta_time
  join_hints:
  - JOIN cpu ON (system_name, cpu_num, from_timestamp) for CPU context
  - JOIN dfile ON (system_name, device_name, from_timestamp) for file-level activity
  columns:
    system_name:
      queryable: true
      type: string
      description: NonStop node name Name of the system on which the measurement was
        taken.
    cpu_num:
      queryable: true
      type: integer
      description: "CPU number managing this disk Number of the CPU on which the measurement\
        \ was taken. For interprocessor communications (IPC records, CPU\u2011NUM\
        \ is MYCPU.)"
    object_uid:
      queryable: false
      type: string
      description: (ZMS Style only Reserved for future use.)
    from_timestamp:
      queryable: true
      type: datetime
      description: "Starting time of the measurement or transient entity. Specified\
        \ as Julian\u2011based, local civil time (LCT.) When using the CSV[A], JSON,\
        \ or XML report format, the timestamp is emitted as ISO 8601 date and time\
        \ of day representation, extended format, fractional seconds, local time (YYYY-MM-DDThh:mm:ss.s.)"
    to_timestamp:
      queryable: true
      type: datetime
      description: "Ending time of the measurement or transient entity. Specified\
        \ as Julian\u2011based, local civil time (LCT.) When using the CSV[A], JSON,\
        \ or XML report format, the timestamp is emitted as ISO 8601 date and time\
        \ of day representation, extended format, fractional seconds, local time (YYYY-MM-DDThh:mm:ss.s.)"
    delta_time:
      queryable: true
      type: integer
      unit: microseconds
      description: Duration of the measurement, in microseconds.
      derived_formula: The counters ACCEL-BUSY-TIME, NATIVE-BUSY-TIME, and TNS-BUSY-TIME
        are calculated, returned, and displayed only if a PROCESSH measurement has
        been active in the CPU during the delta time period. end
    template_version:
      queryable: false
      type: integer
      description: (ZMS Style only Record template version from MEASDDLS for the format
        of the external record. When data collected on systems of differing product
        versions are stored in the same structured files, the template version for
        all records is the one used to create the structured file.)
    subsystem_version:
      queryable: false
      type: integer
      description: Provided by DP2 (ZMS Style only This value is set to 1 for the
        initial H-series and later versions of all subsystems. If the value is greater
        than 1, consult the subsystem documentation for information about changes
        that affect the Measure counters.)
    error:
      queryable: false
      type: integer
      description: Indicates whether an error prevented Measure from collecting data
        or writing an output record for this entity. For values, see Identifying Data
        File Errors.
      thresholds: 'If the total number of array elements exceeds 256, Measure returns
        error 3251 (configuration error). If the total number of array elements exceeds
        1600, Measure returns error 3251 (configuration error). Warning event 4063
        looks like this: Measure will not re-emit warning event 4063 unless CID table
        usage is reduced to a pre-determined level before once again exceeding > ADD
        DEFINE =_SET_MAX_CIDS_TO_1024K, file a Process_Create_ error MM ( NN ) from
        Measmoncontrol TACL> ADD DEFINE =_MEAS_EMIT_CID_USAGE, FILE WARN80 10-04-07
        10:04:44 \MEASYOS.$XM00 TANDEM.MEASURE.H04 004063 Exceeded CID usage threshold.
        # Identifying Data File ErrorsIdentifying Data File Errors The first field
        of the output record for each measured entity type indicates whether a problem
        prevented measurement or record allocation. For example, test for a positive
        value, which indicates an error condition. Indicates whether an error prevented
        Measure from collecting data or writing an output record for this entity.
        For SQL/MX, if the actual name of the procedure exceeds the 32 characters
        allowed, a field overflow is reported in the ERROR field and only the least-significant
        31 bytes (preceded by a tilde (~)) are included. error INT is the error code
        that indicates the outcome of the operation. settings output INT:ref:1 is
        an array of flags that indicates the current setting of Measure subsystem
        parameters controlled through defines: $PERF.CAPAPP 14> MEASURE File Tool
        - T9086H01 - (01AUG06) - \YOSPRD Copyright 2006 Hewlett-Packard Company SPLIT
        MDATA5,(SFFILE1,SFFILE2),BY ENTITY (CPU PROCESS,SERVERNET) File $PERF.CAPAPP.MDATA5
        was split into the following files: File Size % Entity(s) -----------------------------------
        ---------- ------ --------------------- $PERF.CAPAPP.SFFILE1 41372788 30.88
        CPU,PROCESS $PERF.CAPAPP.SFFILE2 10586256 7.90 SERVERNET MEASFT SPLIT MDATA5,(SFFILE1,SFFILE2),
        BY ENTITY (CPU PROCESS,SERVERNET) $PERF.CAPAPP 16> MEASURE File Tool - T9086H01
        - (01AUG06) - \YOSPRD Copyright 2006 Hewlett-Packard Company SPLIT MDATA5,MCPU*,BY
        CPU * File $PERF.CAPAPP.MDATA5 was split into the following files: File Size
        % CPU(s) ----------------------------------- ---------- ------ ---------------------
        $PERF.CAPAPP.MCPU00 28410588 21.21 0 $PERF.CAPAPP.MCPU01 19602928 14.63 1
        $PERF.CAPAPP.MCPU02 41879174 31.26 2 $PERF.CAPAPP.MCPU03 42687210 31.86 3
        MEASFT SPLIT MDATA5,MCPU*,BY CPU * HELP | empty ` If a message indicates a
        syntax error, a circumflex (^) shows where the syntax error was detected.'
    pin:
      queryable: true
      type: integer
      description: Process Identification Number of the disk process Process identification
        number of the measured process.
    device_type:
      queryable: true
      type: integer
      description: Disk device type; value 3 = disk volume A value of 30 (optical
        disk device.)
      thresholds: 'A value of 3, which indicates a disk volume. One of these values,
        which indicates the type of device associated with the file: Name of the measured
        file. Additional information about the device type: A value of 63, which indicates
        an Expand line.'
    device_subtype:
      queryable: true
      type: integer
      description: Additional identifier for device_type; see System Generation Manual
        An additional identifier for DEVICE-TYPE. For a complete list of possible
        subtype values for optical disks, see the System Generation Manual. An additional
        identifier for DEVICE-TYPE.
      thresholds: 'Additional information about the device type: A value of 63, which
        indicates an Expand line.'
    device_name:
      queryable: true
      type: string
      description: Disk device name (e.g. $DATA01, $SYSTEM) Disk device on which the
        program file is located. For SMF files, this field provides the physical location
        that corresponds to the logical file name. For Nonstop files, this field is
        the same as the FILE-NAME VOLUME subfield.
      thresholds: MEAS_PATH_SEL Indicates that selection is only by path and device
        name, and not other attributes like lun, partition, or scsi-id.
    logical_device:
      queryable: true
      type: integer
      description: Logical device number Logical device number of the measured terminal.
    config_name:
      queryable: true
      type: string
      description: Logical name of the physical disk from system configuration database;
        null-terminated (ZMS Style only Logical name associated with this physical
        disk. Logical names are maintained by the system configuration database.)
      thresholds: MEAS_MULTIPLE_CLIMS Indicates that the CONFIG-NAME field in this
        descriptor contains more than one CLIM name.
    adapter_name:
      queryable: true
      type: string
      description: Logical name of the adapter containing the SAC; null-terminated
        Logical name associated with the adapter in which the SAC resides. Logical
        names are maintained by the system configuration database.
    sac_name:
      queryable: true
      type: string
      description: Logical name of the SAC or CLIM name; null-terminated Logical name
        of the SAC used in this path to the physical disk. Logical names are maintained
        by the system configuration database.
    capacity:
      queryable: true
      type: integer
      unit: bytes
      description: Disk volume capacity in bytes; use in IF/BY clauses Disk volume
        capacity in bytes. Item can be used only in the IF and BY clauses.
    storage_pool:
      queryable: true
      type: string
      description: SMF storage pool process name Name of the SMF storage pool to which
        the measured disk is assigned (process name of the storage pool process.)
      thresholds: 0 Unstructured 1 Relative 2 Entry-sequenced 3 Key-sequenced ` Name
        of the SMF storage pool to which the measured disk is assigned (process name
        of the storage pool process).
    disc_process_type:
      queryable: true
      type: integer
      description: Disk process type (DP2) The disk process type, DP2.
    request_qtime:
      queryable: true
      type: integer
      unit: microseconds
      counter_type: Queue
      description: "Time I/O requests spent on the disk process internal queue including\
        \ active requests; RATE ON \xE2\u2020\u2019 AQL. NOTE: includes lock wait\
        \ time Time that requests spent on the optical disk process internal queue\
        \ (includes any currently active requests. When reading a request, the optical\
        \ disk process places it on the internal queue.)"
    requests:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: "Number of I/O requests (READ, WRITE, FILEINFO) received by the\
        \ disk process Number of requests received by the terminal process. To determine\
        \ how long the requests were queued before being read by the terminal process,\
        \ measure the process and examine the PROCESS RECV\u2011QTIME counter."
      derived_formula: "This derived counter is formed by dividing a busy or queue-busy\
        \ counter for a resource by a corresponding incrementing counter for requests\
        \ of the resource. REQUEST-QTIME is divided by REQUESTS. When the REPORT RATE\
        \ value is on, this counter returns the average wait time (LOCKWAIT\u2011\
        TIME divided by REQUESTS\u2011BLOCKED). Average message latency can be calculated\
        \ by subtracting listener record SERVER-QTIME from linker record WRITE-QTIME,\
        \ then dividing by the linker record WRITE-REQUESTS. OSSNS-WAIT-TIME is divided\
        \ by OSSNS-REQUESTS."
    reads:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: 'Number of physical read operations from disk to memory Number
        of read operations (from the terminal to memory performed by the terminal
        process. Counter type: Incrementing.)'
    writes:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: 'Number of physical write operations from memory to disk Number
        of write operations (from memory to the terminal performed by the terminal
        process. Counter type: Incrementing.)'
      derived_formula: DEVICE-QBUSY-TIME is divided by the sum of READS and WRITES.
        For writes to unstructured files where the write-count is less than or equal
        to 4096 bytes and for structured files, the number of physical disk write
        operations is the difference between DRIVER-OUTPUT-CALLS and CACHE-WRITE-HITS.
        For writes to unstructured files where the write-count is greater than 4096
        (large write), the number of physical disk write operations is the difference
        between DRIVER-OUTPUT-CALLS and the sum of CACHE-WRITE-HITS and CACHE-WRITE-CLEANS.
    input_bytes:
      queryable: true
      type: integer
      unit: bytes
      counter_type: Accumulating
      description: "Bytes read from disk Number of bytes read from the terminal. The\
        \ total number of bytes transferred to and from the terminal is this counter\
        \ plus OUTPUT\u2011BYTES. In G-series RVUs, the INPUT-BYTES-F field is a 64-bit\
        \ version of INPUT-BYTES."
    output_bytes:
      queryable: true
      type: integer
      unit: bytes
      counter_type: Accumulating
      description: "Bytes written to disk Number of bytes written to the terminal.\
        \ The total number of bytes transferred to and from the terminal is INPUT\u2011\
        BYTES plus this counter."
    swaps:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: Number of swap I/O operations; advanced per I/O (may exceed CPU
        swaps) Number of swap operations (both into and out of memory performed for
        the memory manager. Unlike CPU swaps, which are not dependent on file block
        size, the disk process performs I/O based on the block size of the file and
        might need to perform more than one I/O to swap the needed data.)
    control_points:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: Number of times disk process wrote a TMF control point record to
        its audit-trail file Number of times the disk process wrote a TMF control
        point record to its audit-trail file. For a discussion of TMF auditing, see
        the TMF Operations and Recovery Guide.
    control_point_writes:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: Number of dirty cache blocks written to disk at TMF control points
        Number of dirty cache blocks that the disk process wrote to disk at TMF control
        points. For a discussion of TMF auditing, see the TMF Operations and Recovery
        Guide.
    free_space_ios:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: Number of I/O operations to the disk free space table Number of
        I/O operations to the disk free space table. The disk free space table lists
        each available free block on the disk.
    requests_blocked:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: Number of times an operation waited because the requested file
        or record was locked Number of times an I/O operation had to wait because
        the requested file or record was locked. LOCKWAITS is another term for this
        counter.
    starting_free_space:
      queryable: true
      type: integer
      unit: bytes
      counter_type: Snapshot
      description: Free disk space at interval start; primary path record only Number
        of bytes free on the volume when the measurement starts. This counter is displayed
        by MEASCOM when the REPORT STYLE is ZMS.
    ending_free_space:
      queryable: true
      type: integer
      unit: bytes
      counter_type: Snapshot
      description: Free disk space at interval end; primary path record only Number
        of bytes free on the volume at the time indicated by the TO time. This counter
        is updated only for the primary path record.
    starting_free_blocks:
      queryable: true
      type: integer
      counter_type: Snapshot
      description: Free entries in the free space table at interval start; primary
        path record only Number of free entries in the free space table for the volume
        when the measurement starts. The free space table is an internal data structure
        maintained by DP2.
    ending_free_blocks:
      queryable: true
      type: integer
      counter_type: Snapshot
      description: Free entries in the free space table at interval end; primary path
        record only Number of free blocks on the volume at the time indicated by the
        TO time. The counter is updated only for the primary path record.
    volsem_qtime:
      queryable: true
      type: integer
      unit: microseconds
      counter_type: Queue
      description: "Time requests waited for the volume semaphore (exclusive and shared\
        \ modes); RATE ON \xE2\u2020\u2019 AQL Time that the requests spent waiting\
        \ for the volume semaphore (exclusive and shared modes. With REPORT RATE OFF,\
        \ the value of this counter equals the total queue time for volume semaphore.)"
    read_qbusy_time:
      queryable: true
      type: integer
      unit: microseconds
      counter_type: Queue-Busy
      description: "Time the read queue was non-empty; RATE ON \xE2\u2020\u2019 %\
        \ Time spent in a state in which requests for data transfer from this entity\
        \ to memory were queued. Counter type: Queue Busy."
    read_qtime:
      queryable: true
      type: integer
      unit: microseconds
      counter_type: Queue
      description: "Total time spent by read requests queued to this disk; RATE ON\
        \ \xE2\u2020\u2019 AQL Total time spent by read requests queued for this entity.\
        \ With REPORT RATE ON, the average number of read requests queued for this\
        \ entity."
    write_qbusy_time:
      queryable: true
      type: integer
      unit: microseconds
      counter_type: Queue-Busy
      description: "Time the write queue was non-empty; RATE ON \xE2\u2020\u2019 %\
        \ Time spent in a state in which requests for data transfer from memory to\
        \ this entity were queued. Counter type: Queue Busy."
    write_qtime:
      queryable: true
      type: integer
      unit: microseconds
      counter_type: Queue
      description: "Total time spent by write requests queued to this disk; RATE ON\
        \ \xE2\u2020\u2019 AQL Total time spent by write requests queued for this\
        \ entity. With REPORT RATE ON, the average number of write requests queued\
        \ for this entity."
      derived_formula: Average message latency can be calculated by subtracting listener
        record SERVER-QTIME from linker record WRITE-QTIME, then dividing by the linker
        record WRITE-REQUESTS. To calculate the average message latency between processors
        in separate clusters, calculate the average SERVER-QTIME and WRITE-QTIME values
        in a similar interval and then subtract the resulting values.
    device_qbusy_time:
      queryable: true
      type: integer
      unit: microseconds
      counter_type: Queue-Busy
      description: "Time any requests were queued to this disk; RATE ON \xE2\u2020\
        \u2019 %. NOTE: does NOT equal read_qbusy_time + write_qbusy_time due to concurrency\
        \ (ZMS Style only Time spent in a state in which requests of any number or\
        \ type were queued to this optical disk in this processor. Counter type: Queue\
        \ Busy.)"
      derived_formula: In D-series RVUs, DISC-BUSY-TIME is calculated by adding the
        values of the DISC WRITE-BUSY-TIME and READ-BUSY-TIME counters. In G-series
        RVUs, DEVICE-QBUSY-TIME does not equal WRITE-QBUSY-TIME plus READ-QBUSY-TIME.
    dbio_reads:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: Read operations enabled for direct bulk I/O; subset of reads Number
        of direct bulk I/O read operations to the measured file. This counter is a
        subset of READS.
    dbio_writes:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: Write operations enabled for direct bulk I/O; subset of writes
        Number of direct bulk I/O write operations to the measured file. This counter
        is a subset of WRITES.
    defreqs:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: Number of requests subject to deferral (mixed workload algorithm);
        subset of requests Number of requests received by the disk process that are
        subject to deferral. This counter is a subset of REQUESTS.
    defreq_qtime:
      queryable: true
      type: integer
      unit: microseconds
      counter_type: Queue
      description: Time deferrable requests spent on the disk process internal queue;
        subset of request_qtime Time (in microseconds that requests subject to deferral
        spent on the disk process internal queue (including any current active or
        deferred requests). This counter is a subset of REQUEST-QTIME.) This counter
        is a subset of REQUEST-QTIME.
    deferred_qtime:
      queryable: true
      type: integer
      unit: microseconds
      counter_type: Queue
      description: Time requests subject to deferral actually spent deferred; subset
        of defreq_qtime Time (in microseconds that requests subject to deferral actually
        spent deferred. This counter is a subset of DEFREQ-QTIME.) This counter is
        a subset of DEFREQ-QTIME.
