proc:
  source_file: measurefiles/proccsv
  ddl_record: ZMSPROC
  entity_type: PROC (Process)
  purpose: 'Per-process performance metrics for each measured process. Captures CPU
    utilization, memory, messaging, file I/O, and OSS activity. Counter records are
    initialized when the process starts, not at measurement start.

    '
  identity_columns:
  - system_name
  - cpu_num
  - pin
  - process_name
  - program_file_name.volume
  - program_file_name.subvol
  - program_file_name.filename
  time_columns:
  - from_timestamp
  - to_timestamp
  - delta_time
  join_hints:
  - JOIN cpu ON (system_name, cpu_num, from_timestamp) for CPU context
  - JOIN file ON (system_name, cpu_num, opener_pin, from_timestamp) for file activity
  - JOIN dopen ON (system_name, opener_cpu, opener_pin, from_timestamp) for disk open
    activity
  columns:
