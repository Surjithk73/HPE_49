  proc.OPEN_CLOSE_WAIT_TIME: Name server operations are counted in OSSNS-WAIT-TIME.
  proc.CHECKPOINT_BUSY_TIME: For waited checkpoints, the CHECKPOINT-BUSY-TIME counter
    is the elapsed time spent executing waited checkpoints. For nowaited checkpoints,
    the CHECKPOINT-BUSY-TIME counter includes the elapsed time to initiate nowaited
    checkpoint requests and the elapsed time for which the process is suspended in
