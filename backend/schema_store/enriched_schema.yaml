    by Nonstop OS, is four or greater; otherwise the counter contains a zero value
    and is not displayed by MEASCOM.
  proc.SENT_BYTES: For DBIO byte counts, see the measurements attributed to the linker
    process in the DBIO-WRITE-BYTES counter of the FILE entity type.
  proc.RETURNED_BYTES: For DBIO byte counts, see the measurements attributed to the
    linker process in the DBIO-READ-BYTES counter of the FILE entity type.
  proc.SENT_CBYTES: The protocol control bytes are not included in the counter SENT-BYTES.
