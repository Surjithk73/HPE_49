business_rules: "PROCESS NAME CONVENTIONS in macht413.proc: ALL processes in this\
  \ dataset start\nwith '$'. There are NO processes without a '$' prefix \u2014 do\
  \ NOT use\n\"NOT LIKE '$%'\" to identify user processes; it will return zero rows.\n\
  Disk processes match LIKE '$DATA%' OR '$SSD%' OR '$AUDIT%'.\nCore system processes\
  \ are: $SYSTEM, $MONITOR, $MSENGER, $VIRTUAL, $NULL,\n$OSS, $SWAP, $SWAP01, $SWAP23,\
  \ $SWAP34, $NCP, $TMP.\nUser/application processes are everything else (e.g. $BEER,\
  \ $CHAMP, $GANESH).\nWhen categorising processes, always use explicit IN() or LIKE\
  \ patterns based\non the actual names above \u2014 never assume generic HPE naming\
  \ conventions.\n"
cpu:
  source_file: measurefiles/cpucsv
  ddl_record: ZMSCPU
  entity_type: CPU (Central Processing Unit)
  purpose: 'Per-CPU performance metrics for each NonStop processor. Captures utilization,
    memory, I/O, transaction, and ServerNet fabric activity over measurement intervals.
    Counter records are initialized at CPU load time, not at measurement start.

    '
  identity_columns:
  - system_name
  - cpu_num
  time_columns:
  - from_timestamp
  - to_timestamp
  - delta_time
  join_hints:
  - JOIN proc ON (system_name, cpu_num, from_timestamp) for process activity
  - JOIN disc ON (system_name, cpu_num, from_timestamp) for disk activity
  columns:
    u_loadid.loadid:
      queryable: false
      type: string
      description: Internal Measure load ID
    u_loadid.load_id.prefix_id:
      queryable: false
      type: string
      description: Internal Measure load ID prefix
    u_loadid.load_id.interval_id:
      queryable: false
      type: string
      description: Internal Measure load ID interval
    system_name:
      queryable: true
      type: string
      description: 'NonStop node name (e.g. \KRONOS) (MANUAL DEF: Name of the system
        on which the measurement was taken.)'
      derived_formula: end ``` ``` + help zmstmf counters --- Measurement descriptive
        fields --------------------------------- error+ delta-time+ loadid* from-timestamp+
        system-name* cpu-num+ to-timestamp+ os-version+ --- Counter fields -------------------------------------------------
        home-trans remote-trans-qtime home-net-trans-qtime remote-trans home-net-trans
        trans-backout-qtime home-trans-qtime aborting-trans tmp-work tmp-work-qtime
        pio-sends pio-send-qtime pio-send-bytes pio-recvs pio-recv-bytes --- Derived
        counter fields ----------------------------------------- home-trans-ART home-net-trans-ART
        remote-trans-ART trans-backout-ART tmp-work-AQT ``` ``` RECORD zmstmf.
    cpu_num:
      queryable: true
      type: integer
      description: "CPU number (0-indexed, 0-15) (MANUAL DEF: Number of the CPU on\
        \ which the measurement was taken. For interprocessor communications (IPC)\
        \ records, CPU\u2011NUM is MYCPU.)"
      derived_formula: end ``` ``` + help zmstmf counters --- Measurement descriptive
        fields --------------------------------- error+ delta-time+ loadid* from-timestamp+
        system-name* cpu-num+ to-timestamp+ os-version+ --- Counter fields -------------------------------------------------
        home-trans remote-trans-qtime home-net-trans-qtime remote-trans home-net-trans
        trans-backout-qtime home-trans-qtime aborting-trans tmp-work tmp-work-qtime
        pio-sends pio-send-qtime pio-send-bytes pio-recvs pio-recv-bytes --- Derived
        counter fields ----------------------------------------- home-trans-ART home-net-trans-ART
        remote-trans-ART trans-backout-ART tmp-work-AQT ``` ``` RECORD zmstmf.
    os_version.letter:
      queryable: true
      type: string
      description: OS version letter (e.g. J, L)
    os_version.number:
      queryable: true
      type: integer
      description: OS version number (e.g. 06)
    object_uid:
      queryable: false
      type: string
      description: 'Reserved for future use (MANUAL DEF: (ZMS Style only) Reserved
        for future use.)'
    from_timestamp:
      queryable: true
      type: datetime
      description: "Measurement interval start (Julian LCT) (MANUAL DEF: Starting\
        \ time of the measurement or transient entity. Specified as Julian\u2011based,\
        \ local civil time (LCT).) (DERIVED METRIC: When using the CSV[A], JSON, or\
        \ XML report format, the timestamp is emitted as ISO 8601 date and time of\
        \ day representation, extended format, fractional seconds, local time (YYYY-MM-DDThh:mm:ss.s).)"
      derived_formula: end ``` ``` + help zmstmf counters --- Measurement descriptive
        fields --------------------------------- error+ delta-time+ loadid* from-timestamp+
        system-name* cpu-num+ to-timestamp+ os-version+ --- Counter fields -------------------------------------------------
        home-trans remote-trans-qtime home-net-trans-qtime remote-trans home-net-trans
        trans-backout-qtime home-trans-qtime aborting-trans tmp-work tmp-work-qtime
        pio-sends pio-send-qtime pio-send-bytes pio-recvs pio-recv-bytes --- Derived
        counter fields ----------------------------------------- home-trans-ART home-net-trans-ART
        remote-trans-ART trans-backout-ART tmp-work-AQT ``` ``` RECORD zmstmf.
    to_timestamp:
      queryable: true
      type: datetime
      description: "Measurement interval end (Julian LCT) (MANUAL DEF: Ending time\
        \ of the measurement or transient entity. Specified as Julian\u2011based,\
        \ local civil time (LCT).) (DERIVED METRIC: When using the CSV[A], JSON, or\
        \ XML report format, the timestamp is emitted as ISO 8601 date and time of\
        \ day representation, extended format, fractional seconds, local time (YYYY-MM-DDThh:mm:ss.s).)"
      derived_formula: end ``` ``` + help zmstmf counters --- Measurement descriptive
        fields --------------------------------- error+ delta-time+ loadid* from-timestamp+
        system-name* cpu-num+ to-timestamp+ os-version+ --- Counter fields -------------------------------------------------
        home-trans remote-trans-qtime home-net-trans-qtime remote-trans home-net-trans
        trans-backout-qtime home-trans-qtime aborting-trans tmp-work tmp-work-qtime
        pio-sends pio-send-qtime pio-send-bytes pio-recvs pio-recv-bytes --- Derived
        counter fields ----------------------------------------- home-trans-ART home-net-trans-ART
        remote-trans-ART trans-backout-ART tmp-work-AQT ``` ``` RECORD zmstmf.
    delta_time:
      queryable: true
      type: integer
      unit: microseconds
      description: 'Interval duration; divide accumulating counters by delta_time
        for per-second rates (MANUAL DEF: Duration of the measurement, in microseconds.)'
      derived_formula: The counters ACCEL-BUSY-TIME, NATIVE-BUSY-TIME, and TNS-BUSY-TIME
        are calculated, returned, and displayed only if a PROCESSH measurement has
        been active in the CPU during the delta time period. end ``` ``` + help zmstmf
        counters --- Measurement descriptive fields ---------------------------------
        error+ delta-time+ loadid* from-timestamp+ system-name* cpu-num+ to-timestamp+
        os-version+ --- Counter fields -------------------------------------------------
        home-trans remote-trans-qtime home-net-trans-qtime remote-trans home-net-trans
        trans-backout-qtime home-trans-qtime aborting-trans tmp-work tmp-work-qtime
        pio-sends pio-send-qtime pio-send-bytes pio-recvs pio-recv-bytes --- Derived
        counter fields ----------------------------------------- home-trans-ART home-net-trans-ART
        remote-trans-ART trans-backout-ART tmp-work-AQT ``` ``` RECORD zmstmf.
    template_version:
      queryable: false
      type: integer
      description: 'ZMS record template version from MEASDDLS (MANUAL DEF: (ZMS Style
        only) Record template version from MEASDDLS for the format of the external
        record. When data collected on systems of differing product versions are stored
        in the same structured files, the template version for all records is the
        one used to create the structured file.)'
      derived_formula: The length of in^record is derived from the information encoded
        in the template version of the header record pointed to by in^record.
    format_version.letter:
      queryable: false
      type: string
      description: MEASFH format version letter
    format_version.number:
      queryable: false
      type: integer
      description: MEASFH format version number
    data_version.letter:
      queryable: false
      type: string
      description: Data file version letter
    data_version.number:
      queryable: false
      type: integer
      description: Data file version number
    subsystem_version:
      queryable: false
      type: integer
      description: 'Set to 1 for initial H-series; 0 for G-series (MANUAL DEF: (ZMS
        Style only) This value is set to 1 for the initial H-series and later versions
        of all subsystems. If the value is greater than 1, consult the subsystem documentation
        for information about changes that affect the Measure counters.)'
      derived_formula: "##### - ##### - ##### - ``` Diskfile $DATA.ZSD12345.Z1234567\
        \ File Format x ANSI SQL Name \u2018TABLE Catalog_12.Schema_45.Table_56 PARTITION\
        \ Partition_78\u2019 Device Name $DATA Pool Local CPU 0 File Type Key Sequenced\
        \ File Code 550 Format Version: H01 Data Version: H01 Subsystem Version: 1\
        \ Local System \\HURTS From 12 Jan 2003, 19:35:28 For 46.9 Seconds ------------\
        \ File ---------------------------------------------------------- Open-Qtime\
        \ 72.11 ms Transient-Opens Starting-EOF Ending-EOF Extent-Allocations File-Growth-Ratio\
        \ ``` # ENDPOINTENDPOINT The SERVERNET entity has been replaced by ENDPOINT."
    error:
      queryable: false
      type: integer
      description: '0=no error; >0=error (no data); <0=warning (data present with
        caveats) (MANUAL DEF: Indicates whether an error prevented Measure from collecting
        data or writing an output record for this entity. For values, see Identifying
        Data File Errors.)'
      derived_formula: end ``` ``` + help zmstmf counters --- Measurement descriptive
        fields --------------------------------- error+ delta-time+ loadid* from-timestamp+
        system-name* cpu-num+ to-timestamp+ os-version+ --- Counter fields -------------------------------------------------
        home-trans remote-trans-qtime home-net-trans-qtime remote-trans home-net-trans
        trans-backout-qtime home-trans-qtime aborting-trans tmp-work tmp-work-qtime
        pio-sends pio-send-qtime pio-send-bytes pio-recvs pio-recv-bytes --- Derived
        counter fields ----------------------------------------- home-trans-ART home-net-trans-ART
        remote-trans-ART trans-backout-ART tmp-work-AQT ``` ``` RECORD zmstmf.
      thresholds: 'If the total number of array elements exceeds 256, Measure returns
        error 3251 (configuration error). If the total number of array elements exceeds
        1600, Measure returns error 3251 (configuration error). Warning event 4063
        looks like this: ``` ``` Measure will not re-emit warning event 4063 unless
        CID table usage is reduced to a pre-determined level before once again exceeding
        ``` ``` > ADD DEFINE =_SET_MAX_CIDS_TO_1024K, file a ``` ``` Process_Create_
        error MM ( NN ) from Measmoncontrol ``` ``` TACL> ADD DEFINE =_MEAS_EMIT_CID_USAGE,
        FILE WARN80 ``` ``` 10-04-07 10:04:44 \MEASYOS.$XM00 TANDEM.MEASURE.H04 004063
        Exceeded CID usage threshold. # Identifying Data File ErrorsIdentifying Data
        File Errors The first field of the output record for each measured entity
        type indicates whether a problem prevented measurement or record allocation.
        For example, test for a positive value, which indicates an error condition.
        # ERRORERROR Indicates whether an error prevented Measure from collecting
        data or writing an output record for this entity. For SQL/MX, if the actual
        name of the procedure exceeds the 32 characters allowed, a field overflow
        is reported in the ERROR field and only the least-significant 31 bytes (preceded
        by a tilde (~)) are included. error INT is the error code that indicates the
        outcome of the operation. settings output INT:ref:1 is an array of flags that
        indicates the current setting of Measure subsystem parameters controlled through
        defines: ``` ADD DEFINE =_SET_MAX_CIDS_TO_1024K, file a ``` ``` error := MEASMONSTATUS
        ( meascb! -1F indicates an error return. A return context of 1F indicates
        an error. SubtopicsSubtopics INFO CommandINFO Command SPLIT CommandSPLIT Command
        HELP CommandHELP Command MEASFT Error and Warning MessagesMEASFT Error and
        Warning Messages # INFO CommandINFO Command The INFO command produces a report
        that indicates how much space in a data file is associated with each entity
        type and processor type. This example illustrates the format of a typical
        error and warning: ``` $PERF.CAPAPP 14> ``` ``` MEASURE File Tool - T9086H01
        - (01AUG06) - \YOSPRD Copyright 2006 Hewlett-Packard Company SPLIT MDATA5,(SFFILE1,SFFILE2),BY
        ENTITY (CPU PROCESS,SERVERNET) File $PERF.CAPAPP.MDATA5 was split into the
        following files: File Size % Entity(s) -----------------------------------
        ---------- ------ --------------------- $PERF.CAPAPP.SFFILE1 41372788 30.88
        CPU,PROCESS $PERF.CAPAPP.SFFILE2 10586256 7.90 SERVERNET ``` ``` MEASFT SPLIT
        MDATA5,(SFFILE1,SFFILE2), BY ENTITY (CPU PROCESS,SERVERNET) ``` ``` $PERF.CAPAPP
        16> ``` ``` MEASURE File Tool - T9086H01 - (01AUG06) - \YOSPRD Copyright 2006
        Hewlett-Packard Company SPLIT MDATA5,MCPU*,BY CPU * File $PERF.CAPAPP.MDATA5
        was split into the following files: File Size % CPU(s) -----------------------------------
        ---------- ------ --------------------- $PERF.CAPAPP.MCPU00 28410588 21.21
        0 $PERF.CAPAPP.MCPU01 19602928 14.63 1 $PERF.CAPAPP.MCPU02 41879174 31.26
        2 $PERF.CAPAPP.MCPU03 42687210 31.86 3 ``` ``` MEASFT SPLIT MDATA5,MCPU*,BY
        CPU * ``` ``` HELP | empty ``` If a message indicates a syntax error, a circumflex
        (^) shows where the syntax error was detected.'
    cpu_type:
      queryable: true
      type: integer
      counter_type: Snapshot
      description: Processor type identifier; use PROCESSOR_GETNAME_ to decode
    cpu_subtype:
      queryable: true
      type: integer
      counter_type: Snapshot
      description: Processor subtype identifier
    mem_mb:
      queryable: true
      type: integer
      unit: megabytes
      counter_type: Snapshot
      description: Total physical memory in MB; if 0xFFFF compute from mem_frames
        * page_size_bytes
      derived_formula: Total Memory Size = MEM-FRAMES * PAGE-SIZE-BYTES
      thresholds: Supports sizes up to 64GB. If size is larger, returns 0xFFFF (which
        indicates the formula should be used).
    pcbs:
      queryable: true
      type: integer
      counter_type: Snapshot
      description: 'Number of Process Control Blocks configured by SYSGEN (MANUAL
        DEF: Number of process control blocks (PCBs) configured by the SYSGEN program.)'
    page_size_bytes:
      queryable: true
      type: integer
      unit: bytes
      counter_type: Snapshot
      description: 'Memory page frame size in bytes (MANUAL DEF: (G-series, Legacy
        Style only) Number of bytes in the memory page frame of the CPU being measured.
        See also Usage Notes for H-series and later PROCESS Entities.)'
    mem_frames:
      queryable: true
      type: integer
      counter_type: Snapshot
      description: Total physical memory frames available (PHYSCL in PEEK)
    mem_initial_lock:
      queryable: true
      type: integer
      counter_type: Snapshot
      description: Memory frames locked at system load by SYSGEN (SWAPBL in PEEK)
    ipus:
      queryable: true
      type: integer
      counter_type: Snapshot
      description: 'Number of IPUs comprising this logical CPU (J-series and later)
        (DERIVED METRIC: The field is not displayed by MEASCOM, but determines whether
        the IPU-SWITCHES field is displayed.) (MANUAL DEF: (ZMS Style only) In Measure
        J01 and later PVUs, indicates the number of IPUs in the CPU. The field is
        not displayed by MEASCOM, but determines whether the IPU-SWITCHES field is
        displayed.)'
      thresholds: '# IPUSIPUS (ZMS Style only) In Measure J01 and later PVUs, indicates
        the number of IPUs in the CPU. # IPU-SWITCHESIPU-SWITCHES (ZMS Style only)
        Accumulating counter that indicates the total number of times that a process
        switched IPUs while executing.'
    flags:
      queryable: true
      type: bitmask
      counter_type: Snapshot
      description: 'Bit 14=1: L-series or later RVU; Bit 15=1: NSMA system (H06.24/J06.13+)
        (MANUAL DEF: (ZMS style only, L-series and later RVUs) A16-bit field that
        is used to indicate if the measurement was done on an L-series and later RVU.
        flags.0:13Reserved for future use.)'
      thresholds: 'settings output INT:ref:1 is an array of flags that indicates the
        current setting of Measure subsystem parameters controlled through defines:
        ``` ADD DEFINE =_SET_MAX_CIDS_TO_1024K, file a ``` ``` error := MEASMONSTATUS
        ( meascb!'
    cpu_busy_time:
      queryable: true
      type: integer
      unit: microseconds
      counter_type: Busy
      description: "Time CPU was busy; for TNS/E = sum of accel_busy_time + tns_busy_time\
        \ + native_busy_time; RATE ON \xE2\u2020\u2019 % of interval (MANUAL DEF:\
        \ Time that the CPU spent executing the measured process: In D-series RVUs,\
        \ this counter is not advanced for the sending process when LDONE queuing\
        \ is in use. For measurements on systems running G05 and later RVUs, this\
        \ counter includes any page-defaulting activity performed on behalf of this\
        \ process.) (DERIVED METRIC: For TNS/R systems, CPU-BUSY-TIME is the sum of\
        \ ACCEL\u2011BUSY\u2011TIME, TNS\u2011BUSY\u2011TIME, and TNSR\u2011BUSY\u2011\
        TIME. For TNS/E systems, CPU-BUSY-TIME is the sum of ACCEL\u2011BUSY\u2011\
        TIME, TNS\u2011BUSY\u2011TIME, and NATIVE\u2011BUSY\u2011TIME. A CPU-BUSY-TIME\
        \ value is always displayed. ``` ``` Related CounterRelated Counter DescriptionDescription\
        \ CPU CPU-BUSY-TIMESimilar, but is the busy time for the entire processor.\
        \ PROCESS CPU-NUM Identifies the CPU executing the process ``` Counter type:\
        \ Busy.)"
    cpu_qtime:
      queryable: true
      type: integer
      unit: microseconds
      counter_type: Queue
      description: "Time processes spent on the CPU ready list; RATE ON \xE2\u2020\
        \u2019 AQL"
    dispatches:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: "Number of times a process was selected from the ready list and\
        \ executed (MANUAL DEF: Number of times the process was selected from the\
        \ ready list and executed by the CPU identified by the CPU\u2011NUM field.\
        \ You can expect one dispatch for each I/O operation, plus additional dispatches\
        \ caused by the process being preempted by higher priority processes.)"
    swaps:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: 'Number of memory swap operations (in and out); advanced once per
        swap regardless of pages swapped (MANUAL DEF: Number of swap operations (both
        into and out of memory) performed for the memory manager. Unlike CPU swaps,
        which are not dependent on file block size, the disk process performs I/O
        based on the block size of the file and might need to perform more than one
        I/O to swap the needed data.)'
      derived_formula: None mentioned.
      thresholds: None mentioned.
    intr_busy_time:
      queryable: true
      type: integer
      unit: microseconds
      counter_type: Busy
      description: Time spent executing interrupt handlers; on TNS/E includes system
        IPs and APs
    process_ovhd:
      queryable: true
      type: integer
      unit: microseconds
      counter_type: Busy
      description: Time spent by OS initializing and terminating processes; not included
        in per-process cpu_busy_time
    disc_ios:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: Total disk I/O transfers performed by disk processes in this CPU,
        including direct bulk I/O
    cache_hits:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: 'Number of times required block was found in disk cache during
        an I/O operation (MANUAL DEF: Number of times a read operation found the required
        block in cache, which saves a disk I/O. If you write a partially filled block
        to disk, the disk process must read the block (possibly incrementing this
        counter), merge the new data into the block, and then write the block to disk.)'
      derived_formula: None mentioned.
      thresholds: None mentioned.
    transactions:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: "Number of terminal transactions (read followed by write) in active\
        \ measurements on this CPU (MANUAL DEF: Number of terminal transactions (a\
        \ read followed immediately by a write) performed by the terminal process.\
        \ RESPONSE\u2011TIME measures the time spent on the transactions.)"
    response_time:
      queryable: true
      type: integer
      unit: microseconds
      counter_type: Response-time
      description: "Cumulative terminal response time; RATE ON \xE2\u2020\u2019 avg\
        \ response time per transaction (MANUAL DEF: Time the terminal process spent\
        \ on terminal response. A transaction is a read from a terminal followed by\
        \ a write to the terminal.)"
      derived_formula: Accumulated response time value is divided by a transaction
        count (when RATE is ON).
      thresholds: None mentioned.
    comp_traps:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: 'Number of compatibility mode traps (data misalignment, unexpected
        TNS/native transitions) (MANUAL DEF: Number of times a compatibility trap
        occurred during execution of this process. A compatibility trap is a data
        misalignment event, an unexpected transition to or from accelerated or unaccelerated
        code, or a relative segment 2 or 3 problem.)'
    native_busy_time:
      queryable: true
      type: integer
      unit: microseconds
      counter_type: Busy
      description: 'Time CPU was busy executing native (TNS/E) code; only valid when
        PROCESSH measurement is active (MANUAL DEF: (ZMS Style only) Time that the
        CPU was busy executing native code in this process. See Usage Notes for H-series
        and later PROCESS Entities.)'
      derived_formula: Calculated based on the number of PROCESSH samples observed
        in the applicable code region.
      thresholds: None mentioned.
    accel_busy_time:
      queryable: true
      type: integer
      unit: microseconds
      counter_type: Busy
      description: 'Time CPU was busy executing accelerated code; only valid when
        PROCESSH measurement is active (MANUAL DEF: Time that the CPU was busy executing
        accelerated code in this process. This counter applies only to measurements
        taken on a TNS/R or TNS/E system.)'
      derived_formula: Calculated based on the number of PROCESSH samples observed
        in the applicable code region.
      thresholds: None mentioned.
    tns_busy_time:
      queryable: true
      type: integer
      unit: microseconds
      counter_type: Busy
      description: 'Time CPU was busy executing TNS code; only valid when PROCESSH
        measurement is active (MANUAL DEF: Time that the CPU was busy executing TNS
        code in this process. This counter applies only to measurements taken on a
        TNS/R or TNS/E system.)'
      derived_formula: Calculated based on the number of PROCESSH samples observed
        in the applicable code region.
      thresholds: None mentioned.
    page_requests:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: Number of times memory manager was invoked to obtain a page frame
        (CLOCK:CALLS in PEEK)
    page_scans:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: Number of page frames examined by memory manager to find a replaceable
        page
    mm_page_scans:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: 'Memory manager background page scans not caused by demand; does
        not indicate a performance problem (MANUAL DEF: (ZMS Style only) Number of
        memory page scans initiated by the memory manager to perform memory clean-up
        that was not caused by memory demand. The memory manager periodically scans
        memory for removable pages in the background.)'
    starting_free_mem:
      queryable: true
      type: integer
      counter_type: Snapshot
      description: Free memory frames at interval start
    ending_free_mem:
      queryable: true
      type: integer
      counter_type: Snapshot
      description: Free memory frames at interval end
    starting_ucme:
      queryable: true
      type: integer
      counter_type: Snapshot
      description: Uncorrectable Memory Error (UCME) frames at interval start; not
        valid for H-series and later
    ending_ucme:
      queryable: true
      type: integer
      counter_type: Snapshot
      description: Uncorrectable Memory Error (UCME) frames at interval end; not valid
        for H-series and later
    starting_ucl:
      queryable: true
      type: integer
      counter_type: Snapshot
      description: User process code and library segment frames in physical memory
        at interval start
    ending_ucl:
      queryable: true
      type: integer
      counter_type: Snapshot
      description: User process code and library segment frames in physical memory
        at interval end
    starting_scl:
      queryable: true
      type: integer
      counter_type: Snapshot
      description: System process code and library segment frames in physical memory
        at interval start
    ending_scl:
      queryable: true
      type: integer
      counter_type: Snapshot
      description: System process code and library segment frames in physical memory
        at interval end
    starting_free_cids:
      queryable: true
      type: integer
      counter_type: Snapshot
      description: 'Counter ID control blocks available for new counter records at
        interval start (MANUAL DEF: (ZMS Style only) Number of counter ID control
        blocks available for new counter records in this processor at the beginning
        of the reported measurement interval. Counter type: Snapshot.)'
    ending_free_cids:
      queryable: true
      type: integer
      counter_type: Snapshot
      description: 'Counter ID control blocks available for new counter records at
        interval end (MANUAL DEF: Number of counter ID control blocks available for
        new counter records in this processor at the end of the reported measurement
        interval. Counter type: Snapshot.)'
    unsp_pages_qtime:
      queryable: true
      type: integer
      unit: microseconds
      counter_type: Queue
      description: "Time unsponsored shared pages spent in main memory (G05+); RATE\
        \ ON \xE2\u2020\u2019 AQL (MANUAL DEF: Time that unsponsored pages (shared\
        \ pages not owned by any process) spent in main memory. For a description\
        \ of unsponsored pages, see Usage Notes for G-Series CPU Entities.)"
    unsp_pages_start:
      queryable: true
      type: integer
      counter_type: Snapshot
      description: 'Number of unsponsored pages at interval start (MANUAL DEF: Number
        of pages on the UNSP-PAGES-QTIME queue at the start of the measurement interval.
        Counter type: Snapshot.) (DERIVED METRIC: Number of pages on the UNSP-PAGES-QTIME
        queue at the start of the measurement interval.)'
    unsp_pages_end:
      queryable: true
      type: integer
      counter_type: Snapshot
      description: 'Number of unsponsored pages at interval end (MANUAL DEF: Number
        of pages on the UNSP-PAGES-QTIME queue at the end of the measurement interval.
        Counter type: Snapshot.) (DERIVED METRIC: Number of pages on the UNSP-PAGES-QTIME
        queue at the end of the measurement interval.)'
    link_prepush_msgs:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: 'H/J: messages transferred to another CPU using prepush protocol;
        L: requests via Send operation (MANUAL DEF: H/J-series: Number of messages
        transferred to another CPU using the prepush protocol. L-series: Number of
        requests transferred to another CPU via a Send operation.)'
    link_readlink_msgs:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: 'H/J: messages within readlinkcache size not using prepush; L:
        replies received from another CPU (MANUAL DEF: H/J-series: Number of messages
        transferred to another CPU not using the prepush protocol but within the readlinkcache
        message size. L-series: Number of replies received from another CPU.)'
    link_large_msgs:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: 'H/J: messages exceeding readlinkcache size; L: requests where
        data pulled via IB RDMA Read (MANUAL DEF: H/J-series: Number of messages transferred
        to a CPU that exceeded the readlinkcache message size. L-series: Number of
        requests transferred to another CPU that exceeded the Send operation size.)'
    readlinkcache_all:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: 'H/J: received messages with both control and data cached; L: received
        requests fully cached (MANUAL DEF: H/J-series: Number of received messages
        for which both control and data bytes were cached in readlinkcache buffers.
        L-series: Number of received requests for which both control and data bytes
        were cached in the receive buffer.)'
    readlinkcache_ctrl:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: 'H/J: received messages with only control bytes cached; L: received
        requests with only control cached (MANUAL DEF: H/J-series: Number of received
        messages for which only control bytes were cached in readlinkcache buffers.
        L-series: Number of received requests for which only control bytes were cached
        in the receive buffer.)'
    readlinkcache_none:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: 'H/J: received messages with no bytes cached; L: replies transferred
        via RDMA Write (MANUAL DEF: H/J-series: Number of received messages for which
        neither control nor data bytes were cached in readlinkcache buffers. L-series:
        Number of replies transferred to another CPU that used an RDMA Write operation.)'
    replyctrlcache_msgs:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: 'H/J: message replies with control in interrupt packet; L: replies
        via Send operation (MANUAL DEF: H/J-series: Number of message replies for
        which control was carried in the interrupt packet. L-series: Number of message
        replies transferred to another CPU using a Send operation.)'
    processh_samples:
      queryable: true
      type: integer
      counter_type: Sampling
      description: 'Raw count of PROCESSH sampling interrupts in this CPU; 0 if no
        PROCESSH measurement active; for NSMA = aggregate across all IPUs (MANUAL
        DEF: (ZMS Style only) This counter is valid only for H-series, J-series, and
        later RVUs. It reports the raw count of the number of PROCESSH samples in
        the processor if a PROCESSH measurement is active.) (DERIVED METRIC: For NSMA
        systems in Measure J01 and later PVUs, PROCESSH-SAMPLES reports the aggregate
        value of all the number of samples on all the IPUs and hence is typically
        equal to n*sampling frequency on that CPU.)'
      derived_formula: The counters are calculated based on the number of PROCESSH
        samples observed in the applicable code region, and so for more accurate numbers,
        you can increase the frequency of PROCESSH samples.
    starting_timer_cells:
      queryable: true
      type: integer
      counter_type: Snapshot
      description: 'Instrumentation timer cells in use at interval start (MANUAL DEF:
        (ZMS Style only) Number of instrumentation timer cells in use at the start
        of the measurement interval. Counter type: Snapshot.)'
    ending_timer_cells:
      queryable: true
      type: integer
      counter_type: Snapshot
      description: 'Instrumentation timer cells in use at interval end (MANUAL DEF:
        (ZMS Style only) Number of instrumentation timer cells in use at the end of
        the measurement interval. Counter type: Snapshot.)'
    locked_pages_qtime:
      queryable: true
      type: integer
      unit: microseconds
      counter_type: Queue
      description: 'Reserved for future use (H06/J04+) (MANUAL DEF: (ZMS Style only)
        Reserved for future use.)'
    locked_pages_start:
      queryable: true
      type: integer
      counter_type: Snapshot
      description: "Page frames locked in main memory at interval start \xE2\u20AC\
        \u201D aggregate for all processes in CPU (H06/J04+; valid when subsystem_version\
        \ >= 3) (MANUAL DEF: (ZMS Style only) In Measure H06/J04 and later PVUs, the\
        \ number of page frames associated with the process that were locked in main\
        \ memory at the start of the measurement interval. This counter is valid and\
        \ displayed by MEASCOM in ZMS style when the PROCESS subsystem version (ZMSPROC.HDR.SUBSYSTEM-\
        \ VERSION), supplied by Nonstop OS, is four or greater; otherwise the counter\
        \ contains a zero value and is not displayed by MEASCOM.) (DERIVED METRIC:\
        \ This counter is valid and displayed by MEASCOM in ZMS style when the PROCESS\
        \ subsystem version (ZMSPROC.HDR.SUBSYSTEM- VERSION), supplied by Nonstop\
        \ OS, is four or greater; otherwise the counter contains a zero value and\
        \ is not displayed by MEASCOM.)"
    locked_pages_end:
      queryable: true
      type: integer
      counter_type: Snapshot
      description: "Page frames locked in main memory at interval end \xE2\u20AC\u201D\
        \ aggregate for all processes in CPU (H06/J04+; valid when subsystem_version\
        \ >= 3) (MANUAL DEF: (ZMS Style only) In Measure H06/J04 and later PVUs, the\
        \ number of page frames associated with the process that were locked in main\
        \ memory at the end of the measurement interval. This counter is valid and\
        \ displayed by MEASCOM in ZMS style when the PROCESS subsystem version (ZMSPROC.HDR.SUBSYSTEM-\
        \ VERSION), supplied by Nonstop OS, is four or greater; otherwise the counter\
        \ contains a zero value and is not displayed by MEASCOM.) (DERIVED METRIC:\
        \ This counter is valid and displayed by MEASCOM in ZMS style when the PROCESS\
        \ subsystem version (ZMSPROC.HDR.SUBSYSTEM- VERSION), supplied by Nonstop\
        \ OS, is four or greater; otherwise the counter contains a zero value and\
        \ is not displayed by MEASCOM.)"
    ipu{N}.ipu_busy_time:
      queryable: true
      type: integer
      unit: microseconds
      counter_type: Busy
      description: "Time IPU N was busy; N = 0..15; RATE ON \u2192 % of interval"
    ipu{N}.ipu_qtime:
      queryable: true
      type: integer
      unit: microseconds
      counter_type: Queue
      description: "Time processes waited on IPU N ready queue; RATE ON \u2192 AQL"
    ipu{N}.ipu_dispatches:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: Number of process dispatches on IPU N
    svnet{N}.read_requests:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: Transfers initiated by this CPU that brought data INTO CPU N; N
        = 0..15
    svnet{N}.write_requests:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: Transfers initiated by this CPU that sent data OUT FROM CPU N (writes
        + message sends)
    svnet{N}.read_bytes:
      queryable: true
      type: integer
      unit: bytes
      counter_type: Accumulating
      description: Bytes transferred by read requests for CPU N
    svnet{N}.write_bytes:
      queryable: true
      type: integer
      unit: bytes
      counter_type: Accumulating
      description: Bytes transferred by write requests for CPU N
disc:
  source_file: measurefiles/disccsv
  ddl_record: ZMSDISC
  entity_type: DISC (Disk Device)
  purpose: 'Per-disk performance: I/O, queue times, free space, per-cache stats. Cache
    spans 8 levels c0..c7; totals must sum ALL eight, not just c0. Capacity comes
    from primary DP2 records only.

    '
  identity_columns:
  - system_name
  - cpu_num
  - device_name
  time_columns:
  - from_timestamp
  - to_timestamp
  - delta_time
  join_hints:
  - JOIN cpu ON (system_name, cpu_num, from_timestamp) for CPU context
  - JOIN dfile ON (system_name, device_name, from_timestamp) for file-level activity
  columns:
    u_loadid.loadid:
      queryable: false
      type: string
    u_loadid.load_id.prefix_id:
      queryable: false
      type: string
    u_loadid.load_id.interval_id:
      queryable: false
      type: string
    system_name:
      queryable: true
      type: string
      description: 'NonStop node name (MANUAL DEF: Name of the system on which the
        measurement was taken.)'
      derived_formula: end ``` ``` + help zmstmf counters --- Measurement descriptive
        fields --------------------------------- error+ delta-time+ loadid* from-timestamp+
        system-name* cpu-num+ to-timestamp+ os-version+ --- Counter fields -------------------------------------------------
        home-trans remote-trans-qtime home-net-trans-qtime remote-trans home-net-trans
        trans-backout-qtime home-trans-qtime aborting-trans tmp-work tmp-work-qtime
        pio-sends pio-send-qtime pio-send-bytes pio-recvs pio-recv-bytes --- Derived
        counter fields ----------------------------------------- home-trans-ART home-net-trans-ART
        remote-trans-ART trans-backout-ART tmp-work-AQT ``` ``` RECORD zmstmf.
    cpu_num:
      queryable: true
      type: integer
      description: "CPU number managing this disk (MANUAL DEF: Number of the CPU on\
        \ which the measurement was taken. For interprocessor communications (IPC)\
        \ records, CPU\u2011NUM is MYCPU.)"
      derived_formula: end ``` ``` + help zmstmf counters --- Measurement descriptive
        fields --------------------------------- error+ delta-time+ loadid* from-timestamp+
        system-name* cpu-num+ to-timestamp+ os-version+ --- Counter fields -------------------------------------------------
        home-trans remote-trans-qtime home-net-trans-qtime remote-trans home-net-trans
        trans-backout-qtime home-trans-qtime aborting-trans tmp-work tmp-work-qtime
        pio-sends pio-send-qtime pio-send-bytes pio-recvs pio-recv-bytes --- Derived
        counter fields ----------------------------------------- home-trans-ART home-net-trans-ART
        remote-trans-ART trans-backout-ART tmp-work-AQT ``` ``` RECORD zmstmf.
    os_version.letter:
      queryable: true
      type: string
    os_version.number:
      queryable: true
      type: integer
    object_uid:
      queryable: false
      type: string
      description: '(MANUAL DEF: (ZMS Style only) Reserved for future use.)'
    from_timestamp:
      queryable: true
      type: datetime
      description: "(MANUAL DEF: Starting time of the measurement or transient entity.\
        \ Specified as Julian\u2011based, local civil time (LCT).) (DERIVED METRIC:\
        \ When using the CSV[A], JSON, or XML report format, the timestamp is emitted\
        \ as ISO 8601 date and time of day representation, extended format, fractional\
        \ seconds, local time (YYYY-MM-DDThh:mm:ss.s).)"
      derived_formula: end ``` ``` + help zmstmf counters --- Measurement descriptive
        fields --------------------------------- error+ delta-time+ loadid* from-timestamp+
        system-name* cpu-num+ to-timestamp+ os-version+ --- Counter fields -------------------------------------------------
        home-trans remote-trans-qtime home-net-trans-qtime remote-trans home-net-trans
        trans-backout-qtime home-trans-qtime aborting-trans tmp-work tmp-work-qtime
        pio-sends pio-send-qtime pio-send-bytes pio-recvs pio-recv-bytes --- Derived
        counter fields ----------------------------------------- home-trans-ART home-net-trans-ART
        remote-trans-ART trans-backout-ART tmp-work-AQT ``` ``` RECORD zmstmf.
    to_timestamp:
      queryable: true
      type: datetime
      description: "(MANUAL DEF: Ending time of the measurement or transient entity.\
        \ Specified as Julian\u2011based, local civil time (LCT).) (DERIVED METRIC:\
        \ When using the CSV[A], JSON, or XML report format, the timestamp is emitted\
        \ as ISO 8601 date and time of day representation, extended format, fractional\
        \ seconds, local time (YYYY-MM-DDThh:mm:ss.s).)"
      derived_formula: end ``` ``` + help zmstmf counters --- Measurement descriptive
        fields --------------------------------- error+ delta-time+ loadid* from-timestamp+
        system-name* cpu-num+ to-timestamp+ os-version+ --- Counter fields -------------------------------------------------
        home-trans remote-trans-qtime home-net-trans-qtime remote-trans home-net-trans
        trans-backout-qtime home-trans-qtime aborting-trans tmp-work tmp-work-qtime
        pio-sends pio-send-qtime pio-send-bytes pio-recvs pio-recv-bytes --- Derived
        counter fields ----------------------------------------- home-trans-ART home-net-trans-ART
        remote-trans-ART trans-backout-ART tmp-work-AQT ``` ``` RECORD zmstmf.
    delta_time:
      queryable: true
      type: integer
      unit: microseconds
      description: '(MANUAL DEF: Duration of the measurement, in microseconds.)'
      derived_formula: The counters ACCEL-BUSY-TIME, NATIVE-BUSY-TIME, and TNS-BUSY-TIME
        are calculated, returned, and displayed only if a PROCESSH measurement has
        been active in the CPU during the delta time period. end ``` ``` + help zmstmf
        counters --- Measurement descriptive fields ---------------------------------
        error+ delta-time+ loadid* from-timestamp+ system-name* cpu-num+ to-timestamp+
        os-version+ --- Counter fields -------------------------------------------------
        home-trans remote-trans-qtime home-net-trans-qtime remote-trans home-net-trans
        trans-backout-qtime home-trans-qtime aborting-trans tmp-work tmp-work-qtime
        pio-sends pio-send-qtime pio-send-bytes pio-recvs pio-recv-bytes --- Derived
        counter fields ----------------------------------------- home-trans-ART home-net-trans-ART
        remote-trans-ART trans-backout-ART tmp-work-AQT ``` ``` RECORD zmstmf.
    template_version:
      queryable: false
      type: integer
      description: '(MANUAL DEF: (ZMS Style only) Record template version from MEASDDLS
        for the format of the external record. When data collected on systems of differing
        product versions are stored in the same structured files, the template version
        for all records is the one used to create the structured file.)'
      derived_formula: The length of in^record is derived from the information encoded
        in the template version of the header record pointed to by in^record.
    format_version.letter:
      queryable: false
      type: string
    format_version.number:
      queryable: false
      type: integer
    data_version.letter:
      queryable: false
      type: string
    data_version.number:
      queryable: false
      type: integer
    subsystem_version:
      queryable: false
      type: integer
      description: 'Provided by DP2 (MANUAL DEF: (ZMS Style only) This value is set
        to 1 for the initial H-series and later versions of all subsystems. If the
        value is greater than 1, consult the subsystem documentation for information
        about changes that affect the Measure counters.)'
      derived_formula: "##### - ##### - ##### - ``` Diskfile $DATA.ZSD12345.Z1234567\
        \ File Format x ANSI SQL Name \u2018TABLE Catalog_12.Schema_45.Table_56 PARTITION\
        \ Partition_78\u2019 Device Name $DATA Pool Local CPU 0 File Type Key Sequenced\
        \ File Code 550 Format Version: H01 Data Version: H01 Subsystem Version: 1\
        \ Local System \\HURTS From 12 Jan 2003, 19:35:28 For 46.9 Seconds ------------\
        \ File ---------------------------------------------------------- Open-Qtime\
        \ 72.11 ms Transient-Opens Starting-EOF Ending-EOF Extent-Allocations File-Growth-Ratio\
        \ ``` # ENDPOINTENDPOINT The SERVERNET entity has been replaced by ENDPOINT."
    error:
      queryable: false
      type: integer
      description: '(MANUAL DEF: Indicates whether an error prevented Measure from
        collecting data or writing an output record for this entity. For values, see
        Identifying Data File Errors.)'
      derived_formula: end ``` ``` + help zmstmf counters --- Measurement descriptive
        fields --------------------------------- error+ delta-time+ loadid* from-timestamp+
        system-name* cpu-num+ to-timestamp+ os-version+ --- Counter fields -------------------------------------------------
        home-trans remote-trans-qtime home-net-trans-qtime remote-trans home-net-trans
        trans-backout-qtime home-trans-qtime aborting-trans tmp-work tmp-work-qtime
        pio-sends pio-send-qtime pio-send-bytes pio-recvs pio-recv-bytes --- Derived
        counter fields ----------------------------------------- home-trans-ART home-net-trans-ART
        remote-trans-ART trans-backout-ART tmp-work-AQT ``` ``` RECORD zmstmf.
      thresholds: 'If the total number of array elements exceeds 256, Measure returns
        error 3251 (configuration error). If the total number of array elements exceeds
        1600, Measure returns error 3251 (configuration error). Warning event 4063
        looks like this: ``` ``` Measure will not re-emit warning event 4063 unless
        CID table usage is reduced to a pre-determined level before once again exceeding
        ``` ``` > ADD DEFINE =_SET_MAX_CIDS_TO_1024K, file a ``` ``` Process_Create_
        error MM ( NN ) from Measmoncontrol ``` ``` TACL> ADD DEFINE =_MEAS_EMIT_CID_USAGE,
        FILE WARN80 ``` ``` 10-04-07 10:04:44 \MEASYOS.$XM00 TANDEM.MEASURE.H04 004063
        Exceeded CID usage threshold. # Identifying Data File ErrorsIdentifying Data
        File Errors The first field of the output record for each measured entity
        type indicates whether a problem prevented measurement or record allocation.
        For example, test for a positive value, which indicates an error condition.
        # ERRORERROR Indicates whether an error prevented Measure from collecting
        data or writing an output record for this entity. For SQL/MX, if the actual
        name of the procedure exceeds the 32 characters allowed, a field overflow
        is reported in the ERROR field and only the least-significant 31 bytes (preceded
        by a tilde (~)) are included. error INT is the error code that indicates the
        outcome of the operation. settings output INT:ref:1 is an array of flags that
        indicates the current setting of Measure subsystem parameters controlled through
        defines: ``` ADD DEFINE =_SET_MAX_CIDS_TO_1024K, file a ``` ``` error := MEASMONSTATUS
        ( meascb! -1F indicates an error return. A return context of 1F indicates
        an error. SubtopicsSubtopics INFO CommandINFO Command SPLIT CommandSPLIT Command
        HELP CommandHELP Command MEASFT Error and Warning MessagesMEASFT Error and
        Warning Messages # INFO CommandINFO Command The INFO command produces a report
        that indicates how much space in a data file is associated with each entity
        type and processor type. This example illustrates the format of a typical
        error and warning: ``` $PERF.CAPAPP 14> ``` ``` MEASURE File Tool - T9086H01
        - (01AUG06) - \YOSPRD Copyright 2006 Hewlett-Packard Company SPLIT MDATA5,(SFFILE1,SFFILE2),BY
        ENTITY (CPU PROCESS,SERVERNET) File $PERF.CAPAPP.MDATA5 was split into the
        following files: File Size % Entity(s) -----------------------------------
        ---------- ------ --------------------- $PERF.CAPAPP.SFFILE1 41372788 30.88
        CPU,PROCESS $PERF.CAPAPP.SFFILE2 10586256 7.90 SERVERNET ``` ``` MEASFT SPLIT
        MDATA5,(SFFILE1,SFFILE2), BY ENTITY (CPU PROCESS,SERVERNET) ``` ``` $PERF.CAPAPP
        16> ``` ``` MEASURE File Tool - T9086H01 - (01AUG06) - \YOSPRD Copyright 2006
        Hewlett-Packard Company SPLIT MDATA5,MCPU*,BY CPU * File $PERF.CAPAPP.MDATA5
        was split into the following files: File Size % CPU(s) -----------------------------------
        ---------- ------ --------------------- $PERF.CAPAPP.MCPU00 28410588 21.21
        0 $PERF.CAPAPP.MCPU01 19602928 14.63 1 $PERF.CAPAPP.MCPU02 41879174 31.26
        2 $PERF.CAPAPP.MCPU03 42687210 31.86 3 ``` ``` MEASFT SPLIT MDATA5,MCPU*,BY
        CPU * ``` ``` HELP | empty ``` If a message indicates a syntax error, a circumflex
        (^) shows where the syntax error was detected.'
