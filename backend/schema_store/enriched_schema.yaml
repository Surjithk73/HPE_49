    device_type:
      queryable: true
      type: integer
      description: A value of 30 (optical disk device).
    device_subtype:
      queryable: true
      type: integer
      description: An additional identifier for DEVICE-TYPE. For a complete list of
        possible subtype values for optical disks, see the System Generation Manual.
    fabric:
      queryable: true
      type: integer
      description: Fabric name or identifier associated with the device path (ZMS
        Style only).
    servernet:
      queryable: true
      type: integer
      description: (G-series and later RVUs) ServerNet fabric used by this specific
        path to the optical disk. The Measure subsystem measures all optical disk
        records relative to the specified fabric. The value is 0 for X fabric, 1 for
        Y fabric. The default is to measure records for both fabrics. Optical disks
        connected by a ServerNet/DA do not have an X or Y fabric. To indicate these
        disks, use an asterisk (*). In this case, you can use an asterisk (*) in the
        LISTACTIVE command as long as the rest of the entity specification describes
        one disk.
    device_name:
      queryable: true
      type: string
      description: Disk device on which the program file is located. For SMF files,
        this field provides the physical location that corresponds to the logical
        file name. For Nonstop files, this field is the same as the FILE-NAME VOLUME
        subfield.
    logical_device:
      queryable: true
      type: integer
      description: Logical device number of the measured terminal.
    gms.group:
      queryable: true
      type: integer
      description: Group number of physical location address.
    gms.module:
      queryable: true
      type: integer
      description: (G-series and later RVUs) is the module number of the device to
        be measured. slot
    gms.slot:
      queryable: true
      type: integer
      description: config^name can also be the configuration name of either a single
        ServerNet addressable controller (SAC) or an adapter that contains several
        ServerNet addressable controllers. In this case, the specification includes
        all devices of the requested type supported by that SAC or adapter. config^name
        must be null -terminated and null -fi lled. An asterisk in the first byte
        indicates all configuration names.
    scsi_id:
      queryable: true
      type: integer
      description: (ZMS Style only) SCSI port identifier for this optical disk.
    plpt:
      queryable: true
      description: '(ZMS Style only) In Measure H03 and later PVUs, the PLPT structure
        replaces the SCSI-ID field. More attributes were necessary to identify a CLIM
        device, so the SCSI-ID field (which had a range of 0 to 999) was reduced to
        16 bits and became the PLPT.TARGET-ID field. This structure is used in descriptor
        and data records. The PLPT structure consists of five subfields:'
      type: integer
    plpt.plpt_flags:
