    opener_program_fname_mid.pathid:
      queryable: false
      type: string
      description: Internal OSS MID PATHID for opener program file
    opener_program_fname_mid.crvsn:
      queryable: false
      type: string
      description: Creation Version Serial Number for opener program file
    file_open_type:
      queryable: true
      type: integer
      description: 'File open type bitmask: GUARDIAN, ENSCRIBE, SQLFILE, PROCFILE,
