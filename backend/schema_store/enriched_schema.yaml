file:
  source_file: measurefiles/filecsv
  ddl_record: ZMSFILE
  entity_type: FILE (File Activity per Opener)
  purpose: 'Logical I/O operations performed by a user process on an explicitly opened file. Measures all partitions of a
    partitioned file together as a single entity. Counter records are initiated on first significant use of the file, not
    on open. Does not measure files not explicitly opened by the application (e.g. alternate-key files).

    '
  identity_columns:
    - system_name
    - cpu_num
    - opener_pin
    - file_number
    - file_name.volume
    - file_name.subvol
    - file_name.filename
  time_columns:
    - from_timestamp
    - to_timestamp
    - delta_time
  join_hints:
    - JOIN proc ON (system_name, cpu_num, opener_pin, from_timestamp) for opener process detail
    - JOIN dfile ON (system_name, cpu_num, file_name.*, from_timestamp) for disk file totals
  columns:
    system_name:
      queryable: true
      type: string
      description: Name of the system on which the measurement was taken.
    cpu_num:
      queryable: true
      type: integer
      description: Number of the CPU on which the measurement was taken. For interprocessor communications (IPC) records,
        CPU-NUM is MYCPU.
    object_uid:
      queryable: false
      type: string
      description: (ZMS Style only) Reserved for future use.
    from_timestamp:
      queryable: true
      type: datetime
      description: Starting time of the measurement or transient entity. Specified as Julian-based, local civil time (LCT).
    to_timestamp:
      queryable: true
      type: datetime
      description: Ending time of the measurement or transient entity. Specified as Julian-based, local civil time (LCT).
    delta_time:
      queryable: true
      type: integer
      unit: microseconds
      description: Duration of the measurement, in microseconds.
    template_version:
      queryable: false
      type: integer
      description: (ZMS Style only) Record template version from MEASDDLS for the format of the external record. When data
        collected on systems of differing product versions are stored in the same structured files, the template version for
        all records is the one used to create the structured file.
    subsystem_version:
      queryable: false
      type: integer
      description: Provided by Guardian or OSS file system depending on open type (ZMS Style only) This value is set to 1
        for the initial H-series and later versions of all subsystems. If the value is greater than 1, consult the subsystem
        documentation for information about changes that affect the Measure counters.
    error:
      queryable: false
      type: integer
      description: Indicates whether an error prevented Measure from collecting data or writing an output record for this
        entity. For values, see Identifying Data File Errors.
    opener_pin:
      queryable: true
      type: integer
      description: PIN of the process that opened the file Process identification number of the process that opened the file.
    file_number:
      queryable: true
      type: integer
      description: File ACB number within the opener's context
    file_type:
      queryable: true
      type: integer
      description: 'File type from ACB: 0=other, 1=relative, 2=entry-sequenced, 3=key-sequenced File type, from the access
        control block: .'
    device_type:
      queryable: true
      type: integer
      description: 'Device type: 0=process, 1=operator, 2=$RECEIVE, 3=disk, 4=tape, 5=printer, 6=terminal, 7=comm line, 8=SCSI
        A value of 30 (optical disk device).'
      thresholds: '# DEVICE-TYPEDEVICE-TYPE A value of 63, which indicates an Expand line.'
    file_system_name:
      queryable: true
      type: string
      description: System name from the complete file specification Name of the system from the complete file specification.
    opener_processname:
      queryable: true
      type: string
      description: Named process name of the opener (if named) Name of the opener process.
    device_name:
      queryable: true
      type: string
      description: Device name of the file; for SMF = physical location Disk device on which the program file is located.
        For SMF files, this field provides the physical location that corresponds to the logical file name.) For Nonstop files,
        this field is the same as the FILE-NAME VOLUME subfield.
      thresholds: MEAS_PATH_SEL Indicates that selection is only by path and device name, and not other attributes like lun,
        partition, or scsi-id.
    opener_device_name:
      queryable: true
      type: string
      description: Device name of the opener's program file; for SMF = physical location Disk device on which the opener program
        file is located. For SMF files, this field provides the physical location that corresponds to the logical file name.)
        For Nonstop files, this field is the same as the OPENER-PROGRAM-FILENAME VOLUME subfield.
    opener_osspid:
      queryable: true
      type: integer
      description: OSS process ID of the opener; zeros for non-OSS processes If the opener process runs in the OSS environment,
        this field contains the OSS Process ID. If this process is not an OSS process, this field contains zeros.
    file_open_type:
      queryable: true
      type: integer
      description: 'File open type bitmask: GUARDIAN, ENSCRIBE, SQLFILE, PROCFILE, OSS, OSSDISK, OSSFIFO, OSSPIPE, OSSSOCKET,
        etc. Identifier for the file open type added for measurement or selected for list display reporting. Possible values
        are: .'
    file_busy_time:
      queryable: true
      type: integer
      unit: microseconds
      counter_type: Busy
      description: "Elapsed time executing waited I/O requests; for nowait I/O includes AWAITIO wait time; RATE ON \xE2\u2020\
        \u2019 % For waited I/O, the FILE-BUSY-TIME counter is the elapsed time spent executing waited I/O requests. OSS file\
        \ opens count file busy time for waited requests after the first significant file operation on the file.) For waited\
        \ I/O, the FILE-BUSY-TIME counter is the elapsed time spent executing waited I/O requests. The file system starts\
        \ FILE-BUSY-TIME counter when the message for the I/O request (for example, READ or WRITE) is sent to the server.\
        \ Requests sent during the file open and close and requests sent to the OSS Name Server are not counted in the FILE-BUSY-TIME\
        \ counter, but are counted in the PROCESS entity. For nowait I/O, in J06.20/L16.05 and later RVUs, the FILE-BUSY-TIME\
        \ counter includes the elapsed time to initiate nowait I/O requests to the server and the elapsed time the process\
        \ is suspended in AWAITIO[X] waiting for nowait I/Os for each file open. For nowait I/O, in RVUs prior to in J06.20/L16.05,\
        \ the FILE-BUSY-TIME counter is the execution time to initiate nowait I/O requests to the server and any elapsed time\
        \ the process actually spends waiting for nowait requests to complete in AWAITIO[X]. For the OSSPIPE FILE open type,\
        \ general application usage of the OSSPIPE will allow read() or write() to complete on a memory-to-memory move and\
        \ will generate a low FILE-BUSY-TIME. However, if applications ignore the OSSFM error EWOULDBLOCK (4101), then FILE-BUSY-\
        \ TIME will increment."
      derived_formula: N/A
      thresholds: N/A
    reads:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: 'Calls to read family of APIs including OSS read() and recv(); includes DBIO and OSS cache reads Number
        of read operations (from the terminal to memory) performed by the terminal process. Counter type: Incrementing.'
    writes:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: 'Calls to WRITE family of APIs (excluding WRITEREAD); includes DBIO and OSS cache writes Number of write
        operations (from memory to the terminal) performed by the terminal process. Counter type: Incrementing.'
    updates_or_replies:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: WRITEUPDATE calls with non-zero buffer (updates on disk/tape) or successful REPLY calls (on terminals/processes)
        Number of calls to the WRITEUPDATE family of APIs with a non-zero buffer length for update operations and number of
        successful calls to the REPLY family of APIs. This counter includes both user and system calls to these procedures.
    deletes_or_writereads:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: WRITEUPDATE calls with zero buffer (deletes on disk/tape) or WRITEREAD calls (on terminals/processes) Number
        of calls to the WRITEUPDATE APIs with a buffer length of zero for delete operations and number of calls to the WRITEREAD
        APIs for write and read operations. This counter includes both user and system calls to these procedures.
      derived_formula: N/A
      thresholds: N/A
    info_calls:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: 'Calls to FILEINFO, FILE_GETINFO_, DEVICEINFO, etc. that dispatched a message; for OSS includes fstat(),
        getsockname(), etc. Number of calls to these procedures that resulted in a message being sent to a process (IOP or
        other) to obtain the information requested: Counter type: Incrementing.'
    records_used:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: Records returned to SQL executor on reads/inserts/writes/updates/deletes; zero for Enscribe files Number
        of records inserted, updated, deleted, or read by the SQL executor through this statement. In G-series and earlier
        RVUs, this is a 32-bit counter.) In G-series RVUs, the RECORDS-USED-F field is a 64-bit version of RECORDS-USED.
    records_accessed:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: Records read by disk process to perform operations; >= records_used; zero for Enscribe files Number of
        records accessed by the disk process or file system to evaluate this statement. In G-series and earlier RVUs, this
        is a 32-bit counter.) In G-series RVUs, the RECORDS-ACCESSED-F field is a 64-bit version of RECORDS-ACCESSED.
    disc_reads:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: Number of physical disk reads performed Number of physical disk reads performed for this statement. If
        the REPORT RATE value is on, the rate is disk reads for each second.) In G-series RVUs, the DISC-READS-F field is
        a 64-bit version of DISC-READS.
      derived_formula: N/A
      thresholds: N/A
    messages:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: Messages sent for this open including OPEN messages; for OSS sockets = name server activity only Number
        of messages sent by the system on behalf of this statement, including messages sent by the file system to the disk
        process and messages sent by the SQL executor to the SQL compiler for recompiles. In G-series and earlier RVUs, this
        is a 32-bit counter.
    message_bytes:
      queryable: true
      type: integer
      unit: bytes
      counter_type: Accumulating
      description: Message bytes sent and received for this open; does not include DBIO bytes Number of message bytes sent
        for this statement by the system. This counter accumulates the number of bytes sent for the messages reported by the
        MESSAGES counter.
    lock_waits:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: 'Number of times a call waited for a lock request Number of times this statement waited for a lock request.
        Counter type: Incrementing.'
    timeouts_or_cancels:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: 'Number of timeouts or cancels issued against this open Number of timeouts or cancels issued against this
        OPEN. Counter type: Incrementing.'
    escalations:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: 'Number of times a record lock escalated to a file-level lock Number of times a record lock was escalated
        to a file lock. Counter type: Incrementing.'
      derived_formula: N/A
      thresholds: N/A
    dbio_reads:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: Direct bulk I/O read operations; subset of reads Number of direct bulk I/O read operations to the measured
        file. This counter is a subset of READS.
      derived_formula: N/A
      thresholds: N/A
    dbio_writes:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: Direct bulk I/O write operations; subset of writes Number of direct bulk I/O write operations to the measured
        file. This counter is a subset of WRITES.
      derived_formula: N/A
      thresholds: N/A
    dbio_read_bytes:
      queryable: true
      type: integer
      unit: bytes
      counter_type: Accumulating
      description: 'Bytes transferred by DBIO read operations Number of bytes transferred by direct bulk I/O read operations.
        Counter type: Incrementing.'
      derived_formula: N/A
      thresholds: N/A
    dbio_write_bytes:
      queryable: true
      type: integer
      unit: bytes
      counter_type: Accumulating
      description: 'Bytes transferred by DBIO write operations Number of bytes transferred by direct bulk I/O write operations.
        Counter type: Incrementing.'
      derived_formula: N/A
      thresholds: N/A
    read_bytes:
      queryable: true
      type: integer
      unit: bytes
      counter_type: Accumulating
      description: 'Bytes returned to user application data buffer; available for all file open types Total number of bytes
        transferred as a result of read requests or pull operations and the bytes received in pre-push operations from the
        linker CPU. Counter type: Accumulating.'
    write_bytes:
      queryable: true
      type: integer
      unit: bytes
      counter_type: Accumulating
      description: 'Bytes written from user application buffer; available for all file open types Total number of bytes transferred
        as a result of write requests. Counter type: Accumulating.'
    oss_cache_reads:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: 'Application reads from OSS file-system cache (OSS regular files only) For OSS regular files only, the
        number of READS performed using OSS cache. Counter type: Incrementing.'
    oss_cache_writes:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: 'Application writes processed using OSS file-system cache (OSS regular files only) For OSS regular files
        only, the number of WRITES performed using OSS cache. Counter type: Incrementing.'
    oss_cache_read_bytes:
      queryable: true
      type: integer
      unit: bytes
      counter_type: Accumulating
      description: 'Bytes read by oss_cache_reads (OSS regular files only) For OSS regular files only, the number of bytes
        read by OSS-CACHE-READS. Counter type: Accumulating.) For OSS regular files only, the number of bytes read by OSS-CACHE-READS.'
    oss_cache_write_bytes:
      queryable: true
      type: integer
      unit: bytes
      counter_type: Accumulating
      description: 'Bytes written by oss_cache_writes (OSS regular files only) For OSS regular files only, the number of bytes
        written by OSS-CACHE-WRITES. Counter type: Accumulating.) For OSS regular files only, the number of bytes written
        by OSS-CACHE-WRITES.'
    oss_block_reads:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: Block read requests to DP2 to fill OSS cache (OSS regular files only) For OSS regular files only, the number
        of block read requests to DP2 issued to fill OSS cache. A block read call can return more than one block.
    oss_block_read_bytes:
      queryable: true
      type: integer
      unit: bytes
      counter_type: Accumulating
      description: 'Bytes read to cache as a result of oss_block_reads (OSS regular files only) For OSS regular files only,
        the number of bytes read to cache as a result of OSS-BLOCK-READS. Counter type: Accumulating.) For OSS regular files
        only, the number of bytes read to cache as a result of OSS-BLOCK-READS.'
    oss_flow_controls:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: 'Times a WRITE operation was blocked (OSS sockets and pipes) For OSS sockets and pipes, this counter reports
        the number of times a WRITE operation was blocked. Counter type: Incrementing.'
    misc_calls:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: 'OSS operations that increase file_busy_time but are not reads/writes/info_calls: ioctl(), fsync(), ftruncate(),
        lseek(), fcntl(), connect(), setsockopt(), accept(), shutdown() For OSS, this counter totals operations that increase
        FILE-BUSY-TIME but are not READS, WRITES, or INFO-CALLS. APIs that fall in this category are ioctl(), fsync(), ftruncate(),
        lseek(), and fcntl(), and the socket APIs connect(), setsockopt(), accept(), and shutdown().) For OSS, this counter
        totals operations that increase FILE-BUSY-TIME but are not READS, WRITES, or INFO-CALLS.'
    os_version_number:
      type: integer
      queryable: true
      description: os_version_number metric
    format_version_number:
      type: integer
      queryable: true
      description: format_version_number metric
    data_version_number:
      type: integer
      queryable: true
      description: data_version_number metric
    ip_family:
      type: integer
      queryable: true
      description: ip_family metric
    ip_port:
      type: integer
      queryable: true
      description: ip_port metric
    ip_ip_addr:
      type: string
      queryable: true
      description: ip_ip_addr metric
    u_loadid_loadid:
      type: string
      queryable: true
