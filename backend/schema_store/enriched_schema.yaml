      description: ipu1_ipu_busy_time metric
    ipu2_ipu_busy_time:
      type: integer
      queryable: true
      description: ipu2_ipu_busy_time metric
    ipu3_ipu_busy_time:
      type: integer
      queryable: true
      description: ipu3_ipu_busy_time metric
    ipu4_ipu_busy_time:
      type: integer
      queryable: true
      description: ipu4_ipu_busy_time metric
    ipu5_ipu_busy_time:
      type: integer
      queryable: true
