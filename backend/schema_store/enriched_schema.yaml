        \ which indicates a disk volume. # DEVICE-TYPEDEVICE-TYPE One of these values,\
        \ which indicates the type of device associated with the file: ``` 0 Process\
        \ 1 Operator 2 $RECEIVE 3 Disk 4 Tape drive 5 Printer 6 Terminal 7 Communication\
