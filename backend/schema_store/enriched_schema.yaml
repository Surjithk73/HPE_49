    - FS-DIRECT-READS
    - FS-DIRECT-WRITES
    - FS-MAP-FAILURES
    - FS-PREFETCH-BLOCKS
    - FS-PREFETCH-USED
    - FS-REREAD-STOLEN-BLKS
    - LS-AWAKES
    - LS-QUEUES
    - LS-RECVS
    - LS-SELECTS
    - LS-SENDS
    - PP-ALLOC-FAILURES
    - PS-GETTIME-REQS
    - PS-PROXY-READS
    - PS-PROXY-WRITES
    - PS-SELECT-RCVD
    - PS-SELECT-READY
    - PS-SELECT-SENT
    - PS-SETTIME-REQS
    - PXS-FAILURES
    accumulating:
    - FM-CALLBACK-WT-BLOCKS
    - FS-CACHE-READ-BLOCKS
    - FS-CACHE-READ-BYTES
    - FS-CACHE-WRITE-BLOCKS
    - FS-CACHE-WRITE-BYTES
    - FS-DIRECT-READ-BYTES
    - FS-DIRECT-WRITE-BYTES
    - LS-QUEUE-BYTES
    - LS-RECV-BYTES
    - LS-SEND-BYTES
    - PS-PROXY-READ-BYTES
    - PS-PROXY-WRITE-BYTES
    queue:
    - FS-CACHE-ACTIVE-QTIME
    - FS-CACHE-DIRTY-QTIME
    - FS-CACHE-VALID-QTIME
    max_queue:
    - FS-CACHE-ACTIVE-QMAX
    - FS-CACHE-DIRTY-QMAX
    - FS-CACHE-VALID-QMAX
    - PP-BLOCK-INUSE-QMAX
  formulas:
    oss_cache_miss_rate: (FS-CACHE-RD-READ-REQS + FS-CACHE-WT-READ-REQS + FS-CACHE-WRITE-REQS)
      / (FS-CACHE-READS + FS-CACHE-WRITES)
  interpretations:
  - counter: FS-MAP-FAILURES
    description: A map failure can be a symptom of performance degradation indicating
      the OSS file-system cache failed to obtain a map buffer for prefetching cache
      blocks. If this persists, moving applications to another CPU may remedy the
      failure.
  - counter: PXS-FAILURES
    description: An allocation failure occurs because of a lack of free space or contiguous
      free space in the POSIX extended segment. If persistent, user applications might
      need to be migrated to another CPU.
  thresholds:
  - condition: DIR-OPENS > DIR-OPENS-LIMIT
    type: warning
    description: Soft limit exceeded for directory opens. Acceptable as long as OSS-OPENS-LIMIT
      is not reached.
  - condition: DISK-OPENS > DISK-OPENS-LIMIT
    type: warning
    description: Soft limit exceeded for OSS opens of regular files. Acceptable as
      long as OSS-OPENS-LIMIT is not reached.
  - condition: NFS-OPENS > NFS-OPENS-LIMIT
    type: warning
    description: Soft limit exceeded for NFS opens. Acceptable as long as OSS-OPENS-LIMIT
      is not reached.
  - condition: DIR-STREAMS > DIR-STREAMS-LIMIT
    type: warning
    description: Soft limit exceeded for directory streams. Acceptable as long as
      OSS-OPENS-LIMIT is not reached.
  - condition: OSS-OPENS >= OSS-OPENS-LIMIT
    type: critical
    description: Hard limit reached for all OSS file opens (384,000 in newer RVUs).
      Unbounded open resources can no longer be exceeded.
  business_rules:
  - Block reads and writes occur on cache block boundaries (except for the last cache
    block of the file), where an OSS cache block is 4 KB.
  - Valid cache for open files includes active cache blocks and inactive (unowned)
    file cache blocks for recently closed files.
  - Valid and active cache counters (FS-CACHE-VALID-QTIME, FS-CACHE-ACTIVE-QTIME)
    do not reflect cache blocks stolen by the Nonstop memory manager. Refer to FS-REREAD-STOLEN-BLKS
    for stolen blocks that had to be reread.
  - The OSS-OPENS-LIMIT counter in Measure and the ALL_OPENS resource limit in the
    OSS SCF interface represent the same value.
  relationships:
  - target: FS-DIRECT-READ-BYTES
    source: FS-DIRECT-READS
    type: derived_from
  - target: FS-DIRECT-WRITE-BYTES
    source: FS-DIRECT-WRITES
    type: derived_from
  - target: FS-CACHE-READ-BYTES
    source: FS-CACHE-READS
    type: derived_from
  - target: FS-CACHE-WRITE-BYTES
    source: FS-CACHE-WRITES
    type: derived_from
  - target: LCL
    related_to: CPU
    type: belongs_to
    description: LCL array occurs 16 times, once for each CPU, containing pipe server
      and Local Server 2 requests.
  sql_generation_guidance:
  - counter: LCL array counters
    guidance: Counters such as LS-SENDS or LS-RECVS apply per CPU and represent requests
      to/from satellite sockets mastered in CPU n where n is the LCL array index.
  reporting_guidance:
  - When reporting on OSS CPU memory constraints, evaluate both PXS-FAILURES and FS-MAP-FAILURES
    together to determine if an application migration to another CPU is necessary.
  - Differentiate between noncached operations (FS-DIRECT-READS/WRITES) and cached
    operations (FS-CACHE-READS/WRITES). Cached operations can result in block I/O
    requests between the cache and DP2.
  ddl_record: ZMSOSSCP
  entity_type: OSSCPU (OSS subsystem CPU cache and filesystem metrics)
