    device_type:
      queryable: true
      type: integer
      description: A value of 63, which indicates an Expand line.
    device_subtype:
      queryable: true
      type: integer
      description: 'Additional information about the device type: |   0 | Single -
        line handler attached to a controller     | |-----|----------------------------------------------------|
        |   1 | Multiline path handler                             | |   2 | Multiline
        line attached to a controller            | |   3 | FOX line handler                                   |
        |   5 | Single - line handler attached to a 6100 subsystem | |   6 | Multiline
        line attached to a 6100 subsystem        |'
    pin:
      queryable: true
      type: integer
      description: Process identification number of the primary process.
    trackid:
      queryable: true
      type: string
      description: 6 -byte identifier returned by the 3880 controller SEEPROM and
        labeled externally on the enclosure.
    clip:
      queryable: true
      type: integer
      description: Number of counter ID control blocks available for new counter records
        in this processor at the end of the reported measurement interval.
    line:
      queryable: true
      type: integer
      description: 'Specific line within a CLIP on a SWAN controller: either 0 or
        1.'
    reserved_1:
      queryable: true
      type: string
      description: 'Operational counter / identifier for netline entity: reserved_1'
    read_busy_time:
      queryable: true
      type: integer
      description: Time spent reading data from the network communications line. This
        counter includes the time spent waiting for input to the line. The counter
        measures the time from the instruction that starts the read to the interrupt
        that signals the end of the I/O operation. Because active, full -duplex lines
        usually have a read continue outstanding, expect a high value for this counter.
        Any process can run during this time. This counter is only measured when Expand
        over SWAN is in use.
    write_busy_time:
      queryable: true
      type: integer
      description: Time spent writing to the network communications line. This counter
        measures the time from the instruction that starts the write to the interrupt
        that signals the end of the I/O operation. Any process can run during this
        time. This counter is only measured when Expand over SWAN is in use.
    requests:
      queryable: true
      type: integer
      description: Sum of all SYSTEM LINKS handled by this path plus the sum of all
        SYSTEM SENT FORWARDs (PASSTHRU REQUESTS) handled by this path. LINKS is a
        message -level number. SENT, RECEIVED, SENT FORWARD, and RECEIVE FORWARD are
        packet counters. One message can be several packets.
    input_bytes:
      queryable: true
      type: integer
      description: Number of bytes read from the terminal. The total number of bytes
        transferred to and from the terminal is this counter plus OUTPUT -BYTES. For
        SNAX lines, this counter includes the 6 -byte transmission header (TH) and
        the 3 -byte request/response (RH) SNA headers. In D-series and G-series RVUs,
        this is a 32-bit counter. In H-series and later RVUs, it is a 64-bit counter.
        In G-series RVUs, the INPUT-BYTES-F field is a 64-bit version of INPUT-BYTES.
    output_bytes:
      queryable: true
      type: integer
      description: Number of bytes written to the terminal. The total number of bytes
        transferred to and from the terminal is INPUT -BYTES plus this counter. Because
        the terminal process modifies this counter before the I/O operation, this
        counter might not be accurate if the write instruction fails. For SNAX lines,
        this counter includes the 6 -byte transmission header (TH) and the 3 -byte
        request/response (RH) SNA headers. In D-series and G-series RVUs, this is
        a 32-bit counter. In H-series and later RVUs, it is a 64-bit counter. In G-series
        RVUs, the OUTPUT -BYTES -F field is a 64 -bit version of OUTPUT -BYTES.
    input_data_bytes:
      queryable: true
      type: integer
      description: Number of data bytes read from the communications line. This counter
        includes only user data. Data required by line protocol is ignored. All INPUT
        -DATA -BYTES events are recorded on the write unit of the line. The INPUT
        -DATA -BYTES count is always less than the INPUT -BYTES count. For SNAX lines,
        this counter includes only request/response header (RH) and RU data counts
        (3 + RU bytes) of RUs destined for an OPEN logical unit or a logical unit
        in a pass -through session. In G-series and earlier RVUs, this is a 32-bit
        counter. In H-series and later RVUs, this is a 64-bit counter. In G-series
        RVUs, the INPUT -DATA -BYTES -F field is a 64 -bit version of INPUT -DATA
        -BYTES.
    output_data_bytes:
      queryable: true
      type: integer
      description: Number of data bytes written to the communications line. This counter
        includes only user data. Data required by line protocol is ignored. The OUTPUT
        -DATA -BYTES count is always less than the OUTPUT -BYTES count. For SNAX lines,
        this counter includes only the request/response header (RH) and RU data counts
        (3 + RU bytes) of RUs being sent on the line. In G-series and earlier RVUs,
        this is a 32-bit counter. In H-series and later RVUs, this is a 64-bit counter.
        In G-series RVUs, the OUTPUT -DATA -BYTES -F field is a 64 -bit version of
        OUTPUT -DATA -BYTES.
    reads:
      queryable: true
      type: integer
      description: Number of read operations (from the network communications line
        to memory) performed by the linehandler process.
    writes:
      queryable: true
      type: integer
      description: Number of write operations (from memory to the network communications
        line) performed by the linehandler process.
    retries:
      queryable: true
      type: integer
      description: Number of times the message system tries to send a message before
        succeeding. This counter applies only to IPC and RIPC records.
    transactions:
      queryable: true
      type: integer
      description: Number of terminal transactions (a read followed immediately by
        a write) performed by the terminal process. RESPONSE -TIME measures the time
        spent on the transactions. For SNAX lines, this counter is always zero.
    response_time:
      queryable: true
      type: integer
      description: Time the terminal process spent on terminal response. A transaction
        is a read from a terminal followed by a write to the terminal. Terminal response
        is the interval between the end of the read and the beginning of the write.
        Block mode operations read a function key and then read data. This counter
        does not include the time between the two reads. For SNAX lines, this counter
        is always zero.
    ctrl:
      queryable: true
      type: integer
      description: INT:value:1 is the literal value CTRL^T or the numeric identifier
        18. A positive type value includes the specified entities in the measurement
        configuration. A negative type value excludes the specified entities from
        measurement. For an example, see Specifying Entity Descriptors. INT:value:1
        is the length in bytes of this descriptor.
    unit:
      queryable: true
      type: integer
      description: INT:value:1 is the literal OPDISK^T or the numeric identifier 17.
        A positive type value includes the specified entities in the measurement configuration.
        A negative type value excludes the specified entities from measurement. For
        an example, see Specifying Entity Descriptors. INT:value:1 is the length in
        bytes of this descriptor.
    channel:
      queryable: true
      type: integer
      description: INT:value:1 is the channel number of the controller to be measured.
        INT:value:1 is the controller number (0 through 31). To indicate all controllers,
        use the literal -1.
    input_bytes_f:
      queryable: true
      type: integer
      description: (G-series, Legacy Style only) Same as INPUT -BYTES but accommodates
        larger values (64 bits rather than 32 bits).
    output_bytes_f:
      queryable: true
      type: integer
      description: (G-series, Legacy Style only) Same as OUTPUT -BYTES but accommodates
        larger values (64 bits rather than 32 bits).
    input_data_bytes_f:
      queryable: true
      type: integer
      description: (G-series, Legacy Style only) Same as INPUT -DATA -BYTES but accommodates
        larger values (64 bits rather than 32).
    output_data_bytes_f:
      queryable: true
      type: integer
      description: (G-series, Legacy Style only) Same as OUTPUT -DATA -BYTES but accommodates
        larger values (64 bits rather than 32).
    l2in_bytes:
      queryable: true
      type: integer
      description: Number of Level 2 bytes read by the network line handler. This
        counter includes both user data and data associated with line protocol. For
        non -CSS type controllers, this counter contains DIN4 -BYTES and CIN4 -BYTES.
        For CSS type controllers, this counter also contains CLB (CAP to CLIP) protocol
        and CLIP TRACE blocks. The total number of Level 2 bytes on the network line
        is this counter plus L2OUT -BYTES. In G-series and earlier RVUs, this is a
        32-bit counter. In H-series and later RVUs, this is a 64-bit counter. In G-series
        RVUs, the L2IN -BYTES -F field is a 64 -bit version of L2IN -BYTES.
    l2out_bytes:
      queryable: true
      type: integer
      description: Number of Level 2 bytes written by the network line handler. This
        counter includes both user data and data associated with line protocol. For
        non -CSS type controllers, this counter contains DOUT4 -BYTES and COUT4 -BYTES.
        For CSS type controllers, this counter also contains CLB protocol bytes.
    din4_bytes:
      queryable: true
      type: integer
      description: Number of Level 4 data bytes read by the network line handler.
        This counter includes only user data and, on D-series, message system protocol
        bytes. The data associated with line protocol is ignored. In G-series and
        earlier RVUs, this is a 32-bit counter. In H-series and later RVUs, this is
        a 64-bit counter. In G-series RVUs, the DIN4 -BYTES -F field is a 64 -bit
        version of DIN4 -BYTES.
    dout4_bytes:
      queryable: true
      type: integer
      description: Number of Level 4 data bytes written by the network line handler.
        This counter includes only user data and, on D-series, message system protocol
        bytes. The data associated with line protocol is ignored. In G-series and
        earlier RVUs, this is a 32-bit counter. In H-series and later RVUs, this is
        a 64-bit counter. In G-series RVUs, the DOUT4 -BYTES -F field is a 64 -bit
        version of DOUT4 -BYTES.
    cin4_bytes:
      queryable: true
      type: integer
      description: Number of Level 4 protocol bytes and NCP requests bytes (ACK, NAK,
        ENQ, PCHG, NCPM, CONN, and CAN) read by the network line handler for an Expand
        line. X.25 does not update this counter. In G-series and earlier RVUs, this
        is a 32-bit counter. In H-series and later RVUs, this is a 64-bit counter.
        In G-series RVUs, the CIN4 -BYTES -F field is a 64 -bit version of CIN4 -BYTES.
    cout4_bytes:
      queryable: true
      type: integer
      description: Number of Level 4 protocol bytes and NCP request bytes (ACK, NAK,
        ENQ, PCHG, NCPM, CONN, and CAN) written by the network line handler for an
        Expand line. X.25 does not update this counter. In G-series and earlier RVUs,
        this is a 32-bit counter. In H-series and later RVUs, this is a 64-bit counter.
        In G-series RVUs, the COUT4 -BYTES -F field is a 64 -bit version of COUT4
        -BYTES.
    u64_bytes:
      queryable: true
      type: integer
      description: Number of messages shorter than 64 bytes after compression. The
        size includes protocol bytes.
    u128_bytes:
      queryable: true
      type: integer
      description: 'Number of messages from 64 through 127 bytes long after compression.
        The size includes protocol bytes. Counter type: Incrementing.'
    u256_bytes:
      queryable: true
      type: integer
      description: 'Number of messages from 128 through 255 bytes long after compression.
        The size includes protocol bytes. Counter type: Incrementing.'
    u512_bytes:
      queryable: true
      type: integer
      description: Number of messages from 256 through 511 bytes long after compression.
        The size includes protocol bytes.
    u1024_bytes:
      queryable: true
      type: integer
      description: Number of messages from 512 through 1023 bytes long after compression.
        The size includes protocol bytes.
    u2048_bytes:
      queryable: true
      type: integer
      description: Number of messages from 1024 through 2047 bytes long after compression.
        The size includes protocol bytes.
    u4096_bytes:
      queryable: true
      type: integer
      description: Number of messages from 2048 through 4095 bytes long after compression.
        The size includes protocol bytes.
    o4095_bytes:
      queryable: true
      type: integer
      description: Number of messages longer than 4095 bytes long after compression.
        The size includes protocol bytes.
    l2in_bytes_f:
      queryable: true
      type: integer
      description: (G-series, Legacy Style only) Same as L2IN -BYTES but accommodates
        larger values (64 bits rather than 32).
    l2out_bytes_f:
      queryable: true
      type: integer
      description: (G-series, Legacy Style only) Same as L2OUT -BYTES but accommodates
        larger values (64 bits rather than 32).
    din4_bytes_f:
      queryable: true
      type: integer
      description: (G-series, Legacy Style only) Same as DIN4 -BYTES but accommodates
        larger values (64 bits rather than 32).
    dout4_bytes_f:
      queryable: true
      type: integer
      description: (G-series, Legacy Style only) Same as DOUT4 -BYTES but accommodates
        larger values (64 bits rather than 32).
    cin4_bytes_f:
      queryable: true
      type: integer
      description: (G-series, Legacy Style only) Same as CIN4 -BYTES but accommodates
        larger values (64 bits rather than 32).
    cout4_bytes_f:
      queryable: true
      type: integer
      description: (G-series, Legacy Style only) Same as COUT4 -BYTES but accommodates
        larger values (64 bits rather than 32).
