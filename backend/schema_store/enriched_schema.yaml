    userid_user:
      type: integer
      queryable: true
      description: userid_user metric.
    creatorid_group:
      type: integer
      queryable: true
      description: creatorid_group metric.
    creatorid_user:
      type: integer
      queryable: true
      description: creatorid_user metric.
    u_gmom_gmom_gmom_node:
      type: integer
      queryable: true
      description: u_gmom_gmom_gmom_node metric.
    u_gmom_gmom_gmom_cpu:
      type: integer
      queryable: true
      description: u_gmom_gmom_gmom_cpu metric.
    u_gmom_gmom_gmom_pin:
      type: integer
      queryable: true
      description: u_gmom_gmom_gmom_pin metric.
    u_gmom_gmom_gmom_jobid:
      type: integer
      queryable: true
      description: u_gmom_gmom_gmom_jobid metric.
    u_loadid_loadid:
      type: string
      queryable: true
      description: u_loadid_loadid metric.
    u_loadid_load_id_prefix_id:
      type: string
      queryable: true
      description: u_loadid_load_id_prefix_id metric.
    u_loadid_load_id_interval_id:
      type: string
      queryable: true
      description: u_loadid_load_id_interval_id metric.
    program_file_name_mid_pathid:
      type: string
      queryable: true
      description: program_file_name_mid_pathid metric.
    os_version_letter:
      type: string
      queryable: true
      description: os_version_letter metric.
    program_file_name_mid_crvsn:
      type: string
      queryable: true
      description: program_file_name_mid_crvsn metric.
    program_file_name_volume:
      type: string
