tmf:
  source_file: measurefiles/tmfcsv
  ddl_record: ZMSTMF
  entity_type: TMF (Transaction Management Facility)
  purpose: 'Transaction Management Facility performance metrics per CPU. Captures
    transaction activity including home transactions, remote transactions, aborting
    transactions, and TMP queue activity. TMF counters are advanced only in the CPU
    containing the primary $TMP process.

    '
  identity_columns:
    - system_name
    - cpu_num
  time_columns:
    - from_timestamp
    - to_timestamp
    - delta_time
  join_hints:
    - JOIN cpu ON (system_name, cpu_num, from_timestamp) for CPU context
    - JOIN proc ON (system_name, cpu_num, from_timestamp) for process activity
  columns:
    system_name:
      queryable: true
      type: string
      description: Name of the system on which the measurement was taken
    cpu_num:
      queryable: true
      type: integer
      description: Number of the CPU on which the measurement was taken. For interprocessor
        communications (IPC) records, CPU-NUM is MYCPU
    object_uid:
      queryable: false
      type: string
      description: Reserved for future use
    from_timestamp:
      queryable: true
      type: datetime
      description: Starting time of the measurement or transient entity. Specified
        as Julian-based, local civil time (LCT)
    to_timestamp:
      queryable: true
      type: datetime
      description: Ending time of the measurement or transient entity. Specified as
        Julian-based, local civil time (LCT)
    delta_time:
      queryable: true
      type: integer
      unit: microseconds
      description: Duration of the measurement, in microseconds
    template_version:
      queryable: false
      type: integer
      description: Record template version from MEASDDLS for the format of the external
        record. When data collected on systems of differing product versions are stored
        in the same structured files, the template version for all records is the
        one used to create the structured file
    subsystem_version:
      queryable: false
      type: integer
      description: Provided by the TMF subsystem
    error:
      queryable: false
      type: integer
      description: Indicates whether an error prevented Measure from collecting data
        or writing an output record for this entity. For values, see Identifying Data
        File Errors
    home_trans:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: Number of transactions that began in the measured CPU; includes
        transactions regardless of whether they remain on the local system or are
        distributed to a remote system
    home_trans_qtime:
      queryable: true
      type: integer
      unit: microseconds
      counter_type: Queue
      description: Sum of lifetimes of transactions originated in the measured CPU;
        includes transactions regardless of whether they remain in the local system
        or are distributed to a remote system
    home_net_trans:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: Number of transactions that began in this system and were subsequently
        distributed to another system; advanced only in the CPU containing the primary
        $TMP process
    home_net_trans_qtime:
      queryable: true
      type: integer
      unit: microseconds
      counter_type: Queue
      description: Time that transactions that began on the local system and were
        subsequently distributed to a remote system spent on the remote system; advanced
        only in the CPU containing the primary $TMP process
    remote_trans:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: Number of transactions that began in a remote system and were distributed
        to the measured system; advanced only in the CPU containing the primary $TMP
        process
    remote_trans_qtime:
      queryable: true
      type: integer
      unit: microseconds
      counter_type: Queue
      description: Time that transactions that began in a remote system and were distributed
        to the local system spent on the local system; advanced only in the CPU containing
        the primary $TMP process
    aborting_trans:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: Number of aborted transactions; counted regardless of whether it
        began in the local system and remained there, began in the local system and
        was distributed to a remote system, or began in a remote system and was distributed
        to the local system; advanced only in the CPU containing the primary $TMP
        process
    trans_backout_qtime:
      queryable: true
      type: integer
      unit: microseconds
      counter_type: Queue
      description: Time that transactions spent waiting for and being serviced by
        BACKOUT; after a transaction is designated as aborting and its audit is on
        disk, that transaction is scheduled for backout services; advanced only in
        the CPU containing the primary $TMP process
    tmp_work:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: Number of work items placed on the TMP queue
    tmp_work_qtime:
      queryable: true
      type: integer
      unit: microseconds
      counter_type: Queue
      description: Time that work items spent on the TMP queue
    pio_sends:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: Number of PIOs sent to other CPUs
    pio_send_qtime:
      queryable: true
      type: integer
      unit: microseconds
      counter_type: Queue
      description: Time PIOs spent in transit
    pio_send_bytes:
      queryable: true
      type: integer
      unit: bytes
      counter_type: Accumulating
      description: Number of PIO bytes sent to other CPUs
    pio_recvs:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: Number of PIOs received by the CPU
    pio_recv_bytes:
      queryable: true
      type: integer
      unit: bytes
      counter_type: Accumulating
      description: Number of PIO bytes received by the CPU
