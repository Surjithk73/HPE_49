  cpu.IPUS: The field is not displayed by MEASCOM, but determines whether the IPU-SWITCHES
    field is displayed.
  cpu.CPU_BUSY_TIME: "For TNS/R systems, CPU-BUSY-TIME is the sum of ACCEL\u2011BUSY\u2011\
    TIME, TNS\u2011BUSY\u2011TIME, and TNSR\u2011BUSY\u2011TIME. For TNS/E systems,\
    \ CPU-BUSY-TIME is the sum of ACCEL\u2011BUSY\u2011TIME, TNS\u2011BUSY\u2011TIME,\
    \ and NATIVE\u2011BUSY\u2011TIME. A CPU-BUSY-TIME value is always displayed. ```\
    \ ``` Related CounterRelated Counter DescriptionDescription CPU CPU-BUSY-TIMESimilar,\
    \ but is the busy time for the entire processor. PROCESS CPU-NUM Identifies the\
    \ CPU executing the process ``` Counter type: Busy."
  cpu.UNSP_PAGES_START: Number of pages on the UNSP-PAGES-QTIME queue at the start
    of the measurement interval.
  cpu.UNSP_PAGES_END: Number of pages on the UNSP-PAGES-QTIME queue at the end of
    the measurement interval.
  cpu.PROCESSH_SAMPLES: For NSMA systems in Measure J01 and later PVUs, PROCESSH-SAMPLES
    reports the aggregate value of all the number of samples on all the IPUs and hence
    is typically equal to n*sampling frequency on that CPU.
  cpu.LOCKED_PAGES_START: This counter is valid and displayed by MEASCOM in ZMS style
