    file_name_mid.crvsn:
      queryable: false
      description: Creation Version Serial Number
      type: integer
    record_type:
      queryable: true
      type: integer
      description: 0 = short-form record (temp/edit/object files); non-zero = long-form
        record with locking counters
    ocb32_number:
      queryable: true
      type: integer
      description: 32-bit Open Control Block number (L02/J06 and later)
    driver_input_calls:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: Read operations for this open (cache hits + misses); physical reads
        = driver_input_calls - cache_hits
    driver_output_calls:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: Write operations for this open
    cache_hits:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: Times a read found the required block in cache for this open
    cache_write_hits:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: Times a write found the required block dirty in cache for this
        open
    block_splits:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: B-tree block splits caused by this opener
    requests_blocked:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: Requests blocked waiting for a lock for this open
    requests:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: Total I/O requests for this open
    lockwait_time:
      queryable: true
      type: integer
      unit: microseconds
      counter_type: Lockwait
      description: Cumulative lock wait time for this open; zero for short-form records;
        RATE ON → avg per blocked request
    max_lockwait_time:
      queryable: true
      type: integer
      unit: microseconds
      counter_type: Max value
      description: Maximum single lock wait time for this open; zero for short-form
        records; unaffected by RATE
    lock_timeouts:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: Lock timeout events for this open; zero for short-form records
    lock_bounces:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: Lock bounce events (FELOCKED/error 73) for this open; zero for
        short-form records
    cache_write_cleans:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: Times a write found the required block clean in cache for this
        open; zero for short-form records
    dbio_input_calls:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: Direct bulk I/O read operations for this open; subset of driver_input_calls
    dbio_output_calls:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: Direct bulk I/O write operations for this open; subset of driver_output_calls
    sql_operation_time:
      queryable: true
      type: integer
      unit: microseconds
      counter_type: Busy
      description: DP2 process busy-time while working on SQL subset requests for
        this open; RATE ON → %
  counter_classifications:
  - counter: BLOCK-SPLITS
    classification: Incrementing
  - counter: CACHE-HITS
    classification: Incrementing
  - counter: CACHE-WRITE-CLEANS
    classification: Incrementing
  - counter: CACHE-WRITE-HITS
    classification: Incrementing
  - counter: DBIO-INPUT-CALLS
    classification: Incrementing
  - counter: DBIO-OUTPUT-CALLS
    classification: Incrementing
  - counter: DRIVER-INPUT-CALLS
    classification: Incrementing
  - counter: DRIVER-OUTPUT-CALLS
    classification: Incrementing
  - counter: LOCK-BOUNCES
    classification: Incrementing
  - counter: LOCK-TIMEOUTS
    classification: Incrementing
  - counter: LOCKWAIT-TIME
    classification: Lockwait
  - counter: MAX-LOCKWAIT-TIME
    classification: Max value
  - counter: REQUESTS
    classification: Incrementing
  - counter: REQUESTS-BLOCKED
    classification: Incrementing
  - counter: SQL-OPERATION-TIME
    classification: Busy
  formulas:
  - formula: LOCKWAIT-TIME / REQUESTS-BLOCKED
    description: Average lock wait time
  - formula: DRIVER-INPUT-CALLS - CACHE-HITS
    description: Number of physical read operations
  - formula: DRIVER-OUTPUT-CALLS - CACHE-WRITE-HITS
    description: Number of physical disk write operations (for unstructured files
      <= 4096 bytes and structured files)
  - formula: DRIVER-OUTPUT-CALLS - (CACHE-WRITE-HITS + CACHE-WRITE-CLEANS)
    description: Number of physical disk write operations (for large writes > 4096
      bytes unstructured)
  - formula: ((CACHE-HITS + DISC-READS) - DRIVER-INPUT-CALLS)
    description: Physical reads done for a given volume from a prefetch operation,
      where DISC-READS is from the FILE entity.
  interpretations:
  - counter: CACHE-WRITE-HITS
    interpretation: Number of times a write operation found the required block in
      cache and the block was dirty. A write to a dirty block saves a physical write
      operation.
  - counter: LOCK-BOUNCES
    interpretation: Number of bounced locks (FELOCKED or error 73) returned by the
      disk process to the file system. For SQL tables, a result of CONTROL TABLE with
      RETURN-IF-LOCKED. For Enscribe, SETMODE function 4 alternate lock mode.
  - counter: LOCK-TIMEOUTS
    interpretation: Number of timeouts on locks (error 40).
  - counter: REQUESTS-BLOCKED
    interpretation: Number of times an I/O operation had to wait because the requested
      file or record was locked (e.g., LOCKFILE request, LOCKREC request, or TMF auditing
      operation).
  - counter: SQL-OPERATION-TIME
    interpretation: DP2 process busy-time accumulated while DP2 was working on SQL
      subset requests on behalf of this DISCOPEN. It identifies SQL operations that
      are major consumers of DP2 process-busy-time.
  - entity: DISCOPEN
    interpretation: Provides a detailed view of disk file activity. Counters are useful
      for detecting potential problems with the structure of key-sequenced database
      files.
  thresholds:
  - metric: MAX-LOCKWAIT-TIME
    condition: Guide
    interpretation: Can be used as a guide to set the timeout value in the application.
  - metric: BLOCK-SPLITS
    condition: '> minimum'
    interpretation: Should be kept to a minimum because they require several I/O operations,
      but cannot be entirely avoided when inserting many new records in a key-sequenced
      file.
  business_rules:
  - rule: OCBs for backup disk processes are not measured; DISCOPEN measurements must
      be restarted if the primary disk process is disabled or moved.
  - rule: Short record format allocates zeros to REQUESTS, MAX-LOCKWAIT-TIME, LOCK-BOUNCES,
      LOCKWAIT-TIME, LOCK-TIMEOUTS, and CACHE-WRITE-CLEANS for temporary files ($vol.#nnnnnnn),
      edit files (101), and object files (100).
  - rule: DISCOPEN creates a separate counter record for each file open, including
      indirect opens (e.g., alternate-key file), unlike DISKFILE.
  - rule: In writes to mirrored disks, request counts are incremented once even though
      two physical writes occurred.
  relationships:
  - source_entity: DISCOPEN
    target_entity: DISKFILE
    relationship_type: complementary
    description: DISCOPEN creates a separate record for each file open, identifying
      opener processes. DISKFILE measures disk file access collectively for a file.
  - source_entity: DISCOPEN
    target_entity: FILE
    relationship_type: complementary
    description: DISCOPEN measures physical I/O operations by the disk process. FILE
      measures logical access to a file.
  sql_generation_guidance:
  - guidance: REPORT RATE ON has no effect on MAX-LOCKWAIT-TIME.
  - guidance: When grouping SQL-OPERATION-TIME, note that summing across all DISCOPEN
      records for a disk is not inclusive of all DP2 processing time or all SQL-related
      processing time.
  - guidance: If REPORT RATE value is on, average wait time should be computed as
      (LOCKWAIT-TIME / REQUESTS-BLOCKED).
  reporting_guidance:
  - guidance: Use DISCOPEN instead of DISKFILE when a detailed view of disk file activity
      is needed, especially to detect problems with key-sequenced database files structure.
file:
  ddl_record: ZMSFILE
  entity_type: FILE (File Activity per Opener)
  purpose: 'Logical I/O operations performed by a user process on an explicitly opened
    file. Measures all partitions of a partitioned file together as a single entity.
    Counter records are initiated on first significant use of the file, not on open.
    Does not measure files not explicitly opened by the application (e.g. alternate-key
    files).

    '
  identity_columns:
  - system_name
  - cpu_num
  - opener_pin
  - file_number
  - file_name.volume
  - file_name.subvol
  - file_name.filename
  time_columns:
  - from_timestamp
  - to_timestamp
  - delta_time
  join_hints:
  - JOIN proc ON (system_name, cpu_num, opener_pin, from_timestamp) for opener process
    detail
  - JOIN dfile ON (system_name, cpu_num, file_name.*, from_timestamp) for disk file
    totals
  columns:
    u_loadid.loadid:
