  ossns.IC_HITS: To derive inode cache misses, subtract IC-HITS from IC-LOOKUPS.
  ossns.LC_HITS: Link cache misses can be derived by subtracting LC-HITS from LC-LOOKUPS.
  proc.FROM_TIMESTAMP: When using the CSV[A], JSON, or XML report format, the timestamp
