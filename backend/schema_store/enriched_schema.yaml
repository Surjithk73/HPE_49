  identity_columns: [system_name, cpu_num, pin, process_name]
  time_columns: [from_timestamp, to_timestamp, delta_time]
  join_hints:
    - "JOIN proc ON (system_name, cpu_num, pin, from_timestamp) for process context"
  columns:
    # --- Shared header ---
    u_loadid.loadid:              { queryable: false }
    u_loadid.load_id.prefix_id:   { queryable: false }
    u_loadid.load_id.interval_id: { queryable: false }
    system_name:       { queryable: true,  type: string }
    cpu_num:           { queryable: true,  type: integer }
    os_version.letter: { queryable: true,  type: string }
    os_version.number: { queryable: true,  type: string }
    object_uid:        { queryable: false }
    from_timestamp:    { queryable: true,  type: datetime }
    to_timestamp:      { queryable: true,  type: datetime }
    delta_time:        { queryable: true,  type: integer, unit: microseconds }
    template_version:      { queryable: false }
    format_version.letter: { queryable: false }
    format_version.number: { queryable: false }
    data_version.letter:   { queryable: false }
    data_version.number:   { queryable: false }
    subsystem_version:     { queryable: false }
    error:                 { queryable: false }

    # --- Process Identity (ID fields) ---
    pin:                        { queryable: true, type: integer, description: "PIN of the NS process" }
    process_name:               { queryable: true, type: string,  description: "Named process name (e.g. $ZPNS)" }
    program_file_name.volume:   { queryable: true, type: string,  description: "Volume of the NS program file" }
    program_file_name.subvol:   { queryable: true, type: string,  description: "Subvolume of the NS program file" }
    program_file_name.filename: { queryable: true, type: string,  description: "Filename of the NS program file" }
    ic_entries:                 { queryable: true, type: integer, counter_type: Snapshot, description: "Configured number of Inode Cache (IC) records available on this name server" }
    lc_entries:                 { queryable: true, type: integer, counter_type: Snapshot, description: "Configured number of Link Cache (LC) records available on this name server" }

    # --- Name Resolution ---
    rr_processed:       { queryable: true, type: integer, counter_type: Incrementing, description: "Number of name resolution requests processed by this name server" }
    rr_redir_sent:      { queryable: true, type: integer, counter_type: Incrementing, description: "Number of name resolution requests redirected to another name server" }
    rr_redir_processed: { queryable: true, type: integer, counter_type: Incrementing, description: "Number of redirected name resolution requests processed" }

    # --- Inode Cache ---
    ic_lookups:     { queryable: true, type: integer, counter_type: Incrementing, description: "Inode Cache lookup operations" }
    ic_hits:        { queryable: true, type: integer, counter_type: Incrementing, description: "Inode Cache hits; ic_hits/ic_lookups = hit ratio" }
    ic_dirty_qtime: { queryable: true, type: integer, unit: microseconds, counter_type: Queue, description: "Time dirty IC entries waited in queue; RATE ON â†’ AQL" }

    # --- Link Cache ---
    lc_lookups:     { queryable: true, type: integer, counter_type: Incrementing, description: "Link Cache lookup operations; LC also remembers unsuccessful lookups" }
    lc_hits:        { queryable: true, type: integer, counter_type: Incrementing, description: "Link Cache hits; lc_hits/lc_lookups = hit ratio" }
    lc_inuse_qtime: { queryable: true, type: integer, unit: microseconds, counter_type: Queue, description: "Time LC entries were in use; LC can expand beyond configured size; RATE ON â†’ AQL" }

    # --- Checkpoint & Synchronization ---
    checkpoint_reqs:  { queryable: true, type: integer, counter_type: Incrementing, description: "Logical checkpoint requests sent by this name server to its backup" }
    checkpoint_blks:  { queryable: true, type: integer, counter_type: Incrementing, description: "Checkpoint blocks sent to backup (multiple requests assembled per block)" }
    sem_waits:        { queryable: true, type: integer, counter_type: Incrementing, description: "Semaphore wait events in processing threads" }
    sem_wait_qtime:   { queryable: true, type: integer, unit: microseconds, counter_type: Queue, description: "Cumulative semaphore wait time in processing threads; RATE ON â†’ AQL" }

    # --- Inter-process Messaging ---
    dp2_dd_reqs:    { queryable: true, type: integer, counter_type: Incrementing, description: "Data definition requests sent to DP2 (creat, open, link, mkdir, chmod, chown, utime, rename, unlink, rmdir, mknod, mkfifo, bind)" }
    dp2_messages:   { queryable: true, type: integer, counter_type: Incrementing, description: "Total messages sent to DP2 (includes DD calls and other calls)" }
    dp2_msg_qtime:  { queryable: true, type: integer, unit: microseconds, counter_type: Queue, description: "Accumulated service time waiting while DP2 messages were outstanding; RATE ON â†’ AQL" }
    ps_messages:    { queryable: true, type: integer, counter_type: Incrementing, description: "Messages sent to pipe server processes ($ZPPnn)" }
    ps_msg_qtime:   { queryable: true, type: integer, unit: microseconds, counter_type: Queue, description: "Time pipe server messages were outstanding; RATE ON â†’ AQL" }
    ls_messages:    { queryable: true, type: integer, counter_type: Incrementing, description: "Messages sent to local OSS server process ($ZPLS or $ZLSnn)" }
    ls_msg_qtime:   { queryable: true, type: integer, unit: microseconds, counter_type: Queue, description: "Time local server messages were outstanding; RATE ON â†’ AQL" }
    gettime_reqs:   { queryable: true, type: integer, counter_type: Incrementing, description: "Number of gettime requests sent to a pipe server or local server" }
    settime_reqs:   { queryable: true, type: integer, counter_type: Incrementing, description: "Number of settime requests sent to a pipe server or local server" }


proc:
  source_file: measurefiles/proccsv
  ddl_record: ZMSPROC
  entity_type: PROC (Process)
  purpose: >
    Per-process performance metrics for each measured process. Captures CPU utilization,
    memory, messaging, file I/O, and OSS activity. Counter records are initialized when
    the process starts, not at measurement start.
  identity_columns: [system_name, cpu_num, pin, process_name, program_file_name.volume, program_file_name.subvol, program_file_name.filename]
  time_columns: [from_timestamp, to_timestamp, delta_time]
  join_hints:
    - "JOIN cpu ON (system_name, cpu_num, from_timestamp) for CPU context"
    - "JOIN file ON (system_name, cpu_num, opener_pin, from_timestamp) for file activity"
    - "JOIN dopen ON (system_name, opener_cpu, opener_pin, from_timestamp) for disk open activity"
  columns:
    # --- Shared header ---
    u_loadid.loadid:              { queryable: false, description: "Internal Measure load ID" }
    u_loadid.load_id.prefix_id:   { queryable: false, description: "Internal Measure load ID prefix" }
    u_loadid.load_id.interval_id: { queryable: false, description: "Internal Measure load ID interval" }
    system_name:       { queryable: true,  type: string,   description: "NonStop node name" }
    cpu_num:           { queryable: true,  type: integer,  description: "CPU number where the process runs" }
    os_version.letter: { queryable: true,  type: string }
    os_version.number: { queryable: true,  type: string }
    object_uid:        { queryable: false }
    from_timestamp:    { queryable: true,  type: datetime }
    to_timestamp:      { queryable: true,  type: datetime }
    delta_time:        { queryable: true,  type: integer, unit: microseconds }
    template_version:      { queryable: false }
    format_version.letter: { queryable: false }
    format_version.number: { queryable: false }
    data_version.letter:   { queryable: false }
    data_version.number:   { queryable: false }
    subsystem_version:     { queryable: false, description: "Provided by Nonstop OS; >= 9 enables process-launch counters" }
    error:                 { queryable: false }

    # --- Process Identity (ID fields) ---
    pin:                        { queryable: true, type: integer, description: "Process Identification Number" }
    priority:                   { queryable: true, type: integer, description: "Creation priority of the process" }
    userid.group:               { queryable: true, type: integer, description: "Process accessor ID group component (PAID)" }
    userid.user:                { queryable: true, type: integer, description: "Process accessor ID user component (PAID)" }
    creatorid.group:            { queryable: true, type: integer, description: "Creator access ID group component (CAID)" }
    creatorid.user:             { queryable: true, type: integer, description: "Creator access ID user component (CAID)" }
    process_name:               { queryable: true, type: string,  description: "Named process name (e.g. $ZEXP)" }
    program_file_name.volume:   { queryable: true, type: string,  description: "Volume of the program object file" }
    program_file_name.subvol:   { queryable: true, type: string,  description: "Subvolume of the program object file" }
    program_file_name.filename: { queryable: true, type: string,  description: "Filename of the program object file" }
    osspid:                     { queryable: true, type: integer, description: "OSS process ID; zeros for non-OSS processes" }
    ancestor_cpu:               { queryable: true, type: integer, description: "CPU number of the ancestor process" }
    ancestor_pin:               { queryable: true, type: integer, description: "PIN of the ancestor process" }
    ancestor_sysname:           { queryable: true, type: string,  description: "System name of the ancestor process" }
    ancestor_process_name:      { queryable: true, type: string,  description: "Named process name of the ancestor" }
    device_name:                { queryable: true, type: string,  description: "Disk device of the program file; for SMF = physical location" }
    program_file_name_mid.pathid: { queryable: false, description: "Internal OSS MID PATHID for program file; zeros for non-OSS" }
    program_file_name_mid.crvsn:  { queryable: false, description: "Creation Version Serial Number for program file; zeros for non-OSS" }
    flags:                      { queryable: true, type: bitmask, description: "Bit 10=KLT process; Bit 11=AP; Bit 12=handles X+Y interrupts; Bit 13=IP; Bit 15=NSMA system" }
    u_gmom.gmom.gmom_node:      { queryable: true, type: integer, description: "Expand node number of GMOM process (NetBatch); 0 if not NetBatch" }
    u_gmom.gmom.gmom_cpu:       { queryable: true, type: integer, description: "CPU of GMOM process (NetBatch); 0 if not NetBatch" }
    u_gmom.gmom.gmom_pin:       { queryable: true, type: integer, description: "PIN of GMOM process (NetBatch); 0 if not NetBatch" }
    u_gmom.gmom.gmom_jobid:     { queryable: true, type: integer, description: "NetBatch job ID assigned by GMOM; 0 if not NetBatch" }
    gmom_sysname:               { queryable: true, type: string,  description: "Expand system name of GMOM node if remote; spaces otherwise" }
    gmom_process_name:          { queryable: true, type: string,  description: "Named process name of GMOM; spaces if not NetBatch" }
    program_accelerated:        { queryable: true, type: integer, description: "Non-zero if UC or UL portions of program are accelerated" }
    native_process:             { queryable: true, type: integer, description: "Non-zero if process executes only in native mode" }
    system_process:             { queryable: true, type: integer, description: "System process type code; 0=not a system process (see SYSPROC_TYPE_* literals)" }
    ipus:                       { queryable: true, type: integer, description: "Number of IPUs in the CPU (J-series+); 1 for non-NSMA" }
    hometerm_sysname:           { queryable: true, type: string,  description: "Home terminal system name" }
    hometerm_name.device:       { queryable: true, type: string,  description: "Home terminal device name component" }
    hometerm_name.subdevice:    { queryable: true, type: string,  description: "Home terminal subdevice name component" }
    hometerm_name.qualifier:    { queryable: true, type: string,  description: "Home terminal qualifier component" }
    serverclass_name:           { queryable: true, type: string,  description: "Serverclass name (populated by Nonstop TS/MP Pathway; L02/J06+)" }
    thread_group_id:            { queryable: true, type: integer, description: "Thread group ID; valid only for KLT processes (L03+)" }

    # --- Processor ---
    cpu_busy_time:          { queryable: true, type: integer, unit: microseconds, counter_type: Busy, description: "Time CPU spent executing this process; RATE ON → %" }
    ready_time:             { queryable: true, type: integer, unit: microseconds, counter_type: Busy, description: "Time process spent on ready list or executing; RATE ON → %" }
    dispatches:             { queryable: true, type: integer, counter_type: Incrementing, description: "Number of times process was dispatched (selected and run)" }
    comp_traps:             { queryable: true, type: integer, counter_type: Incrementing, description: "Number of compatibility mode traps during process execution" }
    native_busy_time:       { queryable: true, type: integer, unit: microseconds, counter_type: Busy, description: "Time CPU busy executing native code for this process; valid only when PROCESSH active" }
    accel_busy_time:        { queryable: true, type: integer, unit: microseconds, counter_type: Busy, description: "Time CPU busy executing accelerated code for this process; valid only when PROCESSH active" }
    tns_busy_time:          { queryable: true, type: integer, unit: microseconds, counter_type: Busy, description: "Time CPU busy executing TNS code for this process; valid only when PROCESSH active" }
    vsems:                  { queryable: true, type: integer, counter_type: Incrementing, description: "Number of times process waited for a semaphore-protected resource" }
    ipu_switches:           { queryable: true, type: integer, counter_type: Incrementing, description: "Number of times process switched IPUs while executing (NSMA systems)" }
    ipu_num:                { queryable: true, type: integer, counter_type: Snapshot, description: "IPU number where process was executing when sample was taken (H05/J03+)" }
    ipu_num_prev:           { queryable: true, type: integer, counter_type: Snapshot, description: "Previous IPU number if an IPU switch occurred during interval (H05/J03+)" }
    initial_priority_start: { queryable: true, type: integer, counter_type: Snapshot, description: "Target (requested) process priority at interval start (H06.25/J06.14+)" }
    initial_priority_end:   { queryable: true, type: integer, counter_type: Snapshot, description: "Target (requested) process priority at interval end (H06.25/J06.14+)" }
    current_priority_start: { queryable: true, type: integer, counter_type: Snapshot, description: "Current execution priority at interval start (H06.25/J06.14+)" }
    current_priority_end:   { queryable: true, type: integer, counter_type: Snapshot, description: "Current execution priority at interval end (H06.25/J06.14+)" }
    x_interrupts:           { queryable: true, type: integer, counter_type: Incrementing, description: "Number of X-fabric interrupts (or non-fabric interrupts) handled (H07/J05+)" }
    y_interrupts:           { queryable: true, type: integer, counter_type: Incrementing, description: "Number of Y-fabric interrupts handled (H07/J05+)" }
    tles_start:             { queryable: true, type: integer, counter_type: Snapshot, description: "Instrumentation timer cells (TLEs) allocated at interval start (L02/J06+)" }
    tles_end:               { queryable: true, type: integer, counter_type: Snapshot, description: "Instrumentation timer cells (TLEs) allocated at interval end (L02/J06+)" }
    ipu_affinity_class_start: { queryable: true, type: integer, counter_type: Snapshot, description: "IPU affinity class at interval start (L02/J06+)" }
    ipu_affinity_class_end:   { queryable: true, type: integer, counter_type: Snapshot, description: "IPU affinity class at interval end (L02/J06+)" }

    # --- Memory Management ---
    mem_qtime:          { queryable: true, type: integer, unit: microseconds, counter_type: Queue, description: "Time process spent waiting on page faults; RATE ON → AQL" }
    page_faults:        { queryable: true, type: integer, counter_type: Incrementing, description: "Number of page faults generated by this process" }
    pres_pages_qtime:   { queryable: true, type: integer, unit: microseconds, counter_type: Queue, description: "Time pages sponsored by this process spent in main memory; RATE ON → AQL" }
    pres_pages_start:   { queryable: true, type: integer, counter_type: Snapshot, description: "Pages in main memory sponsored by this process at interval start" }
    pres_pages_end:     { queryable: true, type: integer, counter_type: Snapshot, description: "Pages in main memory sponsored by this process at interval end" }
    abs_segs_qtime:     { queryable: true, type: integer, unit: microseconds, counter_type: Queue, description: "Time segment table entries were in use for absolute addressable segments; RATE ON → AQL" }
    abs_segs_start:     { queryable: true, type: integer, counter_type: Snapshot, description: "Absolute addressable segment table entries in use at interval start" }
    abs_segs_end:       { queryable: true, type: integer, counter_type: Snapshot, description: "Absolute addressable segment table entries in use at interval end" }
    ext_segs_qtime:     { queryable: true, type: integer, unit: microseconds, counter_type: Queue, description: "Time extended segments were allocated via SEGMENT_ALLOCATE_ family; RATE ON → AQL" }
    alloc_seg_calls:    { queryable: true, type: integer, counter_type: Incrementing, description: "Number of successful calls to SEGMENT_ALLOCATE_ family of APIs" }
    locked_pages_start: { queryable: true, type: integer, counter_type: Snapshot, description: "Page frames locked in main memory associated with this process at interval start (H06/J04+)" }
    locked_pages_end:   { queryable: true, type: integer, counter_type: Snapshot, description: "Page frames locked in main memory associated with this process at interval end (H06/J04+)" }
    globals_size:       { queryable: true, type: integer, unit: bytes, counter_type: Snapshot, description: "Size of the Globals segment (L02/J06+)" }
    swapspace:          { queryable: true, type: integer, unit: bytes, counter_type: Snapshot, description: "Guaranteed KMSF swap space size (L02/J06+)" }
    heap32_size_start:  { queryable: true, type: integer, unit: bytes, counter_type: Snapshot, description: "Heap (32-bit) size at interval start (L02/J06+)" }
    heap32_size_end:    { queryable: true, type: integer, unit: bytes, counter_type: Snapshot, description: "Heap (32-bit) size at interval end (L02/J06+)" }
    heap32_limit:       { queryable: true, type: integer, unit: bytes, counter_type: Snapshot, description: "Maximum allowed Heap (32-bit) size (L02/J06+)" }
    heap64_size_start:  { queryable: true, type: integer, unit: bytes, counter_type: Snapshot, description: "Heap (64-bit) size at interval start (L02/J06+)" }
    heap64_size_end:    { queryable: true, type: integer, unit: bytes, counter_type: Snapshot, description: "Heap (64-bit) size at interval end (L02/J06+)" }
    heap64_limit:       { queryable: true, type: integer, unit: bytes, counter_type: Snapshot, description: "Maximum allowed Heap (64-bit) size (L02/J06+)" }
    mainstack_size_start: { queryable: true, type: integer, unit: bytes, counter_type: Snapshot, description: "Main stack size at interval start (H07/J05+)" }
    mainstack_size_end:   { queryable: true, type: integer, unit: bytes, counter_type: Snapshot, description: "Main stack size at interval end (H07/J05+)" }
    mainstack_limit_start: { queryable: true, type: integer, unit: bytes, counter_type: Snapshot, description: "Maximum allowed main stack size at interval start (H07/J05+)" }
    mainstack_limit_end:   { queryable: true, type: integer, unit: bytes, counter_type: Snapshot, description: "Maximum allowed main stack size at interval end (H07/J05+)" }
    privstack_size_start: { queryable: true, type: integer, unit: bytes, counter_type: Snapshot, description: "Priv stack size at interval start (H07/J05+)" }
    privstack_size_end:   { queryable: true, type: integer, unit: bytes, counter_type: Snapshot, description: "Priv stack size at interval end (H07/J05+)" }
    privstack_limit:      { queryable: true, type: integer, unit: bytes, counter_type: Snapshot, description: "Maximum allowed Priv stack size (H07/J05+)" }

    # --- Messaging ---
    messages_sent:      { queryable: true, type: integer, counter_type: Incrementing, description: "Number of messages sent by this process (linker)" }
    sent_bytes:         { queryable: true, type: integer, unit: bytes, counter_type: Accumulating, description: "Message bytes sent by this process (linker)" }
    returned_bytes:     { queryable: true, type: integer, unit: bytes, counter_type: Accumulating, description: "Message bytes received by this process as linker (reply bytes from listener)" }
    messages_received:  { queryable: true, type: integer, counter_type: Incrementing, description: "Number of messages read from $RECEIVE by this process (listener)" }
    received_bytes:     { queryable: true, type: integer, unit: bytes, counter_type: Accumulating, description: "Message bytes received by this process as listener" }
    reply_bytes:        { queryable: true, type: integer, unit: bytes, counter_type: Accumulating, description: "Message bytes sent by this process as listener in reply" }
    sent_cbytes:        { queryable: true, type: integer, unit: bytes, counter_type: Accumulating, description: "Protocol control bytes sent by message system on behalf of this process (linker)" }
    returned_cbytes:    { queryable: true, type: integer, unit: bytes, counter_type: Accumulating, description: "Protocol control bytes returned to this process as linker" }
    received_cbytes:    { queryable: true, type: integer, unit: bytes, counter_type: Accumulating, description: "Protocol control bytes received by this process as listener" }
    reply_cbytes:       { queryable: true, type: integer, unit: bytes, counter_type: Accumulating, description: "Protocol control bytes sent by this process as listener in reply" }
    mqc_allocations:    { queryable: true, type: integer, counter_type: Incrementing, description: "Number of MQCs currently allocated to this process" }
    mqc_alloc_failures: { queryable: true, type: integer, counter_type: Incrementing, description: "Number of MQC allocation failures" }
    mqcs_inuse_qtime:   { queryable: true, type: integer, unit: microseconds, counter_type: Queue, description: "Time MQCs have been allocated to this process; RATE ON → AQL" }
    msgs_sent_qtime:    { queryable: true, type: integer, unit: microseconds, counter_type: Queue, description: "Time messages sent by this process were outstanding; RATE ON → AQL" }
    recv_qtime:         { queryable: true, type: integer, unit: microseconds, counter_type: Queue, description: "Time messages spent waiting on $RECEIVE queue; RATE ON → AQL" }

    # --- File I/O ---
    file_open_calls:        { queryable: true, type: integer, counter_type: Incrementing, description: "Number of calls to FILE_OPEN_ or OPEN procedures (includes OSS opens)" }
    info_calls:             { queryable: true, type: integer, counter_type: Incrementing, description: "Number of FILEINFO/DEVICEINFO/fstat/etc. calls that dispatched a message" }
    open_close_wait_time:   { queryable: true, type: integer, unit: microseconds, counter_type: Busy, description: "Time process waited on open and close requests; RATE ON → %" }
    open_closes:            { queryable: true, type: integer, counter_type: Incrementing, description: "Number of OSS and Guardian open and close operations (L03+)" }
    file_reads:             { queryable: true, type: integer, counter_type: Incrementing, description: "Number of read operations (L03+)" }
    file_writes:            { queryable: true, type: integer, counter_type: Incrementing, description: "Number of write, update, and delete operations (L03+)" }
    file_nowait_initiated:  { queryable: true, type: integer, counter_type: Incrementing, description: "Number of nowait I/Os initiated (L03+)" }
    file_nowait_completed:  { queryable: true, type: integer, counter_type: Incrementing, description: "Number of nowait I/O completions processed (L03+)" }
    file_awaitio_calls:     { queryable: true, type: integer, counter_type: Incrementing, description: "Number of calls to AWAITIO and FILE_COMPLETE_ family of APIs (L03+)" }
    file_awaitio_qtime:     { queryable: true, type: integer, unit: microseconds, counter_type: Queue, description: "Time spent in AWAITIO and FILE_COMPLETE_ family of APIs (L03+); RATE ON → AQL" }

    # --- Transactions ---
    begin_trans:        { queryable: true, type: integer, counter_type: Incrementing, description: "Number of times process began a TMF transaction" }
    abort_trans:        { queryable: true, type: integer, counter_type: Incrementing, description: "Number of times process invoked ABORTTRANSACTION" }
    checkpoints:        { queryable: true, type: integer, counter_type: Incrementing, description: "Number of calls to CHECKPOINT family of APIs" }
    checkpoint_busy_time: { queryable: true, type: integer, unit: microseconds, counter_type: Busy, description: "Time spent in checkpointing (waited + AWAITIO wait for nowaited); RATE ON → % (L02+; valid when subsystem_version >= 8)" }

    # --- Process Launches ---
    launches:               { queryable: true, type: integer, counter_type: Incrementing, description: "Number of calls to process creation procedures (deprecated in L03; use process_launches)" }
    launch_wait_time:       { queryable: true, type: integer, unit: microseconds, counter_type: Busy, description: "Time process waited on PROCESS_CREATE_ or fork()/exec*() (deprecated in L03; zero)" }
    process_launches:       { queryable: true, type: integer, counter_type: Incrementing, description: "Number of process launches (L03+; valid when subsystem_version >= 9)" }
    process_launch_qtime:   { queryable: true, type: integer, unit: microseconds, counter_type: Queue, description: "Time to launch processes (L03+; valid when subsystem_version >= 9); RATE ON → AQL" }
    thread_launches:        { queryable: true, type: integer, counter_type: Incrementing, description: "Number of KLT thread launches (L03+; valid when subsystem_version >= 9)" }
    thread_launch_qtime:    { queryable: true, type: integer, unit: microseconds, counter_type: Queue, description: "Time to launch KLT threads (L03+; valid when subsystem_version >= 9); RATE ON → AQL" }

    # --- Open System Services ---
    oss_tty_reads:          { queryable: true, type: integer, counter_type: Incrementing, description: "Number of READ operations to all /dev/tty opens" }
    oss_tty_writes:         { queryable: true, type: integer, counter_type: Incrementing, description: "Number of WRITE operations to all /dev/tty opens" }
    oss_tty_read_bytes:     { queryable: true, type: integer, unit: bytes, counter_type: Accumulating, description: "Bytes read from all /dev/tty opens" }
    oss_tty_write_bytes:    { queryable: true, type: integer, unit: bytes, counter_type: Accumulating, description: "Bytes written to all /dev/tty opens" }
    oss_tty_wait_time:      { queryable: true, type: integer, unit: microseconds, counter_type: Busy, description: "Time process waited on /dev/tty requests; RATE ON → %" }
    oss_dev_null_ops:       { queryable: true, type: integer, counter_type: Incrementing, description: "Number of reads and writes to all /dev/null opens" }
    ossns_dd_calls:         { queryable: true, type: integer, counter_type: Incrementing, description: "Number of data definition requests sent to OSS name servers (creat, open, link, mkdir, etc.)" }
    ossns_requests:         { queryable: true, type: integer, counter_type: Incrementing, description: "Number of requests sent to OSS name servers (fileinfo, DD, directory, resolution)" }
    ossns_message_bytes:    { queryable: true, type: integer, unit: bytes, counter_type: Accumulating, description: "Message data bytes sent and received for OSS name server requests" }
    ossns_wait_time:        { queryable: true, type: integer, unit: microseconds, counter_type: Busy, description: "Time process waited on OSS name server requests; RATE ON → %" }
    ossns_redirects:        { queryable: true, type: integer, counter_type: Incrementing, description: "Number of redirected requests sent to OSS name servers" }


tmf:
  source_file: measurefiles/tmfcsv
  ddl_record: ZMSTMF
  entity_type: TMF (Transaction Management Facility)
  purpose: >
    Transaction Management Facility performance metrics per CPU. Captures transaction
    activity including home transactions, remote transactions, aborting transactions,
    and TMP queue activity. TMF counters are advanced only in the CPU containing the
    primary $TMP process.
  identity_columns: [system_name, cpu_num]
  time_columns: [from_timestamp, to_timestamp, delta_time]
  join_hints:
    - "JOIN cpu ON (system_name, cpu_num, from_timestamp) for CPU context"
    - "JOIN proc ON (system_name, cpu_num, from_timestamp) for process activity"
  columns:
    # --- Shared header ---
    u_loadid.loadid:              { queryable: false }
    u_loadid.load_id.prefix_id:   { queryable: false }
    u_loadid.load_id.interval_id: { queryable: false }
    system_name:       { queryable: true,  type: string }
    cpu_num:           { queryable: true,  type: integer }
    os_version.letter: { queryable: true,  type: string }
    os_version.number: { queryable: true,  type: string }
    object_uid:        { queryable: false }
    from_timestamp:    { queryable: true,  type: datetime }
    to_timestamp:      { queryable: true,  type: datetime }
    delta_time:        { queryable: true,  type: integer, unit: microseconds }
    template_version:      { queryable: false }
    format_version.letter: { queryable: false }
    format_version.number: { queryable: false }
    data_version.letter:   { queryable: false }
    data_version.number:   { queryable: false }
    subsystem_version:     { queryable: false, description: "Provided by the TMF subsystem" }
    error:                 { queryable: false }

    # --- Transaction Counters ---
    home_trans:             { queryable: true, type: integer, counter_type: Incrementing, description: "Number of transactions that began in the measured CPU; includes transactions regardless of whether they remain on the local system or are distributed to a remote system" }
    home_trans_qtime:       { queryable: true, type: integer, unit: microseconds, counter_type: Queue, description: "Sum of lifetimes of transactions originated in the measured CPU; includes transactions regardless of whether they remain in the local system or are distributed to a remote system; RATE ON → AQL" }
    home_net_trans:         { queryable: true, type: integer, counter_type: Incrementing, description: "Number of transactions that began in this system and were subsequently distributed to another system; advanced only in the CPU containing the primary $TMP process" }
    home_net_trans_qtime:   { queryable: true, type: integer, unit: microseconds, counter_type: Queue, description: "Time that transactions that began on the local system and were subsequently distributed to a remote system spent on the remote system; advanced only in the CPU containing the primary $TMP process; RATE ON → AQL" }
    remote_trans:           { queryable: true, type: integer, counter_type: Incrementing, description: "Number of transactions that began in a remote system and were distributed to the measured system; advanced only in the CPU containing the primary $TMP process" }
    remote_trans_qtime:     { queryable: true, type: integer, unit: microseconds, counter_type: Queue, description: "Time that transactions that began in a remote system and were distributed to the local system spent on the local system; advanced only in the CPU containing the primary $TMP process; RATE ON → AQL" }
    aborting_trans:         { queryable: true, type: integer, counter_type: Incrementing, description: "Number of aborted transactions; counted regardless of whether it began in the local system and remained there, began in the local system and was distributed to a remote system, or began in a remote system and was distributed to the local system; advanced only in the CPU containing the primary $TMP process" }
    trans_backout_qtime:    { queryable: true, type: integer, unit: microseconds, counter_type: Queue, description: "Time that transactions spent waiting for and being serviced by BACKOUT; after a transaction is designated as aborting and its audit is on disk, that transaction is scheduled for backout services; advanced only in the CPU containing the primary $TMP process; RATE ON → AQL" }

    # --- TMP Queue Activity ---
    tmp_work:               { queryable: true, type: integer, counter_type: Incrementing, description: "Number of work items placed on the TMP queue" }
    tmp_work_qtime:         { queryable: true, type: integer, unit: microseconds, counter_type: Queue, description: "Time that work items spent on the TMP queue; RATE ON → AQL" }

    # --- PIO (Process I/O) Activity ---
    pio_sends:              { queryable: true, type: integer, counter_type: Incrementing, description: "Number of PIOs sent to other CPUs" }
    pio_send_qtime:         { queryable: true, type: integer, unit: microseconds, counter_type: Queue, description: "Time PIOs spent in transit; RATE ON → AQL" }
    pio_send_bytes:         { queryable: true, type: integer, unit: bytes, counter_type: Accumulating, description: "Number of PIO bytes sent to other CPUs" }
    pio_recvs:              { queryable: true, type: integer, counter_type: Incrementing, description: "Number of PIOs received by the CPU" }
    pio_recv_bytes:         { queryable: true, type: integer, unit: bytes, counter_type: Accumulating, description: "Number of PIO bytes received by the CPU" }


udef:
  source_file: measurefiles/udefcsv
  ddl_record: ZMSUDEF
  entity_type: UDEF (User-Defined Counters)
  purpose: >
    User-defined performance counters created by application processes using the
    MEASCOUNTERBUMPINIT and MEASCOUNTERBUMP procedures. Each counter record
    represents one user-defined counter instance with its name, type, index, and value.
    Applications can define counters of various types: accumulating, busy, queue, snapshot, etc.
  identity_columns: [system_name, cpu_num, pin, process_name, name, type, index]
  time_columns: [from_timestamp, to_timestamp, delta_time]
  join_hints:
    - "JOIN proc ON (system_name, cpu_num, pin, from_timestamp) for process context"
  columns:
    # --- Shared header ---
    u_loadid.loadid:              { queryable: false }
    u_loadid.load_id.prefix_id:   { queryable: false }
    u_loadid.load_id.interval_id: { queryable: false }
    system_name:       { queryable: true,  type: string }
    cpu_num:           { queryable: true,  type: integer }
    os_version.letter: { queryable: true,  type: string }
    os_version.number: { queryable: true,  type: string }
    object_uid:        { queryable: false }
    from_timestamp:    { queryable: true,  type: datetime }
    to_timestamp:      { queryable: true,  type: datetime }
    delta_time:        { queryable: true,  type: integer, unit: microseconds }
    template_version:      { queryable: false }
    format_version.letter: { queryable: false }
    format_version.number: { queryable: false }
    data_version.letter:   { queryable: false }
    data_version.number:   { queryable: false }
    subsystem_version:     { queryable: false, description: "Provided by the application if using SUBSYSTEM-VERSION extension to MEASCOUNTERBUMPINIT()" }
    error:                 { queryable: false }

    # --- Process Identity (ID fields) ---
    pin:                        { queryable: true, type: integer, description: "Process identification number of the measured process" }
    priority:                   { queryable: true, type: integer, description: "Priority of the measured process" }
    userid.group:               { queryable: true, type: integer, description: "Process accessor ID (PAID) group component" }
    userid.user:                { queryable: true, type: integer, description: "Process accessor ID (PAID) user component" }
    creatorid.group:            { queryable: true, type: integer, description: "Creator access ID (CAID) group component" }
    creatorid.user:             { queryable: true, type: integer, description: "Creator access ID (CAID) user component" }
    process_name:               { queryable: true, type: string,  description: "Name of the measured process" }
    program_file_name.volume:   { queryable: true, type: string,  description: "Volume of the program object file" }
    program_file_name.subvol:   { queryable: true, type: string,  description: "Subvolume of the program object file" }
    program_file_name.filename: { queryable: true, type: string,  description: "Filename of the program object file" }
    osspid:                     { queryable: true, type: integer, description: "OSS process ID; zeros for non-OSS processes" }
    ancestor_cpu:               { queryable: true, type: integer, description: "CPU number of the ancestor process" }
    ancestor_pin:               { queryable: true, type: integer, description: "PIN of the ancestor process" }
    ancestor_sysname:           { queryable: true, type: string,  description: "System name of the ancestor process" }
    ancestor_process_name:      { queryable: true, type: string,  description: "Name of the ancestor process" }
    device_name:                { queryable: true, type: string,  description: "Disk device of the program file; for SMF = physical location" }
    program_file_name_mid.pathid: { queryable: false, description: "Internal OSS MID PATHID for program file; zeros for non-OSS" }
    program_file_name_mid.crvsn:  { queryable: false, description: "Creation Version Serial Number for program file; zeros for non-OSS" }
    u_gmom.gmom.gmom_node:      { queryable: true, type: integer, description: "Expand node number of GMOM process (NetBatch); 0 if not NetBatch" }
    u_gmom.gmom.gmom_cpu:       { queryable: true, type: integer, description: "CPU of GMOM process (NetBatch); 0 if not NetBatch" }
    u_gmom.gmom.gmom_pin:       { queryable: true, type: integer, description: "PIN of GMOM process (NetBatch); 0 if not NetBatch" }
    u_gmom.gmom.gmom_jobid:     { queryable: true, type: integer, description: "NetBatch job ID assigned by GMOM; 0 if not NetBatch" }
    gmom_sysname:               { queryable: true, type: string,  description: "Expand system name of GMOM node if remote; spaces otherwise" }
    gmom_process_name:          { queryable: true, type: string,  description: "Named process name of GMOM; spaces if not NetBatch" }

    # --- Counter Identity ---
    type:                       { queryable: true, type: integer, description: "Type of the user-defined counter: 1=ACCUM (32-bit), 2=BUSY, 3=QUEUE, 4=FACCUM (64-bit), 5=QBUSY, 6=TCELLBUSY, 7=TCELLQUEUE, 8=TCELLQBUSY, 9=SNAPSHOT (32-bit), 10=FSNAPSHOT (64-bit)" }
    index:                      { queryable: true, type: integer, description: "Index value of the counter; single counter value has index 0; array index values range from 0-127 (0-511 for H07/J05/L-series and later)" }
    name:                       { queryable: true, type: string,  description: "Name of the user-defined counter (up to 16 characters)" }

    # --- Counter Value ---
    value:                      { queryable: true, type: integer, description: "Value of the user-defined counter; interpretation depends on counter type" }
