      unit: microseconds
      counter_type: Busy
      description: "Elapsed time executing waited I/O requests; for nowait I/O includes\
        \ AWAITIO wait time; RATE ON \xE2\u2020\u2019 % (MANUAL DEF: For waited I/O,\
        \ the FILE-BUSY-TIME counter is the elapsed time spent executing waited I/O\
        \ requests. OSS file opens count file busy time for waited requests after\
        \ the first significant file operation on the file.) (DERIVED METRIC: For\
        \ waited I/O, the FILE-BUSY-TIME counter is the elapsed time spent executing\
        \ waited I/O requests. The file system starts FILE-BUSY-TIME counter when\
        \ the message for the I/O request (for example, READ or WRITE) is sent to\
        \ the server. Requests sent during the file open and close and requests sent\
        \ to the OSS Name Server are not counted in the FILE-BUSY-TIME counter, but\
        \ are counted in the PROCESS entity. For nowait I/O, in J06.20/L16.05 and\
        \ later RVUs, the FILE-BUSY-TIME counter includes the elapsed time to initiate\
        \ nowait I/O requests to the server and the elapsed time the process is suspended\
        \ in AWAITIO[X] waiting for nowait I/Os for each file open. ``` NOTENOTE The\
        \ FILE-BUSY-TIME counter does not include: The process wait time in select()\
        \ and FILE_COMPLETE_() for OSS non-regular files to become ready. ``` For\
        \ nowait I/O, in RVUs prior to in J06.20/L16.05, the FILE-BUSY-TIME counter\
        \ is the execution time to initiate nowait I/O requests to the server and\
        \ any elapsed time the process actually spends waiting for nowait requests\
        \ to complete in AWAITIO[X]. For the OSSPIPE FILE open type, general application\
        \ usage of the OSSPIPE will allow read() or write() to complete on a memory-to-memory\
        \ move and will generate a low FILE-BUSY-TIME. However, if applications ignore\
        \ the OSSFM error EWOULDBLOCK (4101), then FILE-BUSY- TIME will increment.)"
      derived_formula: N/A
      thresholds: N/A
    reads:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: 'Calls to read family of APIs including OSS read() and recv();
        includes DBIO and OSS cache reads (MANUAL DEF: Number of read operations (from
        the terminal to memory) performed by the terminal process. Counter type: Incrementing.)'
      derived_formula: "DEVICE-QBUSY-TIME is divided by the sum of READS and WRITES.\
        \ ``` ``` For a prefetch operation, the physical reads done for a given volume\
        \ can be derived as ((CACHE-HITS + DISC-READS) \u2013 DRIVE R-INPUT-CALLS).\
        \ For a prefetch operation, the physical reads done for a given volume can\
        \ be derived as ((CACHE-READ-HITS+ DISC-READS) \u2013 DRIVER-INPUT-CALLS)."
    writes:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: 'Calls to WRITE family of APIs (excluding WRITEREAD); includes
        DBIO and OSS cache writes (MANUAL DEF: Number of write operations (from memory
        to the terminal) performed by the terminal process. Counter type: Incrementing.)'
      derived_formula: DEVICE-QBUSY-TIME is divided by the sum of READS and WRITES.
        For writes to unstructured files where the write-count is less than or equal
        to 4096 bytes and for structured files, the number of physical disk write
        operations is the difference between DRIVER-OUTPUT-CALLS and CACHE-WRITE-HITS.
        For writes to unstructured files where the write-count is greater than 4096
        (large write), the number of physical disk write operations is the difference
        between DRIVER-OUTPUT-CALLS and the sum of CACHE-WRITE-HITS and CACHE-WRITE-CLEANS.
    updates_or_replies:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: 'WRITEUPDATE calls with non-zero buffer (updates on disk/tape)
        or successful REPLY calls (on terminals/processes) (MANUAL DEF: Number of
        calls to the WRITEUPDATE family of APIs with a non-zero buffer length for
        update operations and number of successful calls to the REPLY family of APIs.
        This counter includes both user and system calls to these procedures.)'
    deletes_or_writereads:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: 'WRITEUPDATE calls with zero buffer (deletes on disk/tape) or WRITEREAD
        calls (on terminals/processes) (MANUAL DEF: Number of calls to the WRITEUPDATE
        APIs with a buffer length of zero for delete operations and number of calls
        to the WRITEREAD APIs for write and read operations. This counter includes
        both user and system calls to these procedures.)'
      derived_formula: N/A
      thresholds: N/A
    info_calls:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: 'Calls to FILEINFO, FILE_GETINFO_, DEVICEINFO, etc. that dispatched
        a message; for OSS includes fstat(), getsockname(), etc. (MANUAL DEF: Number
        of calls to these procedures that resulted in a message being sent to a process
        (IOP or other) to obtain the information requested: ``` FILEINFO DEVICEINFO2
        getsockopt() FILERECINFO access() pathconf() FILE_GETINFO_ fpathconf() select()
        FILE_GETINFOBYNAME_ fstat() sockatmark() FILE_GETINFOLISTBYNAME_ fstatvfs()
        stat() FILEGETINFO_LIST getpeername() statvfs() DEVICEINFO getsockname() ```
        Counter type: Incrementing.)'
    records_used:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: 'Records returned to SQL executor on reads/inserts/writes/updates/deletes;
        zero for Enscribe files (MANUAL DEF: Number of records inserted, updated,
        deleted, or read by the SQL executor through this statement. In G-series and
        earlier RVUs, this is a 32-bit counter.) (DERIVED METRIC: In G-series RVUs,
        the RECORDS-USED-F field is a 64-bit version of RECORDS-USED.)'
    records_accessed:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: 'Records read by disk process to perform operations; >= records_used;
        zero for Enscribe files (MANUAL DEF: Number of records accessed by the disk
        process or file system to evaluate this statement. In G-series and earlier
        RVUs, this is a 32-bit counter.) (DERIVED METRIC: In G-series RVUs, the RECORDS-ACCESSED-F
        field is a 64-bit version of RECORDS-ACCESSED.)'
    disc_reads:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: 'Number of physical disk reads performed (MANUAL DEF: Number of
        physical disk reads performed for this statement. If the REPORT RATE value
        is on, the rate is disk reads for each second.) (DERIVED METRIC: In G-series
        RVUs, the DISC-READS-F field is a 64-bit version of DISC-READS.)'
      derived_formula: N/A
      thresholds: N/A
    messages:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: 'Messages sent for this open including OPEN messages; for OSS sockets
        = name server activity only (MANUAL DEF: Number of messages sent by the system
        on behalf of this statement, including messages sent by the file system to
        the disk process and messages sent by the SQL executor to the SQL compiler
        for recompiles. In G-series and earlier RVUs, this is a 32-bit counter.)'
      thresholds: 'SubtopicsSubtopics INFO CommandINFO Command SPLIT CommandSPLIT
        Command HELP CommandHELP Command MEASFT Error and Warning MessagesMEASFT Error
        and Warning Messages # INFO CommandINFO Command The INFO command produces
        a report that indicates how much space in a data file is associated with each
        entity type and processor type.'
    message_bytes:
      queryable: true
      type: integer
      unit: bytes
      counter_type: Accumulating
      description: 'Message bytes sent and received for this open; does not include
        DBIO bytes (MANUAL DEF: Number of message bytes sent for this statement by
        the system. This counter accumulates the number of bytes sent for the messages
        reported by the MESSAGES counter.)'
    lock_waits:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: 'Number of times a call waited for a lock request (MANUAL DEF:
        Number of times this statement waited for a lock request. Counter type: Incrementing.)'
    timeouts_or_cancels:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: 'Number of timeouts or cancels issued against this open (MANUAL
        DEF: Number of timeouts or cancels issued against this OPEN. Counter type:
        Incrementing.)'
    escalations:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: 'Number of times a record lock escalated to a file-level lock (MANUAL
        DEF: Number of times a record lock was escalated to a file lock. Counter type:
        Incrementing.)'
      derived_formula: N/A
      thresholds: N/A
    dbio_reads:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: 'Direct bulk I/O read operations; subset of reads (MANUAL DEF:
        Number of direct bulk I/O read operations to the measured file. This counter
        is a subset of READS.)'
      derived_formula: N/A
      thresholds: N/A
    dbio_writes:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: 'Direct bulk I/O write operations; subset of writes (MANUAL DEF:
        Number of direct bulk I/O write operations to the measured file. This counter
        is a subset of WRITES.)'
      derived_formula: N/A
      thresholds: N/A
    dbio_read_bytes:
      queryable: true
      type: integer
      unit: bytes
      counter_type: Accumulating
      description: 'Bytes transferred by DBIO read operations (MANUAL DEF: Number
        of bytes transferred by direct bulk I/O read operations. Counter type: Incrementing.)'
      derived_formula: N/A
      thresholds: N/A
    dbio_write_bytes:
      queryable: true
      type: integer
      unit: bytes
      counter_type: Accumulating
      description: 'Bytes transferred by DBIO write operations (MANUAL DEF: Number
        of bytes transferred by direct bulk I/O write operations. Counter type: Incrementing.)'
      derived_formula: N/A
      thresholds: N/A
    read_bytes:
      queryable: true
      type: integer
      unit: bytes
      counter_type: Accumulating
      description: 'Bytes returned to user application data buffer; available for
        all file open types (MANUAL DEF: Total number of bytes transferred as a result
        of read requests or pull operations and the bytes received in pre-push operations
        from the linker CPU. Counter type: Accumulating.)'
    write_bytes:
      queryable: true
      type: integer
      unit: bytes
      counter_type: Accumulating
      description: 'Bytes written from user application buffer; available for all
        file open types (MANUAL DEF: Total number of bytes transferred as a result
        of write requests. Counter type: Accumulating.)'
    oss_cache_reads:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: 'Application reads from OSS file-system cache (OSS regular files
        only) (MANUAL DEF: For OSS regular files only, the number of READS performed
        using OSS cache. Counter type: Incrementing.)'
    oss_cache_writes:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: 'Application writes processed using OSS file-system cache (OSS
        regular files only) (MANUAL DEF: For OSS regular files only, the number of
        WRITES performed using OSS cache. Counter type: Incrementing.)'
    oss_cache_read_bytes:
      queryable: true
      type: integer
      unit: bytes
      counter_type: Accumulating
      description: 'Bytes read by oss_cache_reads (OSS regular files only) (MANUAL
        DEF: For OSS regular files only, the number of bytes read by OSS-CACHE-READS.
        Counter type: Accumulating.) (DERIVED METRIC: For OSS regular files only,
        the number of bytes read by OSS-CACHE-READS.)'
    oss_cache_write_bytes:
      queryable: true
      type: integer
      unit: bytes
      counter_type: Accumulating
      description: 'Bytes written by oss_cache_writes (OSS regular files only) (MANUAL
        DEF: For OSS regular files only, the number of bytes written by OSS-CACHE-WRITES.
        Counter type: Accumulating.) (DERIVED METRIC: For OSS regular files only,
        the number of bytes written by OSS-CACHE-WRITES.)'
    oss_block_reads:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: 'Block read requests to DP2 to fill OSS cache (OSS regular files
        only) (MANUAL DEF: For OSS regular files only, the number of block read requests
        to DP2 issued to fill OSS cache. A block read call can return more than one
        block.)'
    oss_block_read_bytes:
      queryable: true
      type: integer
      unit: bytes
      counter_type: Accumulating
      description: 'Bytes read to cache as a result of oss_block_reads (OSS regular
        files only) (MANUAL DEF: For OSS regular files only, the number of bytes read
        to cache as a result of OSS-BLOCK-READS. Counter type: Accumulating.) (DERIVED
        METRIC: For OSS regular files only, the number of bytes read to cache as a
        result of OSS-BLOCK-READS.)'
    oss_flow_controls:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: 'Times a WRITE operation was blocked (OSS sockets and pipes) (MANUAL
        DEF: For OSS sockets and pipes, this counter reports the number of times a
        WRITE operation was blocked. Counter type: Incrementing.)'
    misc_calls:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: 'OSS operations that increase file_busy_time but are not reads/writes/info_calls:
        ioctl(), fsync(), ftruncate(), lseek(), fcntl(), connect(), setsockopt(),
        accept(), shutdown() (MANUAL DEF: For OSS, this counter totals operations
        that increase FILE-BUSY-TIME but are not READS, WRITES, or INFO-CALLS. APIs
        that fall in this category are ioctl(), fsync(), ftruncate(), lseek(), and
        fcntl(), and the socket APIs connect(), setsockopt(), accept(), and shutdown().)
        (DERIVED METRIC: For OSS, this counter totals operations that increase FILE-BUSY-TIME
        but are not READS, WRITES, or INFO-CALLS.)'
    physical_reads (prefetch operation):
      type: integer
      description: Physical reads done for a given volume for a prefetch operation.
        CACHE-READ-HITS (or CACHE-HITS) is from the FILE entity.
      queryable: true
      derived_formula: ((CACHE-READ-HITS + DISC-READS) - DRIVE-READS)
      thresholds: N/A
    average queue time counters (_aqt, _art):
      type: integer
      description: Measure the average time that each item visiting a queue spends
        there. -ART includes average service time; -AQT does not.
      queryable: true
      derived_formula: Queue counter / Corresponding incrementing counter for items
        visiting the queue
      thresholds: N/A
    average service time counters (_ast):
      type: integer
      description: Measure the average time to satisfy each request of a resource.
      queryable: true
      derived_formula: Busy or queue-busy counter for a resource / Corresponding incrementing
        counter for requests of the resource
      thresholds: N/A
ossns:
  source_file: measurefiles/ossnscsv
  ddl_record: ZMSOSSNS
  entity_type: OSSNS (OSS Name Service)
  purpose: 'OSS Name Service (NS) performance metrics per process. One record per
    primary and backup process for each OSS name server defined on the system. Any
    OSS operation involving an OSS file pathname uses the OSS name server.

    '
  identity_columns:
  - system_name
  - cpu_num
  - pin
  - process_name
  time_columns:
  - from_timestamp
  - to_timestamp
  - delta_time
  join_hints:
  - JOIN proc ON (system_name, cpu_num, pin, from_timestamp) for process context
  columns:
    u_loadid.loadid:
      queryable: false
      type: string
    u_loadid.load_id.prefix_id:
      queryable: false
      type: string
    u_loadid.load_id.interval_id:
      queryable: false
      type: string
    system_name:
      queryable: true
      type: string
      description: '(MANUAL DEF: Name of the system on which the measurement was taken.)'
    cpu_num:
      queryable: true
      type: integer
      description: "(MANUAL DEF: Number of the CPU on which the measurement was taken.\
        \ For interprocessor communications (IPC) records, CPU\u2011NUM is MYCPU.)"
    os_version.letter:
      queryable: true
      type: string
    os_version.number:
      queryable: true
      type: integer
    object_uid:
      queryable: false
      type: string
      description: '(MANUAL DEF: (ZMS Style only) Reserved for future use.)'
    from_timestamp:
      queryable: true
      type: datetime
      description: "(MANUAL DEF: Starting time of the measurement or transient entity.\
        \ Specified as Julian\u2011based, local civil time (LCT).) (DERIVED METRIC:\
        \ When using the CSV[A], JSON, or XML report format, the timestamp is emitted\
        \ as ISO 8601 date and time of day representation, extended format, fractional\
        \ seconds, local time (YYYY-MM-DDThh:mm:ss.s).)"
    to_timestamp:
      queryable: true
      type: datetime
      description: "(MANUAL DEF: Ending time of the measurement or transient entity.\
        \ Specified as Julian\u2011based, local civil time (LCT).) (DERIVED METRIC:\
        \ When using the CSV[A], JSON, or XML report format, the timestamp is emitted\
        \ as ISO 8601 date and time of day representation, extended format, fractional\
        \ seconds, local time (YYYY-MM-DDThh:mm:ss.s).)"
    delta_time:
      queryable: true
      type: integer
      unit: microseconds
      description: '(MANUAL DEF: Duration of the measurement, in microseconds.)'
    template_version:
      queryable: false
      type: integer
      description: '(MANUAL DEF: (ZMS Style only) Record template version from MEASDDLS
        for the format of the external record. When data collected on systems of differing
        product versions are stored in the same structured files, the template version
        for all records is the one used to create the structured file.)'
    format_version.letter:
      queryable: false
      type: string
    format_version.number:
      queryable: false
      type: integer
    data_version.letter:
      queryable: false
      type: string
    data_version.number:
      queryable: false
      type: integer
    subsystem_version:
      queryable: false
      type: integer
      description: '(MANUAL DEF: (ZMS Style only) This value is set to 1 for the initial
        H-series and later versions of all subsystems. If the value is greater than
        1, consult the subsystem documentation for information about changes that
        affect the Measure counters.)'
    error:
      queryable: false
      type: integer
      description: '(MANUAL DEF: Indicates whether an error prevented Measure from
        collecting data or writing an output record for this entity. For values, see
        Identifying Data File Errors.)'
    pin:
      queryable: true
      type: integer
      description: 'PIN of the NS process (MANUAL DEF: Process identification number
        of the measured process.)'
    process_name:
      queryable: true
      type: string
      description: 'Named process name (e.g. $ZPNS) (MANUAL DEF: Name of the measured
        process.)'
    program_file_name.volume:
      queryable: true
      type: string
      description: Volume of the NS program file
    program_file_name.subvol:
      queryable: true
      type: string
      description: Subvolume of the NS program file
    program_file_name.filename:
      queryable: true
      type: string
      description: Filename of the NS program file
    ic_entries:
      queryable: true
      type: integer
      counter_type: Snapshot
      description: 'Configured number of Inode Cache (IC) records available on this
        name server (MANUAL DEF: Configured number of inode cache records available
        on an OSS name server.)'
    lc_entries:
      queryable: true
      type: integer
      counter_type: Snapshot
      description: 'Configured number of Link Cache (LC) records available on this
        name server (MANUAL DEF: Configured number of link cache records available
        on an OSS name server.)'
    rr_processed:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: 'Number of name resolution requests processed by this name server
        (MANUAL DEF: Number of name resolution requests processed by the OSS name
        server under measurement. Counter type: Incrementing.)'
    rr_redir_sent:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: 'Number of name resolution requests redirected to another name
        server (MANUAL DEF: Number of name resolution requests redirected by an OSS
        name server. Counter type: Incrementing.)'
    rr_redir_processed:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: 'Number of redirected name resolution requests processed (MANUAL
        DEF: Number of redirected name resolution requests processed by an OSS name
        server. Counter type: Incrementing.)'
    ic_lookups:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: 'Inode Cache lookup operations (MANUAL DEF: Number of inode cache
        lookups performed by an OSS name server. Counter type: Incrementing.)'
    ic_hits:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: 'Inode Cache hits; ic_hits/ic_lookups = hit ratio (MANUAL DEF:
        Number of inode cache hits encountered by an OSS name server. To derive inode
        cache misses, subtract IC-HITS from IC-LOOKUPS.) (DERIVED METRIC: To derive
        inode cache misses, subtract IC-HITS from IC-LOOKUPS.)'
      derived_formula: inode cache misses = IC-LOOKUPS - IC-HITS
    ic_dirty_qtime:
      queryable: true
      type: integer
      unit: microseconds
      counter_type: Queue
      description: "Time dirty IC entries waited in queue; RATE ON \xE2\u2020\u2019\
        \ AQL (MANUAL DEF: Amount of time inode cache entries were dirty on an OSS\
        \ name server. Counter type: Queue.)"
    lc_lookups:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: 'Link Cache lookup operations; LC also remembers unsuccessful lookups
        (MANUAL DEF: Number of link cache lookups performed by an OSS name server.
        Counter type: Incrementing.)'
    lc_hits:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: 'Link Cache hits; lc_hits/lc_lookups = hit ratio (MANUAL DEF: Number
        of link cache hits encountered by an OSS name server. Link cache misses can
        be derived by subtracting LC-HITS from LC-LOOKUPS.) (DERIVED METRIC: Link
        cache misses can be derived by subtracting LC-HITS from LC-LOOKUPS.)'
      derived_formula: link cache misses = LC-LOOKUPS - LC-HITS
    lc_inuse_qtime:
      queryable: true
      type: integer
      unit: microseconds
      counter_type: Queue
      description: "Time LC entries were in use; LC can expand beyond configured size;\
        \ RATE ON \xE2\u2020\u2019 AQL (MANUAL DEF: Amount of time link cache entries\
        \ were in use on an OSS name server. Link cache expands beyond the configured\
        \ number of entries if needed.)"
    checkpoint_reqs:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: 'Logical checkpoint requests sent by this name server to its backup
        (MANUAL DEF: Number of logical checkpoint requests sent by an OSS name server.
        Checkpoint requests are assembled into blocks in the primary so that multiple
        requests are sent to the backup in each message.)'
    checkpoint_blks:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: 'Checkpoint blocks sent to backup (multiple requests assembled
        per block) (MANUAL DEF: Number of checkpoint blocks sent by an OSS name server
        to its backup. Counter type: Incrementing.)'
    sem_waits:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: 'Semaphore wait events in processing threads (MANUAL DEF: Number
        of semaphore waits an OSS name server encounters in its processing threads.
        Counter type: Incrementing.)'
    sem_wait_qtime:
      queryable: true
      type: integer
      unit: microseconds
      counter_type: Queue
      description: "Cumulative semaphore wait time in processing threads; RATE ON\
        \ \xE2\u2020\u2019 AQL (MANUAL DEF: Amount of time spent in a semaphore wait\
        \ condition by OSS name server processing threads. An OSS name server is a\
        \ multithreaded process.)"
    dp2_dd_reqs:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: 'Data definition requests sent to DP2 (creat, open, link, mkdir,
        chmod, chown, utime, rename, unlink, rmdir, mknod, mkfifo, bind) (MANUAL DEF:
        Number of data definition requests sent to DP2 by an OSS name server. Data
        definition operations are initiated by these procedures: ``` creat()link()
        mkdir()chmod()utime() bind() open()unlink()rmdir()chown() rename() ``` Counter
        type: Incrementing.)'
    dp2_messages:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: 'Total messages sent to DP2 (includes DD calls and other calls)
        (MANUAL DEF: Number of messages an OSS name server sent to DP2. The total
        includes Data Definition calls, which modify the file label, as well as other
        calls that do not alter the disk entry.)'
    dp2_msg_qtime:
      queryable: true
      type: integer
      unit: microseconds
      counter_type: Queue
      description: "Accumulated service time waiting while DP2 messages were outstanding;\
        \ RATE ON \xE2\u2020\u2019 AQL (MANUAL DEF: Accumulated service time spent\
        \ in a thread waiting while DP2 messages were outstanding on an OSS name server.\
        \ Counter type: Queue.)"
    ps_messages:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: 'Messages sent to pipe server processes ($ZPPnn) (MANUAL DEF: Number
        of messages an OSS name server sent to pipe server processes. The pipe server
        runs in each CPU ($ZPPnn, where nn = CPU number) and provides pipe services
        for applications using OSS pipes and FIFOs.)'
    ps_msg_qtime:
      queryable: true
      type: integer
      unit: microseconds
      counter_type: Queue
      description: "Time pipe server messages were outstanding; RATE ON \xE2\u2020\
        \u2019 AQL (MANUAL DEF: Amount of time pipe server messages from an OSS name\
        \ server were outstanding. Counter type: Queue.)"
    ls_messages:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: 'Messages sent to local OSS server process ($ZPLS or $ZLSnn) (MANUAL
        DEF: Number of messages an OSS name server sent to the local OSS server process.
        The local OSS server ($ZPLS for pre-AF_UNIX R2; $ZLS nn, where nn is the CPU
        number, or $ZLSNN for AF_UNIX R2) is the transport provider for AF_UNIX sockets.)'
    ls_msg_qtime:
      queryable: true
      type: integer
      unit: microseconds
      counter_type: Queue
      description: "Time local server messages were outstanding; RATE ON \xE2\u2020\
        \u2019 AQL (MANUAL DEF: Amount of time spent waiting on completion of local\
