  dfile.ENDING_EOF: "This item is displayed in its absolute value in bytes, followed\
    \ by the ratio of ENDING\u2011EOF over STARTING-EOF."
  dfile.DRIVER_INPUT_CALLS: The number of physical read operations is the difference
    between DRIVER- INPUT-CALLS and CACHE-READ-HITS.
  dfile.DRIVER_OUTPUT_CALLS: For writes to unstructured files where the write-count
    is less than or equal to 4096 bytes and for structured files, the number of physical
    disk write operations is the difference between DRIVER-OUTPUT-CALLS and CACHE-WRITE-HITS.
    For writes to unstructured files where the write-count is greater than 4096 (large
    write), the number of physical disk write operations is the difference between
    DRIVER-OUTPUT-CALLS and the sum of CACHE-WRITE-HITS and CACHE-WRITE-CLEANS.
  dfile.LOCKWAIT_TIME: "When the REPORT RATE value is on, this counter returns the\
    \ average wait time (LOCKWAIT\u2011TIME divided by REQUESTS\u2011BLOCKED)."
  dfile.DBIO_INPUT_CALLS: This counter is a subset of DRIVER-INPUT-CALLS.
  dfile.DBIO_OUTPUT_CALLS: This counter is a subset of DRIVER-OUTPUT-CALLS.
  dfile.OSS_BLOCK_WRITE_BYTES: Number of bytes written by DP2 as a result of OSS-BLOCK-WRITES.
  dfile.OSS_CALLBACK_WRITES: Number of OSS-BLOCK-WRITES received by DP2 as a result
    of OSS-CACHE-CALLBACKS.
  dopen.FROM_TIMESTAMP: When using the CSV[A], JSON, or XML report format, the timestamp
