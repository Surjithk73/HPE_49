      counter_type: Incrementing
      description: 'OSS block writes received by DP2 as a result of oss_cache_callbacks
        Number of OSS-BLOCK-WRITES received by DP2 as a result of OSS-CACHE-CALLBACKS.
        Counter type: Incrementing. Number of OSS-BLOCK-WRITES received by DP2 as
        a result of OSS-CACHE-CALLBACKS.'
