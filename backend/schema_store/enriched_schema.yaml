udef:
  source_file: measurefiles/udefcsv
  ddl_record: ZMSUDEF
  entity_type: UDEF (User-Defined Counters)
  purpose: 'User-defined performance counters created by application processes using
    the MEASCOUNTERBUMPINIT and MEASCOUNTERBUMP procedures. Each counter record represents
    one user-defined counter instance with its name, type, index, and value. Applications
    can define counters of various types: accumulating, busy, queue, snapshot, etc.

    '
  identity_columns:
  - system_name
  - cpu_num
  - pin
  - process_name
  - name
  - type
  - index
  time_columns:
  - from_timestamp
  - to_timestamp
  - delta_time
  join_hints:
  - JOIN proc ON (system_name, cpu_num, pin, from_timestamp) for process context
  columns:
    system_name:
      queryable: true
      type: string
      description: Name of the system on which the measurement was taken.
    cpu_num:
      queryable: true
      type: integer
      description: Number of the CPU on which the measurement was taken. For interprocessor
        communications (IPC) records, CPU‑NUM is MYCPU.
    object_uid:
      queryable: false
      type: string
      description: Reserved for future use.
    from_timestamp:
      queryable: true
      type: datetime
      description: Starting time of the measurement or transient entity. Specified
        as Julian‑based, local civil time (LCT). When using the CSV[A], JSON, or XML
        report format, the timestamp is emitted as ISO 8601 date and time of day representation,
        extended format, fractional seconds, local time (YYYY-MM-DDThh:mm:ss.s).
    to_timestamp:
      queryable: true
      type: datetime
      description: Ending time of the measurement or transient entity. Specified as
        Julian‑based, local civil time (LCT). When using the CSV[A], JSON, or XML
        report format, the timestamp is emitted as ISO 8601 date and time of day representation,
        extended format, fractional seconds, local time (YYYY-MM-DDThh:mm:ss.s).
    delta_time:
      queryable: true
      type: integer
      unit: microseconds
      description: Duration of the measurement, in microseconds.
    template_version:
      queryable: false
      type: integer
      description: Record template version from MEASDDLS for the format of the external
        record. When data collected on systems of differing product versions are stored
        in the same structured files, the template version for all records is the
        one used to create the structured file.
    subsystem_version:
      queryable: false
      type: integer
      description: Provided by the application if using SUBSYSTEM-VERSION extension
        to MEASCOUNTERBUMPINIT() This value is set to 1 for the initial H-series and
        later versions of all subsystems. If the value is greater than 1, consult
        the subsystem documentation for information about changes that affect the
        Measure counters.
    error:
      queryable: false
      type: integer
      description: Indicates whether an error prevented Measure from collecting data
        or writing an output record for this entity. For values, see Identifying Data
        File Errors.
    pin:
      queryable: true
      type: integer
      description: Process identification number of the measured process
    priority:
      queryable: true
      type: integer
      description: Priority of the measured process
    process_name:
      queryable: true
      type: string
      description: Name of the measured process
    osspid:
      queryable: true
      type: integer
      description: OSS process ID; zeros for non-OSS processes If the process runs
        in the OSS environment, this field contains the OSS Process ID. If it is another
        process, this field contains zeros.
    ancestor_cpu:
      queryable: true
      type: integer
      description: CPU number of the ancestor process Number of the CPU on which the
        ancestor process resides.
    ancestor_pin:
      queryable: true
      type: integer
      description: PIN of the ancestor process Process identification number of the
        ancestor process.
    ancestor_sysname:
      queryable: true
      type: string
      description: System name of the ancestor process Name of the system on which
        the ancestor process resides.
    ancestor_process_name:
      queryable: true
      type: string
      description: Name of the ancestor process
    device_name:
      queryable: true
      type: string
      description: Disk device of the program file; for SMF = physical location Disk
        device on which the program file is located. For SMF files, this field provides
        the physical location that corresponds to the logical file name. For Nonstop
        files, this field is the same as the FILE-NAME VOLUME subfield.
    gmom_sysname:
      queryable: true
      type: string
      description: Expand system name of GMOM node if remote; spaces otherwise Expand
        system name of the GMOM node if the GMOM process is remote; otherwise spaces.
    gmom_process_name:
      queryable: true
      type: string
      description: Named process name of GMOM; spaces if not NetBatch Name of the
        GMOM process that initiated the NETBATCH job that in turn initiated this process;
        otherwise spaces.
    type:
      queryable: true
      type: integer
      description: 'Type of the user-defined counter: 1=ACCUM (32-bit), 2=BUSY, 3=QUEUE,
        4=FACCUM (64-bit), 5=QBUSY, 6=TCELLBUSY, 7=TCELLQUEUE, 8=TCELLQBUSY, 9=SNAPSHOT
        (32-bit), 10=FSNAPSHOT (64-bit)'
    index:
      queryable: true
      type: integer
      description: Index value of the counter; single counter value has index 0; array
        index values range from 0-127 (0-511 for H07/J05/L-series and later) Index
        value of the counter. A single counter value has an index value of 0.
    name:
      queryable: true
      type: string
      description: Name of the user-defined counter (up to 16 characters) Name of
        the user‑defined counter.
    os_version_number:
      type: integer
      queryable: true
      description: os_version_number metric.
    format_version_number:
      type: integer
      queryable: true
      description: format_version_number metric.
    data_version_number:
      type: integer
      queryable: true
      description: data_version_number metric.
    userid_group:
      type: integer
      queryable: true
