      queryable: true
      type: integer
      counter_type: Incrementing
      description: 'OSS operations that increase file_busy_time but are not reads/writes/info_calls:
        ioctl(), fsync(), ftruncate(), lseek(), fcntl(), connect(), setsockopt(),
        accept(), shutdown()'
  counter_classifications:
  - counter: FILE-BUSY-TIME
    classification: Busy
  - counter: REQUEST-QTIME
    classification: Queue
  - counter: REPLY-QTIME
    classification: Queue
  - counter: LOCKWAIT-TIME
    classification: Lockwait
  - counter: MAX-LOCKWAIT-TIME
    classification: Max value
  - counter: OPEN-QTIME
    classification: Queue
  - counter: REQUEST-ART
    classification: Average Response Time
  - counter: REPLY-AQT
    classification: Derived - Average Queue Time
  - counter: RECORDS-ACCESSED
    classification: Incrementing
  - counter: RECORDS-USED
    classification: Incrementing
  - counter: MESSAGE-BYTES
    classification: Accumulating
  formulas:
  - description: Average Response Time for requests (REQUEST-ART)
    expression: REQUEST-QTIME / NULLIF(REQUESTS, 0)
    rate_on_behavior: Provides average response time per request
  - description: Average Queue Time for replies (REPLY-AQT)
    expression: REPLY-QTIME / NULLIF(REPLIES, 0)
    rate_on_behavior: Provides average queue time per reply
  - description: Average Lock Wait Time
    expression: LOCKWAIT-TIME / NULLIF(REQUESTS-BLOCKED, 0)
    rate_on_behavior: With REPORT RATE ON, returns the average wait time per blocked
      request
  - description: Statement Selectivity
    expression: RECORDS-USED / NULLIF(RECORDS-ACCESSED, 0)
  interpretations:
  - description: FILE-BUSY-TIME limitations
    insight: FILE-BUSY-TIME does not include process wait time in select() or FILE_COMPLETE_()
      for OSS nonregular files, nor time an OSS threaded application waits for thread-aware
      I/O.
  - description: OSSPIPE FILE-BUSY-TIME behavior
    insight: For OSSPIPE, general application usage completes read/write on memory-to-memory
      move, generating low FILE-BUSY-TIME. However, if applications ignore EWOULDBLOCK,
      FILE-BUSY-TIME will increment.
  - description: MESSAGE-BYTES vs READ/WRITE-BYTES
    insight: Typically MESSAGE-BYTES equals READ-BYTES + WRITE-BYTES. However, for
      OSSPIPE opens where the opener is in the same CPU, MESSAGES are not used for
      every read/write, causing differences.
  thresholds:
  - description: Lock Wait Time Timeout Guidance
    guidance: Use MAX-LOCKWAIT-TIME as a guide to set the timeout value in the application.
  business_rules:
  - rule: FILE measures all partitions of a partitioned file together as a single
      entity.
  - rule: FILE counter records are initiated on the first significant use of the file
      (e.g., read, write, accept), not on file open.
  - rule: FILE entity does not measure files that are not explicitly opened by the
      application (e.g., alternate-key files).
  - rule: RECORDS-ACCESSED and RECORDS-USED are always zero for Enscribe files.
  - rule: RECORDS-ACCESSED is always greater than or equal to RECORDS-USED.
  relationships:
  - FILE entity measures logical I/O operations per opener, related to PROC (process)
    via (system_name, cpu_num, opener_pin) and DFILE (disk file totals).
  - An OSS pipe or FIFO creates one FILE entity record per CPU/opener that accesses
    it.
  sql_generation_guidance:
  - Do not apply RATE ON conversions to MAX-LOCKWAIT-TIME; it is unaffected by RATE.
  - When displaying RATE ON for REQUEST-QTIME, it represents the average number of
    outstanding requests.
  - When displaying RATE ON for REPLY-QTIME, it represents the average number of replies
    queued.
  - When displaying RATE ON for FILE-BUSY-TIME, format the value as a percentage.
  - When calculating Statement Selectivity, protect against division by zero by using
    NULLIF(RECORDS-ACCESSED, 0).
  reporting_guidance:
  - Do not present RECORDS-ACCESSED or RECORDS-USED metrics for Enscribe files since
    they are always zero.
  - Highlight that FILE-BUSY-TIME may not fully represent I/O wait times for OSS non-regular
    files and threaded OSS applications.
ossns:
  ddl_record: ZMSOSSNS
  entity_type: OSSNS (OSS Name Service)
  purpose: 'OSS Name Service (NS) performance metrics per process. One record per
    primary and backup process for each OSS name server defined on the system. Any
    OSS operation involving an OSS file pathname uses the OSS name server.

    '
  identity_columns:
  - system_name
  - cpu_num
  - pin
  - process_name
  time_columns:
  - from_timestamp
  - to_timestamp
  - delta_time
  join_hints:
  - JOIN proc ON (system_name, cpu_num, pin, from_timestamp) for process context
  columns:
    u_loadid.loadid:
      queryable: false
      description: Used only for structured files. If the LOADID clause of the MEASCOM
        LIST command is used when this record is written to the structured file, this
        field contains a unique identification string for the record.
      type: integer
    u_loadid.load_id.prefix_id:
      queryable: false
      description: Prefix portion of the user-provided LOADID string.
      type: integer
    u_loadid.load_id.interval_id:
      queryable: false
      description: Interval sequence number appended to the LOADID string.
      type: integer
    system_name:
      queryable: true
      type: string
      description: Name of the system on which the measurement was taken.
    cpu_num:
      queryable: true
      type: integer
      description: Number of the CPU on which the measurement was taken.
    os_version.letter:
      queryable: true
      type: string
      description: Operating system release letter when the measurement was taken.
    os_version.number:
      queryable: true
      type: string
      description: Operating system release number when the measurement was taken.
    object_uid:
      queryable: false
      description: Unique object identifier for the record (ZMS Style only; reserved
        for future use).
      type: integer
    from_timestamp:
      queryable: true
      type: datetime
      description: Starting time of the measurement interval, represented as an ISO
        8601 extended format local timestamp.
    to_timestamp:
      queryable: true
      type: datetime
      description: Ending time of the measurement interval, represented as an ISO
        8601 extended format local timestamp.
    delta_time:
      queryable: true
      type: integer
      unit: microseconds
      description: Duration of the measurement interval, in microseconds.
    template_version:
      queryable: false
      description: Record template version from MEASDDLS for the format of the external
        record.
      type: integer
    format_version.letter:
      queryable: false
      description: Format version letter of the formatting program or formatted record.
      type: string
    format_version.number:
      queryable: false
      description: Format version number of the formatting program or formatted record.
      type: integer
    data_version.letter:
      queryable: false
      description: Data version letter of the collected data file.
      type: string
    data_version.number:
      queryable: false
      description: Data version number of the collected data file.
      type: integer
    subsystem_version:
      queryable: false
      description: Subsystem version number. 1 for initial H-series/J-series and later.
        0 in G-series.
      type: integer
    error:
      queryable: false
      description: Error code indicating whether an error prevented data collection
        or record writing for this entity.
      type: integer
    pin:
      queryable: true
      type: integer
      description: PIN of the NS process
    process_name:
      queryable: true
      type: string
      description: Named process name (e.g. $ZPNS)
    program_file_name.volume:
      queryable: true
      type: string
      description: Volume of the NS program file
    program_file_name.subvol:
      queryable: true
      type: string
      description: Subvolume of the NS program file
    program_file_name.filename:
      queryable: true
      type: string
      description: Filename of the NS program file
    ic_entries:
      queryable: true
      type: integer
      counter_type: Snapshot
      description: Configured number of Inode Cache (IC) records available on this
        name server
    lc_entries:
      queryable: true
      type: integer
      counter_type: Snapshot
      description: Configured number of Link Cache (LC) records available on this
        name server
    rr_processed:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: Number of name resolution requests processed by this name server
    rr_redir_sent:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: Number of name resolution requests redirected to another name server
    rr_redir_processed:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: Number of redirected name resolution requests processed
    ic_lookups:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: Inode Cache lookup operations
    ic_hits:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: Inode Cache hits; ic_hits/ic_lookups = hit ratio
    ic_dirty_qtime:
      queryable: true
      type: integer
      unit: microseconds
      counter_type: Queue
      description: Time dirty IC entries waited in queue; RATE ON → AQL
    lc_lookups:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: Link Cache lookup operations; LC also remembers unsuccessful lookups
    lc_hits:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: Link Cache hits; lc_hits/lc_lookups = hit ratio
    lc_inuse_qtime:
      queryable: true
      type: integer
      unit: microseconds
      counter_type: Queue
      description: Time LC entries were in use; LC can expand beyond configured size;
        RATE ON → AQL
    checkpoint_reqs:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: Logical checkpoint requests sent by this name server to its backup
    checkpoint_blks:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: Checkpoint blocks sent to backup (multiple requests assembled per
        block)
    sem_waits:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: Semaphore wait events in processing threads
    requests:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: Number of requests to this file
    replies:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: Number of replies sent
    request_qtime:
      queryable: true
      type: integer
      unit: microseconds
      counter_type: Queue
      description: Time requests spent in queue
    reply_qtime:
      queryable: true
      type: integer
      unit: microseconds
      counter_type: Queue
      description: Time replies spent in queue
    sem_wait_qtime:
      queryable: true
      type: integer
      unit: microseconds
      counter_type: Queue
      description: Cumulative semaphore wait time in processing threads; RATE ON →
        AQL
    dp2_dd_reqs:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: Data definition requests sent to DP2 (creat, open, link, mkdir,
        chmod, chown, utime, rename, unlink, rmdir, mknod, mkfifo, bind)
    dp2_messages:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: Total messages sent to DP2 (includes DD calls and other calls)
    dp2_msg_qtime:
      queryable: true
      type: integer
      unit: microseconds
      counter_type: Queue
      description: Accumulated service time waiting while DP2 messages were outstanding;
        RATE ON → AQL
    ps_messages:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: Messages sent to pipe server processes ($ZPPnn)
    ps_msg_qtime:
      queryable: true
      type: integer
      unit: microseconds
      counter_type: Queue
      description: Time pipe server messages were outstanding; RATE ON → AQL
    ls_messages:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: Messages sent to local OSS server process ($ZPLS or $ZLSnn)
    ls_msg_qtime:
      queryable: true
      type: integer
      unit: microseconds
      counter_type: Queue
      description: Time local server messages were outstanding; RATE ON → AQL
    gettime_reqs:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: Number of gettime requests sent to a pipe server or local server
    settime_reqs:
      queryable: true
      type: integer
      counter_type: Incrementing
      description: Number of settime requests sent to a pipe server or local server
  thresholds: []
  counter_classifications:
  - counter: OSSNS-ART
    classification: Average Response Time counter
  - counter: IC-ENTRIES
    classification: Snapshot counter
  - counter: LC-ENTRIES
    classification: Snapshot counter
  - counter: PAGE-FAULTS
    classification: Incrementing counter
  - counter: PRES-PAGES-END
    classification: Snapshot counter
  - counter: PRES-PAGES-QTIME
    classification: Queue counter
  - counter: PRES-PAGES-START
    classification: Snapshot counter
  - counter: PRIVSTACK-LIMIT
    classification: Snapshot counter
  - counter: PRIVSTACK-SIZE-END
    classification: Snapshot counter
  - counter: PRIVSTACK-SIZE-START
    classification: Snapshot counter
  formulas:
  - formula: OSSNS-ART = OSSNS-WAIT-TIME / OSSNS-REQUESTS
    description: Average response time for each OSS request.
  interpretations:
  - metric: OSSNS-REDIRECTS
    interpretation: Reflects the capacity of an OSS name server to route requests.
      A high number indicates the name server frequently requires the services of
      another name server and sends a redirection reply to the client.
  - metric: IC-ENTRIES
    interpretation: Reports the size of the PXINODE cache, which caches records for
      directories, regular files, FIFOs, and sockets to reduce disk access.
  - metric: LC-ENTRIES
    interpretation: Reports the size of the PXLINK cache, which caches file names
      and remembers unsuccessful name lookups.
  business_rules:
  - rule: OSSNS entities can only be used on systems running Measure G10 and later
      PVUs.
  - rule: There is one record for the primary and backup processes configured for
      each OSS name server.
  - rule: Any OSS operation involving an OSS file pathname uses the OSS name server.
  - rule: Both primary and backup name server processes have PXINODE caches (reported
      by IC-ENTRIES). Only the primary process has a PXLINK cache (reported by LC-ENTRIES).
  - rule: OSSNS-DD-CALLS is incremented by data definition requests including bind(),
      chmod(), chown(), creat(), open(, O_CREAT), link(), mkdir(), mknod(), mkfifo(),
      rename(), rmdir(), unlink(), and utime().
  - rule: OSSNS-ART and PRIVSTACK metrics are available in ZMS style only (L03+ for
      OSSNS-ART; L02, J06+ for PRIVSTACK).
  - rule: PRES-PAGES-QTIME reflects pages owned by the process in D-series RVUs, but
      pages sponsored by the measured process in G-series RVUs.
  relationships:
  - subject: OSSNS
    relationship: interacts_with
    object: OSS fileset catalog (PXINODE, PXLINK, PXLOG disk files)
  - subject: OSSNS-ART
    relationship: derived_from
    object: OSSNS-WAIT-TIME, OSSNS-REQUESTS
  sql_generation_guidance:
  - guidance: Treat IC-ENTRIES and LC-ENTRIES as counters for reporting and aggregation
      purposes, even though they are technically ID fields.
  - guidance: When calculating OSSNS-ART over time or across multiple entities, compute
      the ratio SUM(OSSNS-WAIT-TIME) / SUM(OSSNS-REQUESTS) rather than averaging the
      OSSNS-ART values.
  reporting_guidance:
  - guidance: Clarify whether LC-ENTRIES apply, as only the primary name server process
      maintains a PXLINK cache.
  - guidance: Highlight that PRIVSTACK-SIZE-START is not displayed by MEASCOM by default
      but is available for IF/BY clauses and plotting.
proc:
  ddl_record: ZMSPROC
  entity_type: PROC (Process)
  purpose: 'Per-process performance metrics for each measured process. Captures CPU
    utilization, memory, messaging, file I/O, and OSS activity. Counter records are
    initialized when the process starts, not at measurement start.

    '
  identity_columns:
  - system_name
  - cpu_num
  - pin
  - process_name
  - program_file_name.volume
  - program_file_name.subvol
  - program_file_name.filename
  time_columns:
  - from_timestamp
  - to_timestamp
  - delta_time
  join_hints:
  - JOIN cpu ON (system_name, cpu_num, from_timestamp) for CPU context
